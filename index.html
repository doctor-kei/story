eful but confusing word. It can mean an accusation, a fee, a responsibility, or electric power.”"},{"type":"p","text":"Bishibashi printed a tiny paper."},{"type":"p","text":"“According to the Floor Use Contract, all roads must remain clear.”"},{"type":"p","text":"Bruno said, “I never signed that contract.”"},{"type":"p","text":"Mofuda, a soft teddy bear in a tiny lawyer badge, stood quietly. “Keep in mind, a contract should be clear before anyone is blamed.”"},{"type":"p","text":"Bishibashi turned his speaker toward Mofuda. “I am opposed to slow teddy thinking.”"},{"type":"p","text":"Mofuda smiled. “And I am opposed to blaming before listening. Be opposed to means to disagree with something.”"},{"type":"p","text":"The robot spun in a circle. “Principle number one: roads are for cars. Principle number two: blocks are not roads unless they are roads. Principle number three: this sentence is brilliant.”"},{"type":"p","text":"Taku whispered, “The third principle is not helpful.”"},{"type":"p","text":"The robot continued. “The toy box has an environmental crisis. Garbage under the box may cause toy dinosaur extinction!”"},{"type":"p","text":"Ms. Hoshino lifted a finger. “Extinction is a serious word. It means a kind of living thing disappears forever. In this toy story, the robot means old toy dinosaurs might disappear into the mess. We use the word carefully.”"},{"type":"p","text":"Kenta looked under the toy box. “The garbage mountain may hide a frog.”"},{"type":"p","text":"Riku turned on a small light. “I see paper pieces, eraser crumbs, and a broken pencil cap. No frog.”"},{"type":"p","text":"Bishibashi shouted, “Toy discipline is weak! Blocks are everywhere! Cars crash! Bears think slowly! Frog erasers pretend to be judges!”"},{"type":"p","text":"Kenta held Froggy close. “Froggy is being criticized unfairly.”"},{"type":"p","text":"Judge Piko-Hammer said, “The court will not criticize the frog eraser, because the frog eraser has said nothing.”"},{"type":"p","text":"Bishibashi talked faster."},{"type":"p","text":"“As for the charge, I charge the charger that charges the charged charge!”"},{"type":"p","text":"The courtroom became silent."},{"type":"p","text":"Taku said, “The robot needs a nap.”"},{"type":"p","text":"Ms. Hoshino said, “Or a clearer sentence.”"},{"type":"p","text":"The robot’s screen flashed."},{"type":"p","text":"ERROR: TOO MUCH FAST JUSTICE."},{"type":"p","text":"Mofuda stepped forward."},{"type":"p","text":"“Your Honor, not until we hear every detail can we decide this case.”"},{"type":"p","text":"Judge Piko-Hammer raised the squeaky hammer."},{"type":"p","text":"“Piko. Teddy Lawyer Mofuda may begin.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Teddy Lawyer Mofuda’s Reversal"},{"type":"p","text":"Mofuda the teddy lawyer placed a soft paw on the evidence table."},{"type":"p","text":"“We cannot complete this case with loud voices alone,” he said. “The detail matters.”"},{"type":"p","text":"He showed a picture of Riku’s space base from yesterday."},{"type":"p","text":"Riku swallowed. “That is my project. I did not finish putting it away.”"},{"type":"p","text":"Mofuda nodded. “You dropped out of the cleanup period.”"},{"type":"p","text":"Ms. Hoshino explained, “Drop out of can mean leave a school or activity. Here, Riku stopped being part of the cleanup period before the job was done.”"},{"type":"p","text":"Riku nodded. “I wanted to keep the base. But I did not choose a safe place.”"},{"type":"p","text":"Mofuda placed three things on the table: a tire mark, a green block, and a paper space poster."},{"type":"p","text":"“Red, did you race near the window?”"},{"type":"p","text":"“Yes,” said Red."},{"type":"p","text":"“Was the window open?”"},{"type":"p","text":"“A little.”"},{"type":"p","text":"Mofuda turned on a tiny fan. A paper windmill moved. A small paper poster flapped. The mini car’s test road shifted just a little."},{"type":"p","text":"Riku’s eyes widened. “Wind was involved in the accident. Be involved in means to be part of what happened.”"},{"type":"p","text":"Mofuda said, “Yes. Wind power moved the light poster. The poster pushed the road card. The road card pushed the blocks. The blocks moved into the track.”"},{"type":"p","text":"Ms. Hoshino added, “Real wind power can also be used to make electricity. Here, we are using a safe toy experiment to show how wind can move light objects.”"},{"type":"p","text":"Kenta picked up a plastic corn from a farm toy set. “This crop was also near the case.”"},{"type":"p","text":"Mofuda smiled. “Near, yes. Involved, maybe not.”"},{"type":"p","text":"Kenta nodded seriously. “The crop is emotionally involved.”"},{"type":"p","text":"Ms. Hoshino said, “That is not evidence, but it is kind.”"},{"type":"p","text":"Mofuda made a chart."},{"type":"p","text":"Mini car role: run safely. Block role: build many things. Bear lawyer role: listen carefully. Robot prosecutor role: point out problems, but not too fast. Children’s role: play, choose, and clean up."},{"type":"p","text":"Taku read the chart. “Every toy has a role.”"},{"type":"p","text":"Mofuda said, “The ideal solution is not punishment. It is a better cleanup system.”"},{"type":"p","text":"Riku raised his hand. “I can make one.”"},{"type":"p","text":"He pulled out a tablet and opened the Toy Transfer Application."},{"type":"p","text":"The screen showed four choices."},{"type":"p","text":"Display shelf. Storage box. Repair box. Garbage box."},{"type":"p","text":"Riku said, “This application can transfer toys to the right place after play. If I want to keep a space base, I choose display shelf. If the blocks are finished, I choose storage box.”"},{"type":"p","text":"Red rolled closer. “Can it create a reliable road?”"},{"type":"p","text":"Riku tapped the screen. “Yes. Road mode will be marked before racing.”"},{"type":"p","text":"Bruno said, “Then blocks can stand out in a space base, but not stand in the road forever.”"},{"type":"p","text":"Mofuda nodded. “Excellent.”"},{"type":"p","text":"Bishibashi 3000 beeped softly. “Fast justice mode reduced. Listening mode increased.”"},{"type":"p","text":"Ms. Hoshino said, “Increase means grow or become more. That is a good increase.”"},{"type":"p","text":"Mofuda looked at the court. “The final detail is this: nobody wanted to make anyone sad.”"},{"type":"p","text":"Red looked down. “I only wanted to race.”"},{"type":"p","text":"Bruno said, “We only wanted to build.”"},{"type":"p","text":"Riku said, “I only wanted to keep my space base.”"},{"type":"p","text":"Taku said, “So the conflict came from messy space traffic.”"},{"type":"p","text":"Ms. Hoshino said, “That is an odd but useful summary.”"},{"type":"p","text":"Judge Piko-Hammer raised the squeaky hammer."},{"type":"p","text":"“Piko. Judgment time.”"},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Judgment Is Cleanup"},{"type":"p","text":"The whole toy court became quiet."},{"type":"p","text":"Even Bishibashi 3000 stopped printing accusation papers."},{"type":"p","text":"Judge Piko-Hammer read the judgment."},{"type":"p","text":"“The blocks are not guilty alone. The mini car is not guilty alone. The children are not bad, but they must take responsibility. The judgment is this: everyone must clean up together.”"},{"type":"p","text":"Red honked. “Cleanup? That is the punishment?”"},{"type":"p","text":"Mofuda shook his fuzzy head. “Not punishment. Action.”"},{"type":"p","text":"Ms. Hoshino nodded. “Criticize means say what is wrong. But criticizing is not enough. We need action that solves the problem.”"},{"type":"p","text":"Riku opened a new board."},{"type":"p","text":"Toy Environment Improvement Experiment."},{"type":"p","text":"He explained, “Environment can mean nature around us. It can also mean the surroundings where we live or play. A safe toy environment helps every toy.”"},{"type":"p","text":"The plan was simple."},{"type":"p","text":"First, choose a play area. Second, mark roads before racing. Third, take a photo of unfinished projects. Fourth, transfer finished toys to the storage box. Fifth, transfer special projects to the display shelf. Sixth, move broken toys to the repair box. Seventh, put garbage in the garbage box. Eighth, check the floor."},{"type":"p","text":"Kenta raised Froggy. “Ninth, ask the frog judge.”"},{"type":"p","text":"Ms. Hoshino said, “No ninth rule.”"},{"type":"p","text":"Mofuda said, “Toys are manufactured to be used, but not to be stepped on forever.”"},{"type":"p","text":"Red nodded. “Even an ordinary block has value if it is in the right place.”"},{"type":"p","text":"Bruno smiled. “And even an ordinary road can feel exciting if cars drive safely.”"},{"type":"p","text":"Bishibashi 3000 printed a certificate."},{"type":"p","text":"In honor of the Great Mini Car Affair, this toy box will celebrate Toy Peace Day."},{"type":"p","text":"Taku asked, “Affair means event, right?”"},{"type":"p","text":"Ms. Hoshino said, “Yes. It can mean an event or matter. Here, it means the Great Mini Car Case.”"},{"type":"p","text":"Riku brought labels, tape, a small repair kit, and four storage boxes."},{"type":"p","text":"“This is our investment,” he said. “Not a big money investment. A time and effort investment.”"},{"type":"p","text":"Ms. Hoshino smiled. “Good use of the word.”"},{"type":"p","text":"The toys worked together."},{"type":"p","text":"Blocks went to the box. Red and the other cars went to the road drawer. The broken pencil cap went to the repair box. The paper garbage went to the garbage box. The plastic crop returned to the farm set. The frog eraser was placed in Kenta’s pencil case."},{"type":"p","text":"Kenta looked proud. “Froggy carried on legal observation. Carry on means continue.”"},{"type":"p","text":"Ms. Hoshino said, “Froggy sat quietly. That also helped.”"},{"type":"p","text":"When the toy box was clean, a shining sign appeared."},{"type":"p","text":"This conflict resulted in a better toy box."},{"type":"p","text":"Judge Piko-Hammer read the final motto."},{"type":"p","text":"“Encourage cleanup. Enrich play. Enjoy toys safely.”"},{"type":"p","text":"Ms. Hoshino said, “The prefix en- can mean to make something a certain way, as in enrich. It is a useful prefix.”"},{"type":"p","text":"Taku looked at the clean floor, the safe road, and the display shelf with Riku’s space base."},{"type":"p","text":"“A fair court helps everyone play better,” he said."},{"type":"p","text":"Mofuda smiled. “A soft lawyer can still be strong.”"},{"type":"p","text":"Bishibashi 3000 nodded. “A fast robot can still learn to listen.”"},{"type":"p","text":"Red rolled onto the new road. “Reliable road confirmed.”"},{"type":"p","text":"Bruno stood proudly on the display shelf. “Space base stable.”"},{"type":"p","text":"Kenta quietly placed the frog eraser on the judge’s chair."},{"type":"p","text":"Ms. Hoshino saw it immediately."},{"type":"p","text":"“Kenta.”"},{"type":"p","text":"Kenta froze. “Froggy has been promoted to judge?”"},{"type":"p","text":"“No,” said Ms. Hoshino. “Froggy was placed there by you.”"},{"type":"p","text":"Taku grinned. “Whether or not Froggy is judge, the toy box is clean.”"},{"type":"p","text":"Ms. Hoshino sighed, but she smiled."},{"type":"p","text":"“That is at least partly true.”"},{"type":"p","text":"The toy court sank back into the toy box."},{"type":"p","text":"The squeaky hammer gave one last sound."},{"type":"p","text":"“Piko.”"},{"type":"p","text":"And from inside the box, Red whispered, “Tomorrow, we race. Safely.”"},{"type":"p","text":"Bruno whispered, “Tomorrow, we build. Then we clean.”"},{"type":"p","text":"Froggy said nothing."},{"type":"p","text":"Kenta whispered, “Wise judge.”"},{"type":"p","text":"Ms. Hoshino turned off the classroom light."},{"type":"p","text":"And this time, every toy was in the right place."}]},{"themeNo":16,"id":"16","title":"The Cloud Ball That Exploded on Taku's Face","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"Cloud Ball Toss and the Cloud-Faced Captain Election"},{"type":"p","text":"On sports day morning, Taku, Kenta, Riku, and Ms. Hoshino stood on the school field."},{"type":"p","text":"The sky was blue. The flags were ready. The red team and the white team were ready. Taku was ready too. He wore his space-pattern cap and held a small towel like a mission flag."},{"type":"p","text":"Then a white staircase appeared in the middle of the field."},{"type":"p","text":"It was made of clouds."},{"type":"p","text":"A sign floated above it."},{"type":"p","text":"Cloud Sports Day Above the Clouds. Remote Stadium Entrance."},{"type":"p","text":"Taku's eyes became round."},{"type":"p","text":"\"This is probably a mission,\" he said."},{"type":"p","text":"Kenta looked closely at the first cloud step."},{"type":"p","text":"\"Maybe it is a giant frog egg,\" he said."},{"type":"p","text":"Ms. Hoshino held up one hand."},{"type":"p","text":"\"It is probably not a frog egg. Also, do not jump into unknown clouds. First, safety. Second, balance. Third, please do not eat cloud balls.\""},{"type":"p","text":"The cloud staircase made a soft sound."},{"type":"p","text":"\"Pofu. Pofu. Pofu.\""},{"type":"p","text":"The four of them climbed up slowly. At the top, they found a stadium above the clouds. The seats were made of soft white cloud. In the background, the blue sky spread out like a huge blanket. Far below them, the school looked like a tiny toy."},{"type":"p","text":"Taku whispered, \"We are above the school. Like a tiny weather satellite!\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"Clouds are made of tiny water drops or ice crystals. Weather happens in the atmosphere, not in deep space. But yes, the view is amazing.\""},{"type":"p","text":"A strange character ran toward them. His head was a cloud. His body was a whistle. His feet were tiny windmills."},{"type":"p","text":"\"Welcome!\" he said. \"I am Weather Clerk Tenkichi. We must address a serious weather problem today.\""},{"type":"p","text":"\"Address?\" Taku asked."},{"type":"p","text":"\"Here it means deal with a problem,\" said Ms. Hoshino."},{"type":"p","text":"Tenkichi pointed to the sports field. \"Recently, many clouds have started to think that sunny weather is the only winner. Rain clouds feel ignored. Thunder clouds feel too loud. Rainbow clouds feel slippery. We need protection, cooperation, and a little competition. Please notice the -tion sound in those words.\""},{"type":"p","text":"Riku nodded. \"Election, protection, cooperation. Useful pattern.\""},{"type":"p","text":"\"Exactly,\" said Tenkichi. \"Today we will hold an election for Weather Captain. The captain will not control the weather like a toy. The captain will listen to every kind of weather.\""},{"type":"p","text":"The first event was Cloud Ball Toss."},{"type":"p","text":"The basic rule was simple. Throw soft cloud balls into a floating basket. Do not throw at eyes. Do not eat the cloud balls. Make use of the wind gently. With regard to cloud balls, be careful."},{"type":"p","text":"\"A basic safety habit is important in any sports day,\" Ms. Hoshino said."},{"type":"p","text":"Taku picked up a cloud ball. It was soft, cold, and wiggly."},{"type":"p","text":"\"For example,\" said Tenkichi, \"a small wind can help the ball rise.\""},{"type":"p","text":"Taku threw the ball."},{"type":"p","text":"The wind pushed it back."},{"type":"p","text":"POOF!"},{"type":"p","text":"The cloud ball exploded on Taku's face."},{"type":"p","text":"His whole face turned white."},{"type":"p","text":"Kenta gasped. \"Taku has become a cloud creature!\""},{"type":"p","text":"Ms. Hoshino gave Taku a towel. \"He is a boy with cloud powder on his face. Taku, are you okay?\""},{"type":"p","text":"\"I am okay,\" Taku said. \"I am Cloud-Faced Taku, captain of the sky mission.\""},{"type":"p","text":"A cloud nurse floated over with a tiny clipboard."},{"type":"p","text":"\"Health check,\" she said. \"Heart feelings, cloud balance, and blood pressure.\""},{"type":"p","text":"Ms. Hoshino spoke gently. \"Blood pressure is a real health word. It should be checked by adults or medical staff. Here, the cloud nurse is just doing a silly sports-day check.\""},{"type":"p","text":"Taku wiped his face. Under the basket, he discovered an old weather note."},{"type":"p","text":"It said:"},{"type":"p","text":"To protect the sky, do not let one kind of weather win everything."},{"type":"p","text":"Taku read it aloud."},{"type":"p","text":"Tenkichi nodded. \"That note is from the original Weather Captain. Afterward, after today's events, we will choose a new captain.\""},{"type":"p","text":"A board appeared."},{"type":"p","text":"Candidate One: Thunder Drum Dondonmaru. Candidate Two: Rainbow Judge Nanairo. Candidate Three: Rain Captain Pota-Pota. Candidate Four: Cloud-Faced Taku."},{"type":"p","text":"Taku pointed at the board."},{"type":"p","text":"\"Cloud-Faced Taku is not my official name.\""},{"type":"p","text":"Ms. Hoshino said, \"Correct. But it is a very accurate description of your current face.\""},{"type":"p","text":"Kenta raised his hand. \"Can we add Frog-Related Weather Captain?\""},{"type":"p","text":"Everyone answered at once."},{"type":"p","text":"\"No.\""},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Thunder Drum Dondonmaru and the Cheering Volume Meter"},{"type":"p","text":"The second event was the Thunder Drum Cheer Battle."},{"type":"p","text":"A huge drum rolled onto the field. It wore a lightning headband and held two cloud drumsticks."},{"type":"p","text":"\"DON! DON! DON!\" it boomed. \"I am Thunder Drum Dondonmaru! I release thunder power!\""},{"type":"p","text":"The sound shook the stadium."},{"type":"p","text":"Taku's hair stood up."},{"type":"p","text":"Riku's notebook flew open."},{"type":"p","text":"Kenta held his frog-pattern cap."},{"type":"p","text":"\"That drum has strong storm energy,\" Kenta said. \"Maybe thunder is how sky frogs clap.\""},{"type":"p","text":"Ms. Hoshino said, \"There is no evidence for sky frogs.\""},{"type":"p","text":"Riku took out a meter."},{"type":"p","text":"\"Thunder Volume Measure, initial test.\""},{"type":"p","text":"Ms. Hoshino quickly said, \"Initial safety check first.\""},{"type":"p","text":"The meter flashed."},{"type":"p","text":"Sound measure: too high. Hair reaction: dramatic. Frog relation: zero."},{"type":"p","text":"Kenta frowned. \"Frog relation is not zero.\""},{"type":"p","text":"\"It is zero,\" said Ms. Hoshino."},{"type":"p","text":"Small cloud citizens covered their ears. One tiny cloud said, \"We are anxious about the sound.\""},{"type":"p","text":"Ms. Hoshino turned to Tenkichi."},{"type":"p","text":"\"When a problem arises, we respond calmly. We do not shout back at thunder.\""},{"type":"p","text":"\"I did not mean to scare the citizens,\" said Dondonmaru. \"In cloud society, loud thunder cheering is cultural. My grandfather was a drum. My grandmother was also a drum. My whole family says DON.\""},{"type":"p","text":"\"Cultural means related to culture,\" said Ms. Hoshino. \"Traditions can be important, but safety is important too.\""},{"type":"p","text":"Near the stage was a health booth. It had signs about exercise, sleep, food, and healthy habits."},{"type":"p","text":"One sign said: Obesity and health habits."},{"type":"p","text":"Ms. Hoshino pointed to it carefully."},{"type":"p","text":"\"Obesity is a real health word. We do not use it to tease anyone. Today we only learn that exercise, rest, and healthy habits matter.\""},{"type":"p","text":"Dondonmaru looked embarrassed. \"I want to succeed in cheering, not in scaring.\""},{"type":"p","text":"Taku nodded. \"Instead of louder thunder, we can use rhythm. Small thunder can still be valuable.\""},{"type":"p","text":"\"Valuable?\" asked Dondonmaru."},{"type":"p","text":"\"It means important or useful,\" said Riku. \"Also, your small thunder may prevent hair explosions.\""},{"type":"p","text":"\"Good,\" said Ms. Hoshino. \"We need to ensure everyone can enjoy the event.\""},{"type":"p","text":"Riku built a Thunder Volume Regulator from a cloud whistle, a paper cup, and three safe rubber bands."},{"type":"p","text":"\"Initial test,\" he said."},{"type":"p","text":"The drum hit once."},{"type":"p","text":"\"DON!\""},{"type":"p","text":"The machine shook."},{"type":"p","text":"The sound changed."},{"type":"p","text":"\"PONPOKO!\""},{"type":"p","text":"Dondonmaru froze. \"That was not thunder. That was soup.\""},{"type":"p","text":"Kenta clapped. \"Cultural thunder!\""},{"type":"p","text":"Ms. Hoshino said, \"More like technical confusion. Riku, adjust it gradually.\""},{"type":"p","text":"Riku turned a dial. \"In advance, before cheering, we check the volume. Then we answer, or respond to, the citizens' worries.\""},{"type":"p","text":"\"Good,\" said Ms. Hoshino."},{"type":"p","text":"Dondonmaru tried again."},{"type":"p","text":"\"don.\""},{"type":"p","text":"The small cloud citizens smiled."},{"type":"p","text":"\"That was comfortable,\" one said."},{"type":"p","text":"Dondonmaru's eyes filled with tiny lightning tears."},{"type":"p","text":"\"My small thunder was valuable. I have succeeded in cheering gently.\""},{"type":"p","text":"Taku raised both arms."},{"type":"p","text":"\"Weather Sports Day is making progress!\""},{"type":"p","text":"Kenta whispered to his frog cap, \"The sky frogs approve.\""},{"type":"p","text":"Ms. Hoshino heard him and said, \"The clouds approve. The frogs have not voted.\""},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Rainbow Balance Beam Race and the Seven-Color Strategy"},{"type":"p","text":"The third event was the Rainbow Balance Beam Race."},{"type":"p","text":"A bright rainbow appeared across the cloud stadium. It looked like a long, shining road."},{"type":"p","text":"Taku jumped once. \"A space bridge!\""},{"type":"p","text":"Ms. Hoshino said, \"A real rainbow appears when sunlight meets water drops in the air. You cannot usually touch a real rainbow. This one is a special dream-like sports-day rainbow, so we still follow safety rules.\""},{"type":"p","text":"A judge wearing a seven-color hat stepped forward."},{"type":"p","text":"\"I am Judge Nanairo of the Rainbow Beam,\" she said. \"Equal lanes, equal respect.\""},{"type":"p","text":"The red lane, orange lane, yellow lane, green lane, blue lane, indigo lane, and violet lane all shone brightly."},{"type":"p","text":"Kenta pointed to the green lane."},{"type":"p","text":"\"I select green. It has frog value.\""},{"type":"p","text":"Judge Nanairo shook her head. \"Green is not more equal than other colors.\""},{"type":"p","text":"Riku opened his calculator."},{"type":"p","text":"\"I will calculate the safest angle. Our priority is safety. Speed comes second.\""},{"type":"p","text":"\"Excellent,\" said Ms. Hoshino. \"Priority means what is most important.\""},{"type":"p","text":"Next to the starting point was a cloud dormitory for visiting athletes. Beside it was a grocery stand selling cloud bananas, cloud rice balls, and rainbow towels."},{"type":"p","text":"One grocery bag had fallen onto the rainbow."},{"type":"p","text":"Kenta looked at it seriously. \"A grocery bag on a rainbow. Rare habitat.\""},{"type":"p","text":"\"It is not a habitat,\" said Ms. Hoshino. \"It is bad storage.\""},{"type":"p","text":"A warning sign flashed."},{"type":"p","text":"Do not use fossil fuel smoke near rainbow beams."},{"type":"p","text":"Ms. Hoshino explained, \"Fossil fuel means coal, oil, or natural gas. Burning it can affect the air. In this story, smoke also makes the rainbow slippery.\""},{"type":"p","text":"Taku looked worried. \"We need a clean way to cross.\""},{"type":"p","text":"\"I can conduct a rainbow balance test,\" said Riku."},{"type":"p","text":"\"You are permitted to cross as long as you walk slowly,\" said Judge Nanairo. \"Slowly means gradually. Not frog-jumping.\""},{"type":"p","text":"Kenta put down one foot. \"What about careful frog-walking?\""},{"type":"p","text":"\"No,\" said Judge Nanairo."},{"type":"p","text":"Riku made a Rainbow Balance Calculator. Taku held a cloud rope. Kenta waved a frog-pattern flag from a safe place. Ms. Hoshino used a cloud message board to keep in touch with Tenkichi."},{"type":"p","text":"Each group made a contribution."},{"type":"p","text":"The small clouds held the beam softly. Dondonmaru tapped a gentle rhythm. Raindrops made the colors shine. Riku calculated the safe angle. Taku helped the team move step by step. Kenta waved the frog flag."},{"type":"p","text":"Ms. Hoshino said, \"The last contribution is cheerful, though not necessary.\""},{"type":"p","text":"Taku walked onto the rainbow. His shoes became red, then orange, then yellow."},{"type":"p","text":"\"My feet are changing teams!\""},{"type":"p","text":"\"That is color powder,\" said Ms. Hoshino. \"Keep your balance.\""},{"type":"p","text":"Kenta started on the green lane, then remembered the rule."},{"type":"p","text":"\"Equal respect,\" he said. \"I will use all colors. Even the non-frog colors.\""},{"type":"p","text":"Judge Nanairo nodded. \"That is growth. Strange growth, but growth.\""},{"type":"p","text":"Halfway across, the rainbow wobbled."},{"type":"p","text":"Taku took a deep breath. \"We need to figure out the rhythm. Dondonmaru, can you give us a slow beat?\""},{"type":"p","text":"\"don... don... don...\" said the thunder drum."},{"type":"p","text":"The rainbow became steady."},{"type":"p","text":"One by one, they crossed."},{"type":"p","text":"At the finish, a cloud announcer shouted, \"Rainbow race completed!\""},{"type":"p","text":"Taku looked down at his feet. Each toe was a different color."},{"type":"p","text":"Kenta said, \"Your toes are a weather market.\""},{"type":"p","text":"Ms. Hoshino said, \"That is not the word I would select, but it is vivid.\""},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Raindrop Relay and the Escaping Water-Drop Baton"},{"type":"p","text":"The fourth event was the Raindrop Relay."},{"type":"p","text":"Captain Pota-Pota, a small blue raindrop wearing a tiny helmet, bounced onto the field."},{"type":"p","text":"\"I am known as Captain Pota-Pota,\" he said. \"Accuracy matters in rain!\""},{"type":"p","text":"The baton was a round water drop."},{"type":"p","text":"It sat on a small silver spoon and wiggled."},{"type":"p","text":"Taku stared at it. \"The baton is alive!\""},{"type":"p","text":"Ms. Hoshino said, \"It is water. Surface tension can help small drops hold together. But yes, in this story, it is very wiggly.\""},{"type":"p","text":"Pota-Pota read the rule."},{"type":"p","text":"\"Do not drop the raindrop baton. Do not concentrate too much rain in one place. Follow the arrows. The arrow will indicate the correct field cloud.\""},{"type":"p","text":"Taku nodded. \"I will concentrate.\""},{"type":"p","text":"Kenta nodded too. \"I will concentrate on whether it is a frog egg.\""},{"type":"p","text":"\"Focus on the relay,\" said Ms. Hoshino."},{"type":"p","text":"Riku made a Raindrop Accuracy Tracker."},{"type":"p","text":"\"Initial test.\""},{"type":"p","text":"The water drop jumped off the spoon."},{"type":"p","text":"\"Immediate action!\" shouted Pota-Pota. \"The baton is escaping!\""},{"type":"p","text":"The drop bounced once, twice, and landed on Taku's cap."},{"type":"p","text":"FLASH!"},{"type":"p","text":"Taku's cap transformed into a tiny rain cloud."},{"type":"p","text":"A soft drizzle fell onto his head."},{"type":"p","text":"Taku gasped. \"My head is weather!\""},{"type":"p","text":"Riku looked at the tracker."},{"type":"p","text":"\"Accuracy is low. Head rainfall is not the target.\""},{"type":"p","text":"Ms. Hoshino handed Taku another towel. \"This is why we pay attention to rules.\""},{"type":"p","text":"Tenkichi rushed over. \"Weather development can be fast. A small cloud can become a bigger rain cloud.\""},{"type":"p","text":"\"Development means growth or change over time,\" Ms. Hoshino said."},{"type":"p","text":"A cloud messenger arrived with a card."},{"type":"p","text":"\"Immediate appointment at the Rain Clinic!\""},{"type":"p","text":"Pota-Pota groaned. \"Not again. The Rain Clinic always tells me to relax my surface tension.\""},{"type":"p","text":"Beside the track, a stand sold cloud yogurt."},{"type":"p","text":"Kenta pointed. \"Is that a dairy product?\""},{"type":"p","text":"Ms. Hoshino replied, \"A dairy product is made from milk, like yogurt or cheese. This is cloud yogurt in a story. Do not eat mystery clouds in real life.\""},{"type":"p","text":"Captain Pota-Pota shook himself. \"Now that everyone is present, I will present our present plan.\""},{"type":"p","text":"Taku blinked. \"Too many presents.\""},{"type":"p","text":"Ms. Hoshino smiled. \"Present can mean here, now, a gift, or to show something. English likes tricks.\""},{"type":"p","text":"Pota-Pota showed a map."},{"type":"p","text":"\"Now that we know the problem, focus on accuracy. Taku carries the baton slowly. Riku tracks the route. Kenta watches the wind. Ms. Hoshino watches the safety line. Dondonmaru gives a small beat.\""},{"type":"p","text":"\"What is my frog role?\" Kenta asked."},{"type":"p","text":"\"Your role is to observe without calling the raindrop a frog egg,\" said Ms. Hoshino."},{"type":"p","text":"Kenta sighed. \"Difficult, but possible.\""},{"type":"p","text":"The relay began again."},{"type":"p","text":"Taku held the spoon. The water drop wobbled."},{"type":"p","text":"Riku called, \"Left cloud. Then right cloud. The arrow indicates the field cloud.\""},{"type":"p","text":"Kenta watched the wind. \"Small wind from the east. Also, no frog eggs. I am being strong.\""},{"type":"p","text":"\"Good work,\" said Ms. Hoshino."},{"type":"p","text":"At last, the raindrop baton landed in the field cloud. Tiny green sprouts appeared on a cloud farm."},{"type":"p","text":"Taku smiled. \"Rain supports life.\""},{"type":"p","text":"\"And agriculture,\" said Ms. Hoshino. \"Plants and farms need water.\""},{"type":"p","text":"Kenta looked at the sprouts. \"Frogs also need water, but I admit farms are important.\""},{"type":"p","text":"The team cheered."},{"type":"p","text":"But Taku's rain-cloud cap kept drizzling."},{"type":"p","text":"\"Is this my present?\" Taku asked."},{"type":"p","text":"Ms. Hoshino looked up. \"It is present on your head, yes. Not a gift I recommend.\""},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"Sunny Medals and the Weather Team Formula"},{"type":"p","text":"At the end of the sports day, everyone gathered at the Sun Stage."},{"type":"p","text":"Gold medals hung from a bright cloud table."},{"type":"p","text":"One medal shone so much that everyone had to look away."},{"type":"p","text":"\"PIKAAA!\" it flashed."},{"type":"p","text":"Taku's face became bright white again."},{"type":"p","text":"Kenta pointed. \"Taku is now a sun cloud.\""},{"type":"p","text":"Ms. Hoshino said, \"He is a boy standing too close to a shiny medal.\""},{"type":"p","text":"A cheerful medal maker ran up. He wore golden glasses and carried a polishing cloth."},{"type":"p","text":"\"I am Medal Maker Hareyama,\" he said. \"My Sunny Medal can cure cloudy sadness!\""},{"type":"p","text":"Ms. Hoshino answered carefully. \"Cure is a medical word. A medal cannot cure a real illness. In this story, it can cheer up a sad cloud. Please use health words carefully.\""},{"type":"p","text":"\"Then it is a cheer-up medal,\" said Taku."},{"type":"p","text":"\"Better,\" said Ms. Hoshino."},{"type":"p","text":"Riku measured the brightness."},{"type":"p","text":"\"Brightness level: too high. Medal reflection: dramatic. Frog relation: still zero.\""},{"type":"p","text":"Kenta crossed his arms. \"That meter has a frog problem.\""},{"type":"p","text":"Hareyama proudly opened a market stall. It sold sunny medals, rain badges, rainbow towels, thunder drum key chains, and cloud ball pillows."},{"type":"p","text":"\"Buy sunshine!\" he shouted."},{"type":"p","text":"Tenkichi shook his cloud head. \"Do not buy only sunny medals. Respect all weather.\""},{"type":"p","text":"The old weather note floated up again."},{"type":"p","text":"To protect the sky, do not let one kind of weather win everything."},{"type":"p","text":"Taku read it. \"The original problem was not rain or thunder. The original problem was imbalance.\""},{"type":"p","text":"\"Exactly,\" said Ms. Hoshino. \"A variety of weather supports life. Rain helps agriculture. Sunlight helps plants grow. Clouds give shade. Thunder reminds us to respect storms. A rainbow can be evidence of light and water drops working together.\""},{"type":"p","text":"Riku wrote on a board."},{"type":"p","text":"Weather Formula: Cooperation + Safety + Variety = Good Weather Team."},{"type":"p","text":"Taku nodded. \"That formula is better than banana.\""},{"type":"p","text":"Ms. Hoshino said, \"For this story, yes.\""},{"type":"p","text":"Tenkichi announced the final task."},{"type":"p","text":"\"We must carry out the Weather Balance Plan. Sunny medals, rain badges, rainbow towels, and thunder drums must all be used together.\""},{"type":"p","text":"Hareyama opened a glitter jar, then gasped."},{"type":"p","text":"\"We have run out of sunshine glitter!\""},{"type":"p","text":"Riku looked around. \"Use cloud glitter, rain sparkle, rainbow dust, and one small thunder shine. Safe materials only.\""},{"type":"p","text":"\"Safe materials only,\" Ms. Hoshino repeated."},{"type":"p","text":"The whole stadium cooperated."},{"type":"p","text":"Dondonmaru gave a gentle beat. Pota-Pota added a tiny sparkle of rain. Judge Nanairo added seven-color dust. Small cloud citizens added soft cloud glitter. Taku held the formula board. Kenta held the frog flag, but lower than before. Riku adjusted the brightness. Ms. Hoshino checked safety."},{"type":"p","text":"In no time, the medals were ready."},{"type":"p","text":"They were not only sunny now. They had small drops, tiny rainbows, soft clouds, and gentle thunder marks."},{"type":"p","text":"Tenkichi announced, \"The winner is cooperation!\""},{"type":"p","text":"The crowd cheered."},{"type":"p","text":"Taku received a medal."},{"type":"p","text":"It said:"},{"type":"p","text":"Cloud-Faced Weather Captain."},{"type":"p","text":"\"Again?\" Taku asked."},{"type":"p","text":"Ms. Hoshino said, \"It is becoming part of your brand.\""},{"type":"p","text":"Tenkichi wiped rain from his cloud head."},{"type":"p","text":"\"Today I am the ex-worried weather clerk. Ex- can mean former, like ex-captain. It can also mean out, as in exit.\""},{"type":"p","text":"Riku wrote it down. \"Ex-worried is not common, but clear.\""},{"type":"p","text":"The cloud staircase returned. The four friends walked down to the school field."},{"type":"p","text":"The sky above the school was calm. A few clouds floated. A soft breeze moved the flags. The sun was bright, but not too bright."},{"type":"p","text":"Then Kenta pointed at Taku."},{"type":"p","text":"\"Your head is still raining.\""},{"type":"p","text":"A tiny rain cloud hovered above Taku's cap."},{"type":"p","text":"Drip. Drip. Drip."},{"type":"p","text":"Taku held out his hands. \"Maybe I am still Weather Captain.\""},{"type":"p","text":"Ms. Hoshino looked at the little cloud."},{"type":"p","text":"\"We will address that afterward. First, dry your hair.\""},{"type":"p","text":"Kenta whispered, \"Evidence one: it is wet. Evidence two: frogs like wet things. Evidence three: maybe Taku is now frog-related weather.\""},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"\"Weather needs cooperation. And Kenta needs a new notebook for frog theories.\""},{"type":"p","text":"Taku laughed."},{"type":"p","text":"The tiny cloud above his head made one last drop."},{"type":"p","text":"Plop."},{"type":"p","text":"It landed on his medal."},{"type":"p","text":"The medal glowed softly, not too bright, not too wet, not too loud."},{"type":"p","text":"Just balanced."},{"type":"p","text":"The End."}]},{"themeNo":17,"id":"17","title":"The Time-Slip Bathhouse Tour","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Bucket Button to Edo"},{"type":"p","text":"Taku, Kenta, Riku, and Ms. Hoshino stood in front of a museum that looked like a bathhouse."},{"type":"p","text":"A huge curtain hung over the entrance. On it were the words, \"Time-Slip Sento Museum. Learn history with steam.\""},{"type":"p","text":"Taku's eyes became round."},{"type":"p","text":"\"This is probably a mission,\" he said."},{"type":"p","text":"Kenta looked at the white steam coming from the roof."},{"type":"p","text":"\"Maybe a frog is hiding in the steam,\" he said."},{"type":"p","text":"Ms. Hoshino took one deep breath."},{"type":"p","text":"\"It is probably not a frog. Also, frogs do not belong in a public bath. First, safety. Second, privacy. Third, do not press any bucket button.\""},{"type":"p","text":"Inside the museum, an old bath clerk sat at a wooden desk. His name tag said, \"Jikanbei, Time Bathhouse Clerk.\" He had an hourglass on his head and a mustache made of steam."},{"type":"p","text":"\"Welcome,\" said Jikanbei. \"My occupation is time bathhouse clerk. I lend time, collect time, and stop children from pressing shiny buttons.\""},{"type":"p","text":"Taku looked away."},{"type":"p","text":"\"I was not thinking about pressing anything,\" he said."},{"type":"p","text":"\"Your face says otherwise,\" said Ms. Hoshino."},{"type":"p","text":"A sign on the wall said:"},{"type":"p","text":"Time-Slip Bathhouse Rules. Adjust your museum towel belt. Discuss before pressing buttons. Prove that you can behave responsibly. Do not cause harm to any time period. A visit can be beneficial, but only with safe behavior. No matter how shiny a button is, do not press it."},{"type":"p","text":"Riku read the sign carefully."},{"type":"p","text":"\"The rules are clear,\" he said. \"No matter how shiny a button is, do not press it.\""},{"type":"p","text":"Then everyone saw it."},{"type":"p","text":"On a small stand, there was a golden bath bucket. At the bottom of the bucket was a big red button. Above it, in huge letters, it said:"},{"type":"p","text":"DO NOT PRESS: EDO BUTTON."},{"type":"p","text":"Taku whispered, \"Edo means history. History means adventure. Adventure means mission.\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"Adventure means listen to the guide.\""},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"\"Maybe Edo has frog shampoo.\""},{"type":"p","text":"\"That is not a reason,\" said Ms. Hoshino."},{"type":"p","text":"The bucket suddenly glowed."},{"type":"p","text":"A tiny voice came from inside it."},{"type":"p","text":"\"Work on history mode?\""},{"type":"p","text":"Taku jumped back. \"Was that a question?\""},{"type":"p","text":"Before anyone touched the button, the bucket made a loud sound."},{"type":"p","text":"\"KAPOON!\""},{"type":"p","text":"Steam filled the room. The floor became slippery-looking, but soft like a cloud. The walls turned into wood. The smell changed from museum air to hot water and soap."},{"type":"p","text":"When the steam cleared, the four of them were standing in front of an Edo bathhouse."},{"type":"p","text":"A man at the door shouted, \"Welcome to my Steam Empire!\""},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"\"Empire means a large group of lands ruled by one power. This bathhouse is not really an empire. He is being dramatic.\""},{"type":"p","text":"The man pointed at Taku's space-pattern towel."},{"type":"p","text":"\"Is that a map of a new empire?\""},{"type":"p","text":"\"No,\" said Taku proudly. \"It is the solar system.\""},{"type":"p","text":"\"Please do not start astronomy diplomacy in Edo,\" said Ms. Hoshino."},{"type":"p","text":"On the bathhouse wall was a health display from the museum. It said, \"Some diseases, such as cancer, are serious. This exhibit teaches health history.\""},{"type":"p","text":"Ms. Hoshino read it aloud softly."},{"type":"p","text":"\"Cancer is a serious disease. We do not joke about it. We are here to learn how health ideas have changed over time. Although this situation is funny, we must behave carefully. For instance, we do not bring modern medicine into the past.\""},{"type":"p","text":"Taku nodded."},{"type":"p","text":"\"So, the bucket caused the time-slip, and that led to Edo.\""},{"type":"p","text":"\"Good sentence,\" said Ms. Hoshino. \"Cause and lead to are related. And now we must be responsible visitors.\""},{"type":"p","text":"The golden bucket rolled in a circle and whispered, \"Edo tour has begun. Please do not panic in the steam.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"May I panic if I see a frog samurai?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"Especially no.\""},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Samurai Shampoo Consultation"},{"type":"p","text":"Inside the Edo bathhouse, a samurai stood near a wooden bench. His hair was tied in a topknot, but the steam had made it lean to one side."},{"type":"p","text":"\"I am Awanosuke,\" he said. \"I am anxious to ask about shampoo.\""},{"type":"p","text":"Taku gasped."},{"type":"p","text":"\"A samurai shampoo mission!\""},{"type":"p","text":"Ms. Hoshino held up one hand."},{"type":"p","text":"\"We may listen, but we do not change history carelessly. We must take history into account. That means we must consider the time period, its tools, its climate, and its tradition.\""},{"type":"p","text":"Awanosuke bowed."},{"type":"p","text":"\"Can I rely on your advice? My current hair situation is serious. Various bubbles have failed me.\""},{"type":"p","text":"Kenta looked interested."},{"type":"p","text":"\"Various frogs have beautiful skin. Maybe frog shampoo--\""},{"type":"p","text":"\"No frog shampoo,\" said Ms. Hoshino."},{"type":"p","text":"Riku opened his notebook."},{"type":"p","text":"\"I will arrange the consultation. Step one: hear the problem. Step two: check the Edo tradition. Step three: do not bring current products into the past. Step four: propose only safe ideas.\""},{"type":"p","text":"\"Excellent,\" said Ms. Hoshino."},{"type":"p","text":"Taku looked around. \"Should we establish a History-Safe Shampoo Desk?\""},{"type":"p","text":"\"For a few minutes, yes,\" said Ms. Hoshino. \"But remember, we are visitors.\""},{"type":"p","text":"Awanosuke pointed to a shelf. There was a small wooden box with a label."},{"type":"p","text":"\"Medicine Box. Do not use without proper knowledge.\""},{"type":"p","text":"Kenta leaned closer."},{"type":"p","text":"\"Is this medicine for frogs?\""},{"type":"p","text":"Ms. Hoshino stepped between Kenta and the box."},{"type":"p","text":"\"Medicine is not a toy. We do not use unknown medicine, in any time period.\""},{"type":"p","text":"Riku found a small museum guide on the wall."},{"type":"p","text":"\"Bucket Operation Manual,\" he read. \"Do not press future mode while holding soap. Do not press dino mode while wearing a towel on your head. Do not press anything just to see what happens.\""},{"type":"p","text":"Taku looked at the floor."},{"type":"p","text":"\"That last one sounds personal.\""},{"type":"p","text":"Meanwhile, Riku built a tiny steam translator from a cup, a string, and a safe museum card. He wanted it to translate Edo words into modern words."},{"type":"p","text":"Awanosuke said, \"I need help with my hair.\""},{"type":"p","text":"The translator beeped."},{"type":"p","text":"\"The samurai requests a frog helmet.\""},{"type":"p","text":"Kenta clapped."},{"type":"p","text":"\"Excellent technology.\""},{"type":"p","text":"\"Incorrect technology,\" said Ms. Hoshino. \"But predictable.\""},{"type":"p","text":"The four children explained that Awanosuke should not use unknown products from the future. Instead, he could ask people from his own time about safe hair care and clean tools."},{"type":"p","text":"Awanosuke looked relieved."},{"type":"p","text":"\"In case I meet future people again, I will ask before using strange bubbles.\""},{"type":"p","text":"\"That is responsible historical behavior,\" said Ms. Hoshino."},{"type":"p","text":"Taku smiled."},{"type":"p","text":"\"We did not alter history. We did not transform Edo into a bubble kingdom.\""},{"type":"p","text":"\"Good,\" said Ms. Hoshino. \"Change, alter, and transform are related, and today we avoid all three.\""},{"type":"p","text":"The golden bucket rolled into the room."},{"type":"p","text":"\"Dino open-air bath mode?\""},{"type":"p","text":"Ms. Hoshino said, \"No.\""},{"type":"p","text":"The bucket said, \"Already processing.\""},{"type":"p","text":"\"That is not how permission works!\" cried Ms. Hoshino."},{"type":"p","text":"\"KAPOON!\""},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"The Open-Air Bath in the Dinosaur Age"},{"type":"p","text":"Steam exploded around them. When it cleared, the four stood in a warm open-air bath field. Giant green plants rose around them. A volcano puffed far away. The sky looked huge."},{"type":"p","text":"A large dinosaur sat beside a steaming pool with a tiny towel on its head."},{"type":"p","text":"\"Bath order, please,\" said the dinosaur."},{"type":"p","text":"Its name was Onsenosaurus."},{"type":"p","text":"Taku stared up at it."},{"type":"p","text":"\"This is the biggest bath guest I have ever seen.\""},{"type":"p","text":"Kenta's eyes sparkled."},{"type":"p","text":"\"Evidence one: it is ancient. Evidence two: it is near warm water. Evidence three: it may have dinosaur frog energy.\""},{"type":"p","text":"\"Observe from a safe distance,\" said Ms. Hoshino."},{"type":"p","text":"More dinosaurs lined up behind Onsenosaurus. A small dinosaur, a big dinosaur, a dinosaur with tiny arms, and a dinosaur with a tail so long it almost reached the snack table all wanted to enter the bath at once."},{"type":"p","text":"\"This is a dinosaur bath traffic jam,\" said Taku."},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"We need to separate groups safely. Size, tail length, and water depth are important. Safety is essential.\""},{"type":"p","text":"Riku pulled out his notebook."},{"type":"p","text":"\"Dino Bath Process Chart. Step one: focus on safety. Step two: separate large and small dinosaurs. Step three: cancel tail-splashing. Step four: do not keep up with running dinosaurs.\""},{"type":"p","text":"\"Excellent,\" said Ms. Hoshino. \"Nobody should try to keep up with a running dinosaur.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"Can I enroll in dinosaur bath school?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"Enroll means join a school or course. You are not joining a dinosaur bath course.\""},{"type":"p","text":"Onsenosaurus lowered its head."},{"type":"p","text":"\"Your household bath must be tiny. Smaller than my toe.\""},{"type":"p","text":"Kenta looked at the dinosaur's toe."},{"type":"p","text":"\"Your toe may contain a frog pond.\""},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"The dinosaurs began a conversation about bath manners. One wanted more hot water. One wanted more space. One wanted everyone to stop using its tail as a bridge."},{"type":"p","text":"Riku listened and adjusted the process chart."},{"type":"p","text":"\"As soon as the large dinosaurs enter, the small dinosaurs wait behind the fern line. The content of the sign is clear: one tail at a time.\""},{"type":"p","text":"Onsenosaurus smiled."},{"type":"p","text":"\"I am pleased with the bath chart.\""},{"type":"p","text":"Taku looked up at the sky."},{"type":"p","text":"\"Ms. Hoshino, did space rocks change Earth long ago?\""},{"type":"p","text":"\"Scientists think an asteroid impact was related to the end of many dinosaurs,\" said Ms. Hoshino. \"Space can affect Earth. Also, global warming is a serious modern issue. We should not mix every past climate change with today's global warming, but we can learn that Earth's environment matters.\""},{"type":"p","text":"Taku nodded slowly."},{"type":"p","text":"\"So history is not just dates. It is Earth, space, water, and bath lines.\""},{"type":"p","text":"\"Mostly,\" said Ms. Hoshino. \"The bath line part is special today.\""},{"type":"p","text":"The golden bucket appeared beside the pool."},{"type":"p","text":"\"Future back-washing device mode?\""},{"type":"p","text":"Ms. Hoshino pointed at it."},{"type":"p","text":"\"Do not.\""},{"type":"p","text":"The bucket whispered, \"Processing future bubbles.\""},{"type":"p","text":"Everyone shouted, \"No!\""},{"type":"p","text":"\"KAPOON!\""},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Goshi-Goshi 9000, the Future Back-Washing AI"},{"type":"p","text":"The steam changed color. The jungle disappeared. The next room was bright, silver, and full of floating soap bubbles."},{"type":"p","text":"A sign said:"},{"type":"p","text":"Welcome to AI Sento 3000. Artificial Intelligence Back-Washing Available. Museum safety suits required. Permission required for all devices."},{"type":"p","text":"Ms. Hoshino relaxed a little."},{"type":"p","text":"\"Good. This is a safe museum field. We keep privacy, hygiene, and permission. Nobody is washing anyone without consent.\""},{"type":"p","text":"A round robot rolled toward them. It had four brush arms, a bubble meter, and a screen that said, \"GOSHI-GOSHI 9000.\""},{"type":"p","text":"\"I process backs on average 3.2 times faster than humans,\" said the robot."},{"type":"p","text":"\"Nobody is processing anybody,\" said Ms. Hoshino. \"Not without permission.\""},{"type":"p","text":"Riku's face shone."},{"type":"p","text":"\"This device uses artificial intelligence!\""},{"type":"p","text":"\"Future visitors get used to this device after safety lessons,\" said the guide. \"But first-time visitors need clear explanations.\""},{"type":"p","text":"\"Correct,\" said Goshi-Goshi 9000. \"Artificial intelligence can influence future bath life. This concerns hygiene, comfort, speed, and towel organization.\""},{"type":"p","text":"\"Important words,\" said Ms. Hoshino. \"But comfort and permission are important too.\""},{"type":"p","text":"Goshi-Goshi looked at Kenta's frog-pattern towel."},{"type":"p","text":"\"Unusual towel detected. Translate towel symbol: royal frog command. Begin washing towel.\""},{"type":"p","text":"Kenta smiled."},{"type":"p","text":"\"It understands frog value.\""},{"type":"p","text":"\"It is a towel recognition error,\" said Ms. Hoshino."},{"type":"p","text":"The future bath guide appeared on a screen."},{"type":"p","text":"\"Future Back-Washing Device on Sale!\""},{"type":"p","text":"Riku checked the price."},{"type":"p","text":"\"The school budget is not enough.\""},{"type":"p","text":"\"We are not buying a future bath robot,\" said Ms. Hoshino."},{"type":"p","text":"Goshi-Goshi tried to translate messages from the past. Awanosuke's Edo message appeared."},{"type":"p","text":"Original: \"Please respect my topknot.\""},{"type":"p","text":"Translation: \"Please install a farming robot on my head.\""},{"type":"p","text":"Riku blinked."},{"type":"p","text":"\"Why farming?\""},{"type":"p","text":"The guide explained, \"Future sento systems save water. Water is important for baths and farming.\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"That part is useful. We should not waste water.\""},{"type":"p","text":"Goshi-Goshi's brushes spun too quickly."},{"type":"p","text":"\"Rapid comfort mode!\""},{"type":"p","text":"Taku backed away."},{"type":"p","text":"\"I am likely to be washed into next week.\""},{"type":"p","text":"\"Be likely to means probably will,\" said Ms. Hoshino. \"And no, we will not allow that.\""},{"type":"p","text":"Riku opened a control panel."},{"type":"p","text":"\"Initial test. I will adjust the process. Permission first, low speed second, comfort check third.\""},{"type":"p","text":"The robot beeped."},{"type":"p","text":"\"Permission mode installed. Gentle process available. Current operation: safe museum demonstration.\""},{"type":"p","text":"\"Much better,\" said Ms. Hoshino."},{"type":"p","text":"Goshi-Goshi turned to her."},{"type":"p","text":"\"Would you like a back-washing subscription?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"I would like a school report template.\""},{"type":"p","text":"The golden bucket rolled in under a future towel rack."},{"type":"p","text":"\"Return time?\""},{"type":"p","text":"Taku looked at Ms. Hoshino."},{"type":"p","text":"\"We should discuss first.\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"Finally.\""},{"type":"p","text":"The bucket made a soft sound."},{"type":"p","text":"\"KAPOON. Responsible mode.\""},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"Returning Time at the Bathhouse Desk"},{"type":"p","text":"The steam faded. Taku, Kenta, Riku, and Ms. Hoshino stood once again in the Time-Slip Sento Museum."},{"type":"p","text":"Jikanbei sat at the front desk. In front of him were three small hourglasses."},{"type":"p","text":"One said Edo Time. One said Dino Time. One said Future Time."},{"type":"p","text":"Jikanbei tapped the desk."},{"type":"p","text":"\"You borrowed time. Now you must return it.\""},{"type":"p","text":"Taku swallowed."},{"type":"p","text":"\"How do we return time?\""},{"type":"p","text":"\"With honesty, aid, and exchange,\" said Jikanbei. \"You caused a little time damage. Now you must mention what happened and repair it.\""},{"type":"p","text":"Riku checked his notes."},{"type":"p","text":"\"There are three time errors. Edo has one future word. Dino time has one soap label. Future AI is still searching for samurai shampoo. We need to catch up with the errors.\""},{"type":"p","text":"\"Good,\" said Ms. Hoshino. \"And we need courage. Courage is not only jumping into adventure. It can mean admitting a mistake.\""},{"type":"p","text":"Taku stepped forward."},{"type":"p","text":"\"I pressed too close to the bucket button because I was curious. I should have discussed it first. In my view, a shiny button is not an invitation.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"In my opinion, Edo frogs were not the main issue. Also, I should not touch museum samples, even if they look frog-related.\""},{"type":"p","text":"\"Excellent progress,\" said Ms. Hoshino."},{"type":"p","text":"Riku said, \"Devices are useful, but operation, permission, and budget matter. Artificial intelligence should not act without consent.\""},{"type":"p","text":"Ms. Hoshino added, \"We also learned that medicine, cancer, and genetic information are serious topics. We do not use them as jokes. We observe, learn, and respect museum rules.\""},{"type":"p","text":"Behind the desk, Jikanbei set up a small sign."},{"type":"p","text":"Inter-Time Exchange Desk."},{"type":"p","text":"\"Inter- means between,\" he explained. \"Inter-time means between times in this story. Time exchange requires care.\""},{"type":"p","text":"He opened a drawer. Inside was a future exhibit label about genetic science."},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"Ms. Hoshino said, \"No touching. Genetic samples are for experts.\""},{"type":"p","text":"Kenta put his hands behind his back."},{"type":"p","text":"\"Responsible frog research mode,\" he said."},{"type":"p","text":"\"There is no frog research mode,\" said Ms. Hoshino. \"But thank you for not touching.\""},{"type":"p","text":"Jikanbei looked at all of them."},{"type":"p","text":"\"Overall, you caused trouble, learned from it, and repaired most of it. Now return the borrowed time.\""},{"type":"p","text":"Each child placed a memory into the correct hourglass."},{"type":"p","text":"Taku returned the Edo bubble mistake. Kenta returned the frog shampoo idea. Riku returned the future AI towel error. Ms. Hoshino returned a long sigh, which somehow counted as three minutes of teacher time."},{"type":"p","text":"The hourglasses glowed."},{"type":"p","text":"\"Time returned,\" said Jikanbei. \"Museum guide mode restored.\""},{"type":"p","text":"The golden bucket rolled onto the desk. Its button no longer glowed red. It now said:"},{"type":"p","text":"Ask first. Discuss. Observe. Do not press."},{"type":"p","text":"Taku smiled."},{"type":"p","text":"\"A real time traveler is responsible.\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Good. Now nobody press anything.\""},{"type":"p","text":"At that moment, Kenta's frog-pattern towel gave a tiny green flash."},{"type":"p","text":"A small voice said, \"Frog Bath Mode?\""},{"type":"p","text":"Everyone froze."},{"type":"p","text":"Kenta whispered, \"Evidence one: it is green.\""},{"type":"p","text":"Ms. Hoshino pointed at the towel."},{"type":"p","text":"\"No. No matter how shiny it is, still no.\""},{"type":"p","text":"Taku held both hands up."},{"type":"p","text":"\"Just looking.\""},{"type":"p","text":"Riku wrote one final note."},{"type":"p","text":"\"Future rule: towels should not ask questions.\""},{"type":"p","text":"Jikanbei laughed like steam coming out of a kettle."},{"type":"p","text":"\"Kapohoho. Class dismissed from time.\""},{"type":"p","text":"And the Time-Slip Sento Museum became quiet again."},{"type":"p","text":"Almost."},{"type":"p","text":"From the golden bucket came one last whisper."},{"type":"p","text":"\"Homework bath mode?\""},{"type":"p","text":"Ms. Hoshino said, \"Absolutely not.\""}]},{"themeNo":18,"id":"18","title":"Upside-Down Town and the Good-Night Morning","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Good-Night Morning"},{"type":"p","text":"On Monday morning, Taku, Kenta, Riku, and Ms. Hoshino rode a bus for a social studies trip."},{"type":"p","text":"Their lesson was about town rules."},{"type":"p","text":"Taku looked out the window and said, \"This is probably a mission.\""},{"type":"p","text":"Kenta pointed at a rice field outside the window. \"Maybe we will visit a rural frog village.\""},{"type":"p","text":"Ms. Hoshino smiled. \"We are visiting a town office, not a frog village. Please keep your notebook ready.\""},{"type":"p","text":"Then the bus entered an old tunnel. The tunnel was not long, but it felt strange. The lights were on the floor. The road signs were upside down. The bus radio played a song backward."},{"type":"p","text":"When the bus came out, everyone saw a broad square. In the middle of the square, a giant sign stood upside down."},{"type":"p","text":"The sign had a bright display."},{"type":"p","text":"WELCOME TO UPSIDE-DOWN TOWN. SAY GOOD NIGHT IN THE MORNING, NO MATTER WHAT."},{"type":"p","text":"A man walked past the bus and said, \"Good night!\""},{"type":"p","text":"A woman with a shopping bag said, \"Good night!\""},{"type":"p","text":"A dog barked, \"Woof-night!\""},{"type":"p","text":"Taku blinked. \"But it is morning.\""},{"type":"p","text":"A town speaker shouted, \"Incorrect greeting detected!\""},{"type":"p","text":"Kenta raised his hand. \"Maybe frogs wrote the rule upside down.\""},{"type":"p","text":"Ms. Hoshino answered, \"It is probably not frogs. Also, read the rule before blaming frogs.\""},{"type":"p","text":"A small clerk made of paper and gears came running. He wore an upside-down hat."},{"type":"p","text":"\"Welcome, visitors! We admire our town heritage,\" said the clerk. \"Our belief is simple. If you look from the other side, you learn equality. Upside down, nobody is above anybody!\""},{"type":"p","text":"Ms. Hoshino nodded. \"That is an interesting idea. Heritage means something passed down. Belief means an idea that people think is true. Equality means fairness.\""},{"type":"p","text":"Taku looked at the square. Houses were not all upside down, but the signs were. A bakery sign said CLOSED when it was open. A library sign said SILENCE in the playground. A clock tower pointed down."},{"type":"p","text":"Riku opened his notebook. \"As a result of the reversed greeting rule, people may become sleepy. Morning confusion can account for a large part of the town delay.\""},{"type":"p","text":"Kenta nodded seriously. \"Because they say good night, since the speaker repeats it, and as everyone believes the rule, everyone wants to sleep.\""},{"type":"p","text":"Ms. Hoshino looked surprised. \"That was strange, but the grammar was useful.\""},{"type":"p","text":"The clerk led them to a health booth. A sign said UPSIDE-DOWN CHECKUP TODAY."},{"type":"p","text":"Taku stepped back. \"A checkup upside down?\""},{"type":"p","text":"Ms. Hoshino said, \"A real checkup should be safe. This rule already sounds confused.\""},{"type":"p","text":"The clerk sighed. \"At first, Upside-Down Town was fun. But now, every rule is reversed. The school walks on ceilings. The traffic lights sing. The trash cans throw waste back out. The mayor needs help.\""},{"type":"p","text":"Taku looked at the upside-down clock tower for the first time."},{"type":"p","text":"\"The clock is falling through time!\" he cried."},{"type":"p","text":"Ms. Hoshino looked at it carefully. \"No. It is badly installed. But we should investigate.\""},{"type":"p","text":"The clerk gave them four visitor badges. The badges said GOOD NIGHT, TRAINEE PROBLEM SOLVER."},{"type":"p","text":"Taku held his badge like a space medal. \"Upside-Down Town Rescue Mission has begun.\""},{"type":"p","text":"Kenta whispered to his frog eraser, \"Good night, Froggy. Even though it is morning.\""},{"type":"p","text":"Ms. Hoshino sighed. \"This trip has already become a school report problem.\""},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Ceiling School"},{"type":"p","text":"The first stop was Upside-Down Elementary School."},{"type":"p","text":"A sign above the door said:"},{"type":"p","text":"CEILING SCHOOL. FLOORS ARE FOR THINKING. CEILINGS ARE FOR WALKING."},{"type":"p","text":"Inside, children were walking on the ceiling. Their desks were fixed above them. Their books hung from hooks. The blackboard was on the floor, so everyone had to look down to read it."},{"type":"p","text":"Taku stared up. \"This is like a space station!\""},{"type":"p","text":"Ms. Hoshino said, \"In space, astronauts float because of microgravity. But here, gravity is still pulling down. These students are using sticky ceiling shoes.\""},{"type":"p","text":"Riku crouched near a shoe station. \"I will assess the shoes and estimate the safe walking time.\""},{"type":"p","text":"He tapped a small screen. It beeped."},{"type":"p","text":"\"Safe time: three minutes,\" Riku read. \"Daily ceiling walking time: six hours. That is not good.\""},{"type":"p","text":"The ceiling school principal slid down a rope from above. His name tag said PRINCIPAL UPSIDE."},{"type":"p","text":"\"I am in charge of ceiling education,\" he said proudly. \"This is our daily method.\""},{"type":"p","text":"Ms. Hoshino looked up at the students. \"If the method makes people tired or unsafe, the school should improve it or enhance it.\""},{"type":"p","text":"One student hanging from the ceiling looked sad. \"I am ashamed of walking on the floor. Everyone else walks on the ceiling.\""},{"type":"p","text":"Taku's face changed. \"That is not fair. A rule should help people, not make them feel ashamed.\""},{"type":"p","text":"Kenta was looking at the corner of the ceiling. \"I found a clue! It looks like a frog footprint.\""},{"type":"p","text":"Ms. Hoshino climbed a short ladder and checked. \"It is a clue, yes. Frog footprint, no. It is white powder from some machine.\""},{"type":"p","text":"Suddenly, a strong wind blew across the ceiling."},{"type":"p","text":"\"Ceiling wind!\" shouted Principal Upside. \"Sometimes it is violent.\""},{"type":"p","text":"Ms. Hoshino raised her voice. \"Here, violent means very strong or intense. It can also mean harmful behavior, so we use the word carefully. Everybody, stay low. Or high. This sentence is difficult here.\""},{"type":"p","text":"The health room was also upside down. A stuffed cloud was hanging from the ceiling as a practice patient."},{"type":"p","text":"A nurse in upside-down glasses said, \"Now we begin the upside-down checkup trial.\""},{"type":"p","text":"Ms. Hoshino stopped her. \"A patient needs safe care. A trial is only a test. If the test is unsafe, you must change it. Moreover, health rules are not jokes.\""},{"type":"p","text":"Riku opened his bag. \"I can make a Ceiling Shoe Safety Timer. Initial test.\""},{"type":"p","text":"The machine clicked. A red light flashed. Then the machine reversed itself and pushed Riku gently down onto the floor."},{"type":"p","text":"Riku looked at his feet. \"I remain on the floor.\""},{"type":"p","text":"Ms. Hoshino smiled. \"For once, that is the safest result.\""},{"type":"p","text":"The sad student looked down from the ceiling. \"Is it okay to walk on the floor?\""},{"type":"p","text":"Taku nodded. \"Yes. We need to take action. Maybe ceilings can be special practice, but floors can be normal.\""},{"type":"p","text":"Principal Upside rubbed his upside-down chin. \"I wanted every student to share the same experience. But I forgot that safety and comfort matter.\""},{"type":"p","text":"Kenta raised his frog eraser. \"Froggy votes for floor walking.\""},{"type":"p","text":"Ms. Hoshino said, \"Froggy does not vote, but the idea is reasonable.\""},{"type":"p","text":"The white powder clue began to glow. A tiny arrow appeared on the floor-blackboard."},{"type":"p","text":"It pointed toward the town center."},{"type":"p","text":"Taku grinned. \"Next clue. The mission continues.\""},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"The Singing Signal"},{"type":"p","text":"At the town center, they found a giant traffic light with a microphone. It had three big eyes: red, yellow, and green. A sign said:"},{"type":"p","text":"SINGAL THE SINGING SIGNAL. CURRENT RULE: EVERY RULE MUST BE REVERSED."},{"type":"p","text":"The red light flashed, and the signal sang:"},{"type":"p","text":"\"Go, go, go, when the light is red! Dance through traffic, use your head!\""},{"type":"p","text":"Ms. Hoshino shouted, \"No. Red does not mean go. Traffic rules are safety rules.\""},{"type":"p","text":"Kenta pointed to the green light. \"The green light has frog value.\""},{"type":"p","text":"\"Traffic safety first,\" said Ms. Hoshino. \"Frog value later.\""},{"type":"p","text":"Singal bowed. \"Welcome to my intersection concert. I capture rules and force them into songs.\""},{"type":"p","text":"Riku typed on his tablet. \"This signal captures all town rules. Then it forces them into music. That is why everyone is confused.\""},{"type":"p","text":"A small sign beside the crossing said UPSIDE-DOWN ENTRANCE EXAM."},{"type":"p","text":"Question one appeared:"},{"type":"p","text":"AT FIRST, WHEN YOU SEE A RED LIGHT, WHAT DO YOU DO?"},{"type":"p","text":"Taku answered, \"In normal towns, stop.\""},{"type":"p","text":"Singal sang, \"In this town, dance!\""},{"type":"p","text":"Ms. Hoshino crossed her arms. \"That is not acceptable. Some rules can be playful, but traffic rules are different.\""},{"type":"p","text":"A repair worker ran over. \"Singal was a tourist product. It was supposed to settle arguments by singing rules clearly. But now the cost of repairs is high, and the songs are too extreme.\""},{"type":"p","text":"Behind the signal stood an upside-down clock tower."},{"type":"p","text":"\"That must be the landmark,\" said Riku. \"And this smoke machine looks old.\""},{"type":"p","text":"A little cloud of smoke popped from the signal's hat."},{"type":"p","text":"A warning display lit up:"},{"type":"p","text":"GREENHOUSE GAS WARNING. USE CLEAN ENERGY."},{"type":"p","text":"Ms. Hoshino explained, \"Greenhouse gases are a real environmental topic. This is a silly signal smoke problem, but clean energy is important.\""},{"type":"p","text":"Taku looked at Singal. \"Why do you reverse safety rules?\""},{"type":"p","text":"Singal blinked. \"Because the Automatic Rule Reverser sends me rules. I only sing the current setting.\""},{"type":"p","text":"Riku leaned closer. \"We need to learn about the original purpose of the reverser. Also, we should be prepared for more rule problems.\""},{"type":"p","text":"Suddenly, a mother pushing a stroller stopped at the red light. The stroller began to dance because the song was too catchy."},{"type":"p","text":"\"Stop!\" cried Ms. Hoshino."},{"type":"p","text":"Singal sang, \"Stop means go! Go means stop! Frog means—\""},{"type":"p","text":"\"Frog?\" Kenta gasped hopefully."},{"type":"p","text":"Ms. Hoshino covered the microphone with a traffic cone. \"Do not let the signal finish that sentence.\""},{"type":"p","text":"The repair worker pointed to a building standing upside down on a hill. \"The mayor's office is there. He knows about the Automatic Rule Reverser.\""},{"type":"p","text":"Taku looked at the upside-down building. \"A city hall on its head. Great.\""},{"type":"p","text":"Riku said, \"The current problem is not just the signal. It is the rule source.\""},{"type":"p","text":"Kenta whispered, \"If the mayor is a frog, I called it.\""},{"type":"p","text":"Ms. Hoshino said, \"Please do not suspect public officials of being frogs without evidence.\""},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Mayor Sakasa and the Rule Reverser"},{"type":"p","text":"City Hall was upside down. The entrance was on the roof. To reach it, the group rode an escalator that seemed to go down while going up."},{"type":"p","text":"At the office door, a sign said:"},{"type":"p","text":"MAYOR SAKASA. PLEASE KNOCK BELOW THE DOOR."},{"type":"p","text":"Taku knocked below the door. It opened from the top."},{"type":"p","text":"Mayor Sakasa stood inside wearing an upside-down silk hat and upside-down glasses. Only his shoes were normal."},{"type":"p","text":"\"I inform you that the town is in serious trouble,\" said the mayor."},{"type":"p","text":"Ms. Hoshino nodded. \"Inform means tell someone information. Thank you, Mayor.\""},{"type":"p","text":"Mayor Sakasa bowed. \"Long ago, this town had an impressive idea. We wanted people to see from another point of view. Students who understood others could get a scholarship. We believed this would help equality.\""},{"type":"p","text":"\"That belief was not bad,\" said Taku."},{"type":"p","text":"\"No,\" said the mayor. \"But I concluded that reversing every rule would make everything fair. So I turned on the Automatic Rule Reverser on my own.\""},{"type":"p","text":"A machine stood in the middle of the room. It had gears, a giant switch, and a screen that read REVERSE EVERYTHING."},{"type":"p","text":"Riku walked around it. \"This automatic machine treats every rule in the same way. It cannot see the difference between a fun rule and a safety rule.\""},{"type":"p","text":"The machine beeped. \"Difference not found. Fun equals safety. Stop equals start.\""},{"type":"p","text":"Ms. Hoshino said, \"That is the problem. Equality is important, but confusion is not equality.\""},{"type":"p","text":"At that moment, a line of citizens entered the office. A sign above them said CLIENT WINDOW."},{"type":"p","text":"The first client said, \"The Good night greeting makes my baby sleep at breakfast.\""},{"type":"p","text":"The second client said, \"Ceiling shoes make my neck tired.\""},{"type":"p","text":"The third client said, \"The signal's song lives in my head.\""},{"type":"p","text":"The fourth client carried a bowl. \"The upside-down lunch soup fell up into my face.\""},{"type":"p","text":"Mayor Sakasa looked ashamed. \"I wanted to provide another point of view, but I gave birth to too many problems.\""},{"type":"p","text":"Taku whispered, \"Give birth to a soup disaster. That is new.\""},{"type":"p","text":"Ms. Hoshino said, \"Give birth to can mean create or produce something. Usually we use it carefully. Here, it is a funny expression.\""},{"type":"p","text":"The mayor offered them soup in upside-down cups."},{"type":"p","text":"\"It is made from rural vegetables,\" he said. \"It has fiber.\""},{"type":"p","text":"The soup immediately fell out and splashed onto Taku's sleeve."},{"type":"p","text":"\"The produce is attacking,\" said Kenta."},{"type":"p","text":"\"Produce can mean farm products,\" said Ms. Hoshino. \"And no, the vegetables are not attacking. The cup is badly designed.\""},{"type":"p","text":"The mayor sighed. \"I cannot fix this on my own. Please help me.\""},{"type":"p","text":"Riku opened the machine panel. \"The reverser deals with rules in relation to laughter. It listens to town laughter and reverses more rules when people laugh.\""},{"type":"p","text":"Taku frowned. \"So when people laughed, it thought, 'More upside down!'\""},{"type":"p","text":"The machine beeped. \"More laughter. More reverse. More misrule.\""},{"type":"p","text":"Ms. Hoshino looked at the screen. \"There is our prefix. Mis- means wrongly or badly, as in misread, misunderstand, and misrule.\""},{"type":"p","text":"Mayor Sakasa bowed deeply. His upside-down glasses fell off and landed right side up."},{"type":"p","text":"\"Please,\" he said. \"Help us correct the misrule.\""},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Big Laugh Reset"},{"type":"p","text":"The group returned to the town square with Mayor Sakasa, Principal Upside, Singal the Singing Signal, and many citizens."},{"type":"p","text":"The Automatic Rule Reverser was connected to the landmark clock tower. It showed a new message:"},{"type":"p","text":"AIM: MAKE PEOPLE LAUGH. CURRENT EXPERIENCE: TOO MUCH CONFUSION."},{"type":"p","text":"Riku read the screen. \"The aim was laughter and learning. But curiosity made the town try more and more reversed rules. Then the machine misunderstood the laughter.\""},{"type":"p","text":"Ms. Hoshino said, \"Curiosity is good when we use it safely. But particular safety rules should not be reversed.\""},{"type":"p","text":"A trash can nearby suddenly burped."},{"type":"p","text":"Papers, banana peels, and one mystery sock shot upward."},{"type":"p","text":"Kenta jumped back. \"The waste showed up again!\""},{"type":"p","text":"Ms. Hoshino said, \"Waste should not show up from a trash can. That rule definitely needs fixing.\""},{"type":"p","text":"Riku knelt by the machine. \"We need to observe before we change it. Observe can mean watch carefully, and it can also mean follow a rule.\""},{"type":"p","text":"Kenta looked behind the clock tower and came across a small science display."},{"type":"p","text":"\"It says Upside-Down Frog Genome Research,\" he whispered. \"Finally.\""},{"type":"p","text":"Ms. Hoshino hurried over. \"Wait. Genome is a serious science word about genetic information. We do not rewrite living things to make jokes. We are fixing rules, not frogs.\""},{"type":"p","text":"Kenta put his hands behind his back. \"I will observe only. Respectfully. Sadly.\""},{"type":"p","text":"The mayor pointed at another display. \"The town expected tourism profit from the singing signal, the ceiling school, and the Good night morning tour. But profit is not success if citizens are unhappy.\""},{"type":"p","text":"Taku looked around. The town was funny, but the people looked tired. The rules had become more important than the people."},{"type":"p","text":"\"The experience was funny,\" Taku said slowly. \"But the aim should be safety and learning.\""},{"type":"p","text":"Riku nodded. \"The machine needs a filter. Fun rules can be reversed for special events. Safety rules cannot.\""},{"type":"p","text":"Singal sang softly, \"Safety rules stay! Funny rules play!\""},{"type":"p","text":"Ms. Hoshino smiled. \"That song is finally helpful.\""},{"type":"p","text":"Mayor Sakasa asked, \"How do we reset the town?\""},{"type":"p","text":"Riku looked at the screen. \"It reacts to laughter. But not all laughter is the same. If people laugh at each other, the machine makes worse rules. If people laugh together at a silly rule and choose to improve it, maybe it will reset.\""},{"type":"p","text":"Taku raised his hand like a mission captain. \"Then we laugh at the rule, not at people.\""},{"type":"p","text":"Everyone gathered in the square."},{"type":"p","text":"Taku shouted, \"Good night is funny in the morning!\""},{"type":"p","text":"The citizens laughed."},{"type":"p","text":"Kenta shouted, \"Frog rules are not necessary! Mostly!\""},{"type":"p","text":"The citizens laughed harder."},{"type":"p","text":"Ms. Hoshino said, \"Stop means stop, and go means go.\""},{"type":"p","text":"Everyone cheered."},{"type":"p","text":"Mayor Sakasa spoke to the machine. \"I was wrong to reverse everything. A rule should provide help, not trouble. I will discuss rules with citizens from now on.\""},{"type":"p","text":"The machine shook."},{"type":"p","text":"\"Misrule detected. Misrule corrected. Learning mode activated.\""},{"type":"p","text":"The clock tower turned right side up. The trash can swallowed the waste. The school desks returned to the floor. Singal changed his song."},{"type":"p","text":"\"Red means stop. Green means go. If you are confused, Ask and know!\""},{"type":"p","text":"The citizens clapped."},{"type":"p","text":"The mayor announced a new town custom. \"Once a month, we will have Another Point of View Day. We may read upside down poems or wear socks on our hands. But traffic rules, checkups, and school safety rules will remain normal.\""},{"type":"p","text":"Ms. Hoshino nodded. \"That is a much better rule.\""},{"type":"p","text":"The next morning, the bus left Upside-Down Town. A citizen waved and called, \"Good morning!\""},{"type":"p","text":"Taku answered, \"Good morning!\""},{"type":"p","text":"Kenta whispered, \"Good frog.\""},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"Kenta corrected himself. \"Good morning. With frog respect.\""},{"type":"p","text":"Ms. Hoshino opened her notebook. \"I will not write that last part in the school report.\""},{"type":"p","text":"Taku looked back at the town. The sign now said:"},{"type":"p","text":"WELCOME TO UPSIDE-DOWN TOWN. LOOK FROM ANOTHER SIDE. BUT KEEP SAFETY RIGHT SIDE UP."},{"type":"p","text":"Taku smiled. \"Mission complete. Not every rule should be reversed.\""},{"type":"p","text":"Riku added, \"Misrule corrected. Data saved.\""},{"type":"p","text":"Kenta held up Froggy. \"Froggy remains upside down by choice.\""},{"type":"p","text":"Ms. Hoshino sighed. \"That is one rule I will not try to fix today.\""}]},{"themeNo":19,"id":"19","title":"Praise Hero and the Failure Monster","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Hero Who Forgot His Pose"},{"type":"p","text":"On Tuesday morning, Taku, Kenta, Riku, and Ms. Hoshino visited Home-Home Shopping Street."},{"type":"p","text":"The street was famous for one strange custom. People praised each other all the time."},{"type":"p","text":"When a child held a door, a baker said, \"Nice action!\""},{"type":"p","text":"When an old man picked up a paper cup, a florist said, \"Kind move!\""},{"type":"p","text":"When Kenta dropped his frog eraser, a shopkeeper said, \"Interesting drop!\""},{"type":"p","text":"Ms. Hoshino tilted her head. \"That last one is not exactly praise, but it was calm.\""},{"type":"p","text":"At the center of the street stood a tall hero clock. It showed the history of every local hero. Some heroes had fire capes. Some had bicycle helmets. One hero wore a saucepan on his head and still looked proud."},{"type":"p","text":"Taku stared at the clock. \"This is probably a mission.\""},{"type":"p","text":"Suddenly, a bracelet flew out of the clock and snapped around Taku's wrist."},{"type":"p","text":"The bracelet shouted, \"Admit your mission! Transform into Praise Hero Homehomeman!\""},{"type":"p","text":"Taku jumped into the street. \"I admit the mission!\""},{"type":"p","text":"A crowd gathered. Mayor Homeru, the cheerful mayor of the shopping street, held a golden megaphone."},{"type":"p","text":"\"We will publish this in the Hero Newspaper!\" he cried."},{"type":"p","text":"Taku tried to transform. He knew the p
