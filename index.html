<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Adventure Quest">
<title>Adventure Reading Quest</title>
<style>
:root{
  --vh:1vh;
  --bg1:#06142f;
  --bg2:#26145d;
  --bg3:#005377;
  --paper:#fffdf5;
  --ink:#111827;
  --muted:#6b7280;
  --glass:rgba(255,255,255,.16);
  --glass2:rgba(255,255,255,.25);
  --line:rgba(255,255,255,.30);
  --text:#fff;
  --soft:rgba(255,255,255,.82);
  --sun:#ffe969;
  --sky:#79f5ff;
  --pop:#ff84df;
  --lime:#8effa0;
  --danger:#ffb4b4;
  --shadow:0 18px 44px rgba(0,0,0,.34);
  --radius:24px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
[hidden]{display:none!important}
html,body{width:100%;min-height:100%;margin:0}
html{background:#061327}
body{
  min-height:calc(var(--vh,1vh) * 100);
  color:var(--text);
  font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 12% 10%,rgba(121,245,255,.34),transparent 28%),
    radial-gradient(circle at 88% 13%,rgba(255,132,223,.28),transparent 30%),
    radial-gradient(circle at 50% 112%,rgba(255,233,105,.23),transparent 44%),
    linear-gradient(145deg,var(--bg1),var(--bg2) 52%,var(--bg3));
  touch-action:manipulation;
  overflow:hidden;
}
body:not([data-view="story"]):before,body:not([data-view="story"]):after{
  content:"";position:fixed;inset:-22%;pointer-events:none;opacity:.30;z-index:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.58) 0 1px,transparent 1.7px);
  background-size:33px 33px;animation:drift 28s linear infinite;
}
body:not([data-view="story"]):after{opacity:.17;background-size:57px 57px;transform:rotate(8deg);animation-duration:42s}
@keyframes drift{to{transform:translate3d(-34px,34px,0)}}
body[data-view="story"]{background:var(--paper);color:var(--ink);overflow:auto;touch-action:auto}
button,input,select{font:inherit}
button{cursor:pointer}
button:disabled{cursor:not-allowed;opacity:.42}
.view{position:relative;z-index:1}
.shell{
  width:min(100vw,560px);
  min-height:calc(var(--vh,1vh) * 100);
  min-height:100svh;
  min-height:100dvh;
  margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 12px) 12px calc(env(safe-area-inset-bottom) + 12px);
}
.home-shell,.continued-shell{display:flex;align-items:center;justify-content:center}
.panel{
  width:100%;border:1px solid var(--line);border-radius:30px;background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(255,255,255,.09));
  box-shadow:var(--shadow);backdrop-filter:blur(16px);padding:22px 18px;
}
.logo{font-size:54px;line-height:1;text-align:center;margin-bottom:12px;filter:drop-shadow(0 12px 22px rgba(0,0,0,.28))}
.app-title{margin:0;text-align:center;font-size:clamp(34px,9vw,54px);line-height:.92;font-weight:1000;letter-spacing:-.065em;text-shadow:0 5px 0 rgba(0,0,0,.20),0 0 22px rgba(255,233,105,.34)}
.tagline{margin:14px auto 0;max-width:410px;color:var(--soft);font-size:16px;line-height:1.45;text-align:center;font-weight:800}
.home-actions,.continued-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:22px}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{
  min-height:48px;border:1px solid var(--line);border-radius:17px;background:rgba(255,255,255,.16);color:#fff;
  font-weight:1000;letter-spacing:.01em;box-shadow:0 11px 24px rgba(0,0,0,.20);display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 12px;
}
.btn.primary{background:linear-gradient(135deg,var(--sun),#ff9bf0);color:#111827;border-color:rgba(255,255,255,.48);text-shadow:0 1px 0 rgba(255,255,255,.35)}
.btn.soft{background:rgba(255,255,255,.92);color:#121826;border-color:rgba(255,255,255,.6)}
.btn.icon{min-width:48px;padding:10px;font-size:20px}
.btn.ghost{background:rgba(255,255,255,.08)}
.next-stop{margin:14px 0 0;text-align:center;color:rgba(255,255,255,.78);font-size:13px;font-weight:900}
.cards-shell{
  width:min(100vw,560px);height:calc(var(--vh,1vh) * 100);height:100svh;height:100dvh;margin:0 auto;
  padding:calc(env(safe-area-inset-top) + 8px) 10px calc(env(safe-area-inset-bottom) + 8px);
  display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;gap:8px;overflow:hidden;
}
.card-top{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
.kicker{font-size:10px;line-height:1;font-weight:1000;letter-spacing:.10em;text-transform:uppercase;color:var(--sky);text-shadow:0 0 14px rgba(121,245,255,.70);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-title{margin:3px 0 0;font-size:clamp(21px,6vw,31px);line-height:.95;font-weight:1000;letter-spacing:-.045em;text-shadow:0 4px 0 rgba(0,0,0,.20),0 0 20px rgba(255,233,105,.42);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{justify-self:end;min-width:88px;height:46px;padding:5px 7px;border:1px solid var(--line);border-radius:16px;background:var(--glass);box-shadow:var(--shadow);backdrop-filter:blur(10px);display:grid;place-items:center;font-weight:1000}
.badge span{display:block;font-size:10px;color:var(--soft);letter-spacing:.07em;text-transform:uppercase;text-align:center}
.badge b{display:block;font-size:17px;line-height:1;color:var(--sun);text-align:center}
.theme-strip{display:grid;grid-template-columns:auto 1fr auto;gap:7px;align-items:center;border:1px solid var(--line);border-radius:18px;background:var(--glass);padding:7px 8px;box-shadow:0 10px 26px rgba(0,0,0,.18);backdrop-filter:blur(12px);min-height:0}
.theme-pill{font-size:12px;font-weight:1000;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.theme-name{font-size:13px;font-weight:1000;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stage{min-height:0;display:grid;place-items:stretch;perspective:900px}
.flash-card{width:100%;height:100%;min-height:260px;border:0;background:transparent;color:inherit;padding:0;text-align:inherit;border-radius:29px;display:block;outline:none}
.flash-card:focus-visible{box-shadow:0 0 0 4px rgba(121,245,255,.65)}
.face{
  height:100%;min-height:0;border-radius:29px;border:1px solid rgba(255,255,255,.34);
  background:linear-gradient(160deg,rgba(255,255,255,.95),rgba(255,255,255,.78));color:#111827;box-shadow:var(--shadow);
  padding:16px;display:grid;grid-template-rows:auto minmax(0,1fr) auto;overflow:hidden;position:relative;
}
.face:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 30% 20%,rgba(255,233,105,.42),transparent 24%),radial-gradient(circle at 70% 80%,rgba(121,245,255,.36),transparent 30%);pointer-events:none}
.face>*{position:relative;z-index:1}
.card-chips{display:flex;flex-wrap:wrap;gap:7px;align-items:center;min-width:0}
.chip{display:inline-flex;gap:5px;align-items:center;max-width:100%;border:1px solid rgba(17,24,39,.12);background:rgba(17,24,39,.06);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:1000;color:#1f2937;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.emoji{font-size:16px}.chip-text{overflow:hidden;text-overflow:ellipsis}
.card-center{min-height:0;display:grid;place-items:center;text-align:center;padding:8px 0}
.term{font-size:clamp(34px,10vw,62px);font-weight:1000;line-height:.95;letter-spacing:-.055em;overflow-wrap:anywhere;text-wrap:balance;color:#111827}
.meaning{font-size:clamp(22px,6.2vw,36px);font-weight:1000;line-height:1.18;letter-spacing:-.035em;overflow-wrap:anywhere;color:#111827}
.hidden-side{display:none!important}
.meta{margin-top:14px;display:flex;gap:7px;justify-content:center;flex-wrap:wrap}.pill{border-radius:999px;background:#111827;color:white;padding:6px 10px;font-size:12px;font-weight:1000;letter-spacing:.02em}.pill.level{background:#5b21b6}.pill.pos{background:#0f766e}
.hint{font-size:11px;color:#4b5563;font-weight:1000;text-align:center;letter-spacing:.06em;text-transform:uppercase}
.flash-card.pop .face{animation:pop .18s ease-out}@keyframes pop{50%{transform:scale(1.015) rotate(.2deg)}}
.controls{display:grid;gap:8px;min-height:0}.sliderbox{border:1px solid var(--line);border-radius:17px;background:var(--glass);padding:7px;display:grid;grid-template-columns:1fr 68px;gap:8px;align-items:center;backdrop-filter:blur(10px)}
.sliderbox input[type=range]{width:100%;accent-color:#ffe969}.jump{height:38px;border:0;border-radius:13px;background:rgba(255,255,255,.94);color:#111827;text-align:center;font-weight:1000;outline:none;padding:4px 6px}.jump:focus{box-shadow:0 0 0 4px rgba(121,245,255,.44)}
.button-row{display:grid;grid-template-columns:1fr 1fr 1fr 48px 48px;gap:7px}.button-row .btn{min-height:44px;padding:8px 7px;border-radius:15px}.progress{height:7px;border-radius:999px;background:rgba(255,255,255,.18);overflow:hidden}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--sky),var(--sun),var(--pop));border-radius:inherit;transition:width .16s ease}
.story-view{min-height:100dvh;background:var(--paper);color:var(--ink)}
.story-article{
  user-select:text;-webkit-user-select:text;max-width:780px;margin:0 auto;padding:calc(env(safe-area-inset-top) + 28px) 22px calc(env(safe-area-inset-bottom) + 108px);
  font-family:ui-serif,Georgia,"Times New Roman",serif;font-size:clamp(20px,2.6vw,27px);line-height:1.72;letter-spacing:.005em;
}
.story-article h1{font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(32px,5.8vw,52px);line-height:1.05;letter-spacing:-.055em;margin:0 0 .55em;color:#111827;text-wrap:balance}
.story-article .story-subtitle{font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(22px,3.4vw,32px);line-height:1.18;font-weight:900;margin:-.15em 0 1.4em;color:#374151;text-wrap:balance}
.story-article h2{font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(25px,4vw,38px);line-height:1.12;letter-spacing:-.035em;margin:2.1em 0 .32em;color:#111827;break-after:avoid}
.story-article h2:first-child{margin-top:0}.story-article h3{font-family:ui-rounded,"SF Pro Rounded",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:clamp(21px,3.2vw,30px);line-height:1.22;margin:.18em 0 1.1em;color:#374151;break-after:avoid;text-wrap:balance}.story-article p{margin:0 0 1.05em}.story-article p:last-child{margin-bottom:0}
.story-toolbar{position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom) + 14px);transform:translateX(-50%);z-index:4;display:flex;align-items:center;gap:10px;padding:8px;border:1px solid rgba(17,24,39,.13);border-radius:999px;background:rgba(255,255,255,.86);box-shadow:0 14px 34px rgba(17,24,39,.18);backdrop-filter:blur(16px);transition:opacity .28s ease,transform .28s ease}
.story-toolbar.clean{opacity:.12;transform:translateX(-50%) translateY(6px)}.story-toolbar:focus-within,.story-toolbar:hover{opacity:1;transform:translateX(-50%)}
.round-btn{width:48px;height:48px;border:0;border-radius:999px;background:#111827;color:white;display:grid;place-items:center;font-size:22px;font-weight:1000;box-shadow:0 9px 20px rgba(17,24,39,.18)}.round-btn.menu-round{background:#fff;color:#111827;border:1px solid rgba(17,24,39,.12)}
.continued-title{margin:0;text-align:center;font-size:clamp(36px,9vw,58px);line-height:.94;font-weight:1000;letter-spacing:-.06em;text-shadow:0 5px 0 rgba(0,0,0,.20),0 0 22px rgba(255,233,105,.34)}.continued-copy{margin:15px auto 0;max-width:400px;text-align:center;color:var(--soft);font-size:16px;line-height:1.45;font-weight:850}.spark{font-size:58px;text-align:center;margin-bottom:12px}
.drawer-backdrop{position:fixed;inset:0;z-index:10;background:rgba(0,0,0,.46);display:grid;place-items:end center;padding:0 10px calc(env(safe-area-inset-bottom) + 10px)}.drawer{width:min(100%,620px);max-height:min(82vh,720px);border:1px solid rgba(255,255,255,.24);border-radius:28px;background:rgba(18,24,43,.96);box-shadow:0 24px 80px rgba(0,0,0,.42);backdrop-filter:blur(18px);overflow:hidden;color:white;display:grid;grid-template-rows:auto minmax(0,1fr)}.drawer-head{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;padding:16px 16px 10px}.drawer-title{margin:0;font-size:24px;line-height:1;font-weight:1000;letter-spacing:-.035em}.close-btn{width:44px;height:44px;border:1px solid rgba(255,255,255,.22);border-radius:15px;background:rgba(255,255,255,.12);color:white;font-size:22px;font-weight:1000}.shortcut-list{overflow:auto;padding:0 12px 14px;display:grid;gap:8px}.shortcut-item{border:1px solid rgba(255,255,255,.15);border-radius:18px;background:rgba(255,255,255,.08);padding:9px;display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center}.shortcut-main{min-width:0}.shortcut-name{font-weight:1000;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.shortcut-meta{margin-top:3px;color:rgba(255,255,255,.68);font-size:11px;font-weight:850}.mini-btn{min-height:40px;border:1px solid rgba(255,255,255,.24);border-radius:14px;background:rgba(255,255,255,.13);color:white;font-weight:1000;padding:8px 10px}.mini-btn.primary{background:rgba(255,233,105,.95);color:#111827;border-color:rgba(255,255,255,.5)}.mini-btn:disabled{opacity:.35}
.status{position:fixed;left:10px;right:10px;bottom:10px;z-index:99;background:#111827;color:white;border-radius:16px;padding:12px;box-shadow:0 16px 36px rgba(0,0,0,.28);display:none;font-size:13px}.status.show{display:block}
@media (max-height:680px){.cards-shell{gap:6px;padding-top:calc(env(safe-area-inset-top) + 6px);padding-bottom:calc(env(safe-area-inset-bottom) + 6px)}.badge{height:39px}.theme-strip{padding:5px 7px}.face{padding:12px}.hint{font-size:10px}.sliderbox{padding:5px}.button-row .btn{min-height:39px}.progress{height:6px}.term{font-size:clamp(32px,9vw,54px)}.meaning{font-size:clamp(21px,5.8vw,32px)}}
@media (max-width:390px){.button-row{grid-template-columns:1fr 1fr 1fr 44px 44px;gap:6px}.button-row .btn{font-size:13px}.theme-name{font-size:12px}.shortcut-item{grid-template-columns:1fr 68px 68px}.mini-btn{padding:8px 6px;font-size:12px}.story-article{padding-left:18px;padding-right:18px}}
@media (prefers-reduced-motion:reduce){*,*:before,*:after{animation:none!important;transition:none!important}}
</style>
</head>
<body data-view="home">
<main id="homeView" class="view home-view">
  <div class="shell home-shell">
    <section class="panel" aria-label="Start">
      <div class="logo" aria-hidden="true">🚀</div>
      <h1 class="app-title">Adventure Reading Quest</h1>
      <p class="tagline">Cards first. Story next. Follow the trail and unlock the next adventure.</p>
      <div class="home-actions">
        <button id="continueBtn" class="btn primary" type="button">Continue</button>
        <div class="action-row">
          <button id="startBtn" class="btn soft" type="button">Start</button>
          <button id="homeMenuBtn" class="btn ghost" type="button">Shortcuts</button>
        </div>
      </div>
      <p id="homeNextStop" class="next-stop"></p>
    </section>
  </div>
</main>

<main id="cardsView" class="view cards-view" hidden>
  <div class="cards-shell">
    <section class="card-top" aria-label="Cards header">
      <div>
        <div id="cardsKicker" class="kicker">Theme 01</div>
        <h1 id="cardsTitle" class="card-title">Adventure</h1>
      </div>
      <div class="badge"><span>Card</span><b id="cardsBadge">1/1</b></div>
    </section>
    <section class="theme-strip" aria-label="Theme">
      <span id="themePill" class="theme-pill">Theme 01</span>
      <span id="themeName" class="theme-name">Adventure</span>
      <span id="themeReady" class="theme-pill">Story ready</span>
    </section>
    <section class="stage" aria-label="Card stage">
      <button id="flashCard" class="flash-card" type="button" aria-label="Show meaning">
        <div class="face">
          <div class="card-chips">
            <span class="chip"><span class="emoji" aria-hidden="true">⭐</span><span class="chip-text">Tap the card</span></span>
          </div>
          <div class="card-center">
            <div>
              <div id="termText" class="term"></div>
              <div id="meaningText" class="meaning hidden-side" lang="ja"></div>
              <div class="meta"><span id="posText" class="pill pos"></span><span id="levelText" class="pill level"></span></div>
            </div>
          </div>
          <div id="cardHint" class="hint">Tap for meaning</div>
        </div>
      </button>
    </section>
    <section class="controls" aria-label="Card controls">
      <div class="sliderbox">
        <input id="cardSlider" type="range" min="1" max="1" value="1" aria-label="Card slider">
        <input id="jumpNo" class="jump" type="text" inputmode="numeric" pattern="[0-9]*" value="1" aria-label="Card number">
      </div>
      <div class="button-row">
        <button id="prevBtn" class="btn" type="button">Prev</button>
        <button id="flipBtn" class="btn primary" type="button">Meaning</button>
        <button id="nextBtn" class="btn" type="button">Next</button>
        <button id="speakBtn" class="btn icon" type="button" aria-label="Speak">🔊</button>
        <button id="menuBtn" class="btn icon" type="button" aria-label="Shortcuts">☰</button>
      </div>
      <div class="progress" aria-hidden="true"><div id="cardBar" class="bar"></div></div>
    </section>
  </div>
</main>

<main id="storyView" class="view story-view" hidden>
  <article id="storyArticle" class="story-article" lang="en"></article>
  <nav id="storyToolbar" class="story-toolbar" aria-label="Story controls">
    <button id="storyPrevBtn" class="round-btn" type="button" aria-label="Back to cards">←</button>
    <button id="storyMenuBtn" class="round-btn menu-round" type="button" aria-label="Shortcuts">☰</button>
    <button id="storyNextBtn" class="round-btn" type="button" aria-label="Next adventure">→</button>
  </nav>
</main>

<main id="continuedView" class="view continued-view" hidden>
  <div class="shell continued-shell">
    <section class="panel" aria-label="To be continued">
      <div class="spark" aria-hidden="true">✨</div>
      <h1 class="continued-title">To be continued...</h1>
      <p class="continued-copy">More adventures can join this trail later. You can jump back to any cards or story from Shortcuts.</p>
      <div class="continued-actions">
        <button id="continuedMenuBtn" class="btn primary" type="button">Shortcuts</button>
        <div class="action-row">
          <button id="startOverBtn" class="btn soft" type="button">Start Over</button>
          <button id="exploreCardsBtn" class="btn ghost" type="button">Explore Cards</button>
        </div>
      </div>
    </section>
  </div>
</main>

<div id="shortcutBackdrop" class="drawer-backdrop" hidden>
  <aside class="drawer" aria-label="Shortcuts">
    <header class="drawer-head">
      <h2 class="drawer-title">Shortcuts</h2>
      <button id="shortcutClose" class="close-btn" type="button" aria-label="Close">×</button>
    </header>
    <div id="shortcutList" class="shortcut-list"></div>
  </aside>
</div>

<div id="status" class="status" role="status"></div>

window.APP_THEMES = [{"no":1,"index":0,"id":"01","emoji":"🚀","title":"Fart Rocket Moon Trip","cardCount":68,"hasStory":true},{"no":2,"index":1,"id":"02","emoji":"🍛","title":"Curry Kingdom Spoon Hero","cardCount":68,"hasStory":true},{"no":3,"index":2,"id":"03","emoji":"🦖","title":"Norton the Homework-Eating Dinosaur","cardCount":68,"hasStory":true},{"no":4,"index":3,"id":"04","emoji":"🎒","title":"Lost-and-Found Detective","cardCount":68,"hasStory":true},{"no":5,"index":4,"id":"05","emoji":"💩","title":"Dr. Poop's Earth Rescue Lab","cardCount":68,"hasStory":true},{"no":6,"index":5,"id":"06","emoji":"🥷","title":"Ninja Elementary Training","cardCount":68,"hasStory":true},{"no":7,"index":6,"id":"07","emoji":"👻","title":"Invisible Principal Mystery","cardCount":68,"hasStory":true},{"no":8,"index":7,"id":"08","emoji":"🤖","title":"Robo Ponkomaru Secret Base","cardCount":68,"hasStory":true},{"no":9,"index":8,"id":"09","emoji":"🪲","title":"Beetle Kingdom Tiny Adventure","cardCount":68,"hasStory":false},{"no":10,"index":9,"id":"10","emoji":"🏚️","title":"Not-Scary Ghost Mansion","cardCount":68,"hasStory":false},{"no":11,"index":10,"id":"11","emoji":"🎰","title":"My House Became a Giant Gacha","cardCount":68,"hasStory":false},{"no":12,"index":11,"id":"12","emoji":"🚆","title":"The Sneezing Train to the Sea","cardCount":68,"hasStory":false},{"no":13,"index":12,"id":"13","emoji":"🏴‍☠️","title":"Pajama Pirates and Pillow Island","cardCount":68,"hasStory":false},{"no":14,"index":13,"id":"14","emoji":"🦁","title":"Silly Zoo Boss for a Day","cardCount":68,"hasStory":false},{"no":15,"index":14,"id":"15","emoji":"⚖️","title":"Toy Court and Teddy Lawyer","cardCount":68,"hasStory":false},{"no":16,"index":15,"id":"16","emoji":"☁️","title":"Sports Day Above the Clouds","cardCount":68,"hasStory":false},{"no":17,"index":16,"id":"17","emoji":"♨️","title":"Time-Slip Bathhouse Tour","cardCount":67,"hasStory":false},{"no":18,"index":17,"id":"18","emoji":"🙃","title":"Upside-Down Town Rules","cardCount":67,"hasStory":false},{"no":19,"index":18,"id":"19","emoji":"🦸","title":"Praise Hero vs. Failure Monster","cardCount":67,"hasStory":false},{"no":20,"index":19,"id":"20","emoji":"👽","title":"Alien Transfer Student Monday","cardCount":67,"hasStory":false}];
window.APP_STORIES = [{"themeNo":1,"id":"01","title":"The Fart Rocket Moon Trip","blocks":[{"type":"h2","text":"Chapter One"},{"type":"h3","text":"The Backpack Launch Pad"},{"type":"p","text":"Taku loved space. He loved beetles. He loved frogs. He loved Minecraft-style blocks and LEGO rockets."},{"type":"p","text":"On the morning of the school trip, his backpack was not normal. It was filled with a tiny LEGO moon base, a bug picture book, a frog eraser, three pencils, one lunch box, and a bag of sweet potato chips."},{"type":"p","text":"Ms. Hoshino looked at the backpack."},{"type":"p","text":"“Taku,” she said, “that backpack looks heavy.”"},{"type":"p","text":"“It is not heavy,” said Taku. “It is prepared.”"},{"type":"p","text":"Then he ate one sweet potato chip. Crunch."},{"type":"p","text":"He ate another. Crunch, crunch."},{"type":"p","text":"Then he made a tiny sound."},{"type":"p","text":"Poot."},{"type":"p","text":"It was not a big poot. It was not a dangerous poot. It was a polite little poot."},{"type":"p","text":"But his backpack began to shake."},{"type":"p","text":"A small green light turned on. A robot voice came from inside."},{"type":"p","text":"“Pre-launch analysis complete.”"},{"type":"p","text":"Ms. Hoshino froze."},{"type":"p","text":"“Pre-launch?” she said."},{"type":"p","text":"The backpack answered, “Pre means before. Pre-launch means before launch. Pre-fart check was successful.”"},{"type":"p","text":"Kenta, Taku’s best friend, clapped his hands."},{"type":"p","text":"“Your backpack can talk!”"},{"type":"p","text":"Riku, who loved blocks and machines, leaned closer."},{"type":"p","text":"“This is the best machine I have ever seen.”"},{"type":"p","text":"The backpack stood up by itself. Two straps became silver wings. The bottom opened like a rocket engine. A tiny receipt came out of the front pocket."},{"type":"p","text":"Taku picked it up."},{"type":"p","text":"“It says, One moon trip. Paid by sweet potato gas.”"},{"type":"p","text":"Ms. Hoshino shouted, “We must not abandon our school trip!”"},{"type":"p","text":"The backpack said, “Correct. We will not abandon it. I offer a better school trip. Destination, the Moon.”"},{"type":"p","text":"“The Moon is not abroad,” said Ms. Hoshino."},{"type":"p","text":"“Correct again,” said the backpack. “Abroad means in another country. The Moon is in space.”"},{"type":"p","text":"Taku’s eyes became round."},{"type":"p","text":"“Are we really going to space?”"},{"type":"p","text":"The backpack said, “Please define space trip.”"},{"type":"p","text":"Riku raised his hand."},{"type":"p","text":"“A space trip is when a normal school trip turns into the funniest homework excuse ever.”"},{"type":"p","text":"“Definition accepted,” said the backpack."},{"type":"p","text":"On the school ground, the slide, the sandbox, and the jump rope basket moved together. They became a launch pad."},{"type":"p","text":"Kenta pointed in the distance."},{"type":"p","text":"“The Moon is over there!”"},{"type":"p","text":"Ms. Hoshino tried to be careful, but her hair was already floating a little."},{"type":"p","text":"“Children, listen. A real rocket pushes gas down. As a result of that, the rocket moves up. Gas is physical. It can push on things. We can compare a fart rocket with a real rocket, but this story is silly science, not real science.”"},{"type":"p","text":"The backpack beeped."},{"type":"p","text":"“Main factor, sweet potato chips. Second factor, excitement. Third factor, friendship.”"},{"type":"p","text":"“Friendship is fuel?” asked Taku."},{"type":"p","text":"“Friendship is always fuel,” said the backpack."},{"type":"p","text":"A sign popped out."},{"type":"p","text":"Examples of important cargo, such as LEGO blocks, frog erasers, bug cards, and lunch, are now protected."},{"type":"p","text":"Kenta hugged his frog eraser."},{"type":"p","text":"“Good. Froggy is ready.”"},{"type":"p","text":"The backpack counted down."},{"type":"p","text":"“Three. Two. One. Poot power.”"},{"type":"p","text":"Poooooot."},{"type":"p","text":"The backpack rocket shot into the sky. The class shouted. Ms. Hoshino shouted louder. The school became small. The clouds became soft white pancakes below them."},{"type":"p","text":"Taku laughed so hard that his helmet fogged up."},{"type":"p","text":"“This is science and a fart problem at the same time!”"},{"type":"p","text":"“Mission name,” said the backpack, “Pootster One.”"},{"type":"h2","text":"Chapter Two"},{"type":"h3","text":"Zero-Gravity Lunch Panic"},{"type":"p","text":"Pootster One advanced toward the Moon. Outside the window, Earth looked blue and white."},{"type":"p","text":"Taku pressed his nose to the glass."},{"type":"p","text":"“Earth looks like a marble.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Space fact. The Sun is a star. The Moon does not make its own light. It shines because it reflects sunlight.”"},{"type":"p","text":"Pootster One showed a map of the solar system."},{"type":"p","text":"“Mercury is closest to the Sun. Jupiter is the largest planet. Saturn has rings made mostly of ice and rock. Mars looks red owing to rusty dust.”"},{"type":"p","text":"Kenta whispered, “Do frogs like Mars?”"},{"type":"p","text":"“No one knows,” said Riku. “We must pursue the truth.”"},{"type":"p","text":"Then the lunch bell rang."},{"type":"p","text":"Ding dong."},{"type":"p","text":"A wooden board came down from the ceiling. It said, Space Lunch Safety Board."},{"type":"p","text":"Pootster One announced, “I will distribute lunch.”"},{"type":"p","text":"The lunch boxes opened. But there was no up and no down. Rice balls floated. Carrots floated. A number of peas floated."},{"type":"p","text":"“Many peas,” said Pootster One. “English trick. Many equals a number of.”"},{"type":"p","text":"A milk drop became a round white ball. It bumped into Ms. Hoshino’s nose."},{"type":"p","text":"Boop."},{"type":"p","text":"“Be careful,” she said."},{"type":"p","text":"Pootster One said, “Milk impact detected.”"},{"type":"p","text":"Then Kenta opened his dessert. It was green frog jelly."},{"type":"p","text":"The jelly had two candy eyes. It also had four jelly legs."},{"type":"p","text":"Kenta smiled."},{"type":"p","text":"“Hello, space frog.”"},{"type":"p","text":"The frog jelly jumped out of the cup."},{"type":"p","text":"Boing."},{"type":"p","text":"It bounced off the wall. Boing. It bounced off Riku’s helmet. Boing. It bounced into the air vent."},{"type":"p","text":"“This is serious,” said Pootster One."},{"type":"p","text":"“It is dessert,” said Taku."},{"type":"p","text":"“It is a serious dessert,” said Pootster One."},{"type":"p","text":"Kenta swam through the air after it."},{"type":"p","text":"“I will pursue my frog!”"},{"type":"p","text":"Riku tried to help. He made a tiny net from LEGO pieces. But the net hit a rice ball. The rice ball hit a carrot. The carrot hit the milk ball. The milk ball hit the frog jelly."},{"type":"p","text":"Splop."},{"type":"p","text":"The frog jelly landed on Ms. Hoshino’s notebook."},{"type":"p","text":"Everyone was quiet."},{"type":"p","text":"Then the frog jelly made a tiny sound."},{"type":"p","text":"Ribbit."},{"type":"p","text":"Everyone laughed. Even Ms. Hoshino laughed a little."},{"type":"p","text":"By contrast, Pootster One did not laugh."},{"type":"p","text":"“Lunch is floating owing to zero gravity. Please get in touch with Moon Rabbit City Hall for landing permission.”"},{"type":"p","text":"Taku pushed a red button."},{"type":"p","text":"“Moon Rabbit City Hall, can you hear us?”"},{"type":"p","text":"A sleepy rabbit face appeared on the screen."},{"type":"p","text":"“This is the Moon Rabbit City Hall. Are you a normal rocket?”"},{"type":"p","text":"Taku looked at Pootster One."},{"type":"p","text":"“No. We are a backpack.”"},{"type":"p","text":"The rabbit blinked."},{"type":"p","text":"“Are you a safe backpack?”"},{"type":"p","text":"Riku looked at the floating lunch."},{"type":"p","text":"“Not exactly.”"},{"type":"p","text":"Ms. Hoshino took out a small learning card from the Space Lunch Safety Board."},{"type":"p","text":"“This card has a serious word. Depression can mean a serious health problem. It can also mean a bad time for business. It is not a joke word, so we use it carefully.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“Some words need gentle voices.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “Now, another space fact. On the Moon, there is almost no wind and no rain. That means footprints can stay for a very long time. Some landing places are like a heritage site, so we should not step anywhere we want.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“I agree with your opinion. Also, I agree with the frog jelly’s opinion.”"},{"type":"p","text":"“What is the frog jelly’s opinion?” asked Ms. Hoshino."},{"type":"p","text":"Kenta looked at the jelly."},{"type":"p","text":"“It wants to land on the Moon and become famous.”"},{"type":"p","text":"Pootster One beeped."},{"type":"p","text":"“Landing plan accepted.”"},{"type":"h2","text":"Chapter Three"},{"type":"h3","text":"The Moon Rabbit City Hall"},{"type":"p","text":"The backpack rocket landed on the Moon with a soft bump."},{"type":"p","text":"Puff."},{"type":"p","text":"Gray dust rose slowly."},{"type":"p","text":"Taku stepped out. He jumped."},{"type":"p","text":"Boing."},{"type":"p","text":"He went higher than he expected."},{"type":"p","text":"“Whoa! I am a superhero!”"},{"type":"p","text":"Ms. Hoshino shouted, “Small jumps, please. Your movement is different here.”"},{"type":"p","text":"A rabbit in a tiny suit hopped toward them. He had a rice cake stamp in one paw and a clipboard in the other."},{"type":"p","text":"“I am Mayor Mochinosuke,” he said. “Moon entry requires a permit.”"},{"type":"p","text":"Riku whispered, “He sounds like a villager in a block game.”"},{"type":"p","text":"The mayor said, “Hmm. First question. Why did you arrive in a backpack?”"},{"type":"p","text":"Taku said, “Sweet potato factor.”"},{"type":"p","text":"The mayor wrote it down in detail."},{"type":"p","text":"“Second question. Did your gas level exceed the safe limit?”"},{"type":"p","text":"Pootster One answered, “Maybe.”"},{"type":"p","text":"The mayor’s ears stood up."},{"type":"p","text":"“Maybe is not a number.”"},{"type":"p","text":"Ms. Hoshino bowed."},{"type":"p","text":"“We will take responsibility for the noise, the dust, and the flying lunch.”"},{"type":"p","text":"“Good,” said the mayor. “Taking responsibility is important on the Moon.”"},{"type":"p","text":"The children looked around. There were rabbit houses made of white stones. There was a post office. There was a Moon Mochi Company. There was also a sign that said, Welcome, good company."},{"type":"p","text":"Taku pointed at the two company signs."},{"type":"p","text":"“Company can mean a business, and it can also mean being with someone, right?”"},{"type":"p","text":"“Correct,” said Ms. Hoshino. “You are good company when you are kind to your friends.”"},{"type":"p","text":"The mayor nodded."},{"type":"p","text":"“Please be kind company. Last week, a robot vacuum was bad company. It ate my rice cake.”"},{"type":"p","text":"Kenta looked at the ground."},{"type":"p","text":"“Why do people associate the Moon with rabbits?”"},{"type":"p","text":"The mayor smiled."},{"type":"p","text":"“Long ago, people in some places looked at the dark and light shapes on the Moon and imagined a rabbit. Imagination is powerful.”"},{"type":"p","text":"Riku pointed to a dark flat place far away."},{"type":"p","text":"“Is that the sea?”"},{"type":"p","text":"Pootster One answered, “The Sea of Tranquility is not a marine sea. It has no fish and no frogs.”"},{"type":"p","text":"“No frogs?” said Kenta sadly."},{"type":"p","text":"Ms. Hoshino explained, “Those Moon seas are dark flat areas. Many were made by ancient lava. They can be compared with old frozen lakes of rock, but they are not water.”"},{"type":"p","text":"The mayor stamped a paper."},{"type":"p","text":"“Also, do not jump into deep craters.”"},{"type":"p","text":"“How deep?” asked Taku."},{"type":"p","text":"“Deep enough to make your teacher say your full name,” said the mayor."},{"type":"p","text":"Ms. Hoshino said, “Taku Hoshikawa.”"},{"type":"p","text":"Taku stepped back."},{"type":"p","text":"Near the city hall, there was a strange old sign. It said, Acid rain warning."},{"type":"p","text":"Riku laughed."},{"type":"p","text":"“Acid rain on the Moon?”"},{"type":"p","text":"The mayor sighed."},{"type":"p","text":"“That sign came from Earth by mistake. The Moon has no rain like Earth. No normal rain. No acid rain. But the sign is useful. It keeps rabbits from running too fast.”"},{"type":"p","text":"A tiny clinic stood next to the office. It said, Jump Recovery Room."},{"type":"p","text":"Kenta asked, “What is recovery?”"},{"type":"p","text":"“It means getting better,” said Ms. Hoshino. “After too many moon jumps, rabbits need recovery.”"},{"type":"p","text":"The mayor gave them another paper."},{"type":"p","text":"“If you stay tonight, you need accommodation.”"},{"type":"p","text":"“What is accommodation?” asked Taku."},{"type":"p","text":"“A place to stay,” said the mayor. “Our best room has a crater view, a rice cake pillow, and a very small toilet.”"},{"type":"p","text":"Kenta giggled."},{"type":"p","text":"“Moon toilet!”"},{"type":"p","text":"The mayor became very serious."},{"type":"p","text":"“Particularly small.”"},{"type":"p","text":"The children laughed again."},{"type":"p","text":"Then the city hall alarm rang."},{"type":"p","text":"Wooo. Wooo. Wooo."},{"type":"p","text":"Pootster One flashed red."},{"type":"p","text":"“Problem detected.”"},{"type":"p","text":"The mayor corrected it."},{"type":"p","text":"“Issue detected.”"},{"type":"p","text":"Ms. Hoshino added, “Challenge detected.”"},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“Problem, issue, challenge. Three words. One big uh-oh.”"},{"type":"h2","text":"Chapter Four"},{"type":"h3","text":"Gomigon, the Space Junk Monster"},{"type":"p","text":"Something huge came over the hill."},{"type":"p","text":"Clank. Clank. Clank."},{"type":"p","text":"It had an old satellite on one shoulder. It had a bent antenna on its head. It had broken spoons on its arms. It had a lost LEGO brick on its nose. And for some reason, it had underpants stuck to its back."},{"type":"p","text":"The rabbit crowd screamed."},{"type":"p","text":"“A monster!”"},{"type":"p","text":"The huge thing waved one metal hand."},{"type":"p","text":"“Please do not run. I do not intend to frighten anyone.”"},{"type":"p","text":"But its voice was very loud."},{"type":"p","text":"BOOOOM."},{"type":"p","text":"A rice cake fell off the mayor’s desk."},{"type":"p","text":"Ms. Hoshino stood in front of the children."},{"type":"p","text":"“Stay calm. Let us find out what it wants.”"},{"type":"p","text":"The monster sat down. The Moon shook a little."},{"type":"p","text":"“My name is Gomigon,” it said. “Space junk sticks to me. It causes trouble. I need help.”"},{"type":"p","text":"Taku walked closer."},{"type":"p","text":"“You are not here to fight?”"},{"type":"p","text":"“No,” said Gomigon. “I am here to solve a problem.”"},{"type":"p","text":"“An issue,” said the mayor."},{"type":"p","text":"“A challenge,” said Ms. Hoshino."},{"type":"p","text":"Gomigon nodded."},{"type":"p","text":"“Yes. A problem, an issue, and a challenge. Also, it is itchy.”"},{"type":"p","text":"Kenta looked at the old satellite."},{"type":"p","text":"“Is all of that your property?”"},{"type":"p","text":"Ms. Hoshino said, “Property can mean something you own. It can also mean a special feature.”"},{"type":"p","text":"Gomigon scratched his back with an antenna."},{"type":"p","text":"“My special property is stickiness. My sad property is smelliness.”"},{"type":"p","text":"Pootster One scanned him."},{"type":"p","text":"“Space fact. Space junk is dangerous because even small pieces move very fast. They can damage satellites and spacecraft.”"},{"type":"p","text":"Riku picked up the lost LEGO brick from Gomigon’s nose."},{"type":"p","text":"“This is still useful. We can set up a sorting machine.”"},{"type":"p","text":"The mayor gasped."},{"type":"p","text":"“Be careful near the famous footprints!”"},{"type":"p","text":"Taku saw a small protected area with a tiny fence."},{"type":"p","text":"“Are those famous because astronauts made them?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “On the Moon, there is little wind or rain, so footprints may last a very long time.”"},{"type":"p","text":"Gomigon sighed."},{"type":"p","text":"“I live in the space neighborhood near Earth. I try to clean it. At the same time, I scare everyone. I look forward to having friends, but everyone runs away.”"},{"type":"p","text":"The children looked at him. His eyes were two old camera lenses. They looked lonely."},{"type":"p","text":"Taku said, “That is not fair. You look scary, but you are trying to help.”"},{"type":"p","text":"Gomigon sniffed."},{"type":"p","text":"A tiny bolt fell from his nose."},{"type":"p","text":"“I am willing to clean space. I am willing to help. I am even willing to wash the underpants, but I do not know how.”"},{"type":"p","text":"The mayor stepped back."},{"type":"p","text":"“Moon law says underpants must have a label before washing.”"},{"type":"p","text":"Riku opened his LEGO box."},{"type":"p","text":"“I can build a label machine.”"},{"type":"p","text":"Kenta took out his bug picture book."},{"type":"p","text":"“And I can classify pieces like beetles. Big shiny thing. Small round thing. Weird pants thing.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Good. We will deal with the space junk. We will get rid of dangerous pieces. We will keep useful pieces. We will prevent them from hitting satellites.”"},{"type":"p","text":"Pootster One beeped happily."},{"type":"p","text":"“Teamwork detected. Friendship fuel increased.”"},{"type":"p","text":"The mayor raised his stamp."},{"type":"p","text":"“If you finish this task, I will give Gomigon a graduation certificate from Moon Clean School.”"},{"type":"p","text":"Gomigon’s camera eyes became bright."},{"type":"p","text":"“Graduation? I have never had a graduation.”"},{"type":"p","text":"Taku patted his metal foot."},{"type":"p","text":"“You will today.”"},{"type":"h2","text":"Chapter Five"},{"type":"h3","text":"The Underwear Meteor Shower"},{"type":"p","text":"Riku built the sorting machine. It had LEGO wheels. It had a rice cake button. It had a frog jelly power switch."},{"type":"p","text":"Kenta made biology notes."},{"type":"p","text":"“Frog jelly is not alive,” he said. “But it behaves like a very rude frog.”"},{"type":"p","text":"The frog jelly sat on the switch."},{"type":"p","text":"Ribbit."},{"type":"p","text":"The machine started."},{"type":"p","text":"Whirr. Whirr. Whirr."},{"type":"p","text":"Pootster One gave instructions."},{"type":"p","text":"“Label metal pieces. Label plastic pieces. Label mystery pieces. Label underpants.”"},{"type":"p","text":"A sign appeared."},{"type":"p","text":"Moon Label Corporation. We label everything before lunch."},{"type":"p","text":"The mayor wiped his forehead."},{"type":"p","text":"“Thank you. Without labels, our corporation may go out of business.”"},{"type":"p","text":"Taku held up a pair of striped underpants with two sticks."},{"type":"p","text":"“Is this related to Gomigon’s problem?”"},{"type":"p","text":"Pootster One answered, “Yes. The underpants are related to the space junk challenge.”"},{"type":"p","text":"Gomigon looked embarrassed."},{"type":"p","text":"“I found them near an old laundry satellite. I did not intend to keep them.”"},{"type":"p","text":"Suddenly, the sorting machine sneezed."},{"type":"p","text":"Ka-choo."},{"type":"p","text":"All the underpants flew into the air."},{"type":"p","text":"One pair went over the city hall. One pair wrapped around the mayor’s ears. One pair covered Pootster One’s camera."},{"type":"p","text":"“Visual error,” said Pootster One. “This will confuse navigation.”"},{"type":"p","text":"The rest of the underpants rose higher and higher. They became a silly line in the black sky."},{"type":"p","text":"Pootster One began to warn everyone."},{"type":"p","text":"“Warning. Underwear meteor shower.”"},{"type":"p","text":"The rabbit crowd screamed again."},{"type":"p","text":"“Not the laundry sky!”"},{"type":"p","text":"Ms. Hoshino clapped her hands."},{"type":"p","text":"“Take action. We need a solution.”"},{"type":"p","text":"Riku said, “We can use the underpants as tiny parachutes.”"},{"type":"p","text":"Kenta said, “Or as frog capes.”"},{"type":"p","text":"Taku said, “Both ideas are beautiful, but we need to stop them before they hit the protected footprints.”"},{"type":"p","text":"The mayor pointed to a giant round building."},{"type":"p","text":"“That is our industrial washing machine. It is as big as the gym. It can wash one thousand rice cake towels, or maybe one thousand space underpants.”"},{"type":"p","text":"“Perfect,” said Riku."},{"type":"p","text":"They tied the underpants together like a long soft rope. Gomigon held one end. Pootster One held the other. Taku, Kenta, Riku, Ms. Hoshino, and the rabbits pushed from the middle."},{"type":"p","text":"The frog jelly hopped on top like a green captain."},{"type":"p","text":"“Ribbit.”"},{"type":"p","text":"“Raise the rope,” shouted Taku."},{"type":"p","text":"Everyone raised it."},{"type":"p","text":"“Raise your hands,” shouted Kenta."},{"type":"p","text":"Everyone raised their hands."},{"type":"p","text":"“Raise money for clean space,” shouted the mayor."},{"type":"p","text":"Everyone looked at him."},{"type":"p","text":"“Sorry,” said the mayor. “Wrong meaning of raise.”"},{"type":"p","text":"They pulled the underpants into the industrial washing machine."},{"type":"p","text":"Whump. Spin. Splash. Spin."},{"type":"p","text":"Pootster One said, “Health reminder. Wash hands after touching space junk to prevent disease.”"},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"“Even on the Moon, clean hands are cool.”"},{"type":"p","text":"The machine finished."},{"type":"p","text":"Ding."},{"type":"p","text":"The underpants came out clean, dry, and neatly labeled."},{"type":"p","text":"Useful parachutes. Rabbit ear warmers. Not for helmets. Do not eat."},{"type":"p","text":"The mayor stamped Gomigon’s certificate."},{"type":"p","text":"“Gomigon, you have passed Moon Clean School. Happy graduation.”"},{"type":"p","text":"The rabbit crowd cheered."},{"type":"p","text":"Gomigon cried happy oil tears."},{"type":"p","text":"“I look forward to cleaning the whole space neighborhood with you one day.”"},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“We will visit again, but maybe not by fart rocket.”"},{"type":"p","text":"Pootster One beeped."},{"type":"p","text":"“Fuel warning. Sweet potato gas is almost gone. We must return to school on time.”"},{"type":"p","text":"Ms. Hoshino checked her watch."},{"type":"p","text":"“If we are late, the principal will ask why.”"},{"type":"p","text":"Riku said, “We can say, owing to a space junk issue, lunch floated, a monster needed help, and underpants became meteors.”"},{"type":"p","text":"Ms. Hoshino closed her eyes."},{"type":"p","text":"“That explanation may require a meeting.”"},{"type":"p","text":"Taku searched his pocket. He found one last sweet potato chip."},{"type":"p","text":"The class became silent."},{"type":"p","text":"Kenta whispered, “The final factor.”"},{"type":"p","text":"Taku ate the chip."},{"type":"p","text":"Crunch."},{"type":"p","text":"Pootster One started the engine."},{"type":"p","text":"“Pre-return analysis complete. Main factor, sweet potato. Additional factor, friendship. Extra factor, clean underpants.”"},{"type":"p","text":"Ms. Hoshino said, “Please do not say that in the school report.”"},{"type":"p","text":"The rocket rose from the Moon. Gomigon waved. The mayor waved his stamp. The frog jelly waved one jelly leg."},{"type":"p","text":"Earth grew bigger in the window."},{"type":"p","text":"Pootster One said, “Space fact. Earth is our home planet. It has air, water, and many living things. That is why we must take responsibility for it.”"},{"type":"p","text":"Taku looked at the blue planet."},{"type":"p","text":"“It is pretty.”"},{"type":"p","text":"“It is more than pretty,” said Ms. Hoshino. “It is precious.”"},{"type":"p","text":"The backpack rocket entered the sky. Clouds flew past. The school appeared below. The sandbox opened like a soft landing pillow."},{"type":"p","text":"Pootster One counted down."},{"type":"p","text":"“Three. Two. One. Tiny poot landing.”"},{"type":"p","text":"Poot."},{"type":"p","text":"They landed on the school ground exactly on time."},{"type":"p","text":"The principal walked over."},{"type":"p","text":"“Welcome back. How was the park?”"},{"type":"p","text":"Everyone looked at Ms. Hoshino. Ms. Hoshino looked at Taku. Taku looked at Pootster One."},{"type":"p","text":"Pootster One printed a receipt."},{"type":"p","text":"The principal read it."},{"type":"p","text":"“One moon trip. One lunch impact. One heritage site warning. One Gomigon graduation. One industrial underwear washing service.”"},{"type":"p","text":"The principal was quiet for a long time."},{"type":"p","text":"Then he said, “Next time, please go to the park.”"},{"type":"p","text":"Pootster One beeped."},{"type":"p","text":"“Park trip accepted. Pre-fart check begins now.”"},{"type":"p","text":"Taku shouted, “No!”"},{"type":"p","text":"Kenta shouted, “Yes!”"},{"type":"p","text":"Riku shouted, “I will bring more LEGO!”"},{"type":"p","text":"Ms. Hoshino shouted, “Everybody, open the windows!”"},{"type":"p","text":"And somewhere in the distance, on the Moon, Gomigon laughed so loudly that three clean underpants floated like flags."},{"type":"p","text":"The end."}]},{"themeNo":2,"id":"02","title":"The Curry Kingdom Spoon Hero","blocks":[{"type":"h2","text":"Chapter One"},{"type":"h3","text":"The Morning the Curry Spoke"},{"type":"p","text":"Taku loved space. He loved bugs. He loved frogs. He loved Minecraft-style blocks and LEGO machines."},{"type":"p","text":"But on Thursday, he discovered something even stranger than a fart rocket."},{"type":"p","text":"He discovered talking curry."},{"type":"p","text":"It happened at lunch time. The classroom smelled warm and sweet and spicy. The lunch helpers placed curry rice on every desk. The sauce was yellow. The carrots were orange. The potatoes were round and proud. The rice looked like a snowy mountain."},{"type":"p","text":"Taku held up his spoon."},{"type":"p","text":"\"Today,\" he said, \"I will explore this curry like a tiny solar system. The carrot is Mars. The green pea is Earth. The potato is a small moon with no homework.\""},{"type":"p","text":"Kenta looked into his bowl."},{"type":"p","text":"\"Maybe the green pea is a frog egg,\" he said seriously."},{"type":"p","text":"Ms. Hoshino said, \"Kenta, please do not diagnose your lunch as a frog. Also, do not put your face too close to hot curry. Be careful.\""},{"type":"p","text":"Riku was already building a tiny bridge with three carrot sticks and two grains of rice."},{"type":"p","text":"\"If the sauce is a river,\" he said, \"this bridge can help the potato people cross. Maybe.\""},{"type":"p","text":"Then Taku's curry made a sound."},{"type":"p","text":"Bloop."},{"type":"p","text":"Taku stopped."},{"type":"p","text":"The curry made another sound."},{"type":"p","text":"Bloop. Bloop."},{"type":"p","text":"Then a tiny golden bubble rose from the sauce. It opened like a little mouth."},{"type":"p","text":"\"Help us, Spoon Hero!\""},{"type":"p","text":"Taku dropped his spoon. Clang!"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"\"The curry can talk! I knew it was a frog problem!\""},{"type":"p","text":"\"It is not a frog,\" said the curry bubble. \"It is a kingdom.\""},{"type":"p","text":"Riku leaned closer."},{"type":"p","text":"\"A kingdom in curry? That is better than a machine. That is a machine with sauce.\""},{"type":"p","text":"Ms. Hoshino took one deep breath. Teachers are very good at taking deep breaths when lunch becomes magical."},{"type":"p","text":"\"Class,\" she said, \"please stay calm. Also, please do not drink the talking government.\""},{"type":"p","text":"The bubble grew taller. A tiny king rose from the curry. His body was made of sauce. His crown was made of red pickles. His cape was a very flat noodle."},{"type":"p","text":"\"I am King Rou of Curry Kingdom,\" he said. \"Our kingdom is in danger.\""},{"type":"p","text":"Taku blinked."},{"type":"p","text":"\"Are you the king of my lunch?\""},{"type":"p","text":"\"Yes,\" said King Rou. \"And you are the Spoon Hero.\""},{"type":"p","text":"\"Why me?\""},{"type":"p","text":"\"Because you held the spoon with courage,\" said the king. \"Also, because your spoon is shiny enough.\""},{"type":"p","text":"Riku whispered, \"That is an accurate measurement?\""},{"type":"p","text":"A tiny doctor in a white yogurt coat popped out of a cup beside the curry."},{"type":"p","text":"\"I am Doctor Yogur,\" he said. \"My report is accurate. The spoon shine level is ninety-eight percent.\""},{"type":"p","text":"Kenta pointed at Doctor Yogur."},{"type":"p","text":"\"Are you a microorganism?\""},{"type":"p","text":"Doctor Yogur smiled."},{"type":"p","text":"\"No, I am bigger than a microorganism. A microorganism is too small to see without a tool. Some foods, such as yogurt, are connected with helpful microorganisms.\""},{"type":"p","text":"Kenta looked amazed."},{"type":"p","text":"\"So tiny invisible lunch friends exist?\""},{"type":"p","text":"\"In a way,\" said Ms. Hoshino. \"But wash your hands anyway.\""},{"type":"p","text":"King Rou cleared his tiny sauce throat."},{"type":"p","text":"\"Please do not delay the adventure. Every minute of delay makes our curry colder. When the curry gets cold, our power goes down.\""},{"type":"p","text":"A tiny sign rose from the rice mountain. It said:"},{"type":"p","text":"Emergency Curry Council Meeting. Do not step on the onions."},{"type":"p","text":"The sauce opened, and Taku saw a tiny room under the curry surface. Inside, carrots, potatoes, onions, peas, and rice grains sat around a round table. They were shouting."},{"type":"p","text":"\"We should abolish the No-Waste Promise!\" cried one angry potato."},{"type":"p","text":"\"No!\" shouted a carrot. \"If we abolish it, the dragon will grow bigger!\""},{"type":"p","text":"\"This is too political for lunch,\" whispered Taku."},{"type":"p","text":"\"Correct,\" said Ms. Hoshino. \"Political means related to how a group is governed. Even a curry kingdom may have rules.\""},{"type":"p","text":"King Rou sighed."},{"type":"p","text":"\"Our kingdom is in a recession.\""},{"type":"p","text":"Taku tilted his head."},{"type":"p","text":"\"Recession?\""},{"type":"p","text":"\"It means the economy is weak,\" Ms. Hoshino explained. \"Here, it means the curry shops are sad, the spice market is quiet, and the potatoes cannot buy tiny hats.\""},{"type":"p","text":"A potato at the table held up a hat the size of a pepper seed."},{"type":"p","text":"\"I need this hat for my confidence,\" he said."},{"type":"p","text":"King Rou looked at Taku."},{"type":"p","text":"\"Long ago, my ancestor, Great Rou the First, found the legendary spoon. He said it could be used only by a generous hero.\""},{"type":"p","text":"\"Generous means kind and willing to give,\" said Ms. Hoshino."},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"I can be generous with frog stickers.\""},{"type":"p","text":"\"Good to know,\" said Ms. Hoshino."},{"type":"p","text":"King Rou continued."},{"type":"p","text":"\"Many heroes tried before you. One hero tried to operate the spoon like a helicopter. That was a failure. One hero used the spoon as a slide. That was also a failure. One hero tried to eat the king. That was a very personal failure.\""},{"type":"p","text":"Taku picked up his spoon again."},{"type":"p","text":"\"How do I operate it?\""},{"type":"p","text":"The spoon flashed. A tiny voice came from the handle."},{"type":"p","text":"\"Please take advantage of the Spoon Hero System.\""},{"type":"p","text":"\"Take advantage of means use it well,\" said Ms. Hoshino. \"Do not take advantage of people. But you can take advantage of a useful tool.\""},{"type":"p","text":"The spoon flashed again."},{"type":"p","text":"\"Curry Kingdom consists of rice, sauce, carrots, potatoes, onions, peas, spice, and warm feelings.\""},{"type":"p","text":"\"Consist of means be made of,\" said Taku. \"Right?\""},{"type":"p","text":"\"Right,\" said Ms. Hoshino."},{"type":"p","text":"Then the spoon handle opened. A tiny screen appeared."},{"type":"p","text":"Future Goal: In the future, every child will choose a good lunch amount and waste less food."},{"type":"p","text":"Taku read it slowly."},{"type":"p","text":"\"In the future, waste less food. That sounds important.\""},{"type":"p","text":"\"It is,\" said Ms. Hoshino. \"But remember, it does not mean eating until your stomach hurts.\""},{"type":"p","text":"The spoon beeped."},{"type":"p","text":"\"Word trick: The prefix re- means again. Re-think. Re-try. Re-connect. Re-curry.\""},{"type":"p","text":"Ms. Hoshino looked at the spoon."},{"type":"p","text":"\"Re-curry is not a normal word.\""},{"type":"p","text":"\"It is delicious,\" said the spoon."},{"type":"p","text":"Suddenly, the curry bowl shook. A shadow crossed the sauce. Far away, past the potato castle, a roar rolled across the curry."},{"type":"p","text":"\"Rooooo!\""},{"type":"p","text":"The tiny vegetables screamed."},{"type":"p","text":"King Rou pointed with a noodle."},{"type":"p","text":"\"The Leftover Dragon is awake. Please, Spoon Hero, enter Curry Kingdom.\""},{"type":"p","text":"The spoon grew wider. It became a silver boat. A little flag rose from the front."},{"type":"p","text":"SPOON HERO EXPRESS. NO SHOES IN THE SAUCE."},{"type":"p","text":"Taku climbed onto the spoon. Kenta climbed behind him with his frog eraser. Riku brought three blocks, two rubber bands, and one paper clip. Ms. Hoshino climbed on last, holding a napkin like a safety flag."},{"type":"p","text":"\"Remember,\" she said, \"we are going to learn, help, and return before the curry gets cold.\""},{"type":"p","text":"The spoon tipped forward."},{"type":"p","text":"Whoosh!"},{"type":"p","text":"The four friends became tiny. They slid down the warm yellow river and entered Curry Kingdom."},{"type":"h2","text":"Chapter Two"},{"type":"h3","text":"Carrot Soldiers and Potato Castle"},{"type":"p","text":"The Curry Kingdom was bigger than Taku expected."},{"type":"p","text":"Rice mountains rose like snowy hills. Onion rings floated like small islands. Carrot trees stood in straight orange lines. A river of sauce moved slowly through the valley. In the sky, tiny spice clouds drifted like dust from Mars."},{"type":"p","text":"Taku looked up."},{"type":"p","text":"\"This is not just lunch,\" he said. \"This is a whole world.\""},{"type":"p","text":"Kenta crouched beside a green pea."},{"type":"p","text":"\"Hello, possible frog egg,\" he whispered."},{"type":"p","text":"The pea rolled away."},{"type":"p","text":"\"That was rude,\" said Kenta."},{"type":"p","text":"Riku touched the rice ground."},{"type":"p","text":"\"Good building material,\" he said. \"A little sticky, but useful.\""},{"type":"p","text":"They reached a red-orange gate. Above it was a sign."},{"type":"p","text":"Welcome to the Border of Potato Castle. Please declare all forks, frogs, and mysterious toppings."},{"type":"p","text":"A carrot soldier jumped out. He wore a helmet made of parsley and shoes made of sesame seeds."},{"type":"p","text":"\"Stop at the border!\" he shouted. \"Several strangers are coming!\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"Several means some. Some equals several in many sentences.\""},{"type":"p","text":"Another sign flipped over."},{"type":"p","text":"Word Card: some = several."},{"type":"p","text":"Kenta waved at the sign."},{"type":"p","text":"\"Hello, word card. Do you like frogs?\""},{"type":"p","text":"The carrot soldier frowned."},{"type":"p","text":"\"I am Captain Carroton. I protect this border. Why are you here?\""},{"type":"p","text":"Taku held up the spoon."},{"type":"p","text":"\"I am the Spoon Hero. Maybe.\""},{"type":"p","text":"The spoon beeped."},{"type":"p","text":"\"Hero level: initial but shiny.\""},{"type":"p","text":"Captain Carroton looked at Ms. Hoshino."},{"type":"p","text":"\"And you?\""},{"type":"p","text":"\"I am the teacher,\" she said. \"I am responsible for safety, English, and not stepping in hot sauce.\""},{"type":"p","text":"Carroton saluted."},{"type":"p","text":"\"Good. Today is casual Friday, so our army is wearing aprons instead of armor.\""},{"type":"p","text":"Behind him, several carrot soldiers stood in aprons that said, PROTECT THE POTATOES."},{"type":"p","text":"Taku tried not to laugh. He failed."},{"type":"p","text":"Carroton did not laugh."},{"type":"p","text":"\"The Leftover Dragon can affect every part of Curry Kingdom,\" he said. \"When children take too much food and cannot finish it, sadness falls into the sauce. Consequently, the dragon gains power.\""},{"type":"p","text":"\"Consequently means as a result,\" said Ms. Hoshino."},{"type":"p","text":"\"As a result of too much sadness,\" said Taku, \"the dragon gets bigger.\""},{"type":"p","text":"\"Exactly,\" said Ms. Hoshino."},{"type":"p","text":"They walked through the border gate. Potato Castle stood ahead. It was made of big golden potatoes stacked like blocks. Riku's eyes shone."},{"type":"p","text":"\"Can I build one of these at home?\""},{"type":"p","text":"\"Not with real potatoes,\" said Ms. Hoshino. \"They will become soup.\""},{"type":"p","text":"At the castle gate, onions stood in a long line. They were all crying."},{"type":"p","text":"\"Why are they sad?\" asked Taku."},{"type":"p","text":"\"They are onions,\" said Carroton. \"They cry even when they are excited.\""},{"type":"p","text":"One onion held up a paper."},{"type":"p","text":"\"I want to apply for a job as a brave onion guard,\" he sobbed. \"I can make enemies cry. Also friends. Also myself.\""},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"\"That is a strong skill.\""},{"type":"p","text":"Inside the castle, Taku saw shops with tiny signs."},{"type":"p","text":"Spice Shop: Closed. Tiny Hat Shop: Very Sad. Pea Theater: No customers except one ant."},{"type":"p","text":"King Rou's face appeared on a sauce screen."},{"type":"p","text":"\"Our income has fallen. The spice shops cannot earn enough. Even the tiny hat shop may close.\""},{"type":"p","text":"A potato merchant held up a hat."},{"type":"p","text":"\"No income, no hats,\" he said. \"No hats, no style. No style, no hope.\""},{"type":"p","text":"Ms. Hoshino whispered, \"That may be a little dramatic, but income means money that comes in.\""},{"type":"p","text":"At the center of the castle, a bridge had fallen into the sauce river. On the other side, tiny peas waited with food bags."},{"type":"p","text":"Carroton said, \"We wanted to donate extra peas to the hungry village. But the bridge broke.\""},{"type":"p","text":"\"Donate means give to help others,\" said Ms. Hoshino."},{"type":"p","text":"Riku knelt beside the broken bridge."},{"type":"p","text":"\"I can raise the bridge with blocks. Maybe. Raise can mean lift up. It can also mean bring up an issue. And farmers can raise vegetables. English is like a toolbox.\""},{"type":"p","text":"Ms. Hoshino stared at him."},{"type":"p","text":"\"That was a very good explanation.\""},{"type":"p","text":"Riku shrugged."},{"type":"p","text":"\"I like tools.\""},{"type":"p","text":"He used sticky rice grains, two carrot sticks, and three imaginary LEGO pieces from his pocket. He built a wobbly bridge."},{"type":"p","text":"Kenta tested it with his frog eraser."},{"type":"p","text":"\"Froggy says it is safe.\""},{"type":"p","text":"The bridge immediately bent."},{"type":"p","text":"\"Froggy says it needs support.\""},{"type":"p","text":"Doctor Yogur arrived, carrying a spoon-shaped medical bag."},{"type":"p","text":"\"Before anyone crosses, I must diagnose the curry river,\" he said."},{"type":"p","text":"He dipped a tiny thermometer into the sauce. It screamed."},{"type":"p","text":"\"Hot! Hot! Hot!\""},{"type":"p","text":"Doctor Yogur nodded."},{"type":"p","text":"\"My diagnosis is accurate. The sauce is nervous.\""},{"type":"p","text":"\"Can sauce be nervous?\" asked Taku."},{"type":"p","text":"\"In Curry Kingdom, yes,\" said Doctor Yogur."},{"type":"p","text":"A tomato family walked by with little bags. They had red round faces and friendly smiles."},{"type":"p","text":"Carroton bowed."},{"type":"p","text":"\"They are immigrant tomatoes from Tomato Valley. They came to Curry Kingdom and brought a new flavor.\""},{"type":"p","text":"Ms. Hoshino said, \"An immigrant is a person who comes to live in another country. In this story, the tomatoes bring new culture and new taste. That can make a place richer.\""},{"type":"p","text":"Kenta whispered to one tomato child."},{"type":"p","text":"\"Do you have frogs in Tomato Valley?\""},{"type":"p","text":"The tomato child whispered back, \"We have ketchup fish.\""},{"type":"p","text":"Kenta's eyes grew huge."},{"type":"p","text":"\"I need to visit.\""},{"type":"p","text":"At the end of the hall, they saw a picture of an old potato king. He wore a crown and a very serious mustache."},{"type":"p","text":"Carroton lowered his voice."},{"type":"p","text":"\"That is King Potato the Gentle. He passed away many years ago. We remember him with respect.\""},{"type":"p","text":"Ms. Hoshino spoke softly."},{"type":"p","text":"\"Pass away is a gentle expression. We use it with respect.\""},{"type":"p","text":"Everyone became quiet for a moment. Even the onions cried more softly."},{"type":"p","text":"Then a potato guard sneezed."},{"type":"p","text":"\"Achoo!\""},{"type":"p","text":"His mustache flew off."},{"type":"p","text":"It was not a real mustache. It was a noodle."},{"type":"p","text":"The room burst into laughter. Even Ms. Hoshino smiled."},{"type":"p","text":"Then the castle floor shook. A red light flashed."},{"type":"p","text":"Warning! Karakuchi Meter 3000 is unstable! Mild level is gone!"},{"type":"p","text":"Captain Carroton turned pale orange."},{"type":"p","text":"\"The Spicy Meter! If it breaks, the sauce will become too hot. We must get over our fear and go to the machine room.\""},{"type":"p","text":"\"Get over means overcome,\" said Ms. Hoshino. \"We can get over a fear, a problem, or sometimes a cold.\""},{"type":"p","text":"Taku held up the spoon."},{"type":"p","text":"\"Then let's go. Spoon Hero team, move out!\""},{"type":"p","text":"Kenta raised his frog eraser."},{"type":"p","text":"\"Froggy is emotionally prepared!\""},{"type":"p","text":"Riku picked up his blocks."},{"type":"p","text":"\"The machine room sounds excellent.\""},{"type":"p","text":"Together, they ran toward the spicy red light."},{"type":"h2","text":"Chapter Three"},{"type":"h3","text":"The Spicy Meter Goes Wild"},{"type":"p","text":"The machine room was under Potato Castle."},{"type":"p","text":"It was enormous. Giant pipes carried yellow sauce. Spice wheels spun in the walls. A huge meter stood in the center of the room. It had a face, two eyebrows, and a long red needle."},{"type":"p","text":"The words on the meter were strange."},{"type":"p","text":"MILD. MEDIUM. HOT. SUPER HOT. VOLCANO. WHY IS THIS HAPPENING?"},{"type":"p","text":"The needle was shaking between VOLCANO and WHY IS THIS HAPPENING?"},{"type":"p","text":"\"This,\" said Riku, \"is a beautiful machine.\""},{"type":"p","text":"The machine coughed. Red spice powder flew into the air."},{"type":"p","text":"\"Achoo!\" shouted Taku."},{"type":"p","text":"\"Achoo!\" shouted Kenta."},{"type":"p","text":"\"Achoo,\" said Ms. Hoshino, very politely."},{"type":"p","text":"Doctor Yogur looked worried."},{"type":"p","text":"\"This spice cloud is like air pollution in the curry world. Air pollution means dirty air. In real life, it can be bad for people and nature.\""},{"type":"p","text":"Kenta waved his hand in front of his nose."},{"type":"p","text":"\"It is also bad for frog erasers. Froggy looks spicy.\""},{"type":"p","text":"Riku walked around the meter."},{"type":"p","text":"\"I need a detailed plan,\" he said. \"This meter is composed of several parts: a spice wheel, a sauce pump, a temperature sensor, a stress tank, and one unnecessary dancing onion.\""},{"type":"p","text":"In the corner, an onion wearing sunglasses danced slowly."},{"type":"p","text":"\"I am necessary for style,\" said the onion."},{"type":"p","text":"Ms. Hoshino pointed to a sign on the wall."},{"type":"p","text":"English Note: be composed of means be made of."},{"type":"p","text":"Taku nodded."},{"type":"p","text":"\"So the Spicy Meter is composed of many parts.\""},{"type":"p","text":"The needle jumped again."},{"type":"p","text":"Ding!"},{"type":"p","text":"SUPER HOT. Ding! VOLCANO. Ding! WHY IS THIS HAPPENING?"},{"type":"p","text":"Captain Carroton shouted, \"We assume the Leftover Dragon caused this!\""},{"type":"p","text":"Taku frowned."},{"type":"p","text":"\"Assume means think something is true before we know for sure, right?\""},{"type":"p","text":"\"Right,\" said Ms. Hoshino. \"We should not blame someone only because we assume. We need to research the mystery.\""},{"type":"p","text":"\"Research,\" said Kenta. \"That means look into it. Like looking into a pond for frogs.\""},{"type":"p","text":"\"Close enough,\" said Ms. Hoshino. \"Look into means investigate.\""},{"type":"p","text":"A tiny screen on the meter showed a comparison."},{"type":"p","text":"Mild curry: smiles. Medium curry: brave faces. Super hot curry: dragon sneezes. Volcano curry: teacher drinks three cartons of milk."},{"type":"p","text":"Taku pointed."},{"type":"p","text":"\"The comparison says Ms. Hoshino needs milk.\""},{"type":"p","text":"\"The comparison is correct,\" said Ms. Hoshino."},{"type":"p","text":"Riku opened a little door on the machine. A metal screw rolled out and fell into the sauce."},{"type":"p","text":"Plop."},{"type":"p","text":"\"We need to exchange that broken screw for something else,\" he said."},{"type":"p","text":"He picked up a sticky rice grain."},{"type":"p","text":"\"This rice grain can take the place of the screw.\""},{"type":"p","text":"The rice grain looked proud."},{"type":"p","text":"Kenta saluted it."},{"type":"p","text":"\"Good luck, tiny screw rice.\""},{"type":"p","text":"Riku pushed the rice grain into the machine. The machine hummed. Then it yelled."},{"type":"p","text":"\"I am not soup!\""},{"type":"p","text":"\"That did not work exactly,\" said Riku. \"But it was an interesting failure.\""},{"type":"p","text":"The dancing onion stopped dancing."},{"type":"p","text":"\"The stress tank is too full,\" he said. \"Everyone is blaming everyone. Therefore, the meter is becoming hotter.\""},{"type":"p","text":"\"Therefore means so,\" said Taku. \"Everyone is stressed, so the curry gets hotter.\""},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"Stress can affect bodies and choices. In this story, stress affects sauce.\""},{"type":"p","text":"A little door opened in the wall. The sign above it said:"},{"type":"p","text":"Spoon Airport. Flights to Rice Mountain, Pea Village, and Pika-Pika Plate Temple. Please do not ride the ladle without permission."},{"type":"p","text":"A grain of rice with a cap waved."},{"type":"p","text":"\"Passengers for Pea Village, line up here!\""},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"\"There is an airport in the curry.\""},{"type":"p","text":"\"Of course,\" said the rice captain. \"How else do peas travel?\""},{"type":"p","text":"The Spicy Meter shook harder. The red pattern inside the meter began to swirl. It looked like a giant storm."},{"type":"p","text":"Taku pointed."},{"type":"p","text":"\"That looks like Jupiter!\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Good eye. Jupiter has a famous giant storm called the Great Red Spot. It has lasted for a very long time. This one is only a curry storm, but the swirl looks similar.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"Do frogs live on Jupiter?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"\"Do spicy frogs live on Jupiter?\""},{"type":"p","text":"\"Also no.\""},{"type":"p","text":"The machine screen flashed again."},{"type":"p","text":"In fact, the Leftover Dragon may not be the only cause. Please choose a way, method, or approach."},{"type":"p","text":"Another word card popped up."},{"type":"p","text":"way = method = approach."},{"type":"p","text":"Riku read it."},{"type":"p","text":"\"A way is a method. A method is an approach. My approach is to build something.\""},{"type":"p","text":"\"Your approach often makes more soup,\" said Kenta."},{"type":"p","text":"\"Not always,\" said Riku."},{"type":"p","text":"A loud roar rolled through the pipes."},{"type":"p","text":"\"Rooooo!\""},{"type":"p","text":"The Spicy Meter's needle bent like a noodle."},{"type":"p","text":"Captain Carroton trembled."},{"type":"p","text":"\"The dragon is coming.\""},{"type":"p","text":"The floor cracked. Sauce bubbled up. A huge shadow rose behind the meter. It had wings made of leftover rice. It had horns made of carrot ends. It had a tail of potato skins. Its eyes were sad and spicy."},{"type":"p","text":"The Leftover Dragon opened its mouth."},{"type":"p","text":"\"Who calls me a monster?\""},{"type":"p","text":"Taku stepped forward. His spoon shook in his hand."},{"type":"p","text":"\"I am Taku. I mean, the Spoon Hero. Maybe.\""},{"type":"p","text":"The dragon lowered its giant head."},{"type":"p","text":"\"Then answer me, Spoon Hero. Why do people waste food?\""},{"type":"p","text":"The whole machine room became silent. Even the dancing onion stopped moving."},{"type":"h2","text":"Chapter Four"},{"type":"h3","text":"The Promise with Nokoshin"},{"type":"p","text":"The Leftover Dragon was bigger than the chalkboard in Taku's classroom. He was bigger than the lunch cart. He was bigger than the school shoe box area, including the shoes that smelled like old socks."},{"type":"p","text":"His name was Nokoshin."},{"type":"p","text":"Nokoshin's body was made of leftover rice, carrot ends, potato skins, unhappy sighs, and tiny sounds of spoons scraping plates. But his eyes did not look mean. They looked tired."},{"type":"p","text":"\"I challenge you,\" said Nokoshin. \"Tell me why food is wasted. Tell me why a child takes a mountain of rice and then says, I am full, after two bites.\""},{"type":"p","text":"Taku held his spoon tightly."},{"type":"p","text":"\"I don't know,\" he said. \"Sometimes people take too much because they are hungry at first. Sometimes they do not know the taste. Sometimes they feel shy to ask for less.\""},{"type":"p","text":"Nokoshin blinked."},{"type":"p","text":"\"You did not attack me.\""},{"type":"p","text":"\"We are trying to research the mystery,\" said Taku. \"Ms. Hoshino says we should not assume.\""},{"type":"p","text":"Ms. Hoshino stepped forward."},{"type":"p","text":"\"Nokoshin, are you trying to hurt Curry Kingdom?\""},{"type":"p","text":"The dragon shook his head. Several rice grains fell from his nose."},{"type":"p","text":"Plip. Plip. Plip."},{"type":"p","text":"Kenta whispered, \"Dragon boogers.\""},{"type":"p","text":"Ms. Hoshino gave him the teacher look."},{"type":"p","text":"Kenta stood up straight."},{"type":"p","text":"\"I mean, unusual rice movement.\""},{"type":"p","text":"Nokoshin sighed."},{"type":"p","text":"\"I do not want to spread trouble. But every time food is wasted, I gain more sadness. The sadness spreads through the sauce. It can bring about a spice storm.\""},{"type":"p","text":"\"Bring about means cause,\" said Ms. Hoshino. \"His sadness brings about the storm.\""},{"type":"p","text":"Taku looked at the dragon's tail. A tiny pea was stuck there, holding a suitcase."},{"type":"p","text":"\"Why is there a pea on your tail?\""},{"type":"p","text":"The pea waved."},{"type":"p","text":"\"I am a passenger. I was on the bus to Pea Village. The spice storm pushed me into dragon traffic.\""},{"type":"p","text":"A curry bus rolled out from behind Nokoshin's foot. It was shaped like a spoon. The driver was a grain of rice with sunglasses."},{"type":"p","text":"\"All passengers, please remain seated,\" the driver called. \"Do not lick the windows.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"Can frog erasers be passengers?\""},{"type":"p","text":"\"Only if they have tickets,\" said the driver."},{"type":"p","text":"Nokoshin lowered his head."},{"type":"p","text":"\"I was born for protection. I protect the idea that food matters. I protect the work of farmers, cooks, water, soil, and the Sun. But when too much is wasted, I grow too large. Then everyone fears me.\""},{"type":"p","text":"Ms. Hoshino's voice became gentle."},{"type":"p","text":"\"Protection means keeping something safe. Nokoshin is not simply an enemy. He is a protector who became too big.\""},{"type":"p","text":"Captain Carroton looked ashamed."},{"type":"p","text":"\"We called him a monster. That was not fair.\""},{"type":"p","text":"\"Fair means treating people in a right and balanced way,\" said Taku."},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Yes. And now I will give a short lecture. A lecture is a talk that teaches something. Do not worry. It will be shorter than the line for curry seconds.\""},{"type":"p","text":"Everyone sat down on rice cushions. Even Nokoshin sat, although his tail knocked over a potato statue."},{"type":"p","text":"Bonk."},{"type":"p","text":"\"Sorry,\" said Nokoshin."},{"type":"p","text":"Ms. Hoshino began."},{"type":"p","text":"\"Food waste is a serious issue. But being responsible does not mean eating until your stomach hurts. Your body matters too. A good choice can depend on your body, your hunger, allergies, and how much you can eat that day. You should be able to choose a smaller amount if you need it. Then, if you are still hungry, you can ask for more.\""},{"type":"p","text":"Taku nodded slowly."},{"type":"p","text":"\"So the goal is not to force everyone to finish a giant mountain. The goal is to choose well and waste less.\""},{"type":"p","text":"\"Exactly,\" said Ms. Hoshino."},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"In my opinion, frogs do not waste flies.\""},{"type":"p","text":"There was a long silence."},{"type":"p","text":"Ms. Hoshino smiled a tiny smile."},{"type":"p","text":"\"That is a strange example, but your point is favorable. Favorable means good or positive.\""},{"type":"p","text":"Nokoshin smiled for the first time. It was a big smile with rice on the teeth."},{"type":"p","text":"\"I like the frog boy,\" he said."},{"type":"p","text":"Kenta bowed."},{"type":"p","text":"\"The frog boy likes rice dragons.\""},{"type":"p","text":"Suddenly, the ground shook again. A mountain of red spice rose behind Potato Castle. Smoke puffed from the top."},{"type":"p","text":"Doctor Yogur shouted, \"Spice Mountain is about to burst! It will be a natural disaster in Curry Kingdom!\""},{"type":"p","text":"\"A natural disaster is a dangerous natural event,\" said Ms. Hoshino quickly. \"In this world, it is a spice eruption. In real life, examples include earthquakes, floods, and storms.\""},{"type":"p","text":"Riku was already drawing a figure in the sauce with a carrot stick."},{"type":"p","text":"\"Here is the figure,\" he said. \"If the dragon sadness goes down, the stress tank goes down. If the stress tank goes down, the Spicy Meter cools. If the meter cools, Spice Mountain stops.\""},{"type":"p","text":"Taku looked at the figure."},{"type":"p","text":"\"So figure can mean a picture or a number?\""},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"It can also mean an important person. And figure out means understand.\""},{"type":"p","text":"Riku nodded."},{"type":"p","text":"\"I have figured out that we need a promise system.\""},{"type":"p","text":"\"What kind of system?\" asked Nokoshin."},{"type":"p","text":"Riku placed blocks on the ground."},{"type":"p","text":"\"A Choose-Your-Amount Gate. Small, medium, or hungry-hero size. Before lunch, everyone chooses a range. Then the lunch helper serves an amount within that range.\""},{"type":"p","text":"\"Range means a set of choices between two points,\" said Ms. Hoshino."},{"type":"p","text":"Nokoshin's wings relaxed."},{"type":"p","text":"\"Will children be able to ask for less without shame?\""},{"type":"p","text":"Taku nodded."},{"type":"p","text":"\"Yes. And they can ask for more if they are hungry.\""},{"type":"p","text":"Kenta added, \"And if a green pea looks like a frog egg, we can still be respectful.\""},{"type":"p","text":"\"Please be respectful without calling it a frog egg,\" said Ms. Hoshino."},{"type":"p","text":"Nokoshin looked at the vegetables, the rice passengers, the tomato family, the onions, and Captain Carroton."},{"type":"p","text":"\"Curry Kingdom has many kinds of food and many kinds of culture,\" he said. \"Each ingredient has a story.\""},{"type":"p","text":"The immigrant tomato child stepped forward."},{"type":"p","text":"\"Our family came from Tomato Valley. At first, some potatoes thought we were too red. Now our tomato festival is part of the culture.\""},{"type":"p","text":"\"And ketchup fish,\" whispered Kenta."},{"type":"p","text":"\"Especially ketchup fish,\" said the tomato child."},{"type":"p","text":"The Spicy Meter beeped from far away."},{"type":"p","text":"Stress level falling. Dragon sadness falli
