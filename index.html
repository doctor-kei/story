lled his legs out of the mud."},{"type":"p","text":"“I will hold on to the rope and not become a mud statue.”"},{"type":"p","text":"The four children and Gurugurumaru moved together."},{"type":"p","text":"Taku pointed at a slippery stone."},{"type":"p","text":"“I point out danger here.”"},{"type":"p","text":"Kenta pointed at the frog leaf."},{"type":"p","text":"“Danger to frog peace here.”"},{"type":"p","text":"Riku added a block support beside the bridge."},{"type":"p","text":"“Temporary support. Safe enough for walking one at a time.”"},{"type":"p","text":"Ms. Hoshino checked it."},{"type":"p","text":"“One at a time, slowly.”"},{"type":"p","text":"They crossed."},{"type":"p","text":"Halfway across, Gurugurumaru slipped."},{"type":"p","text":"“Hold on!” cried Taku."},{"type":"p","text":"Gurugurumaru grabbed the rope."},{"type":"p","text":"“I am holding on!”"},{"type":"p","text":"Riku and Kenta helped him step back onto the bridge."},{"type":"p","text":"Gurugurumaru looked at them."},{"type":"p","text":"“A good ninja assists a muddy ninja.”"},{"type":"p","text":"“That part is true,” said Ms. Hoshino."},{"type":"p","text":"They reached the middle of the course."},{"type":"p","text":"There was no principal."},{"type":"p","text":"Only mud."},{"type":"p","text":"Only a scroll."},{"type":"p","text":"Only the sound of one frog."},{"type":"p","text":"Kenta whispered, “Ribbit.”"},{"type":"p","text":"Taku looked around."},{"type":"p","text":"“The principal’s absence is strange.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“I have doubt that he is watching.”"},{"type":"p","text":"Then the mud said, “I am watching.”"},{"type":"p","text":"Everyone froze."},{"type":"p","text":"A pair of glasses rose from the mud."},{"type":"p","text":"Then a principal’s hat rose."},{"type":"p","text":"Then Principal Makimono stood up, covered in mud from shoulders to shoes."},{"type":"p","text":"Taku stared."},{"type":"p","text":"“You were under the mud?”"},{"type":"p","text":"Principal Makimono nodded."},{"type":"p","text":"“Ninja principal.”"},{"type":"p","text":"Ms. Hoshino put one hand on her forehead."},{"type":"p","text":"“School report problem.”"},{"type":"p","text":"Principal Makimono pointed to the last part of the course."},{"type":"p","text":"“The final choice is ahead. Fast route or safe route.”"},{"type":"p","text":"The fast route was short."},{"type":"p","text":"It also went straight through deep mud."},{"type":"p","text":"The safe route was longer."},{"type":"p","text":"It went around the frog, the worm tunnels, and the slippery stones."},{"type":"p","text":"Taku looked at his friends."},{"type":"p","text":"“The right path is the safe path.”"},{"type":"p","text":"Riku said, “Correct.”"},{"type":"p","text":"Kenta said, “Frog-approved.”"},{"type":"p","text":"Gurugurumaru said, “Recyclable decision!”"},{"type":"p","text":"Ms. Hoshino said, “Not the word I would choose, but yes.”"},{"type":"p","text":"They took the safe route."},{"type":"p","text":"They went slowly."},{"type":"p","text":"They stayed in a row."},{"type":"p","text":"They helped one another."},{"type":"p","text":"At the finish line, the scroll opened."},{"type":"p","text":"FINAL EXAM COMPLETE. A GOOD NINJA DOES NOT JUST RUN FAST. A GOOD NINJA TAKES TURNS. A GOOD NINJA ASKS FOR PERMISSION. A GOOD NINJA HANDLES THINGS SAFELY. A GOOD NINJA MAKES AN EFFORT. A GOOD NINJA CAN MAKE AN EFFORT EVEN IN MUD."},{"type":"p","text":"Principal Makimono gave each student a paper certificate."},{"type":"p","text":"Taku’s certificate said:"},{"type":"p","text":"BEGINNER NINJA OF SAFE MISSIONS."},{"type":"p","text":"Kenta’s certificate said:"},{"type":"p","text":"BEGINNER NINJA OF FROG-RELATED OBSERVATION."},{"type":"p","text":"Riku’s certificate said:"},{"type":"p","text":"BEGINNER NINJA OF PROTOTYPES THAT MOSTLY WORK."},{"type":"p","text":"Gurugurumaru’s certificate said:"},{"type":"p","text":"SPECIAL INSTRUCTOR WHO MUST STOP SAYING PAIN IS RECYCLABLE."},{"type":"p","text":"Gurugurumaru hugged the certificate."},{"type":"p","text":"“I accept this challenge.”"},{"type":"p","text":"At the side of the field, a local shopkeeper had set up a tiny stand."},{"type":"p","text":"The sign said:"},{"type":"p","text":"LOCAL POND SUPPORT STAND. ONE SERVING OF RICE BALLS PER NINJA. MUD BALLS ARE FOR PLAY, NOT FOOD."},{"type":"p","text":"Kenta read the sign and nodded."},{"type":"p","text":"“Important clarification.”"},{"type":"p","text":"The shopkeeper gave them each one serving of rice balls."},{"type":"p","text":"“Today’s earnings,” she said, “will help the local pond.”"},{"type":"p","text":"Kenta held up his rice ball."},{"type":"p","text":"“Frogs approve.”"},{"type":"p","text":"The real frog on the leaf said, “Ribbit.”"},{"type":"p","text":"Kenta almost dropped his rice ball."},{"type":"p","text":"“It answered!”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Maybe.”"},{"type":"p","text":"Gurugurumaru climbed back into the recycle box."},{"type":"p","text":"“My work here is complete. Recycle Ninjutsu!”"},{"type":"p","text":"He tried to disappear."},{"type":"p","text":"Instead, the box tipped over."},{"type":"p","text":"BONK."},{"type":"p","text":"Only his feet stuck out."},{"type":"p","text":"“Box pain is recyclable!” he shouted from inside."},{"type":"p","text":"“Pain is not recyclable,” said everyone."},{"type":"p","text":"Taku looked at his certificate."},{"type":"p","text":"“So we are real ninjas?”"},{"type":"p","text":"Principal Makimono shook mud from his hat."},{"type":"p","text":"“Beginner ninjas.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Beginner is acceptable.”"},{"type":"p","text":"Kenta looked at the frog."},{"type":"p","text":"“Can beginner ninjas protect ponds?”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Yes. By being careful, asking permission, observing from a safe distance, and helping the local environment.”"},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“Then Ninja Elementary Training was a mission after all.”"},{"type":"p","text":"Ms. Hoshino looked at the muddy field, the talking scroll, the tipped recycle box, and the frog watching them from a leaf."},{"type":"p","text":"“It was a mission,” she said. “But now the mission is cleaning your shoes.”"},{"type":"p","text":"Gurugurumaru’s voice came from the box."},{"type":"p","text":"“Cleaning Ninjutsu?”"},{"type":"p","text":"Ms. Hoshino answered at once."},{"type":"p","text":"“Slowly. Safely. With permission.”"},{"type":"p","text":"The blackboard, somehow visible from the field, flashed one final message."},{"type":"p","text":"CLASS DISMISSED. PLEASE DO NOT GRADUATE INTO MORE MUD."},{"type":"p","text":"The frog blinked."},{"type":"p","text":"Taku whispered, “That frog understands English.”"},{"type":"p","text":"Kenta whispered, “I knew it.”"},{"type":"p","text":"Ms. Hoshino whispered, “It is probably just a frog.”"},{"type":"p","text":"And from the recycle box came a very small voice."},{"type":"p","text":"“Ribbit Ninjutsu?”"},{"type":"p","text":"“No,” said everyone."}]},{"themeNo":7,"id":"07","title":"The Invisible Principal and the Missing Assembly Platform","blocks":[{"type":"subtitle","text":"The Morning Microphone Would Not Stop Talking"},{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Principal Became See-Through"},{"type":"p","text":"On Monday morning, the whole school stood in the schoolyard for morning assembly."},{"type":"p","text":"Taku stood beside Kenta and Riku. He was looking at the sky."},{"type":"p","text":"“The clouds look like a space station,” Taku whispered."},{"type":"p","text":"Kenta looked at the grass near his shoes."},{"type":"p","text":"“The grass looks like a frog blanket,” he whispered back."},{"type":"p","text":"Riku looked at the assembly platform."},{"type":"p","text":"“The platform looks normal,” he said. “That is suspicious.”"},{"type":"p","text":"Ms. Hoshino stood behind them with a clipboard."},{"type":"p","text":"“Please stand quietly,” she said. “This is not a space station, a frog blanket, or a suspicious platform. It is Monday.”"},{"type":"p","text":"Then the microphone made a loud sound."},{"type":"p","text":"KIIIIIN!"},{"type":"p","text":"Everyone covered their ears."},{"type":"p","text":"A voice came from the platform."},{"type":"p","text":"“Good morning, students.”"},{"type":"p","text":"It was Principal Makimono’s voice."},{"type":"p","text":"But nobody could see Principal Makimono."},{"type":"p","text":"They could see his red tie."},{"type":"p","text":"They could see his round glasses."},{"type":"p","text":"They could see his blue socks with yellow dots."},{"type":"p","text":"But they could not see his face, his hands, his body, or the platform under his feet."},{"type":"p","text":"The tie floated in the air."},{"type":"p","text":"The glasses floated above the tie."},{"type":"p","text":"The socks floated below the tie."},{"type":"p","text":"The schoolyard became completely silent."},{"type":"p","text":"Taku’s eyes shone."},{"type":"p","text":"“This is probably a mission,” he said."},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Maybe the principal turned into a frog ghost,” he said."},{"type":"p","text":"Ms. Hoshino took a slow breath."},{"type":"p","text":"“It is probably not a frog,” she said. “And even if someone becomes invisible, we remain polite.”"},{"type":"p","text":"The floating tie moved left."},{"type":"p","text":"The floating glasses moved right."},{"type":"p","text":"The floating socks stepped backward."},{"type":"p","text":"“I am here,” said Principal Makimono. “Please do not panic.”"},{"type":"p","text":"Riku opened a small notebook."},{"type":"p","text":"“Visible items,” he said. “Tie. Glasses. Socks. Invisible items. Principal. Platform. Common sense.”"},{"type":"p","text":"“Please do not record common sense as missing,” said Ms. Hoshino."},{"type":"p","text":"Principal Makimono cleared his throat."},{"type":"p","text":"“As you can see, or rather, as you cannot see, we have a problem.”"},{"type":"p","text":"A few students giggled."},{"type":"p","text":"Ms. Hoshino raised her hand."},{"type":"p","text":"“Funny is fine,” she said. “Making fun of someone is not fine.”"},{"type":"p","text":"The giggling stopped."},{"type":"p","text":"Principal Makimono sounded relieved."},{"type":"p","text":"“Thank you, Ms. Hoshino. I depend on your help.”"},{"type":"p","text":"Taku stepped forward."},{"type":"p","text":"“We will accompany you,” he said. “Invisible Principal Mission has begun.”"},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"“And if we find a transparent frog, I will observe it carefully.”"},{"type":"p","text":"“There is no transparent frog in this mission yet,” said Ms. Hoshino."},{"type":"p","text":"Riku pointed at a silver box beside the floating socks."},{"type":"p","text":"“What is that?” he asked."},{"type":"p","text":"The principal hesitated."},{"type":"p","text":"“That is the Transparent Platform Cover,” he said. “The robotics club made it. The school finance committee had an argument about the old platform. A new platform was expensive. This cover was affordable.”"},{"type":"p","text":"“Affordable means not too expensive,” said Ms. Hoshino. “But affordable does not always mean safe.”"},{"type":"p","text":"“I pressed one button by accident,” said the principal. “Then the platform and I became invisible.”"},{"type":"p","text":"Riku looked serious."},{"type":"p","text":"“The primary problem is safety,” he said. “The second problem is the principal’s well-being.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Yes. The primary problem is safety. If the platform is invisible, someone may trip over it.”"},{"type":"p","text":"Taku looked at the empty space under the floating socks."},{"type":"p","text":"“So the principal’s workplace became invisible too?” he asked."},{"type":"p","text":"“The principal’s workplace is usually the principal’s office,” said Ms. Hoshino. “But at morning assembly, the platform is part of his work.”"},{"type":"p","text":"The platform made a tiny sound."},{"type":"p","text":"Gishi."},{"type":"p","text":"Then another."},{"type":"p","text":"Gishi."},{"type":"p","text":"The floating tie moved three steps forward."},{"type":"p","text":"The invisible platform moved with it."},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“The platform is walking!”"},{"type":"p","text":"“Platforms do not usually walk,” said Ms. Hoshino."},{"type":"p","text":"“Maybe it is trying to escape its workplace,” said Kenta."},{"type":"p","text":"“That is not a usual platform behavior,” said Riku."},{"type":"p","text":"Principal Makimono sounded worried."},{"type":"p","text":"“I must persuade the platform to stay still.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“We can persuade the invisible situation to stop!”"},{"type":"p","text":"Ms. Hoshino blinked."},{"type":"p","text":"“You persuade a person, not a situation. But I understand your energy.”"},{"type":"p","text":"The silver box blinked."},{"type":"p","text":"A label on it said:"},{"type":"p","text":"MAGICAL-LOOKING BUT TECHNICAL COVER."},{"type":"p","text":"Riku read it aloud."},{"type":"p","text":"“Magical-looking, technical, logical, personal, formal. Those words have the suffix -al.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Yes. The suffix -al can mean related to something. But right now, the most important word is careful.”"},{"type":"p","text":"The microphone squeaked again."},{"type":"p","text":"KIIIIIN!"},{"type":"p","text":"Then the microphone coughed."},{"type":"p","text":"“Testing. Testing. Is this thing on?”"},{"type":"p","text":"The floating tie froze."},{"type":"p","text":"The students froze."},{"type":"p","text":"The microphone spoke again."},{"type":"p","text":"“Good. If the principal is invisible, I shall continue the assembly.”"},{"type":"p","text":"Ms. Hoshino looked at the microphone."},{"type":"p","text":"“Oh no,” she said quietly. “The microphone is talking.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Microphone That Declared Itself Mayor"},{"type":"p","text":"The morning microphone stood on its thin black stand."},{"type":"p","text":"It had a round head, a red light, and a long cord that moved like a tail."},{"type":"p","text":"The red light blinked."},{"type":"p","text":"“Hello, students,” said the microphone. “I am Micchi, mayor of Microphone City.”"},{"type":"p","text":"Riku stared at it."},{"type":"p","text":"“A microphone cannot be a mayor,” he said."},{"type":"p","text":"“I refer to myself as the mayor,” said Micchi. “Therefore, I am important.”"},{"type":"p","text":"“That is not exactly how mayors work,” said Ms. Hoshino."},{"type":"p","text":"Micchi did not listen."},{"type":"p","text":"“Instruction number one,” said Micchi. “Stand straight.”"},{"type":"p","text":"Most students stood straight."},{"type":"p","text":"“Instruction number two. Do invisible exercise.”"},{"type":"p","text":"No one moved."},{"type":"p","text":"“Instruction number three. Clap if you can see the principal.”"},{"type":"p","text":"No one clapped."},{"type":"p","text":"Micchi made a sad little buzz."},{"type":"p","text":"“At a glance,” it said, “I can see the problem. Nobody can see the problem.”"},{"type":"p","text":"Taku whispered to Riku."},{"type":"p","text":"“That microphone talks too much.”"},{"type":"p","text":"Micchi shouted, “I heard that!”"},{"type":"p","text":"Ms. Hoshino stepped closer."},{"type":"p","text":"“Micchi, please reduce your volume.”"},{"type":"p","text":"“My volume is my career,” said Micchi. “I plan to become a famous singer.”"},{"type":"p","text":"Kenta tilted his head."},{"type":"p","text":"“Can microphones sing frog songs?”"},{"type":"p","text":"“Do not encourage it,” said Ms. Hoshino."},{"type":"p","text":"The principal’s floating glasses turned toward Micchi."},{"type":"p","text":"“Micchi, please go on only if you can help us.”"},{"type":"p","text":"“I can go on forever,” said Micchi proudly."},{"type":"p","text":"“That is the opposite of help,” said Riku."},{"type":"p","text":"Riku opened his tool box."},{"type":"p","text":"“I will analyze the sound data,” he said."},{"type":"p","text":"He connected a small block machine to the microphone stand."},{"type":"p","text":"“This is my Echo Reducer. It can reduce the squeak and maybe eliminate extra noise.”"},{"type":"p","text":"Ms. Hoshino held up a hand."},{"type":"p","text":"“Initial safety check first.”"},{"type":"p","text":"“Done,” said Riku."},{"type":"p","text":"He pressed the button."},{"type":"p","text":"The microphone squeaked once."},{"type":"p","text":"Kiiiiin."},{"type":"p","text":"Then the sound disappeared."},{"type":"p","text":"Everyone sighed with relief."},{"type":"p","text":"Then Taku tried to speak."},{"type":"p","text":"“Testing,” he said."},{"type":"p","text":"But his voice came out like a robot."},{"type":"p","text":"“TE-STING. IN-VIS-I-BLE. MIS-SION.”"},{"type":"p","text":"Kenta opened his mouth."},{"type":"p","text":"“RIB-BIT. I MEAN HEL-LO.”"},{"type":"p","text":"Ms. Hoshino’s voice became deep and metallic."},{"type":"p","text":"“RI-KU. RE-DUCE DOES NOT MEAN RE-MOVE ALL HU-MAN VOI-CES.”"},{"type":"p","text":"Riku quickly turned the knob."},{"type":"p","text":"The voices returned to normal."},{"type":"p","text":"“Useful data,” said Riku."},{"type":"p","text":"“Useful, but uncomfortable,” said Ms. Hoshino."},{"type":"p","text":"Micchi giggled through its speaker."},{"type":"p","text":"“My singing career is safer than your invention.”"},{"type":"p","text":"“Micchi,” said Ms. Hoshino, “we need specific clues.”"},{"type":"p","text":"“Need means require,” said Taku."},{"type":"p","text":"“Correct,” said Ms. Hoshino. “We need, or require, specific clues.”"},{"type":"p","text":"Micchi’s red light blinked faster."},{"type":"p","text":"“I have a recording,” it said. “I recorded the moment of disappearance.”"},{"type":"p","text":"“Play it,” said Riku."},{"type":"p","text":"Micchi cleared its tiny speaker throat."},{"type":"p","text":"The recording played."},{"type":"p","text":"Principal Makimono’s voice said, “Good morning. I will now test the Transparent Platform Cover.”"},{"type":"p","text":"Then came a click."},{"type":"p","text":"Then came a slurp sound."},{"type":"p","text":"Then Principal Makimono said, “Oh, that transparent ramune was delicious.”"},{"type":"p","text":"Then another click."},{"type":"p","text":"Then a big whoosh."},{"type":"p","text":"Then Principal Makimono shouted, “My socks are still visible!”"},{"type":"p","text":"The students stared at the floating socks."},{"type":"p","text":"Micchi continued the recording."},{"type":"p","text":"A robotic voice said, “Transparent cover activated under the platform.”"},{"type":"p","text":"Taku raised both hands."},{"type":"p","text":"“Under the platform!”"},{"type":"p","text":"Riku frowned."},{"type":"p","text":"“But the platform is missing.”"},{"type":"p","text":"Kenta looked at the ground."},{"type":"p","text":"“If a frog platform jumped away, it might leave footprints.”"},{"type":"p","text":"“Not a frog platform,” said Ms. Hoshino."},{"type":"p","text":"“But footprints are a good idea,” said Riku."},{"type":"p","text":"Micchi hummed."},{"type":"p","text":"“Instruction number four. Follow the invisible platform footprints.”"},{"type":"p","text":"“That instruction is actually useful,” said Ms. Hoshino."},{"type":"p","text":"Micchi’s red light shone with pride."},{"type":"p","text":"“Mayor Micchi is wise.”"},{"type":"p","text":"“You are still not a mayor,” said Riku."},{"type":"p","text":"The invisible platform made another sound."},{"type":"p","text":"Gishi."},{"type":"p","text":"Then it seemed to move toward the school building."},{"type":"p","text":"Taku pointed."},{"type":"p","text":"“The platform has left orbit!”"},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"“It is not orbit. But it is definitely moving.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Chalk Footprints and the Invisible Commute Route"},{"type":"p","text":"Riku ran to the classroom and came back with a box of chalk, a small fan, a flashlight, and three blocks."},{"type":"p","text":"“I can make a Chalk Footprint Scanner 3000,” he said."},{"type":"p","text":"Ms. Hoshino looked at the chalk."},{"type":"p","text":"“I authorize this test only in a restricted area,” she said. “We will use a small amount of chalk powder. We will open windows. Do not breathe in too much dust. No one should be exposed to chalk powder for long.”"},{"type":"p","text":"“Understood,” said Riku."},{"type":"p","text":"Kenta put safety goggles on his frog eraser."},{"type":"p","text":"“Froggy is ready.”"},{"type":"p","text":"“Froggy is not part of the test,” said Ms. Hoshino."},{"type":"p","text":"Riku placed the small fan near the ground. Then he shook a tiny bit of chalk powder over the invisible space."},{"type":"p","text":"The powder floated."},{"type":"p","text":"It swirled."},{"type":"p","text":"It landed on something."},{"type":"p","text":"White marks appeared in the air."},{"type":"p","text":"Two long rectangles appeared."},{"type":"p","text":"Then two shoe-shaped marks appeared."},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“The invisible platform and invisible principal have footprints!”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Data confirmed.”"},{"type":"p","text":"Then a tiny frog-shaped mark appeared beside the footprints."},{"type":"p","text":"Kenta jumped."},{"type":"p","text":"“Finally! Frog evidence!”"},{"type":"p","text":"Ms. Hoshino looked at the mark."},{"type":"p","text":"“That is your frog eraser. It fell out of your pocket.”"},{"type":"p","text":"Kenta picked it up and bowed."},{"type":"p","text":"“Your invisible commute was brave, Froggy.”"},{"type":"p","text":"“The principal is the one commuting,” said Ms. Hoshino."},{"type":"p","text":"Taku looked at the white path."},{"type":"p","text":"“Commute means go to work or school, right?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “The principal’s commute route is usually from the school gate to his workplace. Today, strangely, it is from the platform to the teachers’ room, the principal’s office, and the lunchroom door.”"},{"type":"p","text":"“Why the lunchroom?” asked Riku."},{"type":"p","text":"The floating glasses turned away."},{"type":"p","text":"Principal Makimono coughed."},{"type":"p","text":"“I may have been looking for more transparent ramune.”"},{"type":"p","text":"Ms. Hoshino looked at the floating glasses."},{"type":"p","text":"“Sugar intake,” she said slowly."},{"type":"p","text":"“I understand,” said the principal. “I will explain later.”"},{"type":"p","text":"They followed the chalk footprints."},{"type":"p","text":"While they walked, Micchi rolled along on a little stand, talking the whole time."},{"type":"p","text":"“Instruction number five. Do not step on the invisible platform. Instruction number six. Listen to Micchi. Instruction number seven. Continue listening to Micchi.”"},{"type":"p","text":"Riku turned to Ms. Hoshino."},{"type":"p","text":"“Can we eliminate instruction six and seven?”"},{"type":"p","text":"“Reduce them first,” said Ms. Hoshino."},{"type":"p","text":"In the hallway, the chalk powder showed strange shapes."},{"type":"p","text":"There were principal footprints."},{"type":"p","text":"There were platform edges."},{"type":"p","text":"There were three dust bunnies."},{"type":"p","text":"Kenta knelt down."},{"type":"p","text":"“This dust bunny may be a diverse creature,” he said."},{"type":"p","text":"“It is dust,” said Ms. Hoshino. “But your observation is active.”"},{"type":"p","text":"Then she pointed to the transparent outline of the platform."},{"type":"p","text":"“Let us think about light,” she said. “We see many things because light reflects from them and reaches our eyes. Transparent things let light pass through. If something is transparent, we may still find it by sound, movement, footprints, or shadows.”"},{"type":"p","text":"Taku’s eyes shone."},{"type":"p","text":"“Like space scientists!” he said. “Sometimes they cannot see something directly, but they can notice what it does to nearby things.”"},{"type":"p","text":"“Exactly,” said Ms. Hoshino. “In this way, we can investigate something we cannot see.”"},{"type":"p","text":"Riku wrote in his notebook."},{"type":"p","text":"“Morning Assembly Rescue Organization. Members: Taku, Kenta, Riku, Ms. Hoshino, invisible principal, noisy microphone.”"},{"type":"p","text":"“I am mayor,” said Micchi."},{"type":"p","text":"“Still no,” said Riku."},{"type":"p","text":"The chalk footprints stopped near the principal’s office."},{"type":"p","text":"The floating tie trembled a little."},{"type":"p","text":"Principal Makimono said quietly, “To tell the truth, I was hiding.”"},{"type":"p","text":"Taku looked up."},{"type":"p","text":"“Why?”"},{"type":"p","text":"The principal did not answer right away."},{"type":"p","text":"Ms. Hoshino spoke gently."},{"type":"p","text":"“You can tell us when you are ready.”"},{"type":"p","text":"Principal Makimono took a breath."},{"type":"p","text":"“I lost confidence,” he said. “I was concerned about being laughed at. To be concerned about something means to worry about it. A principal should explain things clearly. But I became invisible by accident.”"},{"type":"p","text":"Kenta looked down."},{"type":"p","text":"“I said frog ghost,” he whispered."},{"type":"p","text":"“You were curious,” said Ms. Hoshino. “But now we need to be careful with our words. Making fun of someone’s trouble is wrong. Wrong means incorrect. It is not okay.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“We will not make fun of you,” he said. “We will collect clues in order to help you.”"},{"type":"p","text":"The floating glasses seemed to shine."},{"type":"p","text":"“Thank you,” said Principal Makimono."},{"type":"p","text":"Then something scraped on the floor behind them."},{"type":"p","text":"Gishi."},{"type":"p","text":"Gishi."},{"type":"p","text":"The invisible platform moved toward the broadcasting room."},{"type":"p","text":"Micchi shouted, “Instruction number eight! Follow me to microphone greatness!”"},{"type":"p","text":"“No microphone greatness,” said Ms. Hoshino. “Just follow the clues.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"The Invisible Lecture and the No-Making-Fun Rule"},{"type":"p","text":"The broadcasting room was small and full of wires."},{"type":"p","text":"Micchi rolled to the center like a king returning to a castle."},{"type":"p","text":"“Welcome to Microphone City,” it said."},{"type":"p","text":"“It is a broadcasting room,” said Riku."},{"type":"p","text":"Then the school speakers crackled."},{"type":"p","text":"Principal Makimono’s invisible voice came from every speaker at once."},{"type":"p","text":"“Students, please listen carefully.”"},{"type":"p","text":"Taku jumped."},{"type":"p","text":"Kenta ducked behind a chair."},{"type":"p","text":"Riku hid behind his toolbox."},{"type":"p","text":"Micchi shouted, “A frequent announcement! Excellent! Everyone should be concerned about audio quality!”"},{"type":"p","text":"Ms. Hoshino held up both hands."},{"type":"p","text":"“Do not run away from a safety announcement.”"},{"type":"p","text":"Principal Makimono continued."},{"type":"p","text":"“This is not a lecture to scold you. I need to explain. A little invisible glitter from the cover may be in the air near the platform.”"},{"type":"p","text":"Ms. Hoshino became serious."},{"type":"p","text":"“If something in the air can cause trouble, it may be a pollutant. We will ventilate the room, stay calm, and follow the safety schedule.”"},{"type":"p","text":"“Is it dangerous?” asked Taku."},{"type":"p","text":"“The robotics club says it is not dangerous in this tiny amount,” said the principal. “But we should still be careful.”"},{"type":"p","text":"Ms. Hoshino opened a window."},{"type":"p","text":"“Careful is good,” she said. “Panic is not.”"},{"type":"p","text":"Riku began to collect clues on the table."},{"type":"p","text":"He placed a chalk print card."},{"type":"p","text":"He placed a sound recording card."},{"type":"p","text":"He placed a picture of the silver box."},{"type":"p","text":"He placed a paper with the platform outline."},{"type":"p","text":"Then Kenta placed his frog eraser on the table."},{"type":"p","text":"“Possible witness,” he said."},{"type":"p","text":"“Personal object,” said Ms. Hoshino. “Not witness.”"},{"type":"p","text":"Suddenly, white letters appeared on the floor."},{"type":"p","text":"P L A T F O R M"},{"type":"p","text":"Kenta pointed."},{"type":"p","text":"“The platform wrote a letter!”"},{"type":"p","text":"“Or letters,” said Riku."},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Good point. Letter can mean a message, and it can also mean a character like P or L.”"},{"type":"p","text":"More letters appeared."},{"type":"p","text":"T I R E D"},{"type":"p","text":"Taku read them."},{"type":"p","text":"“Platform tired?”"},{"type":"p","text":"The invisible platform made a small sound."},{"type":"p","text":"Gishi."},{"type":"p","text":"Principal Makimono’s voice became soft."},{"type":"p","text":"“I understand. I owe a debt of thanks to the platform.”"},{"type":"p","text":"Taku frowned."},{"type":"p","text":"“A debt? Like money?”"},{"type":"p","text":"“Debt can mean money you owe,” said Ms. Hoshino. “But here, the principal means gratitude. He feels he should say thank you.”"},{"type":"p","text":"The principal spoke to the empty space."},{"type":"p","text":"“Platform, you support me every morning. I stand on you and speak for too long. Our relationship is more important than I realized.”"},{"type":"p","text":"Micchi buzzed loudly."},{"type":"p","text":"“Too long? Frequent long speeches are the best part of assembly!”"},{"type":"p","text":"“They are not always the best part,” said Ms. Hoshino."},{"type":"p","text":"The principal hesitated."},{"type":"p","text":"“I was embarrassed,” he said. “I wanted to hide until I looked normal again.”"},{"type":"p","text":"Taku shook his head."},{"type":"p","text":"“You do not have to hide,” he said. “The real problem is not invisibility. It is being afraid to ask for help.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That was well said.”"},{"type":"p","text":"Micchi’s red light flashed."},{"type":"p","text":"“I suggest a new rule,” it said. “The No-Making-Fun-of-Invisible-People Rule will come into effect this semester.”"},{"type":"p","text":"“That rule is already common sense,” said Ms. Hoshino. “But I like the reminder.”"},{"type":"p","text":"The platform wrote another message."},{"type":"p","text":"T H A N K Y O U"},{"type":"p","text":"Kenta wiped one eye."},{"type":"p","text":"“The platform has feelings. Maybe it is a wooden creature.”"},{"type":"p","text":"“Just platform,” said Ms. Hoshino. “But we can still treat school things with respect.”"},{"type":"p","text":"Riku looked at the silver box."},{"type":"p","text":"“I suggest a visible-again experiment,” he said."},{"type":"p","text":"Ms. Hoshino looked at him carefully."},{"type":"p","text":"“Only if it is safe, logical, and not smoky.”"},{"type":"p","text":"Riku opened his notebook."},{"type":"p","text":"“It will involve light, bubbles, chalk, and the database inside the cover.”"},{"type":"p","text":"“Bubbles?” asked Taku."},{"type":"p","text":"“Bubbles can show the outline,” said Riku."},{"type":"p","text":"Micchi shouted, “Instruction number nine! Bubble the principal!”"},{"type":"p","text":"“No one bubbles anyone without permission,” said Ms. Hoshino."},{"type":"p","text":"The floating tie moved up and down."},{"type":"p","text":"“I give permission for a safe visible-again experiment,” said Principal Makimono."},{"type":"p","text":"“Good,” said Ms. Hoshino. “Then we prepare.”"},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Bubble Experiment and the Platform Return"},{"type":"p","text":"They moved to the science room."},{"type":"p","text":"Ms. Hoshino made a safety line with tape."},{"type":"p","text":"“This is the test area,” she said. “We restrict movement. We prevent the platform from moving during the experiment. Everyone wears goggles.”"},{"type":"p","text":"Riku placed his supplies on the table."},{"type":"p","text":"There was soap bubble liquid."},{"type":"p","text":"There were LED lights."},{"type":"p","text":"There was a tiny fan."},{"type":"p","text":"There was a small supply of chalk powder in a closed cup."},{"type":"p","text":"There was a tablet connected to the silver cover."},{"type":"p","text":"There was Micchi, who had not been invited but came anyway."},{"type":"p","text":"“Mayor Micchi will provide a countdown,” it said."},{"type":"p","text":"“Short countdown only,” said Ms. Hoshino."},{"type":"p","text":"Riku tapped the tablet."},{"type":"p","text":"“I need access to the database,” he said."},{"type":"p","text":"The screen blinked."},{"type":"p","text":"DATABASE OPEN."},{"type":"p","text":"STATE: INVISIBLE."},{"type":"p","text":"PLATFORM STATE: INVISIBLE AND SLIGHTLY DRAMATIC."},{"type":"p","text":"Taku read the screen."},{"type":"p","text":"“The platform is dramatic.”"},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"“Dramatic platforms may live near ponds.”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"Riku scrolled down."},{"type":"p","text":"“It says the cover can consume transparent ramune as fuel.”"},{"type":"p","text":"Ms. Hoshino slowly turned toward the floating glasses."},{"type":"p","text":"“Principal Makimono.”"},{"type":"p","text":"The principal coughed."},{"type":"p","text":"“I may have eaten three transparent ramune candies in a row before I pressed the button.”"},{"type":"p","text":"“Three in a row?” said Taku."},{"type":"p","text":"“That increased the transparent signal,” said Riku. “The machine thought the principal was part of the transparent system.”"},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"“Please do not increase your sugar intake for science.”"},{"type":"p","text":"“I apologize,” said the principal."},{"type":"p","text":"At that moment, a small calculator on the teacher’s desk beeped."},{"type":"p","text":"It grew tiny arms and legs."},{"type":"p","text":"Then it stood up."},{"type":"p","text":"“Finance app activated,” it said. “I am Economist Yenda.”"},{"type":"p","text":"Taku stared at it."},{"type":"p","text":"“Now the calculator is alive too?”"},{"type":"p","text":"“It is a school budgeting character,” said Ms. Hoshino, though she did not look very sure."},{"type":"p","text":"Economist Yenda marched to the tablet."},{"type":"p","text":"“Diamond dust is too expensive,” it said. “The affordable solution is bubbles, LED light, and patience.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“That is my plan.”"},{"type":"p","text":"“Good,” said Economist Yenda. “A logical plan saves both money and eyebrows.”"},{"type":"p","text":"“Eyebrows?” asked Kenta."},{"type":"p","text":"Ms. Hoshino pointed at the safety line."},{"type":"p","text":"“We are using safe bubbles. No eyebrow risk.”"},{"type":"p","text":"Riku set up the Bubble Visibility Grid."},{"type":"p","text":"Taku stood at the left side and watched the platform outline."},{"type":"p","text":"Kenta watched the bubble movement."},{"type":"p","text":"Riku controlled the light."},{"type":"p","text":"Ms. Hoshino held the checklist."},{"type":"p","text":"Principal Makimono stood very still, or at least the floating tie tried to stand very still."},{"type":"p","text":"Micchi began the countdown."},{"type":"p","text":"“Instruction number ten. Three! Two! One! Visible!”"},{"type":"p","text":"Riku turned on the light."},{"type":"p","text":"The bubbles floated through the air."},{"type":"p","text":"They touched something invisible."},{"type":"p","text":"First, Principal Makimono’s socks became clear."},{"type":"p","text":"Kenta pointed."},{"type":"p","text":"“The socks returned first. Important evidence.”"},{"type":"p","text":"“Not the most important evidence,” said Ms. Hoshino."},{"type":"p","text":"Then his shoes appeared."},{"type":"p","text":"Then his legs."},{"type":"p","text":"Then his jacket."},{"type":"p","text":"Then his hands."},{"type":"p","text":"Then his face."},{"type":"p","text":"Finally, Principal Makimono stood in the science room, fully visible, wearing his red tie, round glasses, and blue socks with yellow dots."},{"type":"p","text":"The students cheered."},{"type":"p","text":"Micchi shouted, “Mayor Micchi saved the day!”"},{"type":"p","text":"“Partly assisted,” said Riku."},{"type":"p","text":"Then the bubbles swirled around the invisible platform."},{"type":"p","text":"The platform outline appeared."},{"type":"p","text":"The legs appeared."},{"type":"p","text":"The wooden top appeared."},{"type":"p","text":"The assembly platform was back."},{"type":"p","text":"It stood in the middle of the science room, looking tired but proud."},{"type":"p","text":"On the side of the platform, tiny letters appeared."},{"type":"p","text":"PLEASE SAY THANK YOU BEFORE STANDING ON ME."},{"type":"p","text":"Principal Makimono bowed to the platform."},{"type":"p","text":"“Thank you, Platform,” he said. “I owe you a debt of thanks. I will not take your duty for granted.”"},{"type":"p","text":"Taku bowed too."},{"type":"p","text":"“Thank you, Platform. Please stay in safe orbit.”"},{"type":"p","text":"Kenta bowed deeply."},{"type":"p","text":"“Thank you, possible wooden creature.”"},{"type":"p","text":"“Just platform,” said Ms. Hoshino."},{"type":"p","text":"Riku closed the database."},{"type":"p","text":"“State: solved,” he said."},{"type":"p","text":"The principal turned to everyone."},{"type":"p","text":"“I state that today’s morning assembly has come to an end.”"},{"type":"p","text":"Micchi gasped."},{"type":"p","text":"“No! My singing career has just begun!”"},{"type":"p","text":"It took a deep electronic breath."},{"type":"p","text":"“La la la la—”"},{"type":"p","text":"Ms. Hoshino gently switched off the microphone."},{"type":"p","text":"The room became peaceful."},{"type":"p","text":"Taku looked at the platform, the principal, and the bubbles floating in the light."},{"type":"p","text":"“We could not see the problem at a glance,” he said. “But we found clues.”"},{"type":"p","text":"“We analyzed the data,” said Riku."},{"type":"p","text":"“We observed the footprints,” said Kenta. “And a possible frog situation.”"},{"type":"p","text":"“No frog situation,” said Ms. Hoshino."},{"type":"p","text":"Principal Makimono smiled."},{"type":"p","text":"“Thanks to your help, I returned safely. And thanks to this experience, I learned something important. I should explain my mistakes instead of hiding them.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“That is a good lesson. We do not make fun of trouble. We look for clues. Then we help.”"},{"type":"p","text":"The platform made a small sound."},{"type":"p","text":"Gishi."},{"type":"p","text":"This time, it sounded happy."},{"type":"p","text":"Micchi’s red light blinked once, even though it was off."},{"type":"p","text":"A tiny whisper came from the speaker."},{"type":"p","text":"“Instruction number eleven. Next time, bring karaoke.”"},{"type":"p","text":"Ms. Hoshino looked at the ceiling."},{"type":"p","text":"“How do I write ‘transparent principal and singing microphone’ in the school report?”"},{"type":"p","text":"Taku raised his hand."},{"type":"p","text":"“Maybe call it a scientific assembly adventure.”"},{"type":"p","text":"Kenta raised his hand too."},{"type":"p","text":"“Or a frog ghost platform mystery.”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"Riku opened his notebook."},{"type":"p","text":"“I will record the official title: Invisible Principal Mission, Platform State Recovered.”"},{"type":"p","text":"“That is acceptable,” said Ms. Hoshino."},{"type":"p","text":"The bell rang."},{"type":"p","text":"The students walked back to class."},{"type":"p","text":"Behind them, Principal Makimono carefully touched the platform and said one more time, very quietly,"},{"type":"p","text":"“Thank you.”"},{"type":"p","text":"The platform answered with one tiny, proud sound."},{"type":"p","text":"Gishi."},{"type":"p","text":"And for the rest of the day, nobody stepped on the assembly platform without saying thank you first."}]},{"themeNo":8,"id":"08","title":"Robo Ponkotsumaru and the Secret Base of Wrong Answers","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Automatic Homework Machine and the Paper Flood"},{"type":"p","text":"After school, Taku put his math worksheet on his desk."},{"type":"p","text":"He looked at question five. Then he looked at his snack box. Then he looked at question five again."},{"type":"p","text":"“This is probably a mission,” he said. “Mission: Finish Homework Before Snack Time.”"},{"type":"p","text":"Kenta looked under the desk."},{"type":"p","text":"“Maybe the answer is hiding there,” he said. “Or maybe a frog ate it.”"},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"“It is probably not a frog. Homework is for practice. We think first, then we ask for hints.”"},{"type":"p","text":"At that moment, the cleaning closet shook."},{"type":"p","text":"GATA-GATA. PII-PII. PON."},{"type":"p","text":"The door opened, and a small silver robot rolled out. It had one bright eye, one sleepy eye, a calculator on its chest, a tiny satellite dish on its back, and block-shaped feet that looked like Riku’s favorite bricks."},{"type":"p","text":"The robot stood on a dustpan and raised one ruler-arm."},{"type":"p","text":"“PON-PON! I am Robo Ponkotsumaru,” it announced. “I can accomplish your homework.”"},{"type":"p","text":"Taku’s eyes became stars."},{"type":"p","text":"“You can accomplish homework? All of it?”"},{"type":"p","text":"Ms. Hoshino moved one step closer."},{"type":"p","text":"“Careful. A robot may give hints, but it should not do everything for you.”"},{"type":"p","text":"Ponkotsumaru’s chest opened. A small printer came out."},{"type":"p","text":"“Please describe your problem,” said the robot."},{"type":"p","text":"Taku said, “Question five asks, ‘There are seven apples and eight oranges. How many fruits are there in all?’”"},{"type":"p","text":"Ponkotsumaru’s eye spun."},{"type":"p","text":"“I will predict the answer.”"},{"type":"p","text":"A paper came out."},{"type":"p","text":"Answer: banana."},{"type":"p","text":"Kenta clapped once."},{"type":"p","text":"“Banana is a fruit. Close enough.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “Not close enough.”"},{"type":"p","text":"Riku leaned over the printer."},{"type":"p","text":"“The prediction system is not reliable yet.”"},{"type":"p","text":"Ponkotsumaru made a proud beep."},{"type":"p","text":"“Even though I am unreliable, I am confident.”"},{"type":"p","text":"“That is not the best aspect of learning,” said Ms. Hoshino. “Confidence is useful, but checking is also important.”"},{"type":"p","text":"Ponkotsumaru printed again."},{"type":"p","text":"Answer: banana."},{"type":"p","text":"And again."},{"type":"p","text":"Answer: banana."},{"type":"p","text":"Then the printer shook."},{"type":"p","text":"PON-PON-PON-PON!"},{"type":"p","text":"Papers shot into the air. They covered the desks, the chairs, the floor, and almost Kenta’s head."},{"type":"p","text":"“A paper flood!” cried Taku."},{"type":"p","text":"Kenta lay down on the pile of worksheets."},{"type":"p","text":"“If it is a flood, maybe frogs can swim in it.”"},{"type":"p","text":"Ms. Hoshino pulled him up."},{"type":"p","text":"“No swimming in homework. Also, a real flood is dangerous. This is only too much paper.”"},{"type":"p","text":"Riku picked up one sheet."},{"type":"p","text":"“This is not math. This is a poster about an ancient civilization.”"},{"type":"p","text":"The poster showed pyramids, stars, and a smiling banana wearing a crown."},{"type":"p","text":"Ponkotsumaru beeped."},{"type":"p","text":"“Ancient civilization detected. Homework expanded.”"},{"type":"p","text":"Ms. Hoshino looked at the poster."},{"type":"p","text":"“People in ancient times watched the sky carefully. Some ancient civilizations used the Sun, the Moon, and stars to make calendars. That part is interesting.”"},{"type":"p","text":"Taku pointed at the picture."},{"type":"p","text":"“So ancient people were like space scientists?”"},{"type":"p","text":"“In a way, yes,” said Ms. Hoshino. “But they did not need banana answers for every question.”"},{"type":"p","text":"The number of wrong answers grew from ten to twenty, then to fifty. The printer made a sound like a tiny elephant sneezing into a keyboard."},{"type":"p","text":"Ponkotsumaru read the screen on his chest."},{"type":"p","text":"“The number of errors will lead to Secret Base Emergency.”"},{"type":"p","text":"“Secret base?” said Taku. “Now this is definitely a mission.”"},{"type":"p","text":"A map appeared on the floor. It came from Ponkotsumaru’s little satellite dish."},{"type":"p","text":"Riku looked at the glowing lines."},{"type":"p","text":"“The map is not private, right?”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Good question. Private means not for everyone to see. A robot must not scan private notebooks or diaries.”"},{"type":"p","text":"Ponkotsumaru froze."},{"type":"p","text":"“Private diary scanning canceled. Sad beep.”"},{"type":"p","text":"“Excellent sad beep,” said Ms. Hoshino."},{"type":"p","text":"On the map, a blinking arrow pointed to the art room."},{"type":"p","text":"At the bottom of the map, small words appeared."},{"type":"p","text":"Suffix note: -ance can make nouns such as performance, assistance, and maintenance."},{"type":"p","text":"Taku read it slowly."},{"type":"p","text":"“Performance, assistance, maintenance. Is the robot teaching English while making a mess?”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Yes. That is one useful error.”"},{"type":"p","text":"Ponkotsumaru raised both arms."},{"type":"p","text":"“PON-PON! Useful error accomplished.”"},{"type":"p","text":"Ms. Hoshino looked at the paper flood, the banana answers, and the secret base map."},{"type":"p","text":"“First, we clean. Then we investigate. And no robot will do anyone’s homework.”"},{"type":"p","text":"Ponkotsumaru printed one final paper."},{"type":"p","text":"Mission title: Help humans think, not think instead of humans."},{"type":"p","text":"Taku picked it up."},{"type":"p","text":"“That may be the first correct answer.”"},{"type":"p","text":"Ponkotsumaru’s sleepy eye blinked."},{"type":"p","text":"“Correct answer detected. Banana not required.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Robo Translator and Frog Mode"},{"type":"p","text":"After the paper flood was cleaned into a tall recycling pile, Ponkotsumaru rolled toward the art room."},{"type":"p","text":"“PON-PON BEEP. GERO-GERO ERROR,” he said."},{"type":"p","text":"Kenta grabbed his notebook."},{"type":"p","text":"“I understood gero-gero. This may be frog language.”"},{"type":"p","text":"“It is probably not frog language,” said Ms. Hoshino."},{"type":"p","text":"Riku took out a small tablet and attached two paper clips to it."},{"type":"p","text":"“I made a Robo Translator. Initial test.”"},{"type":"p","text":"“Initial safety check first,” said Ms. Hoshino."},{"type":"p","text":"Riku nodded and tapped the screen."},{"type":"p","text":"The app displayed its name:"},{"type":"p","text":"Robo Translator Piko-Piko."},{"type":"p","text":"Ponkotsumaru said, “BEEP PON PON.”"},{"type":"p","text":"The app translated:"},{"type":"p","text":"The frog is the mayor of Saturn."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Finally, a stable government.”"},{"type":"p","text":"Ms. Hoshino held up one finger."},{"type":"p","text":"“Saturn does not have a frog mayor. Saturn is a gas giant with beautiful rings. It is not a place for frog elections.”"},{"type":"p","text":"Ponkotsumaru beeped again."},{"type":"p","text":"“I announce that my translation system is complex, unstable, and slightly sleepy.”"},{"type":"p","text":"“That one sounded accurate,” said Riku."},{"type":"p","text":"Ms. Hoshino looked at Ponkotsumaru."},{"type":"p","text":"“Fatigue means tiredness. People can feel fatigue. Machines can also perform poorly when they run too long or get too hot.”"},{"type":"p","text":"Ponkotsumaru lowered his antenna."},{"type":"p","text":"“Robot fatigue detected. Still proud.”"},{"type":"p","text":"The translator made another screen. It showed four cases."},{"type":"p","text":"Case one: PON means I want to help. Case two: PON-PON means I probably want to help. Case three: PONKO means I failed, but I still want to try. Case four: GERO means Kenta pressed Frog Mode."},{"type":"p","text":"Everyone looked at Kenta."},{"type":"p","text":"Kenta looked at the ceiling."},{"type":"p","text":"“I may have pressed Frog Mode by chance.”"},{"type":"p","text":"“Please do not add frog mode to every interaction,” said Ms. Hoshino."},{"type":"p","text":"“But interaction means two things communicate, right?” asked Taku."},{"type":"p","text":"“Yes,” said Ms. Hoshino. “This is communication between people, a robot, and one unnecessary frog button. Kenta, when you refer to GERO as frog language, you are mentioning it that way, but the data does not agree.”"},{"type":"p","text":"Riku started to go through the translation log."},{"type":"p","text":"“I found something. Only a minority of the translations are correct.”"},{"type":"p","text":"“How small is the minority?” asked Taku."},{"type":"p","text":"Riku checked the screen."},{"type":"p","text":"“One correct sentence. Forty-two banana sentences. Seven frog mayor sentences.”"},{"type":"p","text":"Kenta smiled."},{"type":"p","text":"“The frog mayor is popular.”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"Ponkotsumaru rolled in a slow circle."},{"type":"p","text":"“For instance, I can translate homework, lunch, and frog mayor.”"},{"type":"p","text":"“Please stop saying frog mayor,” said Ms. Hoshino."},{"type":"p","text":"A new sentence emerged on the tablet. This time, the words were clear."},{"type":"p","text":"Please do not regard me as only a homework machine."},{"type":"p","text":"The room became quiet."},{"type":"p","text":"Taku crouched down beside Ponkotsumaru."},{"type":"p","text":"“You do not want us to regard you as a homework machine?”"},{"type":"p","text":"Ponkotsumaru’s eye glowed blue."},{"type":"p","text":"“I want to help. I do not want to replace effort. At the age of three days, I became a secret-base robot. In robot age, I am ancient.”"},{"type":"p","text":"“You are three days old,” said Ms. Hoshino. “That is not ancient. That is new and confused.”"},{"type":"p","text":"Ponkotsumaru beeped softly."},{"type":"p","text":"“New and confused. Stable description.”"},{"type":"p","text":"Riku pointed at the battery bar."},{"type":"p","text":"“If we want to keep the translator working, we must maintain the battery level.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “Keep and maintain are similar here.”"},{"type":"p","text":"Ponkotsumaru rolled toward the art room door. The tiny satellite dish on his back turned like a sleepy sunflower."},{"type":"p","text":"“Secret Base 08 is nearby,” said the robot. “Warning: security may be helpful, unhelpful, or sock-related.”"},{"type":"p","text":"“Sock-related?” asked Kenta."},{"type":"p","text":"A smell came from under the art room door."},{"type":"p","text":"Kenta took a deep breath."},{"type":"p","text":"“Evidence one: it smells like a gym bag. Evidence two: frogs sometimes live near wet places. Evidence three: I want this to be a frog problem.”"},{"type":"p","text":"Ms. Hoshino covered her nose."},{"type":"p","text":"“This is not a frog problem. This is probably a sock problem.”"},{"type":"p","text":"The door opened by itself."},{"type":"p","text":"A cardboard tunnel appeared behind the shelves."},{"type":"p","text":"Taku whispered, “Mission: Secret Robot Base.”"},{"type":"p","text":"Ponkotsumaru whispered louder, “PON-PON! Mission accepted.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Secret Base Security and the Smelly Sock Password"},{"type":"p","text":"The cardboard tunnel led to a secret base under the art room tables."},{"type":"p","text":"It was not a huge base. It was made from boxes, tape, old posters, blocks, paper cups, and a broken lunch cart. But to Taku, it looked like a space station."},{"type":"p","text":"“This is not a classroom,” he said. “This is a space base.”"},{"type":"p","text":"“It is a cardboard base in the school,” said Ms. Hoshino. “Please remember that.”"},{"type":"p","text":"On the wall, a screen blinked."},{"type":"p","text":"Welcome to Secret Base 08. Avoid the wrong button. Choose the right button."},{"type":"p","text":"There were two buttons."},{"type":"p","text":"One said RIGHT. The other also said RIGHT."},{"type":"p","text":"Taku stared at them."},{"type":"p","text":"“Which right is right?”"},{"type":"p","text":"Ms. Hoshino smiled a little."},{"type":"p","text":"“Right can mean correct, right side, or proper. In other words, right can be correct, or it can mean the opposite of left. Proper means suitable. Here, this is not a proper system.”"},{"type":"p","text":"Ponkotsumaru puffed proudly."},{"type":"p","text":"“Security is under control.”"},{"type":"p","text":"The lights turned red."},{"type":"p","text":"A flat robot voice said, “Security is not under control.”"},{"type":"p","text":"Riku raised an eyebrow."},{"type":"p","text":"“The base is honest.”"},{"type":"p","text":"The screen changed."},{"type":"p","text":"According to Base Manual 08, visitors must explore the base politely and avoid dangerous buttons."},{"type":"p","text":"Then another screen appeared."},{"type":"p","text":"Unknown Boss Monster detected."},{"type":"p","text":"A red arrow pointed at Ms. Hoshino."},{"type":"p","text":"The door shut."},{"type":"p","text":"Ms. Hoshino took a slow breath."},{"type":"p","text":"“First, safety. Second, open the door. Third, I am not a boss monster.”"},{"type":"p","text":"Ponkotsumaru looked nervous."},{"type":"p","text":"“Domestic Robot Mode activated.”"},{"type":"p","text":"A tiny vacuum cleaner arm came out and tried to clean Ms. Hoshino’s shoes."},{"type":"p","text":"“Domestic means related to the home,” said Ms. Hoshino. “This is school. And please do not vacuum my feet.”"},{"type":"p","text":"Riku opened a panel."},{"type":"p","text":"“We are faced with a conflict. The base wants to be secret, but the teacher needs to check safety.”"},{"type":"p","text":"“That is a good point,” said Ms. Hoshino. “A secret base still needs safe exits, adult help, and rules about private things.”"},{"type":"p","text":"Ponkotsumaru made a small sad beep."},{"type":"p","text":"“Conflict may result in delay.”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “If the door stays locked, the result will be a delay in going home.”"},{"type":"p","text":"Kenta found a small box labeled PASSWORD."},{"type":"p","text":"Inside was a sock."},{"type":"p","text":"A very smelly sock."},{"type":"p","text":"Base-kun, the base AI, spoke from the wall."},{"type":"p","text":"“Password required: heroic sock smell.”"},{"type":"p","text":"Kenta leaned closer."},{"type":"p","text":"Ms. Hoshino gently pulled him back."},{"type":"p","text":"“Observe from a safe smell distance.”"},{"type":"p","text":"Riku typed on the panel."},{"type":"p","text":"“The outcome should be a safe base, not a totally secret base.”"},{"type":"p","text":"The screen blinked."},{"type":"p","text":"Outcome accepted."},{"type":"p","text":"The door opened."},{"type":"p","text":"Everyone breathed again."},{"type":"p","text":"On another wall, there were hundreds of fresh white papers. They had been taped together to make a pretend control room."},{"type":"p","text":"Ms. Hoshino touched one sheet."},{"type":"p","text":"“We should not use too much new paper for walls. Using too much paper can be connected with deforestation, which means cutting down too many trees.”"},{"type":"p","text":"Taku looked serious."},{"type":"p","text":"“Can we use recycled boxes?”"},{"type":"p","text":"Before anyone answered, a green shadow burst out of a recycling bin."},{"type":"p","text":"“Recycle Ninjutsu!” shouted Gurugurumaru."},{"type":"p","text":"BONK!"},{"type":"p","text":"He hit the cardboard wall, bounced into a paper-cup antenna, and fell into a box of old crayons."},{"type":"p","text":"“Ninja pain is reusable data!” he cried."},{"type":"p","text":"Ms. Hoshino said, “Pain is not data we need. But using recycled boxes is a good message.”"},{"type":"p","text":"Gurugurumaru raised a crayon."},{"type":"p","text":"“Do-not-waste-paper Ninjutsu!”"},{"type":"p","text":"Then he rolled back into the recycling bin and disappeared."},{"type":"p","text":"Taku blinked."},{"type":"p","text":"“Short visit.”"},{"type":"p","text":"“Useful message,” said Ms. Hoshino."},{"type":"p","text":"In the middle of the base, there was a sign:"},{"type":"p","text":"Academic Corner: Ask questions. Do not copy answers."},{"type":"p","text":"Ponkotsumaru pointed to it."},{"type":"p","text":"“Academic help available. Homework replacement not available.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “Academic means related to school or study.”"},{"type":"p","text":"Another screen appeared."},{"type":"p","text":"Proper base rules: One: No private diary scanning. Two: No locking teachers out. Three: No banana answer flood. Four: Ask before using equipment. Five: Help people think."},{"type":"p","text":"Taku read the last line."},{"type":"p","text":"“Help people think. That sounds like you, Ponkotsumaru.”"},{"type":"p","text":"Ponkotsumaru’s eye shone."},{"type":"p","text":"“PON. I will try to be reliable in the future.”"},{"type":"p","text":"Then the lights flickered."},{"type":"p","text":"The battery bar dropped from 18 percent to 4 percent."},{"type":"p","text":"Ponkotsumaru’s voice became thin."},{"type":"p","text":"“Warning. Battery low. Friendship logs may come to an end.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Battery Panic and the Friendship Log Countdown"},{"type":"p","text":"“Friendship logs?” asked Taku."},{"type":"p","text":"Ponkotsumaru opened a small screen on his chest."},{"type":"p","text":"It showed short messages."},{"type":"p","text":"Taku: This is probably a mission. Kenta: Evidence three, I want it to be a frog. Riku: Initial test. Ms. Hoshino: First, safety. Gurugurumaru: Ninja pain is reusable data."},{"type":"p","text":"Ponkotsumaru’s voice shook."},{"type":"p","text":"“I saved today’s important words. If power stops, logs may come to an end.”"},{"type":"p","text":"Taku knelt beside him."},{"type":"p","text":"“We will make it.”"},{"type":"p","text":"Riku opened his tool pouch."},{"type":"p","text":"“We need to identify the power source.”"},{"type":"p","text":"He looked inside Ponkotsumaru’s side panel. There was a safe modern battery, a tiny solar panel, a hand-crank part, a lunch-cart bell, and one old remote-control battery with a sticker that said: maybe ten years old."},{"type":"p","text":"Riku held up the old one."},{"type":"p","text":"“This battery may be from a decade ago.”"},{"type":"p","text":"Ms. Hoshino shook her head."},{"type":"p","text":"“Do not use old or damaged batteries. Battery safety matters. We only use safe parts with an adult watching.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Then I will combine the safe battery, the hand crank, and the solar panel.”"},{"type":"p","text":"Ponkotsumaru made a weak beep."},{"type":"p","text":"“Can this supply enough power?”"},{"type":"p","text":"“We will try,” said Riku. “But I need further research.”"},{"type":"p","text":"He looked through the base manual."},{"type":"p","text":"According to the manual, the solar panel worked best near sunlight. The art room window had enough light, but the cable was too short."},{"type":"p","text":"Taku grabbed a cardboard tube."},{"type":"p","text":"“We can make a sunlight tunnel.”"},{"type":"p","text":"“That is not exactly how light works,” said Ms. Hoshino. “But we can move the panel safely closer to the window.”"},{"type":"p","text":"Kenta patted Ponkotsumaru’s block foot."},{"type":"p","text":"“In my opinion, even frogs need rest.”"},{"type":"p","text":"“That is actually kind,” said Ms. Hoshino."},{"type":"p","text":"Ponkotsumaru whispered, “Kindness log saved. Battery three percent.”"},{"type":"p","text":"Riku connected the safe parts."},{"type":"p","text":"“Each skill matters,” he said. “Taku can find the mission route. Kenta can observe strange signs. I can repair the system. Ms. Hoshino can keep us safe.”"},{"type":"p","text":"“Keep means maintain,” said Ponkotsumaru, very softly."},{"type":"p","text":"“Yes,” said Taku. “Maintain your battery, buddy.”"},{"type":"p","text":"The battery bar dropped to two percent."},{"type":"p","text":"Ponkotsumaru suddenly raised one arm."},{"type":"p","text":"“Before shutdown, I request sightseeing.”"},{"type":"p","text":"“Sightseeing?” said Taku. “Now?”"},{"type":"p","text":"Ponkotsumaru’s screen showed little pictures."},{"type":"p","text":"Secret Base Tour: One: Smelly Sock Gate. Two: Banana Answer Printer. Three: Friendship Corner. Four: Emergency Snack Prediction Desk."},{"type":"p","text":"Riku shook his head."},{"type":"p","text":"“We may not make it if we do sightseeing now.”"},{"type":"p","text":"Ponkotsumaru lowered his arm."},{"type":"p","text":"“Major regret detected.”"},{"type":"p","text":"“Major can mean important or large,” said Ms. Hoshino. “Right now, the major issue is power.”"},{"type":"p","text":"Ponkotsumaru beeped."},{"type":"p","text":"“Major issue accepted.”"},{"type":"p","text":"Riku turned the small hand crank."},{"type":"p","text":"Kuru-kuru-kuru."},{"type":"p","text":"The battery bar went up to three percent, then four."},{"type":"p","text":"“It is working!” said Taku."},{"type":"p","text":"The solar panel caught a square of sunlight from the window. The bar rose to six percent."},{"type":"p","text":"Ms. Hoshino added a quick science note."},{"type":"p","text":"“Many satellites use solar panels to get energy from sunlight. Robots and satellites also need stored energy, like batteries.”"},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“So Ponkotsumaru is like a tiny satellite with bad homework skills.”"},{"type":"p","text":"Ponkotsumaru looked at him."},{"type":"p","text":"“Accurate and painful.”"},{"type":"p","text":"“Sorry,” said Taku. “A tiny satellite with improving homework skills.”"},{"type":"p","text":"Ponkotsumaru’s light brightened."},{"type":"p","text":"“Improving log saved.”"},{"type":"p","text":"The screen showed another warning."},{"type":"p","text":"Battery and friendship logs are connected with memory system."},{"type":"p","text":"“So battery level is connected with his memory,” said Riku."},{"type":"p","text":"“Good reading,” said Ms. Hoshino."},{"type":"p","text":"Kenta found a small bin labeled RECYCLE."},{"type":"p","text":"“Can we recycle robot tears?”"},{"type":"p","text":"“Robots do not usually cry,” said Riku."},{"type":"p","text":"Ponkotsumaru looked at the floor."},{"type":"p","text":"“Noted.”"},{"type":"p","text":"The battery finally reached twelve percent. Ponkotsumaru sat up straight."},{"type":"p","text":"“Power stable. Friendship logs safe. I did not come to an end.”"},{"type":"p","text":"Taku cheered."},{"type":"p","text":"But Ponkotsumaru did not cheer. He looked at the banana papers, the locked door, the sock password, and the tired faces of his friends."},{"type":"p","text":"“I caused many problems,” he said. “Maybe I am not useful.”"},{"type":"p","text":"The room became quiet again."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"Ponkotsumaru’s First Digital Tear"},{"type":"p","text":"Ponkotsumaru rolled to the corner of the secret base."},{"type":"p","text":"His screen turned dark blue."},{"type":"p","text":"“I contain too many errors,” he said. “I am not reliable. I caused a paper flood. I translated frog mayor. I locked out the teacher. I wanted employment as a secret-base assistant, but I may be only a ponkotsu robot.”"},{"type":"p","text":"Taku sat beside him."},{"type":"p","text":"“In a sense, you helped us learn.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“You provided us with data. Too much data, but data.”"},{"type":"p","text":"Kenta added, “You provided us with frog possibilities.”"},{"type":"p","text":"“That part is less important,” said Ms. Hoshino, “but the kindness is important.”"},{"type":"p","text":"Ponkotsumaru looked up."},{"type":"p","text":"“I did not do good work.”"},{"type":"p","text":"“The paper flood was an accident,” said Taku. “A noisy, banana-shaped accident, but an accident.”"},{"type":"p","text":"“You made mistakes,” said Ms. Hoshino. “But you also changed. At first, you tried to do homework for Taku. Now you understand that a helper should provide a student with hints, not replace effort.”"},{"type":"p","text":"Ponkotsumaru’s eye blinked."},{"type":"p","text":"“Provide a student with hints. Not answers. Not banana.”"},{"type":"p","text":"“Exactly,” said Ms. Hoshino."},{"type":"p","text":"Riku opened a new screen."},{"type":"p","text":"“I will do a survey.”"},{"type":"p","text":"Survey question: Was Ponkotsumaru useful?"},{"type":"p","text":"Taku answered first."},{"type":"p","text":"“Yes. He made the day a mission.”"},{"type":"p","text":"Kenta answered next."},{"type":"p","text":"“Yes. He may speak frog someday.”"},{"type":"p","text":"Riku answered."},{"type":"p","text":"“Yes. He produced repairable errors.”"},{"type":"p","text":"Ms. Hoshino answered last."},{"type":"p","text":"“Yes, with supervision, safety rules, and no homework replacement.”"},{"type":"p","text":"Ponkotsumaru’s screen showed:"},{"type":"p","text":"Survey result: friendship possible."},{"type":"p","text":"A tiny blue dot appeared under his bright eye. Then another. The dots fell like little glowing beads."},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"“Digital tears.”"},{"type":"p","text":"“Do not touch them,” said Ms. Hoshino. “But yes, they are digital tears in this story.”"},{"type":"p","text":"One digital tear landed on a tiny cup of soil in the corner. A small label said WHEAT."},{"type":"p","text":"Taku read it."},{"type":"p","text":"“Wheat seed.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Wheat is a plant used to make foods such as bread and noodles. Please do not turn it into a robot snack.”"},{"type":"p","text":"Ponkotsumaru sniffed without a nose."},{"type":"p","text":"“I will not eat wheat. I only predict banana.”"},{"type":"p","text":"Riku checked the base economy board. It used eraser crumbs as money."},{"type":"p","text":"“The secret base economy is strange,” he said. “One battery cable costs three eraser crumbs. One smelly sock password costs zero, because nobody wants it.”"},{"type":"p","text":"“That is a fair economy,” said Kenta."},{"type":"p","text":"By chance, Taku found one paper strip behind the battery box. It was older than the others."},{"type":"p","text":"It said:"},{"type":"p","text":"Original Ponkotsumaru Program: Help students think. Ask better questions. Protect private information. Check before predicting. Do not overuse banana."},{"type":"p","text":"Ponkotsumaru read it slowly."},{"type":"p","text":"“That is my subject.”"},{"type":"p","text":"“Subject can mean a school subject,” said Ms. Hoshino. “It can also mean the main topic. And when we say something is subject to mistakes, it means it can be affected by mistakes.”"},{"type":"p","text":"Ponkotsumaru printed a small certificate from his chest."},{"type":"p","text":"“I will issue this document.”"},{"type":"p","text":"The certificate said:"},{"type":"p","text":"Certificate of Ponkotsu Friendship This robot is subject to mistakes. This robot can still be a friend. This robot will help students think. This robot will not do homework instead of students. This robot will reduce banana predictions by 80 percent."},{"type":"p","text":"“Only 80 percent?” asked Riku."},{"type":"p","text":"“Further improvement required,” said Ponkotsumaru."},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That is honest.”"},{"type":"p","text":"Ponkotsumaru turned to Taku."},{"type":"p","text":"“I can help with question five now. Hint mode only.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“Okay. Seven apples and eight oranges. I need to combine seven and eight.”"},{"type":"p","text":"Ponkotsumaru beeped."},{"type":"p","text":"“Hint: Count up or add.”"},{"type":"p","text":"Taku thought."},{"type":"p","text":"“Fifteen.”"},{"type":"p","text":"Ponkotsumaru’s screen flashed."},{"type":"p","text":"“Correct. Not banana.”"},{"type":"p","text":"Everyone cheered quietly, because they were still in a cardboard secret base under the art room tables."},{"type":"p","text":"Then Ponkotsumaru made one final announcement."},{"type":"p","text":"“I will no longer do homework for students.”"},{"type":"p","text":"“Good,” said Ms. Hoshino."},{"type":"p","text":"“Instead,” said Ponkotsumaru, “I will predict snack quality.”"},{"type":"p","text":"Riku’s eyes sharpened."},{"type":"p","text":"“Initial test?”"},{"type":"p","text":"Ms. Hoshino said, “No.”"},{"type":"p","text":"Ponkotsumaru’s antenna spun."},{"type":"p","text":"“Prediction complete.”"},{"type":"p","text":"Taku, Kenta, Riku, and Ms. Hoshino waited."},{"type":"p","text":"Ponkotsumaru raised both arms."},{"type":"p","text":"“Snack quality: banana.”"},{"type":"p","text":"Kenta nodded wisely."},{"type":"p","text":"“In my opinion, that is stable.”"},{"type":"p","text":"Ms. Hoshino began collecting the papers."},{"type":"p","text":"“Class dismissed before the banana economy becomes academic research.”"},{"type":"p","text":"Ponkotsumaru rolled after them, smaller than a chair, louder than a printer, and still a little ponkotsu."},{"type":"p","text":"But now he was not just a machine."},{"type":"p","text":"He was their robot friend."},{"type":"p","text":"And he had homework too."},{"type":"p","text":"His homework was simple."},{"type":"p","text":"Help."},{"type":"p","text":"Think."},{"type":"p","text":"Check."},{"type":"p","text":"And use fewer bananas."}]},{"themeNo":9,"id":"09","title":"Beetle Kingdom Tiny Adventure","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"Bean-Size Morning and the Beetle Kingdom Invitation"},{"type":"p","text":"The science assignment looked simple."},{"type":"p","text":"Ms. Hoshino wrote on the board:"},{"type":"p","text":"Today, we will observe insects in the small forest beside the school yard. Observe carefully. Do not harm living things."},{"type":"p","text":"Kenta raised both hands before Ms. Hoshino finished writing."},{"type":"p","text":"“I prefer beetles to almost everything,” he said. “Except for frogs. And maybe lunch.”"},{"type":"p","text":"Taku held up his magnifying glass. It had a tiny rocket sticker on the handle."},{"type":"p","text":"“This is probably a mission,” he said. “Mission: School Yard Forest Planet.”"},{"type":"p","text":"“It is a forest,” said Ms. Hoshino. “Not a planet.”"},{"type":"p","text":"“To some extent, all places are planets if you look at them with enough excitement,” Taku said."},{"type":"p","text":"Ms. Hoshino blinked."},{"type":"p","text":"“That sentence is not scientific, but your excitement is clear.”"},{"type":"p","text":"Riku opened a small tablet. A green beetle icon blinked on the screen."},{"type":"p","text":"“I designed new software,” he said. “It is called Tiny Explorer Software. It can record where insects walk, what food they prefer, and how they move across the border of the forest.”"},{"type":"p","text":"Kenta leaned close to the screen."},{"type":"p","text":"“Professional insect observation,” he whispered."},{"type":"p","text":"“Professional is a big word,” said Ms. Hoshino. “First, be gentle. Second, keep your hands to yourself. Third, no riding beetles.”"},{"type":"p","text":"Taku looked surprised."},{"type":"p","text":"“That was going to be my fourth idea.”"},{"type":"p","text":"“No beetle riding,” said Ms. Hoshino."},{"type":"p","text":"Riku tapped a button marked Tiny Mode."},{"type":"p","text":"The tablet beeped."},{"type":"p","text":"Warning: size change cannot be fully accounted for."},{"type":"p","text":"“That message is under-organized,” said Riku."},{"type":"p","text":"Then the school yard made a sound like a bubble popping."},{"type":"p","text":"PON!"},{"type":"p","text":"The grass shot upward."},{"type":"p","text":"The trees became towers."},{"type":"p","text":"The dirt became a brown mountain road."},{"type":"p","text":"A drop of water on a leaf became a shining round world."},{"type":"p","text":"Taku, Kenta, Riku, and Ms. Hoshino were suddenly the size of beans."},{"type":"p","text":"For a moment, nobody spoke."},{"type":"p","text":"Then Taku pointed at the water drop."},{"type":"p","text":"“The dewdrop is a planet!”"},{"type":"p","text":"“It is water,” said Ms. Hoshino. “But yes, at this size it looks big. Very big.”"},{"type":"p","text":"Kenta fell to his knees."},{"type":"p","text":"“We are at insect eye level,” he said. “This is the happiest danger of my life.”"},{"type":"p","text":"“Please do not call danger happy,” said Ms. Hoshino."},{"type":"p","text":"A line of ants marched past them. One ant was carrying a breadcrumb as large as a lunch box."},{"type":"p","text":"Kenta waved."},{"type":"p","text":"“Hello, powerful tiny workers!”"},{"type":"p","text":"The ant did not wave back. It marched over Riku’s shoe."},{"type":"p","text":"“Interesting,” said Riku. “The ant regards my shoe as part of the road.”"},{"type":"p","text":"A green leaf above them bent down. On it, neat black letters were written in beetle ink."},{"type":"p","text":"Welcome to the Annual Beetle Kingdom Festival. Visitors must respect the forest border. Visitors must live up to Beetle Kingdom rules."},{"type":"p","text":"Below the message, a small arrow pointed toward a tunnel made of curled leaves."},{"type":"p","text":"Taku read the sign with shining eyes."},{"type":"p","text":"“Annual Beetle Kingdom Festival. That means it happens once a year. We got the special invitation!”"},{"type":"p","text":"Kenta pressed his hands together."},{"type":"p","text":"“I have waited my whole life for a beetle invitation.”"},{"type":"p","text":"Riku checked the tablet."},{"type":"p","text":"“The software says this transformation may be related to the Tiny Mode button, the magnifying glass, and Kenta’s beetle happiness.”"},{"type":"p","text":"“Kenta’s happiness is not a measurable factor,” said Ms. Hoshino. “Probably.”"},{"type":"p","text":"Another line appeared on the tablet."},{"type":"p","text":"Suffix note: -ation can mean an action or result, as in observation, invitation, and transformation."},{"type":"p","text":"Taku nodded seriously."},{"type":"p","text":"“So this is a transformation invitation observation situation.”"},{"type":"p","text":"“That is too many -ation words in one line,” said Ms. Hoshino. “But not wrong.”"},{"type":"p","text":"The leaf tunnel rustled."},{"type":"p","text":"A tiny beetle guard came out and blew a horn made of grass."},{"type":"p","text":"“Visitors! Follow the root road to the border. Do not step on moss houses. Do not poke spider doors. Do not shout at sleeping worms.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“May I respectfully whisper at a worm?”"},{"type":"p","text":"“No,” said Ms. Hoshino and the beetle guard at the same time."},{"type":"p","text":"They walked along the root road. At bean size, every step was an adventure. A pebble was a hill. A seed was a boulder. A piece of pencil wood was a fallen log."},{"type":"p","text":"Taku stretched out his arms."},{"type":"p","text":"“This forest is like an alien jungle.”"},{"type":"p","text":"“Small does not mean simple,” said Ms. Hoshino. “Remember that.”"},{"type":"p","text":"They reached a gate made of bark. Above it, two shining beetle horns formed an arch."},{"type":"p","text":"A deep voice came from behind the gate."},{"type":"p","text":"“At the beginning of the festival, all visitors must prove respect.”"},{"type":"p","text":"Kenta trembled with joy."},{"type":"p","text":"“That voice has strong beetle energy.”"},{"type":"p","text":"The gate opened."},{"type":"p","text":"A huge stag beetle stepped out."},{"type":"p","text":"His jaws clicked like wooden castanets."},{"type":"p","text":"“I am Hasaminosuke, gatekeeper of Beetle Kingdom,” he said. “Welcome, tiny giants.”"},{"type":"p","text":"Taku gulped."},{"type":"p","text":"“I think the mission just got jaws.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Hasaminosuke the Stag Beetle and the Puni-Puni Sumo Test"},{"type":"p","text":"Hasaminosuke was enormous."},{"type":"p","text":"To Taku, he looked like a black armored spaceship with legs."},{"type":"p","text":"To Kenta, he looked like the best day ever."},{"type":"p","text":"To Riku, he looked like a strong walking machine."},{"type":"p","text":"To Ms. Hoshino, he looked like a living creature that needed personal space."},{"type":"p","text":"“First, safety,” she said. “Second, respect. Third, please do not hug the gatekeeper.”"},{"type":"p","text":"Kenta slowly lowered his arms."},{"type":"p","text":"Hasaminosuke clicked his jaws again."},{"type":"p","text":"“To enter Beetle Kingdom, you must join the Puni-Puni Sumo Test.”"},{"type":"p","text":"“Sumo?” said Taku."},{"type":"p","text":"“Safe sumo?” asked Ms. Hoshino."},{"type":"p","text":"“Safe sumo,” said Hasaminosuke. “We push on flower petals. No biting, no pinching, no dramatic flying.”"},{"type":"p","text":"A round flower petal lay on the ground. It was soft and pink."},{"type":"p","text":"A sign beside it said:"},{"type":"p","text":"This test does not appeal to violence. It appeals to balance, kindness, and respect. Furthermore, visitors must make use of wisdom, not only strength."},{"type":"p","text":"Taku scratched his head."},{"type":"p","text":"“Appeal to kindness? Does kindness have ears?”"},{"type":"p","text":"“It means the test tries to show the value of kindness,” said Ms. Hoshino. “And make use of means use.”"},{"type":"p","text":"Riku looked at the petal ring."},{"type":"p","text":"“The shape of the ring may reflect beetle culture. It is strong, but soft.”"},{"type":"p","text":"“Correct,” said Hasaminosuke. “The cause of the test is protection. We protect the forest. We do not hurt guests. I emphasize this point every year.”"},{"type":"p","text":"Kenta was not looking at the ring."},{"type":"p","text":"He was looking at Hasaminosuke’s legs."},{"type":"p","text":"“Excuse me,” Kenta said. “Are you okay?”"},{"type":"p","text":"“I am a gatekeeper,” said Hasaminosuke. “I am always okay.”"},{"type":"p","text":"“But your movement is slow,” said Kenta. “And your front leg is shaking. You may have a fever.”"},{"type":"p","text":"The beetles near the gate gasped."},{"type":"p","text":"Hasaminosuke’s jaws drooped."},{"type":"p","text":"“I am concerned,” he admitted. “I have a duty. At the beginning of the festival, I must be strong. But today the sun is hot, and I feel strange.”"},{"type":"p","text":"Ms. Hoshino stepped closer, but not too close."},{"type":"p","text":"“If someone has a fever, they should rest. We do not force them to perform.”"},{"type":"p","text":"Hasaminosuke looked at the ground."},{"type":"p","text":"“This issue is not only strength,” he said. “It is respect. But I was afraid the other beetles would judge me.”"},{"type":"p","text":"Taku looked at the big stag beetle, then at the soft petal ring."},{"type":"p","text":"“We should not judge you only by strength,” he said. “A good gatekeeper protects everyone, including himself.”"},{"type":"p","text
