g to medium curry."},{"type":"p","text":"Nokoshin became a little smaller. Not tiny. Still big enough to sit on a lunch cart. But smaller."},{"type":"p","text":"Taku held out his spoon."},{"type":"p","text":"\"Nokoshin, will you help us find the Pika-Pika Plate?\""},{"type":"p","text":"Nokoshin bowed."},{"type":"p","text":"\"I will. I do not want to fight. I want to help protect food.\""},{"type":"p","text":"Captain Carroton raised his carrot sword."},{"type":"p","text":"\"Then we go to Pika-Pika Plate Temple!\""},{"type":"p","text":"The curry bus honked."},{"type":"p","text":"Honk-honk!"},{"type":"p","text":"The rice driver shouted, \"All passengers to the temple! Keep your hands, spoons, and frog erasers inside the bus!\""},{"type":"p","text":"Kenta climbed on with Froggy. Riku carried his blocks. Taku held the spoon. Ms. Hoshino carried a napkin, a pencil, and the power to make any adventure become a lesson."},{"type":"p","text":"Nokoshin walked beside the bus. Every step made the sauce ripple."},{"type":"p","text":"Plop. Plop. Plop."},{"type":"p","text":"The team headed toward the shining temple at the edge of the curry bowl."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Legendary Pika-Pika Plate"},{"type":"p","text":"Pika-Pika Plate Temple stood on a hill of rice. The temple roof was made of carrot slices. The stairs were made of potato cubes. At the top, a plate shone with clean white light."},{"type":"p","text":"Above the door was a message."},{"type":"p","text":"Do not waste food. Be responsible for your choice. Connect your lunch with the Sun, the soil, the water, and many people."},{"type":"p","text":"Taku read the message aloud."},{"type":"p","text":"\"Connect your lunch with the Sun? Is curry a tiny solar system?\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"A little bit. Plants use energy from the Sun. Rice, carrots, potatoes, and onions all grow because of sunlight, water, soil, and people who work hard. So the Sun is one source of the energy in your lunch.\""},{"type":"p","text":"\"Source means where something comes from,\" said Taku."},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"It can also mean where information comes from.\""},{"type":"p","text":"Kenta pointed at a pea."},{"type":"p","text":"\"Then what is the source of frog energy?\""},{"type":"p","text":"\"Food,\" said Ms. Hoshino."},{"type":"p","text":"\"And jumping,\" said Kenta."},{"type":"p","text":"\"Mostly food,\" said Ms. Hoshino."},{"type":"p","text":"Riku looked at the shining plate."},{"type":"p","text":"\"The carrot is Mars. The green pea is Earth. The potato is a moon. The spoon is a rocket. The distance between them is short, but in real space the distance between planets is huge.\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Good space fact. The planets in our solar system are very far apart. A lunch bowl is tiny, but it can help us imagine space.\""},{"type":"p","text":"Taku whispered, \"Curry space.\""},{"type":"p","text":"Kenta whispered, \"Frog astronauts.\""},{"type":"p","text":"Ms. Hoshino whispered, \"No frogs on Jupiter.\""},{"type":"p","text":"At the temple desk sat a tiny green pea wearing a headset. Her name tag said Mameko."},{"type":"p","text":"\"Welcome to Curry Kingdom Customer Service,\" she said. \"For lost spoons, dragon complaints, emotional carrots, and plate shine problems, please press one.\""},{"type":"p","text":"Taku raised his hand."},{"type":"p","text":"\"We need help with the Pika-Pika Plate.\""},{"type":"p","text":"Mameko nodded."},{"type":"p","text":"\"I will interpret your problem as a request for love, responsibility, and maybe less rice next time.\""},{"type":"p","text":"\"Interpret means explain the meaning,\" said Ms. Hoshino. \"It can also mean translate.\""},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"\"Can you interpret frog language?\""},{"type":"p","text":"Mameko pressed a button."},{"type":"p","text":"\"Ribbit means please stop calling peas frog eggs.\""},{"type":"p","text":"Kenta looked shocked."},{"type":"p","text":"\"Frogs are very direct.\""},{"type":"p","text":"Mameko handed Taku a temple card."},{"type":"p","text":"Pika-Pika Plate Rules: 1. Do not waste food on purpose. 2. Choose a good range. 3. Learn the source of your food. 4. Say thank you. 5. Once in a while, things go wrong. Re-think and re-try."},{"type":"p","text":"\"Once in a while means sometimes,\" said Ms. Hoshino."},{"type":"p","text":"Nokoshin read the card and sniffed."},{"type":"p","text":"\"This is beautiful,\" he said."},{"type":"p","text":"Three rice grains offered him a tissue. It was actually a tiny napkin. He used it. It became a rice ball."},{"type":"p","text":"\"Oops,\" said Nokoshin."},{"type":"p","text":"Riku opened his backpack pocket."},{"type":"p","text":"\"I built a Plate Polisher 3000,\" he said. \"It will activate the Pika-Pika Plate.\""},{"type":"p","text":"Ms. Hoshino looked nervous."},{"type":"p","text":"\"Riku, did you test it?\""},{"type":"p","text":"\"The initial test was successful,\" said Riku."},{"type":"p","text":"\"What did it polish?\""},{"type":"p","text":"\"My pencil.\""},{"type":"p","text":"\"And?\""},{"type":"p","text":"\"Also my shoe.\""},{"type":"p","text":"\"And?\""},{"type":"p","text":"\"Also the class hamster's water bottle, but the hamster was not inside.\""},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"\"Please operate it carefully.\""},{"type":"p","text":"Riku placed the machine in front of the plate. It was made of blocks, a rubber band, a spoon handle, two rice gears, and one pea button."},{"type":"p","text":"\"Ready,\" said Riku."},{"type":"p","text":"He pressed the initial switch."},{"type":"p","text":"The machine shook. It whirred. It buzzed. It sang one note from the school song. Then it shot a beam of white light across the temple."},{"type":"p","text":"Zap!"},{"type":"p","text":"The Pika-Pika Plate did not shine more."},{"type":"p","text":"Ms. Hoshino's glasses did."},{"type":"p","text":"They became so shiny that everyone could see their own face in them."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"\"Breakthrough! We can see Ms. Hoshino's eyes very clearly!\""},{"type":"p","text":"Ms. Hoshino removed her glasses."},{"type":"p","text":"\"That is not the breakthrough we need.\""},{"type":"p","text":"Riku scratched his head."},{"type":"p","text":"\"Sometimes machines go wrong.\""},{"type":"p","text":"\"Go wrong means stop working well,\" said Taku."},{"type":"p","text":"The plate glowed softly. A calm voice came from it."},{"type":"p","text":"\"The true breakthrough is not a machine. The true breakthrough is a choice.\""},{"type":"p","text":"Everyone became quiet."},{"type":"p","text":"The Pika-Pika Plate continued."},{"type":"p","text":"\"A clean plate is not only an empty plate. It is a plate that shows care. A child can be responsible for choosing an amount. A helper can be responsible for listening. A kingdom can be responsible for making a fair system.\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Be responsible for means have a duty to take care of something.\""},{"type":"p","text":"Taku looked at his spoon."},{"type":"p","text":"\"So the Pika-Pika Plate is not magic that forces people to eat everything. It is magic that helps people think before they choose.\""},{"type":"p","text":"\"Correct,\" said the plate."},{"type":"p","text":"Mameko from customer service pressed another button."},{"type":"p","text":"\"Would you like to hear today's special menu fact?\""},{"type":"p","text":"The button answered itself."},{"type":"p","text":"\"Some vegetables are grown as organic food. Organic food is made by certain farming methods. It still takes work, water, soil, and care.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"Is there organic food for frogs?\""},{"type":"p","text":"\"Kenta,\" said Ms. Hoshino, \"we are not planning frog lunch today.\""},{"type":"p","text":"Nokoshin began to glow. The rice and potato skins on his body fell away gently and turned into tiny stars of sauce. He became smaller and rounder. His wings became soft rice-paper wings. His carrot horns became cute orange bumps."},{"type":"p","text":"\"I feel lighter,\" he said."},{"type":"p","text":"The Spicy Meter voice rang from the castle."},{"type":"p","text":"Status: medium and happy. Stress tank: safe. Tiny Hat Shop: open. Dragon sadness: low."},{"type":"p","text":"Captain Carroton cheered. The onions cried happy onion tears. The tomato family started a tiny festival. The rice passengers waved from the bus."},{"type":"p","text":"Taku held up the spoon."},{"type":"p","text":"\"I promise to think about my lunch amount. I will not waste food on purpose. And if I cannot finish, I will learn from it for next time.\""},{"type":"p","text":"Kenta held up Froggy."},{"type":"p","text":"\"I promise not to call every green pea a frog egg. Unless it looks extremely frog-ish.\""},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"\"Kenta.\""},{"type":"p","text":"\"I promise to try,\" said Kenta."},{"type":"p","text":"Riku held up his Plate Polisher 3000."},{"type":"p","text":"\"I promise to test machines before using them near a teacher's glasses.\""},{"type":"p","text":"\"Thank you,\" said Ms. Hoshino."},{"type":"p","text":"Nokoshin bowed."},{"type":"p","text":"\"In the future, I will not roar first. I will ask, Can we re-think this?\""},{"type":"p","text":"The prefix re- card popped up again."},{"type":"p","text":"re-think. re-try. re-connect. re-curry."},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"\"Still not re-curry.\""},{"type":"p","text":"The spoon began to shine. It grew under their feet. The curry world spun around them. The rice mountains became rice on a plate. The carrot temple became one carrot slice. Nokoshin became a tiny dragon-shaped steam cloud above the curry."},{"type":"p","text":"Whoosh!"},{"type":"p","text":"Taku, Kenta, Riku, and Ms. Hoshino were back in the classroom. They were normal size. The curry was still warm. Only Ms. Hoshino's glasses were too shiny."},{"type":"p","text":"Taku looked at his plate. He had not taken too much. He ate slowly. He noticed the rice, the potato, the carrot, the sauce, and the work behind them."},{"type":"p","text":"\"This curry is connected to the Sun,\" he said."},{"type":"p","text":"Kenta looked at his green pea."},{"type":"p","text":"\"And maybe to frogs.\""},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"Riku looked at his spoon. It had a tiny message on the handle."},{"type":"p","text":"Mission Complete. Next mission: Miso Soup Galaxy."},{"type":"p","text":"Riku showed it to Taku. Taku's eyes shone."},{"type":"p","text":"\"Miso Soup Galaxy?\""},{"type":"p","text":"Kenta clapped."},{"type":"p","text":"\"Maybe there are tofu planets and seaweed aliens!\""},{"type":"p","text":"Ms. Hoshino took one more deep teacher breath."},{"type":"p","text":"\"No. Today's next mission is cleaning your desks.\""},{"type":"p","text":"The curry in Taku's bowl made one last tiny bubble."},{"type":"p","text":"Bloop."},{"type":"p","text":"A small voice whispered,"},{"type":"p","text":"\"Thank you, Spoon Hero. Please visit again. But do not bring frogs.\""},{"type":"p","text":"Kenta leaned close."},{"type":"p","text":"\"What about frog erasers?\""},{"type":"p","text":"The curry paused."},{"type":"p","text":"\"Frog erasers are acceptable passengers.\""},{"type":"p","text":"Kenta smiled."},{"type":"p","text":"\"Froggy, you have a ticket.\""},{"type":"p","text":"And from that day on, whenever curry was served at school, Taku looked at his spoon, chose a good amount, and listened carefully."},{"type":"p","text":"Because once in a while, if the room was quiet and the curry was warm, he could hear a tiny voice from the sauce."},{"type":"p","text":"\"Re-think. Re-try. Re-connect.\""},{"type":"p","text":"And then, very softly,"},{"type":"p","text":"\"Re-curry.\""}]},{"themeNo":3,"id":"03","title":"Norton the Homework-Eating Dinosaur","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Math Sheet Munching Incident"},{"type":"p","text":"Taku loved space. He loved bugs. He loved frogs, though Kenta loved frogs even more. He loved Minecraft-style blocks, LEGO machines, and strange science."},{"type":"p","text":"But on Monday morning, Taku discovered something stranger than a fart rocket and louder than talking curry."},{"type":"p","text":"He discovered a dinosaur in his homework."},{"type":"p","text":"The school bell rang. Ms. Hoshino stood at the front of the classroom with her calm teacher smile."},{"type":"p","text":"\"Good morning, everyone,\" she said. \"Please take out your math homework. I am about to check it. The phrase be about to means something will happen very soon.\""},{"type":"p","text":"Taku opened his school bag. He took out his math sheet. It was a little wrinkled, but it was finished. Mostly finished. Question five had a very tiny question mark beside it."},{"type":"p","text":"Taku looked at the question mark. His stomach felt jumpy."},{"type":"p","text":"\"I feel anxiety about question five,\" he whispered. \"I tried, but I am not sure.\""},{"type":"p","text":"At that exact moment, the question mark wiggled."},{"type":"p","text":"Wiggle. Wiggle. Chomp."},{"type":"p","text":"A tiny green head popped out of the corner of the paper. It had little teeth. It had little claws. It had a pencil mark on its nose."},{"type":"p","text":"It was a dinosaur the size of a large grape."},{"type":"p","text":"The dinosaur sniffed the math sheet."},{"type":"p","text":"\"Mmm,\" it said. \"Fresh homework anxiety. Delicious.\""},{"type":"p","text":"Then it opened its mouth and bit the right side of the paper."},{"type":"p","text":"Munch. Munch. MUNCH."},{"type":"p","text":"Taku stared. Half of his math homework was gone."},{"type":"p","text":"Kenta leaned over with shining eyes."},{"type":"p","text":"\"Maybe this is a new frog species,\" he said."},{"type":"p","text":"The tiny dinosaur stopped chewing."},{"type":"p","text":"\"I am not a frog,\" it said. \"I am Norton, a Notebiter Rex. I absorb homework anxiety.\""},{"type":"p","text":"Ms. Hoshino closed her attendance book very slowly."},{"type":"p","text":"\"First, safety,\" she said. \"Second, honesty. Third, why is there a dinosaur eating your math homework?\""},{"type":"p","text":"Riku slid his chair closer and looked at the tooth marks."},{"type":"p","text":"\"The bite marks are organized in a pattern,\" he said. \"Interesting. Also, a little sticky.\""},{"type":"p","text":"Taku grabbed the paper."},{"type":"p","text":"\"Norton, stop! That is my homework!\""},{"type":"p","text":"Norton swallowed."},{"type":"p","text":"Gulp."},{"type":"p","text":"Then he patted his tiny belly."},{"type":"p","text":"\"Do not worry. My special feature is homework delivery. I deliver lost answers to my stomach library. BURP! Delivery complete!\""},{"type":"p","text":"He made a tiny burp."},{"type":"p","text":"Burp."},{"type":"p","text":"A small number five floated out, spun around, and disappeared back into the paper."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"\"The dinosaur can burp numbers! This is definitely a frog problem.\""},{"type":"p","text":"\"It is still not a frog,\" said Ms. Hoshino."},{"type":"p","text":"Norton stood proudly on the desk."},{"type":"p","text":"\"I am very active at night,\" he said. \"When children sleep, I take care of difficult questions. I chew them, carry them, file them, and keep them safe.\""},{"type":"p","text":"\"But you ate my paper,\" said Taku."},{"type":"p","text":"\"Only the worried part,\" said Norton. \"I help students deal with fear. Also, my salary is one eraser crumb per page.\""},{"type":"p","text":"Riku blinked."},{"type":"p","text":"\"Your salary is eraser crumbs?\""},{"type":"p","text":"\"Yes,\" said Norton. \"Sometimes two crumbs if the homework has long division.\""},{"type":"p","text":"Kenta reached into his pencil case."},{"type":"p","text":"\"I have an eraser crumb. Can I pay you to not eat my frog drawing?\""},{"type":"p","text":"Norton looked interested."},{"type":"p","text":"Ms. Hoshino raised a hand."},{"type":"p","text":"\"No one is paying the dinosaur to eat or not eat homework. We need to observe the situation first.\""},{"type":"p","text":"Kenta nodded seriously."},{"type":"p","text":"\"I will observe the dinosaur. If it jumps, it may still be partly frog.\""},{"type":"p","text":"Norton jumped."},{"type":"p","text":"Kenta pointed."},{"type":"p","text":"\"Evidence!\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"Many animals can jump.\""},{"type":"p","text":"Taku looked at his half-eaten homework. For one second, he thought, Maybe I can hide it under my notebook. For one second, he thought, Maybe I can say the wind ate it. For one second, he thought, Maybe I can move to Mars."},{"type":"p","text":"Then he remembered Ms. Hoshino's usual words."},{"type":"p","text":"Be honest first. Hiding a problem does not help in the long run."},{"type":"p","text":"Taku took a breath."},{"type":"p","text":"\"Ms. Hoshino,\" he said, \"I did my homework, but Norton ate part of it. I know that sounds like the worst excuse in the history of homework.\""},{"type":"p","text":"Ms. Hoshino looked at the tiny dinosaur. The tiny dinosaur waved. Then it burped a multiplication sign."},{"type":"p","text":"\"For today,\" Ms. Hoshino said, \"I believe the dinosaur part. But we still need to find out what happened.\""},{"type":"p","text":"Riku pulled out three blocks, one paper clip, and a rubber band."},{"type":"p","text":"\"I can build something. Maybe.\""},{"type":"p","text":"Norton sniffed the paper clip."},{"type":"p","text":"\"Is it homework?\""},{"type":"p","text":"\"No,\" said Riku. \"It is a component. Do not eat it.\""},{"type":"p","text":"Suddenly, Taku's math sheet shook. The missing part of question five cried from inside the paper."},{"type":"p","text":"\"Help! I am trapped in the sub-page!\""},{"type":"p","text":"Taku leaned close."},{"type":"p","text":"\"Sub-page?\""},{"type":"p","text":"Ms. Hoshino said, \"The prefix sub- can mean under or below. A sub-page must be a page under the page.\""},{"type":"p","text":"The paper folded itself into a tiny door. A sign appeared in pencil dust."},{"type":"p","text":"Norton's Stomach Library Lost Answers, Worried Words, and Emergency Eraser Crumbs Please do not lick the shelves."},{"type":"p","text":"Norton smiled."},{"type":"p","text":"\"Welcome to my library. Please enter carefully. Also, please bring crumbs.\""},{"type":"p","text":"The door opened. Wind whooshed out. Taku, Kenta, Riku, and Ms. Hoshino were pulled toward the paper."},{"type":"p","text":"\"Not again,\" said Ms. Hoshino."},{"type":"p","text":"Then the classroom became small. The paper became huge. And everyone tumbled into Norton's homework-eating world."},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Stomach Library"},{"type":"p","text":"Taku landed on something soft. It was not a pillow. It was a pile of question marks."},{"type":"p","text":"Kenta landed beside him and picked one up."},{"type":"p","text":"\"This question mark resembles a tadpole,\" he said."},{"type":"p","text":"\"Please do not keep it,\" said Ms. Hoshino, landing next to him with chalk dust in her hair."},{"type":"p","text":"Riku landed on his feet. He looked around."},{"type":"p","text":"\"This is not a stomach,\" he said. \"This is a library with digestive decorations.\""},{"type":"p","text":"He was right. Inside Norton, there were shelves, ladders, reading tables, lamps made of glowing pencil dots, and rivers of blue notebook lines. Every shelf was full of homework pieces. Numbers marched in rows. Words slept in tiny blankets. Commas rolled around like sleepy snails."},{"type":"p","text":"A big wooden sign pointed in three directions."},{"type":"p","text":"Addition Branch Subtraction Branch Lost Frog Drawings That Are Not Frogs"},{"type":"p","text":"Kenta frowned."},{"type":"p","text":"\"I doubt the third branch is fair. Some of those drawings may be frogs.\""},{"type":"p","text":"Ms. Hoshino said, \"Doubt means you are not sure. In this case, we are very sure. Those are math circles.\""},{"type":"p","text":"A small paper dinosaur with glasses hurried toward them. He carried a stamp that said LATE, LOST, OR LIGHTLY CHEWED."},{"type":"p","text":"\"I am Bookdon, the stomach librarian,\" he said. \"Currently, we cannot afford any more homework sheets. The shelves are full, the carts are full, and the eraser crumb cafe is full of confused fractions.\""},{"type":"p","text":"\"Afford means have enough money?\" asked Taku."},{"type":"p","text":"\"Sometimes,\" said Ms. Hoshino. \"Here it means the library has no room or ability to take more.\""},{"type":"p","text":"Bookdon pointed at Norton, who was hiding behind a dictionary."},{"type":"p","text":"\"This dinosaur has a terrible diet. Paper, pencil dust, eraser crumbs, and anxious math problems. Too much of that causes trouble.\""},{"type":"p","text":"Norton looked down."},{"type":"p","text":"\"But I take care of lost answers. That custom was passed down from my great-great-grand-notebook. They said, 'Pass down good rules, not bad habits.'\""},{"type":"p","text":"A portrait on the wall showed an old dinosaur with glasses eating a spelling test. Under it, a company sign said: Homework Rescue Industry, family owned since the age of sharp pencils. Bookdon tapped the sign and said, \"Industry means a kind of business or field of work. In this world, rescuing homework is an industry.\" Under the portrait were the words:"},{"type":"p","text":"Family Rule One: If you start, you begin. If you begin, you start. Start means begin. Do not argue with the dictionary."},{"type":"p","text":"Taku read the sign aloud."},{"type":"p","text":"\"Start means begin. That is easy.\""},{"type":"p","text":"\"Good,\" said Ms. Hoshino. \"Some words can be partners.\""},{"type":"p","text":"A tiny number five ran up to Taku. It wore a helmet made of pencil shavings."},{"type":"p","text":"\"Taku!\" it cried. \"I am from your math sheet. A certain part of the question is missing. Without me, the answer cannot go home.\""},{"type":"p","text":"\"Question five!\" said Taku. \"I knew you were significant.\""},{"type":"p","text":"\"Significant means important,\" said Ms. Hoshino."},{"type":"p","text":"\"Also dramatic,\" said question five. \"I have been waiting for my independence from the Wrong Answer Box.\""},{"type":"p","text":"Kenta looked impressed."},{"type":"p","text":"\"The numbers want independence?\""},{"type":"p","text":"Bookdon nodded."},{"type":"p","text":"\"Every correct idea wants to be free. But many answers are trapped in the wrong places because Norton chewed too quickly.\""},{"type":"p","text":"Taku looked at Norton."},{"type":"p","text":"\"Norton, did you realize you were not solving the problem? You were hiding it inside you.\""},{"type":"p","text":"Norton rubbed his nose with one claw."},{"type":"p","text":"\"I thought I was helping. When I smell anxiety, I absorb it. Then the paper stops shaking.\""},{"type":"p","text":"Ms. Hoshino crouched down so her face was level with the tiny dinosaur."},{"type":"p","text":"\"A little anxiety can happen,\" she said gently. \"But eating the paper does not help the student learn. This idea can apply to a situation like Taku's. If we hide the hard part, we do not practice it.\""},{"type":"p","text":"Taku nodded."},{"type":"p","text":"\"The purpose of homework is practice. Not perfect paper.\""},{"type":"p","text":"Norton blinked."},{"type":"p","text":"\"Practice tastes different from panic. Less salty.\""},{"type":"p","text":"Riku pulled several blocks from his pocket. No one knew how he had blocks in a stomach library. He always had blocks."},{"type":"p","text":"\"We need to organize the lost answers,\" he said. \"I can build an Answer Rescue Cart.\""},{"type":"p","text":"He clipped two blocks together. Click. He attached a paper clip. Clack. He added a rubber band. Boing."},{"type":"p","text":"The cart rolled forward, turned left, and bumped into a comma."},{"type":"p","text":"\"Interesting failure,\" said Riku."},{"type":"p","text":"The comma complained, \"I was resting.\""},{"type":"p","text":"Kenta looked at a shelf filled with zeros."},{"type":"p","text":"\"These look like frog eggs.\""},{"type":"p","text":"The zeros shouted together, \"We are zero!\""},{"type":"p","text":"\"Sorry,\" said Kenta. \"In my opinion, you are very round.\""},{"type":"p","text":"Bookdon opened a huge map. It showed many places inside Norton."},{"type":"p","text":"\"Your missing problem is probably beyond the Subtraction Branch, past the Pencil Dust Noodle Shop, and across Mount Eraser.\""},{"type":"p","text":"\"Mount Eraser?\" asked Taku."},{"type":"p","text":"\"A volcano made of eraser crumbs,\" said Bookdon."},{"type":"p","text":"Ms. Hoshino took one deep teacher breath."},{"type":"p","text":"\"Of course there is an eraser volcano.\""},{"type":"p","text":"Norton smiled nervously."},{"type":"p","text":"\"It is very pretty.\""},{"type":"p","text":"Bookdon whispered, \"It is very explosive.\""},{"type":"p","text":"Taku looked at his friends."},{"type":"p","text":"\"Then we go to Mount Eraser. We find question five. We bring the homework back. And we tell the truth.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"Can we get rid of the sign that says Not Frogs?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"The group started walking through the library. Behind them, Norton carried a tiny bag labeled Emergency Salary Crumbs. Every few steps, he burped softly."},{"type":"p","text":"Burp."},{"type":"p","text":"A little plus sign floated out and joined the Addition Branch."},{"type":"p","text":"Burp."},{"type":"p","text":"A sleepy word woke up and said, \"I remember how to spell because.\""},{"type":"p","text":"Burp."},{"type":"p","text":"A tiny note appeared."},{"type":"p","text":"Please return one frog sticker to Kenta."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"\"The library understands me.\""},{"type":"p","text":"Ms. Hoshino said, \"The library needs boundaries.\""},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Mount Eraser and the Kasu-Kasu Boom"},{"type":"p","text":"The path to Mount Eraser went through the Pencil Dust Noodle Shop. The shop smelled like wood, graphite, and school mornings. A tiny chef made noodles out of pencil dust."},{"type":"p","text":"\"Special today! Number soup!\" shouted the chef."},{"type":"p","text":"Kenta peeked into a bowl."},{"type":"p","text":"\"The noodles are moving. Is that biodiversity?\""},{"type":"p","text":"Ms. Hoshino looked carefully."},{"type":"p","text":"The noodles were shaped like 2, 3, and 7. The commas sat in the soup like tiny beans. A division sign was floating on top like seaweed."},{"type":"p","text":"\"Biodiversity usually means many different kinds of living things in an environment,\" said Ms. Hoshino. \"This is a strange paper world, but it is filled with many different creatures. So yes, in a silly way, we can call it notebook biodiversity.\""},{"type":"p","text":"Kenta looked proud."},{"type":"p","text":"\"I discovered stomach biodiversity.\""},{"type":"p","text":"\"Please do not write that on your science test,\" said Ms. Hoshino."},{"type":"p","text":"Beyond the noodle shop, the ground became white and fluffy. They climbed a hill made of soft eraser crumbs. At the top stood a giant white mountain. It puffed little clouds of dust."},{"type":"p","text":"A wooden sign said:"},{"type":"p","text":"Mount Eraser Home of the Great Kasu-Kasu Boom Annual Eruption Competition at Noon Visitors should not stand in the burp zone."},{"type":"p","text":"Taku looked up."},{"type":"p","text":"\"This volcano really does exist.\""},{"type":"p","text":"Norton stood on a rock and lifted one claw."},{"type":"p","text":"\"I assure you, Mount Eraser is safe.\""},{"type":"p","text":"The mountain rumbled."},{"type":"p","text":"Poff."},{"type":"p","text":"Norton smiled."},{"type":"p","text":"\"Mostly safe.\""},{"type":"p","text":"The mountain rumbled again."},{"type":"p","text":"Poff. Poff."},{"type":"p","text":"Then it exploded."},{"type":"p","text":"KASU-KASU BOOM!"},{"type":"p","text":"A cloud of eraser crumbs shot into the air. White dust snowed down. Numbers ran everywhere. A fraction rolled past wearing a tiny helmet."},{"type":"p","text":"\"The Eruption Competition has begun!\" shouted a crumb announcer. \"Welcome, citizens of the Eraser Crumb Nation!\""},{"type":"p","text":"Hundreds of tiny eraser crumbs cheered. The area was crowded. Then it became more crowded. Then it was crowded with crumbs, numbers, commas, and one very confused frog sticker."},{"type":"p","text":"Ms. Hoshino said, \"We can say this place is crowded with paper creatures.\""},{"type":"p","text":"\"And possible frogs,\" said Kenta."},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"Taku wiped dust from his face."},{"type":"p","text":"\"This volcano resembles something from space,\" he said. \"Like a Mars volcano.\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Good connection. Mars has a huge volcano called Olympus Mons. It is one of the largest volcanoes in the solar system. Mount Eraser is much smaller, though it may be louder.\""},{"type":"p","text":"The volcano burped."},{"type":"p","text":"BURRRRP!"},{"type":"p","text":"A number-shaped cloud flew out. It looked like a seven. Then it turned into a noodle. Then it sneezed."},{"type":"p","text":"Kenta pointed."},{"type":"p","text":"\"That is a symptom. Number-shaped burps are a symptom of too much eraser dust.\""},{"type":"p","text":"Ms. Hoshino stared at him."},{"type":"p","text":"\"That is a strange sentence, but the word symptom is used correctly.\""},{"type":"p","text":"Norton sat down and covered his face."},{"type":"p","text":"\"I must make an apology,\" he said. \"I ate too many eraser crumbs last week. I wanted a bigger salary.\""},{"type":"p","text":"\"You ate your own salary?\" asked Riku."},{"type":"p","text":"\"Only part of it,\" said Norton. \"And the bonus crumbs. And the emergency crumbs. And the crumb chart.\""},{"type":"p","text":"Riku looked at the shaking volcano."},{"type":"p","text":"\"As a result of that diet, the volcano is unstable. Result, outcome, and consequence are all connected.\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"Excellent. Result = outcome = consequence. They are close in meaning. They tell us what happens because of something.\""},{"type":"p","text":"A crowd of numbers gathered near a bridge made of old notebook lines. The bridge had broken in half. Question five was on the far side, waving its tiny arms."},{"type":"p","text":"\"Taku! I am over here!\""},{"type":"p","text":"Taku ran forward, but the ground shook. A river of soft eraser crumbs flowed between them."},{"type":"p","text":"\"We need a bridge,\" said Taku."},{"type":"p","text":"Riku opened his pencil case."},{"type":"p","text":"\"Thanks to advances in pocket block technology, I can build one.\""},{"type":"p","text":"Ms. Hoshino tilted her head."},{"type":"p","text":"\"The full phrase would be thanks to advances in technology. But in your case, yes, thanks to advances in pocket block technology.\""},{"type":"p","text":"Riku built a bridge from blocks, a ruler, and three paper clips. He added a platform in the middle."},{"type":"p","text":"Kenta placed his frog eraser on it."},{"type":"p","text":"\"Froggy will test it.\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"We test safely.\""},{"type":"p","text":"The bridge stretched over the eraser crumb river. It shook. It bent. It made a squeaky sound."},{"type":"p","text":"\"It is flexible,\" said Riku."},{"type":"p","text":"\"It is screaming,\" said Taku."},{"type":"p","text":"The crumb announcer blew a tiny trumpet."},{"type":"p","text":"\"Vote now! Are you in favor of crossing the bridge or in favor of running around in circles?\""},{"type":"p","text":"The numbers shouted, \"In favor of crossing!\""},{"type":"p","text":"Kenta shouted, \"In favor of frogs!\""},{"type":"p","text":"\"That was not an option,\" said Ms. Hoshino."},{"type":"p","text":"One by one, they crossed. Taku stepped carefully. Kenta crawled like a frog, because of course he did. Riku carried the Answer Rescue Cart. Ms. Hoshino held Norton's tail so he would not eat the bridge."},{"type":"p","text":"Halfway across, the volcano puffed again."},{"type":"p","text":"Poff."},{"type":"p","text":"A cloud of pencil dust covered everyone."},{"type":"p","text":"Taku sneezed. Kenta sneezed. Riku sneezed. Ms. Hoshino sneezed. Norton burped."},{"type":"p","text":"BURP! Delivery complete!"},{"type":"p","text":"A lost answer popped out and landed on Taku's sleeve. It said:"},{"type":"p","text":"Question Five: First, read carefully. Second, show your thinking. Third, do not panic."},{"type":"p","text":"Taku smiled."},{"type":"p","text":"\"That is my missing hint.\""},{"type":"p","text":"Question five jumped into the Answer Rescue Cart."},{"type":"p","text":"\"Let us go home,\" it said. \"This volcano is too dusty for math.\""},{"type":"p","text":"Mount Eraser rumbled one last time. Then it gave a tiny polite puff."},{"type":"p","text":"Poff."},{"type":"p","text":"A sign appeared in the dust."},{"type":"p","text":"Competition winner: Most Responsible Apology, Norton. Prize: One crumb, not for eating."},{"type":"p","text":"Norton picked up the prize crumb and stared at it with great effort."},{"type":"p","text":"\"I will not eat this crumb,\" he said."},{"type":"p","text":"He paused."},{"type":"p","text":"\"May I smell it?\""},{"type":"p","text":"\"Only once,\" said Ms. Hoshino."},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"The Secret Plan We Did Not Use"},{"type":"p","text":"The paper world shook. A loud classroom sound came from far above."},{"type":"p","text":"\"Everyone,\" said the real-world voice of Ms. Hoshino, which was strange because Ms. Hoshino was also inside the paper world. \"Please put your homework on your desk.\""},{"type":"p","text":"The inside Ms. Hoshino looked up."},{"type":"p","text":"\"That is the classroom echo,\" she said. \"We are almost out of time.\""},{"type":"p","text":"Taku held the missing piece of question five."},{"type":"p","text":"\"We found the important part. But my paper is still chewed.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"Maybe we can say a frog ate it.\""},{"type":"p","text":"A voice echoed from everywhere."},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"Riku touched his blocks."},{"type":"p","text":"\"I can generate a fake page. It might look like homework.\""},{"type":"p","text":"Ms. Hoshino shook her head."},{"type":"p","text":"\"A fake page is not the purpose of homework. The purpose is practice. Homework helps us see what we understand and what we need to try again.\""},{"type":"p","text":"Taku looked down."},{"type":"p","text":"\"Then we should bring up the problem honestly. We should not hide it.\""},{"type":"p","text":"Norton looked worried."},{"type":"p","text":"\"Will the teacher charge me with homework munching?\""},{"type":"p","text":"Suddenly, three red pencils marched out from behind a dictionary. They wore paper hats and tiny badges."},{"type":"p","text":"\"We are the Red Pencil Police!\" shouted the first pencil. \"We charge Norton with eating homework!\""},{"type":"p","text":"The second pencil held up a tiny bill."},{"type":"p","text":"\"Financial report! Norton owes three pencil noodles, two commas, and one apology stamp!\""},{"type":"p","text":"The third pencil blew a whistle."},{"type":"p","text":"\"Fine dust is evidence! Also, the fine is three crumbs!\""},{"type":"p","text":"Kenta whispered, \"Fine can mean okay, very small, or a penalty. I am fine, but this fine dust is not fine.\""},{"type":"p","text":"Ms. Hoshino put a hand to her forehead."},{"type":"p","text":"\"That is surprisingly useful, Kenta.\""},{"type":"p","text":"Norton shook."},{"type":"p","text":"\"I did not mean to break the law. Eating anxious homework is my custom. I was brought up by old notebooks. They told me, 'Munch first, think later.'\""},{"type":"p","text":"\"That custom needs to change,\" said Taku. \"You can still help, but you cannot eat whole homework pages.\""},{"type":"p","text":"Riku looked around the Red Pencil Police station. It had desks made of index cards. It had chairs made of pencil caps. It had a charging station labeled Charge Your Pencil Here."},{"type":"p","text":"Riku pointed."},{"type":"p","text":"\"Charge has several meanings. The police can charge Norton with a crime. A store can charge money. A charger can charge a pencil battery, if pencils had batteries. English is like a toolbox.\""},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"\"Good, Riku.\""},{"type":"p","text":"The first red pencil looked confused."},{"type":"p","text":"\"Are we still angry?\""},{"type":"p","text":"\"Maybe less angry,\" said the second pencil."},{"type":"p","text":"\"Can we still blow the whistle?\" asked the third."},{"type":"p","text":"\"Once,\" said Ms. Hoshino."},{"type":"p","text":"Tweet."},{"type":"p","text":"Bookdon arrived with a rolled-up map."},{"type":"p","text":"\"We need the internal map of Norton's library,\" he said. \"Without it, the restored homework may come back out of order.\""},{"type":"p","text":"\"Internal means inside,\" said Taku. \"Inside Norton.\""},{"type":"p","text":"\"Correct,\" said Ms. Hoshino. \"We can look up the route in the map.\""},{"type":"p","text":"Kenta looked up."},{"type":"p","text":"\"I looked up. I see a ceiling.\""},{"type":"p","text":"\"Look up can mean raise your eyes,\" said Ms. Hoshino. \"It can also mean search for information.\""},{"type":"p","text":"Riku spread the internal map on a flat stone."},{"type":"p","text":"\"This stone can be our platform,\" he said. \"A platform can be a raised place, a station area, or a base for a plan.\""},{"type":"p","text":"He added blocks around the edges."},{"type":"p","text":"\"I will strengthen it so the map does not fold itself into a paper airplane.\""},{"type":"p","text":"The map immediately tried to fold itself into a paper airplane. Riku caught it."},{"type":"p","text":"\"See? Good design choice.\""},{"type":"p","text":"Bookdon pointed at a small jar of eraser crumbs."},{"type":"p","text":"\"In this paper world, our most important natural resource is safe eraser crumb,\" he said. \"Please do not waste it.\""},{"type":"p","text":"Norton puffed up proudly."},{"type":"p","text":"\"At Notebook Dinosaur College, my major was Advanced Munching,\" he said."},{"type":"p","text":"Taku sighed."},{"type":"p","text":"\"That major is part of the problem.\""},{"type":"p","text":"Bookdon pointed at a district near the bottom of the map."},{"type":"p","text":"\"Here is Homework District. Here is the Stomach Library. Here is Mount Eraser. And here is the Maru-Maru Room, where the marking robot lives.\""},{"type":"p","text":"\"Marking robot?\" asked Taku."},{"type":"p","text":"Bookdon lowered his voice."},{"type":"p","text":"\"Maru-Maru 3000. It gives circles and crosses. But it is out of order.\""},{"type":"p","text":"Norton swallowed."},{"type":"p","text":"\"It got too much demand for perfect answers. It became scary.\""},{"type":"p","text":"Ms. Hoshino's face softened."},{"type":"p","text":"\"That is important. Too much demand for perfection can make learning feel frightening. We need effort, not fear.\""},{"type":"p","text":"The Red Pencil Police looked at their red points."},{"type":"p","text":"\"We may have been too pointy,\" said the first pencil."},{"type":"p","text":"\"We can use red gently,\" said the second."},{"type":"p","text":"\"Can I give a star instead?\" asked the third."},{"type":"p","text":"\"That sounds better,\" said Taku."},{"type":"p","text":"Riku finished the platform. It had a map holder, a crumb shield, and a button labeled Do Not Press Unless Something Goes Wrong."},{"type":"p","text":"Kenta pressed it."},{"type":"p","text":"A tiny flag popped up. It said:"},{"type":"p","text":"Something Went Wrong. Congratulations on noticing."},{"type":"p","text":"Ms. Hoshino looked at Kenta."},{"type":"p","text":"Kenta looked at the flag."},{"type":"p","text":"\"I observed the button. My finger became active.\""},{"type":"p","text":"\"Please make your finger less active,\" said Ms. Hoshino."},{"type":"p","text":"The group followed the map to the Maru-Maru Room. Taku carried question five. Riku carried tools. Kenta carried Froggy. Norton carried his apology stamp. Ms. Hoshino carried patience. Teachers often carry patience, though it becomes heavy."},{"type":"p","text":"At the door, Taku stopped."},{"type":"p","text":"\"So our secret plan is... no secret plan.\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"Exactly. We will tell the truth. Then we will fix what we can.\""},{"type":"p","text":"Norton lifted his tiny claw."},{"type":"p","text":"\"I want to grow out of munching first and thinking later.\""},{"type":"p","text":"\"Good,\" said Taku. \"Then let us start. Or begin.\""},{"type":"p","text":"\"Start means begin,\" whispered Kenta."},{"type":"p","text":"\"Yes,\" said everyone."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Great Burp of Correct Answers"},{"type":"p","text":"The Maru-Maru Room was round, red, and very nervous. On the walls were posters."},{"type":"p","text":"Perfect Answers Only! No Mistakes Allowed! Big Demand for Big Circles!"},{"type":"p","text":"In the center stood Maru-Maru 3000. It was a robot made of red pens, springs, and one tiny pair of glasses. Its arms spun around. It stamped circles and crosses on everything."},{"type":"p","text":"Stamp! A circle on a rock."},{"type":"p","text":"Stamp! A cross on a correct answer."},{"type":"p","text":"Stamp! A hundred points on Kenta's frog eraser."},{"type":"p","text":"Kenta lifted Froggy proudly."},{"type":"p","text":"\"Froggy passed math!\""},{"type":"p","text":"\"The robot is out of order,\" said Riku."},{"type":"p","text":"Maru-Maru 3000 turned toward them."},{"type":"p","text":"\"Perfect answers only!\" it shouted. \"Effort not found! Mistake detected! Panic recommended!\""},{"type":"p","text":"Taku held question five tightly."},{"type":"p","text":"\"I do not want panic,\" he said. \"I want to understand.\""},{"type":"p","text":"The robot spun faster. Its red arms made a windy sound."},{"type":"p","text":"Whirr-whirr-whirr."},{"type":"p","text":"Ms. Hoshino stepped forward."},{"type":"p","text":"\"Maru-Maru, please stop. You are interrupting the learning process.\""},{"type":"p","text":"\"Interrupting,\" repeated Taku. \"That means stopping or getting in the way, right?\""},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"And a robot that stamps everything is definitely getting in the way.\""},{"type":"p","text":"Riku opened a small panel on the robot's side. Inside were wires, springs, and a small note."},{"type":"p","text":"The note said:"},{"type":"p","text":"Internal Order: 1. Read the answer. 2. Check the thinking. 3. Support the student. 4. Do not stamp frogs."},{"type":"p","text":"Riku frowned."},{"type":"p","text":"\"The internal order is broken. The steps are out of order. Step four is happening first.\""},{"type":"p","text":"Maru-Maru stamped another hundred points on Froggy."},{"type":"p","text":"Kenta whispered, \"I see no problem.\""},{"type":"p","text":"\"There is a problem,\" said Ms. Hoshino."},{"type":"p","text":"Taku looked at the posters again. Perfect Answers Only. No Mistakes Allowed."},{"type":"p","text":"He felt the same small anxiety from question five. He did not like that feeling. But now he understood it better."},{"type":"p","text":"He began to consider a new idea."},{"type":"p","text":"\"Maybe mistakes are not enemies,\" Taku said slowly. \"Maybe they are hints.\""},{"type":"p","text":"The room became quiet. Even Maru-Maru stopped whirring for one second."},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"That is a strong idea. Consider means to think carefully.\""},{"type":"p","text":"Norton looked at the robot."},{"type":"p","text":"\"I ate homework because I thought fear was the reason students shook.\""},{"type":"p","text":"\"Reason can mean a cause,\" said Ms. Hoshino. \"It can also be a verb, to reason, meaning to think carefully.\""},{"type":"p","text":"Taku nodded."},{"type":"p","text":"\"Then let us reason. The reason I felt anxiety was not that question five was bad. It was that I needed more practice.\""},{"type":"p","text":"Question five jumped out of the cart."},{"type":"p","text":"\"Finally! Someone understands me!\""},{"type":"p","text":"Maru-Maru beeped."},{"type":"p","text":"\"Practice... detected?\""},{"type":"p","text":"Riku moved the wires. He put step one back before step two. He put step three before step four. He removed a button labeled Panic Now. He replaced it with a button labeled Try Again."},{"type":"p","text":"\"Can I press it?\" asked Kenta."},{"type":"p","text":"\"No,\" said everyone."},{"type":"p","text":"Norton stepped forward. He held the apology stamp."},{"type":"p","text":"\"Maru-Maru, I am sorry. I helped create the panic pile. I thought I was helping, but I made the demand for perfect answers bigger.\""},{"type":"p","text":"Maru-Maru's red eyes softened."},{"type":"p","text":"\"Apology accepted. Effort found.\""},{"type":"p","text":"Then Norton's stomach glowed. Eraser crumbs floated up. Pencil dust swirled around. Question five spun like a tiny planet. The plus signs and minus signs lined up like an asteroid belt."},{"type":"p","text":"Taku whispered, \"It looks like a tiny solar system.\""},{"type":"p","text":"Ms. Hoshino said, \"Between Mars and Jupiter, there is an asteroid belt with many rocky objects. This is a notebook version, made of math and crumbs. Please do not call it space dandruff.\""},{"type":"p","text":"Kenta closed his mouth."},{"type":"p","text":"He had been about to call it space dandruff."},{"type":"p","text":"The crumbs and pencil dust touched the restored answer. There was a soft flash."},{"type":"p","text":"Pika."},{"type":"p","text":"\"A chemical reaction?\" asked Riku."},{"type":"p","text":"\"A magical paper chemical reaction,\" said Ms. Hoshino. \"Do not try to make it in the classroom.\""},{"type":"p","text":"The restored homework pieces flew together. Question five found its place. The missing numbers returned. The paper lines straightened. A tiny label appeared on the top."},{"type":"p","text":"Fresh Homework No preservative Best used before dinosaur snack time"},{"type":"p","text":"Kenta read it."},{"type":"p","text":"\"No preservative means no stuff to keep it fresh for a long time?\""},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"And in this joke, it means do not save homework forever in your desk.\""},{"type":"p","text":"Norton burped."},{"type":"p","text":"BURP! Delivery complete!"},{"type":"p","text":"The paper door opened above them. Wind whooshed again. The library, the volcano, the red pencils, and Maru-Maru 3000 spun around like a pencil sharpener planet."},{"type":"p","text":"\"Hold on!\" cried Taku."},{"type":"p","text":"\"Hold on to what?\" shouted Kenta."},{"type":"p","text":"\"Anything not a frog!\" shouted Ms. Hoshino."},{"type":"p","text":"They shot upward. They flew through notebook lines. They passed the Addition Branch. They passed the Subtraction Branch. They passed a sign that said:"},{"type":"p","text":"Homework District thanks you. Please visit again, but not during a test."},{"type":"p","text":"Then, pop!"},{"type":"p","text":"They were back in the classroom."},{"type":"p","text":"Taku sat at his desk. Kenta sat beside him with Froggy on his head. Riku had a paper clip stuck to his sleeve. Ms. Hoshino had one eraser crumb in her hair."},{"type":"p","text":"The whole class stared. They had witnessed something very strange. One student whispered, \"Did the homework just burp?\""},{"type":"p","text":"Taku looked down. His math sheet was back. It was wrinkled. It had one tiny bite mark in the corner. But question five was complete. Taku's thinking was written beside it. It was not perfect, but it was honest."},{"type":"p","text":"A tiny Norton sat on the corner of the desk. He wore a small tag."},{"type":"p","text":"Name: Norton Species: Notebiter Rex Home: Homework District Diet: eraser crumbs, pencil dust, and almost no homework Warning: may burp correct answers"},{"type":"p","text":"Kenta read the tag."},{"type":"p","text":"\"Species! I told you he was a biology discovery.\""},{"type":"p","text":"\"A dinosaur species, not a frog species,\" said Ms. Hoshino."},{"type":"p","text":"\"Close,\" said Kenta."},{"type":"p","text":"\"Not close,\" said Ms. Hoshino."},{"type":"p","text":"Taku raised his hand."},{"type":"p","text":"\"Ms. Hoshino, I want to explain. I did my homework. I felt worried about question five. Norton smelled the anxiety, ate the page, and delivered the answer to his stomach library. Then we rescued it. Also, there was a volcano. Also, Kenta tried to make a zero into a frog egg.\""},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"\"I apologized to the zero.\""},{"type":"p","text":"Riku raised his hand."},{"type":"p","text":"\"I built a bridge. It was an interesting failure, then a useful platform.\""},{"type":"p","text":"Norton raised his claw."},{"type":"p","text":"\"I am willing to grow out of eating whole homework. From now on, I will only nibble eraser crumbs that are not part of important school property.\""},{"type":"p","text":"Ms. Hoshino looked at the four of them. Then she looked at the tiny dinosaur. Then she looked at the bite mark."},{"type":"p","text":"She took one deep teacher breath."},{"type":"p","text":"\"Taku,\" she said, \"I am satisfied with your honesty and your effort. Your paper is not perfect, but you explained the problem, found a way to fix it, and learned from it. That matters.\""},{"type":"p","text":"Taku smiled."},{"type":"p","text":"\"So mistakes are hints?\""},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"Mistakes are information. They tell us what to practice next.\""},{"type":"p","text":"Norton put a tiny sticker on Taku's paper. It said:"},{"type":"p","text":"Good Effort No Panic Needed"},{"type":"p","text":"Maru-Maru 3000's voice came faintly from inside the notebook."},{"type":"p","text":"\"Effort found. Circle given gently.\""},{"type":"p","text":"A soft red circle appeared around question five."},{"type":"p","text":"Kenta whispered to Froggy, \"You still got one hundred points.\""},{"type":"p","text":"Ms. Hoshino heard him."},{"type":"p","text":"\"Froggy may keep the sticker, not the grade.\""},{"type":"p","text":"Riku looked at Norton."},{"type":"p","text":"\"I can build you a tiny snack box. It will prevent you from eating homework.\""},{"type":"p","text":"\"What is in the snack box?\" asked Norton."},{"type":"p","text":"\"Eraser crumbs,\" said Riku. \"But only safe crumbs.\""},{"type":"p","text":"\"And a schedule,\" said Taku. \"You eat after school, not during homework check.\""},{"type":"p","text":"\"And a label,\" said Ms. Hoshino. \"It will say: Do not absorb anxiety. Talk about it.\""},{"type":"p","text":"Norton nodded."},{"type":"p","text":"\"I can do that. I will try again. Re-try. Re-think. Re-burp.\""},{"type":"p","text":"\"Maybe not re-burp,\" said Ms. Hoshino."},{"type":"p","text":"The class finally handed in homework. For a few minutes, everything was normal. Normal pencils. Normal papers. Normal teacher. Tiny dinosaur. Almost normal."},{"type":"p","text":"Then Ms. Hoshino turned to the board."},{"type":"p","text":"\"Now, class, let us begin today's lesson.\""},{"type":"p","text":"Norton raised one claw."},{"type":"p","text":"\"Begin means start.\""},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"\"Correct.\""},{"type":"p","text":"Norton looked at the stack of homework on her desk. He opened his mouth just a little."},{"type":"p","text":"\"May I eat one tiny corner?\""},{"type":"p","text":"The whole class shouted, \"No!\""},{"type":"p","text":"Norton sighed. He took one safe eraser crumb from his new snack box. He chewed slowly."},{"type":"p","text":"Munch."},{"type":"p","text":"Then he burped a tiny star."},{"type":"p","text":"BURP! Positive effort complete!"},{"type":"p","text":"Ms. Hoshino pointed to the board."},{"type":"p","text":"\"Today's lesson,\" she said, \"is about honesty, practice, and keeping dinosaurs away from paper.\""},{"type":"p","text":"Taku whispered to Kenta and Riku, \"Next time, maybe we should do homework on stone tablets.\""},{"type":"p","text":"Riku's eyes lit up."},{"type":"p","text":"\"I can build that. Maybe.\""},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"\"Can the stone tablet have frogs?\""},{"type":"p","text":"Ms. Hoshino, without turning around, said, \"No.\""},{"type":"p","text":"Norton looked at Taku's notebook and smiled."},{"type":"p","text":"\"Homework is not for being perfect,\" he said."},{"type":"p","text":"Taku finished the sentence."},{"type":"p","text":"\"Homework is for practice.\""},{"type":"p","text":"And from deep inside the notebook, Mount Eraser gave one tiny polite puff."},{"type":"p","text":"Poff."},{"type":"p","text":"The End"}]},{"themeNo":4,"id":"04","title":"Sir Zipperton and the Lost-and-Found Detective","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Pencil Code and the Backpack with a Mustache"},{"type":"p","text":"On Monday morning, Taku opened his pencil case."},{"type":"p","text":"He blinked."},{"type":"p","text":"He looked inside again."},{"type":"p","text":"Then he turned the pencil case upside down and shook it."},{"type":"p","text":"Nothing came out except one tiny eraser crumb and a sticker of Jupiter."},{"type":"p","text":"“My pencil is missing,” said Taku. “My eraser is missing. My ruler is missing. My contact notebook is missing. My space sticker sheet is missing. My lunch cloth is missing. And one indoor shoe is missing.”"},{"type":"p","text":"Kenta counted on his fingers."},{"type":"p","text":"“That is seven lost items,” he said. “Evidence one: many things are gone. Evidence two: this may be a frog problem.”"},{"type":"p","text":"Ms. Hoshino looked up from the attendance book."},{"type":"p","text":"“It is not a frog problem,” she said."},{"type":"p","text":"Taku stared at the empty pencil case."},{"type":"p","text":"“This is probably a mission,” he whispered. “Mission: Recover the Lost Pencil Planet.”"},{"type":"p","text":"Riku leaned over and looked at the desk."},{"type":"p","text":"“The pencil may have rolled,” he said. “We need data.”"},{"type":"p","text":"Just then, in the middle of the classroom, a short pencil rolled across the floor by itself."},{"type":"p","text":"Roll."},{"type":"p","text":"Roll."},{"type":"p","text":"Roll."},{"type":"p","text":"It stopped near Taku’s shoe and drew a black line on the floor."},{"type":"p","text":"The line became letters."},{"type":"p","text":"UNDER..."},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“Under what?” he said. “Under the desk? Under the locker? Underwear?”"},{"type":"p","text":"Ms. Hoshino closed her eyes for one second."},{"type":"p","text":"“Please do not make the clue worse.”"},{"type":"p","text":"The pencil wiggled again and wrote one more word."},{"type":"p","text":"LOCKER."},{"type":"p","text":"Kenta got down on his knees."},{"type":"p","text":"“Evidence three,” he said. “The pencil has legs.”"},{"type":"p","text":"The pencil wrote:"},{"type":"p","text":"NO LEGS. PHYSICS."},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“That is a good word. Physics is the science of motion, force, and energy. A pencil can roll because of gravity, a slanted desk, and friction.”"},{"type":"p","text":"Taku’s eyes shone."},{"type":"p","text":"“So my pencil is like a tiny space tool that failed to attach to the space station?”"},{"type":"p","text":"“In space, tools can float away,” said Ms. Hoshino. “Astronauts often attach tools so they do not drift off. But on Earth, your pencil mostly rolled because your desk is messy.”"},{"type":"p","text":"Taku looked at his desk."},{"type":"p","text":"“That is a painful but actual fact.”"},{"type":"p","text":"Suddenly, the lost-and-found shelf at the back of the classroom shook."},{"type":"p","text":"Bump."},{"type":"p","text":"Bump."},{"type":"p","text":"BUMP."},{"type":"p","text":"A very old brown school backpack jumped out of the shelf. It wore a detective hat. It had a tiny paper mustache. It held a cracked ruler like a magnifying glass. Its front zipper opened like a mouth."},{"type":"p","text":"“ZIP-BLAAARP!” shouted the backpack."},{"type":"p","text":"Everyone froze."},{"type":"p","text":"The sound was like a zipper, a burp, and a tiny old trumpet all at the same time."},{"type":"p","text":"The backpack landed on Taku’s desk."},{"type":"p","text":"“Case opened!” it shouted. “I am Sir Zipperton Wasureruno the Third, Chief Detective of the Lost-and-Found Department!”"},{"type":"p","text":"Ms. Hoshino stared at it."},{"type":"p","text":"“We have a Lost-and-Found Department?”"},{"type":"p","text":"“I invented it five seconds ago,” said the backpack. “Do not question my appearance. My appearance is perfect. Hat, mustache, detective soul, and zipper power!”"},{"type":"p","text":"Riku raised his hand slowly."},{"type":"p","text":"“Your mustache is made of pencil shavings.”"},{"type":"p","text":"“A symbol of wisdom!” shouted Sir Zipperton."},{"type":"p","text":"Taku whispered, “Are you a talking backpack?”"},{"type":"p","text":"“I am the only possible detective for this case,” said Sir Zipperton. “I demand a detective fee.”"},{"type":"p","text":"“A fee?” said Taku. “How much?”"},{"type":"p","text":"“One eraser crumb,” said Sir Zipperton. “Two, if the case smells interesting.”"},{"type":"p","text":"Kenta opened his hand."},{"type":"p","text":"“I have one crumb. It may be a fossil.”"},{"type":"p","text":"Sir Zipperton snapped his zipper."},{"type":"p","text":"“Accepted.”"},{"type":"p","text":"Ms. Hoshino held up one finger."},{"type":"p","text":"“Before any investigation begins, first, safety. Second, honesty. Third, please stop shouting from the backpack.”"},{"type":"p","text":"Sir Zipperton looked offended."},{"type":"p","text":"“My zipper has a naturally dramatic voice.”"},{"type":"p","text":"Taku pointed at the pencil code."},{"type":"p","text":"“The clue says UNDER LOCKER. Can we go now? I am impatient.”"},{"type":"p","text":"Sir Zipperton spun around."},{"type":"p","text":"“Impatient! A dangerous condition! It makes children run before they think and open mystery doors before teachers say no.”"},{"type":"p","text":"Taku stepped back."},{"type":"p","text":"“I will overcome my impatience. Maybe.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “We cannot depend on guesses. We need evidence.”"},{"type":"p","text":"Sir Zipperton pulled out a tiny detective badge made from a bottle cap."},{"type":"p","text":"“Then all of you may take part in the investigation. But do not abuse the badge.”"},{"type":"p","text":"Taku frowned."},{"type":"p","text":"“Abuse?”"},{"type":"p","text":"“Here, abuse means use something in the wrong way,” said Ms. Hoshino. “For example, using a detective badge to skip cleaning time.”"},{"type":"p","text":"Sir Zipperton hid three cleaning-time passes behind his back."},{"type":"p","text":"“Purely theoretical,” he said."},{"type":"p","text":"Riku looked under Taku’s desk and found two more clues: a ruler cap and a note that said SHORTAGE."},{"type":"p","text":"“Shortage of pencils?” asked Taku."},{"type":"p","text":"“Shortage of labels,” said Riku. “Shortage of checking. Shortage of not naming pencils as planets and then forgetting them.”"},{"type":"p","text":"Sir Zipperton nodded gravely."},{"type":"p","text":"“The prefix under- can mean below, like under the locker. It can also mean not enough, like under-organized. Taku, your desk is under-organized.”"},{"type":"p","text":"Taku looked at his desk."},{"type":"p","text":"“My desk is not under-organized,” he said. “It is a space cave.”"},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"“A space cave can still need cleaning.”"},{"type":"p","text":"The short pencil rolled again."},{"type":"p","text":"UNDER LOCKER."},{"type":"p","text":"Then it added:"},{"type":"p","text":"SHOE GALAXY."},{"type":"p","text":"Sir Zipperton shook with excitement."},{"type":"p","text":"“ZIP-BLAAARP! To the shoe boxes! This case smells possible!”"},{"type":"p","text":"Kenta sniffed the air."},{"type":"p","text":"“It does smell possible.”"},{"type":"p","text":"Ms. Hoshino said, “Please investigate from a safe smelling distance.”"},{"type":"p","text":"And so, Taku, Kenta, Riku, Ms. Hoshino, and the loudest backpack in school marched to the shoe boxes."},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Shoe Galaxy and the Smelly Footprint Mystery"},{"type":"p","text":"The shoe boxes stood in a long row near the entrance."},{"type":"p","text":"White indoor shoes sat in neat pairs."},{"type":"p","text":"Some were big."},{"type":"p","text":"Some were small."},{"type":"p","text":"Some were clean."},{"type":"p","text":"Some looked like they had survived a mud festival."},{"type":"p","text":"Taku opened his shoe box."},{"type":"p","text":"One shoe was there."},{"type":"p","text":"The other was gone."},{"type":"p","text":"Kenta opened his shoe box."},{"type":"p","text":"One shoe was there."},{"type":"p","text":"The other was gone."},{"type":"p","text":"Riku opened his shoe box."},{"type":"p","text":"Both shoes were there, but each one had a label."},{"type":"p","text":"NOT MISSING YET."},{"type":"p","text":"Taku pointed at the label."},{"type":"p","text":"“You labeled your shoes before the mystery expanded?”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Initial protection system.”"},{"type":"p","text":"Sir Zipperton jumped onto the shoe boxes."},{"type":"p","text":"“Behold! The Shoe Galaxy! As compared with outdoor shoes, indoor shoes are less muddy but more mysterious.”"},{"type":"p","text":"Kenta looked inside the boxes."},{"type":"p","text":"“These shoes are similar,” he said. “Very similar. It is challenging to recognize one shoe from another.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“That is why clear names and labels play a role in keeping things organized.”"},{"type":"p","text":"A shoe squeaked."},{"type":"p","text":"Everyone jumped."},{"type":"p","text":"One of Taku’s indoor shoes lifted its toe and spoke."},{"type":"p","text":"“Our aim is simple,” said the shoe. “We aim to return to our owner.”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Talking shoe! Evidence one: alive. Evidence two: smells like a pond. Evidence three: maybe a frog wearing a shoe costume.”"},{"type":"p","text":"“It is a shoe,” said Ms. Hoshino."},{"type":"p","text":"The shoe sighed."},{"type":"p","text":"“I want to earn recognition as a real part of a pair. But my partner is missing.”"},{"type":"p","text":"Another shoe whispered from the next box."},{"type":"p","text":"“I saw something slide under the bench.”"},{"type":"p","text":"Sir Zipperton snapped open."},{"type":"p","text":"“Who did it? Give me names! Give me facts! Give me another eraser crumb!”"},{"type":"p","text":"Ms. Hoshino put one hand on the backpack."},{"type":"p","text":"“One fee was enough.”"},{"type":"p","text":"Sir Zipperton coughed."},{"type":"p","text":"“I meant give me evidence.”"},{"type":"p","text":"Riku crouched and found a footprint made of gray dust."},{"type":"p","text":"“The smell may have influence on the investigation,” he said."},{"type":"p","text":"Sir Zipperton leaned close and sniffed."},{"type":"p","text":"Then he fell backward."},{"type":"p","text":"“Despite the smell, we must continue!” he shouted from the floor."},{"type":"p","text":"Kenta wrote in his notebook."},{"type":"p","text":"“Evidence four: smell is powerful enough to knock over a backpack.”"},{"type":"p","text":"A tiny voice came from inside a shoe."},{"type":"p","text":"“Order in the shoe box.”"},{"type":"p","text":"A small judge climbed out of the shoe. He wore a sock as a robe and carried a tiny wooden hammer."},{"type":"p","text":"“I am Judge Sockmoto,” he said."},{"type":"p","text":"He hit the shoe box."},{"type":"p","text":"“Pon.”"},{"type":"p","text":"The sound was very small."},{"type":"p","text":"Sir Zipperton bowed."},{"type":"p","text":"“Your Honor, the lost-and-found budget is three paper clips, one sleepy sticker, and half a rubber band.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“That explains the poor system.”"},{"type":"p","text":"Judge Sockmoto looked at the shoes."},{"type":"p","text":"“This court will hear the case of the Missing Left Shoe.”"},{"type":"p","text":"Ms. Hoshino raised her hand."},{"type":"p","text":"“Before we make a court, let’s make sure everyone can use the system. A good label should help everyone, including a student with an injury or a disability. Pictures, colors, and clear names can make things easier to find.”"},{"type":"p","text":"Sir Zipperton tapped his mustache."},{"type":"p","text":"“A wise point. Also, we need bigger stickers. The budget is shameful.”"},{"type":"p","text":"The missing-shoe mystery grew stranger."},{"type":"p","text":"A right shoe from class 2-B whispered, “I did not mean to give away the secret, but the contact notebook knows everything.”"},{"type":"p","text":"Taku leaned closer."},{"type":"p","text":"“My contact notebook is missing too.”"},{"type":"p","text":"The shoe nodded."},{"type":"p","text":"“It was carried toward the lockers by a parade of small lost things.”"},{"type":"p","text":"Kenta’s eyes widened."},{"type":"p","text":"“A parade? Were there frogs?”"},{"type":"p","text":"“No,” said the shoe."},{"type":"p","text":"“Maybe hidden frogs?”"},{"type":"p","text":"“No.”"},{"type":"p","text":"“Frog influence?”"},{"type":"p","text":"“No.”"},{"type":"p","text":"Ms. Hoshino gently took Kenta’s notebook and wrote:"},{"type":"p","text":"Current evidence: shoes, dust, missing labels, contact notebook."},{"type":"p","text":"Then she added:"},{"type":"p","text":"Not evidence: hope for frogs."},{"type":"p","text":"Kenta looked at it."},{"type":"p","text":"“Harsh, but fair.”"},{"type":"p","text":"Riku began drawing a Shoe Galaxy Map. He marked Taku’s shoe box, Kenta’s shoe box, the dusty footprint, and the bench."},{"type":"p","text":"“We need to follow the path,” he said. “But the path may end at the lockers.”"},{"type":"p","text":"Sir Zipperton gasped."},{"type":"p","text":"“End? Finish? Come to an end? Never! A detective case does not end, finish, or come to an end until the detective has given a very long speech.”"},{"type":"p","text":"Ms. Hoshino said, “Let’s save the long speech for never.”"},{"type":"p","text":"Judge Sockmoto hit the shoe box again."},{"type":"p","text":"“Pon.”"},{"type":"p","text":"The dusty footprint led to the lockers."},{"type":"p","text":"The pencil code had said UNDER LOCKER."},{"type":"p","text":"The shoe had said the contact notebook knew everything."},{"type":"p","text":"Taku swallowed."},{"type":"p","text":"“I think this is bigger than one pencil.”"},{"type":"p","text":"Sir Zipperton opened his zipper."},{"type":"p","text":"“Correct. This case consists of shoes, dust, lies, drama, and poor labeling.”"},{"type":"p","text":"“We have not found lies,” said Ms. Hoshino."},{"type":"p","text":"“Then dramatic silence!” said Sir Zipperton."},{"type":"p","text":"Everyone marched toward the lockers."},{"type":"p","text":"Behind them, Judge Sockmoto whispered to the shoes, “Court is closed.”"},{"type":"p","text":"The hammer went pon."},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"The Witnesses Behind the Locker"},{"type":"p","text":"The lockers looked ordinary."},{"type":"p","text":"They were tall."},{"type":"p","text":"They were metal."},{"type":"p","text":"They had little name cards."},{"type":"p","text":"They also had a dark, dusty space behind them."},{"type":"p","text":"Taku stared at the gap."},{"type":"p","text":"“That looks like a black hole for school items.”"},{"type":"p","text":"“Careful,” said Ms. Hoshino. “No hands behind the locker until we check safely.”"},{"type":"p","text":"Riku took out a small device made from a ruler, a toy camera, and three blocks."},{"type":"p","text":"“LockerScope 3000,” he said. “Initial test.”"},{"type":"p","text":"Ms. Hoshino raised one eyebrow."},{"type":"p","text":"“Initial safety check first.”"},{"type":"p","text":"Riku nodded and used tape to attach the tiny camera to the ruler."},{"type":"p","text":"“I will attach it carefully,” he said."},{"type":"p","text":"He slid the camera behind the locker and pressed a button."},{"type":"p","text":"The screen flashed."},{"type":"p","text":"Then the picture began to expand."},{"type":"p","text":"It expanded more."},{"type":"p","text":"And more."},{"type":"p","text":"And more."},{"type":"p","text":"Suddenly the screen showed a huge world behind the locker."},{"type":"p","text":"There were eraser-crumb asteroids."},{"type":"p","text":"There were pencil-cap comets."},{"type":"p","text":"There were dust-bunny nebulae."},{"type":"p","text":"There was one sock spinning slowly like a sad moon."},{"type":"p","text":"Taku whispered, “The Under-Locker Universe.”"},{"type":"p","text":"Ms. Hoshino said, “In the real solar system, there is an asteroid belt between Mars and Jupiter. This eraser-crumb belt is not an actual asteroid belt. It is mostly old eraser crumbs.”"},{"type":"p","text":"Kenta pressed his face near the screen."},{"type":"p","text":"“This place has biodiversity.”"},{"type":"p","text":"“Dust bunnies are not animals,” said Ms. Hoshino."},{"type":"p","text":"Kenta wrote something down."},{"type":"p","text":"“Possible animals.”"},{"type":"p","text":"“Not animals.”"},{"type":"p","text":"“Possible future animals?”"},{"type":"p","text":"“No.”"},{"type":"p","text":"Sir Zipperton jumped onto a chair and raised a paper card."},{"type":"p","text":"“All witnesses, please make your arrival in an orderly manner!”"},{"type":"p","text":"A gray dust bunny rolled out from behind the locker."},{"type":"p","text":"Then another."},{"type":"p","text":"Then another."},{"type":"p","text":"Soon, six dust bunnies sat in front of the class."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Can I reserve one for research?”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"Sir Zipperton pulled out a tiny desk tag."},{"type":"p","text":"“I reserve three seats for myself.”"},{"type":"p","text":"“You are one backpack,” said Ms. Hoshino. “You do not need three seats.”"},{"type":"p","text":"The biggest dust bunny cleared its throat."},{"type":"p","text":"“We have a complaint,” it said."},{"type":"p","text":"“A complaint!” shouted Sir Zipperton. “Excellent. Dust with feelings!”"},{"type":"p","text":"The dust bunny said, “Complaint number one: everyone blames us when things are lost. Complaint number two: no one cleans under the locker. Complaint number three: Kenta keeps calling us frogs.”"},{"type":"p","text":"Kenta bowed."},{"type":"p","text":"“I apologize. But you have strong pond energy.”"},{"type":"p","text":"Ms. Hoshino smiled a little."},{"type":"p","text":"“The nature of dust bunnies is simple. They are dust, hair, and small fibers gathered together. They are not living things, but they can show us where cleaning is difficult.”"},{"type":"p","text":"Taku looked at the dusty space."},{"type":"p","text":"“It is difficult to find things there because we never look.”"},{"type":"p","text":"“Exactly,” said Ms. Hoshino. “A lost-and-found system can be dependent on good habits. In fact, it can be dependent on small daily checks.”"},{"type":"p","text":"Sir Zipperton sniffed."},{"type":"p","text":"“To begin with, children should respect the dark lands under furniture.”"},{"type":"p","text":"Riku moved the LockerScope deeper."},{"type":"p","text":"The screen showed a small sock sitting alone beside a pencil cap."},{"type":"p","text":"The sock whispered, “I need therapy.”"},{"type":"p","text":"Sir Zipperton threw open his zipper."},{"type":"p","text":"“Sock Therapy Department is now open!”"},{"type":"p","text":"Ms. Hoshino said, “Kind idea. Strange department. Here, therapy just means a way to help someone feel better. In this story, the sock probably needs its partner.”"},{"type":"p","text":"The lonely sock nodded."},{"type":"p","text":"“I have been one sock for too long.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Can a sock become a frog if it is lonely enough?”"},{"type":"p","text":"“No.”"},{"type":"p","text":"Riku pointed at the screen."},{"type":"p","text":"“There is the missing shoe.”"},{"type":"p","text":"Everyone leaned in."},{"type":"p","text":"Behind the locker, Taku’s missing shoe sat beside Kenta’s missing shoe, the ruler, the eraser, the lunch cloth, and the contact notebook."},{"type":"p","text":"The contact notebook was standing upright, like a serious teacher."},{"type":"p","text":"A pencil cap blew a tiny trumpet."},{"type":"p","text":"“Arrival of the main witness!”"},{"type":"p","text":"The contact notebook slid forward and opened itself in front of everyone."},{"type":"p","text":"It spoke in a tired voice."},{"type":"p","text":"“To begin with, no one checked me this morning.”"},{"type":"p","text":"Taku’s face turned pink."},{"type":"p","text":"“I forgot.”"},{"type":"p","text":"Sir Zipperton pointed dramatically."},{"type":"p","text":"“Thus, the case moves to court!”"},{"type":"p","text":"Ms. Hoshino held up her hand."},{"type":"p","text":"“Before court, we need fresh air.”"},{"type":"p","text":"She opened a classroom window."},{"type":"p","text":"“People breathe out carbon dioxide. Plants use carbon dioxide when they make food with light. But lost socks do not clean the air, so we should open windows and keep the room comfortable.”"},{"type":"p","text":"Kenta looked at the sock."},{"type":"p","text":"“Do you want to become a plant?”"},{"type":"p","text":"The sock said, “I just want my other half.”"},{"type":"p","text":"Sir Zipperton clicked his zipper thoughtfully."},{"type":"p","text":"“The reason, the cause, and the factor behind this mystery may not be one bad person. It may be a weak system.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Good. Reason means why something happens. Cause means what makes it happen. Factor means one part that influences it.”"},{"type":"p","text":"Taku looked at the contact notebook, the shoe, the pencil, the ruler, and the dust bunnies."},{"type":"p","text":"“I think the reason is not that my things hate me.”"},{"type":"p","text":"“That is a positive start,” said Ms. Hoshino."},{"type":"p","text":"“The cause is that I did not check my desk, locker, and notebook.”"},{"type":"p","text":"“Good.”"},{"type":"p","text":"“And one factor is that I was thinking about Jupiter stickers.”"},{"type":"p","text":"Sir Zipperton gasped."},{"type":"p","text":"“Jupiter! A gas giant! Your memory has the quality of wet spaghetti on a windy planet.”"},{"type":"p","text":"Taku blinked."},{"type":"p","text":"“That is strangely specific.”"},{"type":"p","text":"Riku saved the LockerScope recording."},{"type":"p","text":"“We have evidence,” he said. “But we still need a system.”"},{"type":"p","text":"The contact notebook shut itself."},{"type":"p","text":"“Then open court,” it said."},{"type":"p","text":"Judge Sockmoto appeared from behind the locker, riding a rolling eraser."},{"type":"p","text":"“Order in the locker,” said the judge."},{"type":"p","text":"Pon."},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"The Contact Notebook Court and the Wet Spaghetti Decision"},{"type":"p","text":"The classroom became a tiny court."},{"type":"p","text":"The teacher’s desk became the judge’s bench."},{"type":"p","text":"A tissue box became the witness stand."},{"type":"p","text":"The dust bunnies sat in a row."},{"type":"p","text":"The lonely sock got a seat beside Kenta, who promised not to call it a frog for at least five minutes."},{"type":"p","text":"Judge Sockmoto sat on top of the tissue box."},{"type":"p","text":"“Court is now open,” he said."},{"type":"p","text":"Pon."},{"type":"p","text":"Sir Zipperton slid into the middle of the classroom."},{"type":"p","text":"“I claim that Taku’s memory is under-organized!” he shouted."},{"type":"p","text":"Taku looked down."},{"type":"p","text":"“I struggle to remember everything. I do not mean to lose things.”"},{"type":"p","text":"Ms. Hoshino stepped beside him."},{"type":"p","text":"“Forgetting happens,” she said. “Hiding makes it harder. Blaming does not fix it. We need to look into the real problem.”"},{"type":"p","text":"Sir Zipperton lifted a card."},{"type":"p","text":"“Evidence card one: pencil under desk. Evidence card two: shoe behind locker. Evidence card three: contact notebook ignored. Evidence card four: Jupiter sticker influence. Evidence card five: wet spaghetti memory.”"},{"type":"p","text":"Ms. Hoshino crossed out the last line."},{"type":"p","text":"“Not evidence.”"},{"type":"p","text":"“Strong image,” said Sir Zipperton."},{"type":"p","text":"“Still not evidence.”"},{"type":"p","text":"The contact notebook opened on the witness stand."},{"type":"p","text":"“I am supposed to help,” it said. “I contain important notes. But I cannot help if nobody opens me.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“I was afraid of being scolded. When I saw the missing things, I wanted to pretend the mission was someone else’s problem.”"},{"type":"p","text":"Ms. Hoshino said gently, “Thank you for saying that honestly.”"},{"type":"p","text":"Sir Zipperton made a tiny sniffing sound."},{"type":"p","text":"“My zipper is not crying. It is investigating moisture.”"},{"type":"p","text":"The contact notebook turned its pages."},{"type":"p","text":"“On this page, there is a note about public transportation for the field trip. The class will use a train. Students need to bring their pass card, water bottle, and name tag.”"},{"type":"p","text":"Taku swallowed."},{"type":"p","text":"“I did not check that.”"},{"type":"p","text":"“There is also a note about organic produce from the school garden,” said the notebook. “Tomorrow, the lunch staff will show carrots and potatoes from the garden.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Do organic carrots attract frogs?”"},{"type":"p","text":"Ms. Hoshino answered, “They attract questions from you.”"},{"type":"p","text":"The notebook continued."},{"type":"p","text":"“There is also a note that says: Bring a clean handkerchief.”"},{"type":"p","text":"Taku looked at his empty hand."},{"type":"p","text":"“That is also missing.”"},{"type":"p","text":"Sir Zipperton spun around."},{"type":"p","text":"“This is not just damage to property. This is damage to preparation!”"},{"type":"p","text":"Ms. Hoshino said, “Damage can mean harm or loss. In this case, forgetting things can damage plans, but it does not make Taku a bad person. It means he needs a better habit.”"},{"type":"p","text":"Riku raised a hand."},{"type":"p","text":"“We need a flexible system.”"},{"type":"p","text":"Sir Zipperton narrowed his zipper."},{"type":"p","text":"“Flexible? Like a rubber band?”"},{"type":"p","text":"“Flexible means it can change and still work,” said Riku. “Taku should not try to memorize everything at once. A checklist can help.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Yes. Memorize means learn by heart. Sometimes that is useful. But for daily items, a system can help more than trying to keep everything in your
