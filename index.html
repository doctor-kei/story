ose had three parts. Right hand up. Left foot out. Chest forward."},{"type":"p","text":"But he forgot everything."},{"type":"p","text":"He bent like a shrimp, hopped on one foot, and shouted, \"Prawn Change!\""},{"type":"p","text":"The bracelet made a sad sound. \"Pose error. Shrimp level high. Hero level low.\""},{"type":"p","text":"Kenta clapped. \"That was nothing but shrimp energy.\""},{"type":"p","text":"Ms. Hoshino nodded slowly. \"Nothing but means only. And yes, that pose was only shrimp energy.\""},{"type":"p","text":"Taku turned red. \"Can we dispose of that memory?\""},{"type":"p","text":"Ms. Hoshino shook her head. \"Do not dispose of a mistake before learning from it. Be calm.\""},{"type":"p","text":"Riku opened his notebook. \"We need a scientific pose analysis.\""},{"type":"p","text":"He drew a diagram of Taku's shrimp pose. The drawing looked like a bent noodle with shoes."},{"type":"p","text":"Taku sighed. \"I admit that I forgot the pose.\""},{"type":"p","text":"The bracelet glowed a little."},{"type":"p","text":"\"Benefit detected,\" it said. \"Admitting a mistake gives a small hero benefit.\""},{"type":"p","text":"Mayor Homeru guided them to the Hero Pose Clinic. The clinic had mirrors, mats, and posters of famous mistakes."},{"type":"p","text":"One poster said:"},{"type":"p","text":"HEROES FAIL FROM TIME TO TIME. ADAPT TO CHANGES. TRY AGAIN."},{"type":"p","text":"There was also a wall about praise from different cultures. Ms. Hoshino read it carefully."},{"type":"p","text":"\"This exhibit explains ethnic traditions of greetings and praise,\" she said. \"We treat cultures with respect. Praise can sound different in different places.\""},{"type":"p","text":"A tiny robot guide rolled up. \"Besides the pose, the heart matters.\""},{"type":"p","text":"Taku practiced again. \"Praise Charge!\""},{"type":"p","text":"Kenta stood beside him and made a frog pose."},{"type":"p","text":"\"Do not confuse my hero pose!\" Taku cried."},{"type":"p","text":"Ms. Hoshino smiled. \"But, however, and yet all show contrast. You failed, but you can try again. However, Kenta should not become a frog assistant. Yet I fear he will try.\""},{"type":"p","text":"Kenta whispered, \"Frog assistant is available.\""},{"type":"p","text":"The bracelet beeped. \"Mission begins. Failure energy approaching.\""},{"type":"p","text":"A purple cloud appeared over the shopping street."},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Failure Beam"},{"type":"p","text":"From the purple cloud fell a monster in a patchy cape. His shoulders were covered with eraser crumbs. Broken pencils stuck out of his backpack. A banana peel hung from his belt like a strange medal."},{"type":"p","text":"He landed on a mailbox and shouted, \"I am Failure Monster Shippaider! I assign failure to everyone!\""},{"type":"p","text":"Taku raised his arm. \"Homehomeman will stop you!\""},{"type":"p","text":"Shippaider pointed both hands. \"Failure Beam!\""},{"type":"p","text":"Purple light shot across the street."},{"type":"p","text":"A baker dropped a tray of rolls."},{"type":"p","text":"\"Oh no!\" said the baker."},{"type":"p","text":"A flower seller ran over. \"Are you okay? I will help remove the rolls from the road.\""},{"type":"p","text":"A boy spilled a bucket of water."},{"type":"p","text":"Three people brought towels."},{"type":"p","text":"A sign painter wrote CLOSED on the OPEN sign."},{"type":"p","text":"Mayor Homeru said, \"Let us fix it together!\""},{"type":"p","text":"Kenta accidentally put his bug notebook upside down."},{"type":"p","text":"Riku began to take notes. \"Failure creates useful data.\""},{"type":"p","text":"Taku blinked. \"The beam is dangerous, but it also makes people kind.\""},{"type":"p","text":"Ms. Hoshino answered, \"Dangerous means unsafe. We still need to evaluate it carefully.\""},{"type":"p","text":"Mayor Homeru wanted a vote. He climbed on a box and shouted, \"Citizens, is this a dangerous beam or a kindness beam? Vote now!\""},{"type":"p","text":"A small girl raised her hand. \"I do not like loud beams.\""},{"type":"p","text":"A quiet bookshop owner said, \"I like kindness, but I do not like accidents.\""},{"type":"p","text":"Ms. Hoshino said, \"A vote is useful, but the minority opinion matters too. Small voices still count.\""},{"type":"p","text":"Riku held up a meter. \"Kindness increased. Nevertheless, accidents also increased. The beam is associated with helping, but it is also associated with mess.\""},{"type":"p","text":"On the corner stood Kindness College, a small school where people practiced polite words and voluntary action. Its sign said:"},{"type":"p","text":"VOLUNTARY KINDNESS IS BETTER THAN FORCED KINDNESS."},{"type":"p","text":"Ms. Hoshino read it aloud. \"Voluntary means people choose to do it. Kindness should not require a monster beam.\""},{"type":"p","text":"Shippaider crossed his arms. \"But everyone has failure in common! Everyone fails!\""},{"type":"p","text":"Taku nodded. \"That part is true. We all make mistakes from time to time.\""},{"type":"p","text":"A shopkeeper ran by carrying a mop. \"This is a lot of physical activity!\""},{"type":"p","text":"Ms. Hoshino laughed. \"Cleaning, carrying, and helping are physical activity. But we should reduce accidents, or cut down on accidents, not create more.\""},{"type":"p","text":"Shippaider lifted his chin. \"See? Failure makes everyone kind.\""},{"type":"p","text":"Then he stepped on his own banana peel."},{"type":"p","text":"Slip."},{"type":"p","text":"Flop."},{"type":"p","text":"He landed in a basket of soft bread."},{"type":"p","text":"\"That was on purpose,\" he said."},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"Shippaider sighed. \"No. It was not on purpose.\""},{"type":"p","text":"The bracelet on Taku's wrist glowed. \"Honest failure detected.\""},{"type":"p","text":"Taku helped Shippaider stand up."},{"type":"p","text":"Shippaider stared at him. \"Why are you helping me? I am the monster.\""},{"type":"p","text":"Taku said, \"Because you fell.\""},{"type":"p","text":"Kenta added, \"Also, the bread basket has frog nest shape.\""},{"type":"p","text":"Ms. Hoshino said, \"Please do not make bread into a habitat yet.\""},{"type":"p","text":"At that moment, a loud whistle blew."},{"type":"p","text":"A boy in a sparkling cleaning cape appeared at the end of the street."},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Clean Master Pika-Maru"},{"type":"p","text":"The boy had a towel headband, a broom cape, and shoes so shiny that Taku had to blink."},{"type":"p","text":"\"I am Clean Master Pika-Maru!\" he announced. \"A real hero cares about clean streets!\""},{"type":"p","text":"Taku straightened his cape. \"I care too!\""},{"type":"p","text":"Pika-Maru pointed at the street. \"Then form a clean-up team. The failure mess is everywhere.\""},{"type":"p","text":"He was right. Water ran down the sidewalk. Bread rolls sat under benches. Praise cards flew in the wind. A mountain of laundry leaned against the dry cleaner's shop."},{"type":"p","text":"Kenta gasped. \"A laundry volcano!\""},{"type":"p","text":"Ms. Hoshino said, \"It is not a volcano. It is a laundry problem. Still, do not stand under it.\""},{"type":"p","text":"Riku made a sign."},{"type":"p","text":"CLEAN STREET COUNCIL."},{"type":"p","text":"The council included Taku, Kenta, Riku, Ms. Hoshino, Pika-Maru, and, after some debate, Shippaider."},{"type":"p","text":"Pika-Maru frowned. \"Why is the monster in the council?\""},{"type":"p","text":"Taku answered, \"He can point out where failures happen. That is useful.\""},{"type":"p","text":"Shippaider whispered, \"At least I can do that.\""},{"type":"p","text":"The clean-up began. Pika-Maru swept quickly. Taku carried boxes. Riku shared gloves and made a route map. Kenta looked under a flower stand."},{"type":"p","text":"\"Stop,\" Kenta said. \"There is a tiny habitat here. Pill bugs live under the stone.\""},{"type":"p","text":"Ms. Hoshino smiled. \"Good observation. We should look after small living things too. Cleaning does not mean destroying a home.\""},{"type":"p","text":"Pika-Maru slowed down. \"Fair point. A fair hero cleans carefully.\""},{"type":"p","text":"Riku compared his map to a school project plan. \"This is similar to a project. We need roles, supplies, and progress checks.\""},{"type":"p","text":"\"Progress is important,\" said Pika-Maru. \"But speed is also important.\""},{"type":"p","text":"Ms. Hoshino said, \"Speed matters, but not more than safety.\""},{"type":"p","text":"They reached the huge laundry tower. Shirts, towels, socks, and one frog-patterned handkerchief hung in a giant pile."},{"type":"p","text":"Kenta pulled out the handkerchief. \"Froggy laundry survived!\""},{"type":"p","text":"Ms. Hoshino said, \"That is not the main deal. The main deal is sorting it safely.\""},{"type":"p","text":"Pika-Maru brought three baskets. \"Clean, dirty, and mystery.\""},{"type":"p","text":"Shippaider picked up a sock. \"This sock failed to smell normal.\""},{"type":"p","text":"Riku stepped back. \"That sock gives useful warning data.\""},{"type":"p","text":"Pika-Maru looked at Taku. \"Can a praise hero handle dirty work?\""},{"type":"p","text":"Taku nodded. \"A hero does not only pose. A hero helps.\""},{"type":"p","text":"The bracelet glowed. \"Action praise detected.\""},{"type":"p","text":"Above the street was a small building called the Cleaning Faculty. It was not a real university, but a funny training room where people learned how to sweep without hitting flowerpots."},{"type":"p","text":"The teacher there shouted, \"Excellent teamwork! Your progress is visible!\""},{"type":"p","text":"Pika-Maru crossed his arms, but he smiled a little."},{"type":"p","text":"Shippaider looked at the clean street. \"Maybe failure can show where help is needed.\""},{"type":"p","text":"Taku said, \"That sounds like a new role.\""},{"type":"p","text":"Shippaider looked confused. \"A role? For me?\""},{"type":"p","text":"Before anyone could answer, Taku's bracelet beeped again."},{"type":"p","text":"\"Praise Battery: three percent.\""},{"type":"p","text":"Taku froze. \"Oh no. I need praise.\""},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"The Praise Battery"},{"type":"p","text":"Everyone gathered in Dr. Hometta's Praise Lab. Dr. Hometta was a scientist with star-shaped glasses and a white coat covered with sticky notes."},{"type":"p","text":"\"We will conduct a praise experiment,\" said Dr. Hometta. \"Please speak kind words into the battery.\""},{"type":"p","text":"Pika-Maru went first. \"Your shoe is tied correctly.\""},{"type":"p","text":"The bracelet beeped. \"Weak praise detected.\""},{"type":"p","text":"Kenta tried next. \"Your hair resembles a brave frog.\""},{"type":"p","text":"The bracelet beeped louder. \"Confusing praise detected.\""},{"type":"p","text":"Ms. Hoshino folded her arms. \"Praise should be honest and helpful. It should notice effort, action, or care.\""},{"type":"p","text":"Riku adjusted the meter. \"The battery is independent, but it does not work independently of meaning.\""},{"type":"p","text":"Dr. Hometta nodded. \"Very good. Empty praise has low energy.\""},{"type":"p","text":"Mayor Homeru arrived with a basket of praise cards. \"Amazing! Wonderful! Super! Best! Heroic!\""},{"type":"p","text":"The bracelet did not glow."},{"type":"p","text":"Taku sighed. \"That did not help.\""},{"type":"p","text":"Ms. Hoshino said, \"Because the words were not connected to what you actually did.\""},{"type":"p","text":"Then Pika-Maru tried again."},{"type":"p","text":"\"You admitted your mistake,\" he said. \"You cleaned even when it was difficult.\""},{"type":"p","text":"The bracelet glowed."},{"type":"p","text":"Riku added, \"You trusted your team.\""},{"type":"p","text":"The light grew stronger."},{"type":"p","text":"Kenta took a deep breath. \"You helped people notice problems. Also, your cape is not a frog, but I accept it.\""},{"type":"p","text":"The bracelet shone bright gold."},{"type":"p","text":"\"Good praise detected,\" it said."},{"type":"p","text":"Shippaider stepped backward. \"I insist that I do not need praise. I am a monster.\""},{"type":"p","text":"Taku looked at him. \"I trust you to report failures honestly.\""},{"type":"p","text":"Shippaider's patchy cape began to give off a soft purple light."},{"type":"p","text":"Dr. Hometta gasped. \"The monster cape is reacting!\""},{"type":"p","text":"Riku scanned it. \"The failure beam was not on purpose. The old battery inside the cape is damaged.\""},{"type":"p","text":"Shippaider touched his cape. \"So I did not choose the beam?\""},{"type":"p","text":"\"Not fully,\" Riku said. \"It leaked when you felt useless.\""},{"type":"p","text":"Dr. Hometta opened a tiny box inside the cape. It was filled with shiny dots."},{"type":"p","text":"\"The battery is made of old praise grains,\" said the scientist. \"Each grain came from a real kind word in this street.\""},{"type":"p","text":"Kenta stared. \"A grain is like rice?\""},{"type":"p","text":"Ms. Hoshino explained, \"Grain can mean seeds like rice or wheat. In this story, praise grains are tiny pieces of kindness.\""},{"type":"p","text":"Mayor Homeru looked embarrassed. \"I tried to make praise into a product. People could buy praise cards like a consumer buys snacks.\""},{"type":"p","text":"Ms. Hoshino shook her head. \"Praise is not a product. It should not be empty.\""},{"type":"p","text":"Riku wrote a new plan on a board."},{"type":"p","text":"PROJECT PRAISE SHARE."},{"type":"p","text":"\"This project will not charge one hero only,\" he said. \"Praise should be shared. Honest praise charges everyone.\""},{"type":"p","text":"Shippaider looked down. \"I have a difficulty. I do not know how to receive praise.\""},{"type":"p","text":"Taku smiled. \"Start small.\""},{"type":"p","text":"Pika-Maru said, \"You found failure spots today. That helped us clean.\""},{"type":"p","text":"Shippaider's cape glowed again."},{"type":"p","text":"He whispered, \"Thank you. That felt strange.\""},{"type":"p","text":"The bracelet announced, \"Praise Battery: one hundred percent.\""},{"type":"p","text":"Taku raised his arm."},{"type":"p","text":"\"Praise Charge!\""},{"type":"p","text":"This time, he did the pose correctly."},{"type":"p","text":"Kenta clapped. \"Very little shrimp energy!\""},{"type":"p","text":"Ms. Hoshino said, \"Better. Still not ideal praise, but better.\""},{"type":"p","text":"Then a new alarm sounded in the street."},{"type":"p","text":"\"Town debate begins now! What should happen to the Failure Monster?\""},{"type":"p","text":"Shippaider swallowed. \"That sounds like a difficult meeting.\""},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"Failure Patrol"},{"type":"p","text":"The whole shopping street met in front of the hero clock."},{"type":"p","text":"Mayor Homeru held his golden megaphone. \"We must debate Shippaider's future. Should he leave? Should he fight Homehomeman? Or is there an alternative?\""},{"type":"p","text":"Pika-Maru crossed his arms. \"I am still disappointed. He caused many messes.\""},{"type":"p","text":"Shippaider looked at the ground. \"So far, I have not been a good monster.\""},{"type":"p","text":"Taku raised his hand. \"But his power can come from failure and become useful. He sees problems quickly.\""},{"type":"p","text":"Ms. Hoshino nodded. \"We need an alternative to fighting. What action helps the town?\""},{"type":"p","text":"Riku rolled out a small machine with wheels and a friendly red light."},{"type":"p","text":"\"This is my new invention,\" he said. \"Failure Patrol Invention, initial test. It finds small problems and asks for kind action in response to them.\""},{"type":"p","text":"The machine beeped."},{"type":"p","text":"\"Banana peel detected.\""},{"type":"p","text":"Pika-Maru swept it up."},{"type":"p","text":"\"Lost coin detected.\""},{"type":"p","text":"Taku took it to the shopkeeper."},{"type":"p","text":"\"Confused frog theory detected.\""},{"type":"p","text":"Kenta raised his hand. \"That is not a failure. That is my lifestyle.\""},{"type":"p","text":"Ms. Hoshino said, \"Sometimes it is still a problem.\""},{"type":"p","text":"Mayor Homeru read a certificate."},{"type":"p","text":"\"Shippaider, you will obtain a new position. This is your promotion: from Failure Monster to Failure Patrol Partner.\""},{"type":"p","text":"The crowd clapped."},{"type":"p","text":"Shippaider's cape fluttered. \"I obtained a certificate. My monster heart is noisy.\""},{"type":"p","text":"Taku said, \"That means you are happy.\""},{"type":"p","text":"\"Do not publish that,\" Shippaider said quickly."},{"type":"p","text":"Mayor Homeru smiled. \"We will publish the new rule instead. Failure is not an enemy. In response to failure, we help, learn, and try again.\""},{"type":"p","text":"Ms. Hoshino added, \"That is better than making fun of people.\""},{"type":"p","text":"The street also created a new holiday."},{"type":"p","text":"NON-PERFECT HERO DAY. Nobody is perfect. Everyone can improve."},{"type":"p","text":"Ms. Hoshino pointed to the sign. \"Non- means not, as in non-perfect. It reminds us that a hero does not have to be perfect.\""},{"type":"p","text":"Mayor Homeru said, \"Our real wealth is not money. It is kindness, effort, and the courage to try again.\""},{"type":"p","text":"Pika-Maru gave Shippaider a small broom. \"Do not be passive. If you see a problem, report it and help.\""},{"type":"p","text":"Shippaider held the broom like a sword. \"Small failure detected. Patrol begins.\""},{"type":"p","text":"Taku, Pika-Maru, and Shippaider walked down the street together."},{"type":"p","text":"Kenta followed with a notebook. \"Evidence one: the monster is walking. Evidence two: he is helping. Evidence three: he may be frog-related after all.\""},{"type":"p","text":"Ms. Hoshino sighed. \"Please keep the third point out of the official report.\""},{"type":"p","text":"A little boy dropped a bag of marbles. They rolled everywhere."},{"type":"p","text":"Shippaider pointed. \"Failure!\""},{"type":"p","text":"Taku said, \"Kind action!\""},{"type":"p","text":"Pika-Maru said, \"Clean path!\""},{"type":"p","text":"Riku said, \"Data collection!\""},{"type":"p","text":"Kenta said, \"Round objects. Possible frog eggs.\""},{"type":"p","text":"Ms. Hoshino said, \"Marbles. They are marbles.\""},{"type":"p","text":"Together they picked them up."},{"type":"p","text":"The boy smiled. \"Thank you.\""},{"type":"p","text":"Taku's bracelet glowed one last time."},{"type":"p","text":"\"Praise charge complete,\" it said."},{"type":"p","text":"Shippaider tripped over a tiny pebble. He almost cried, but then he stood up."},{"type":"p","text":"\"Small failure detected,\" he said. \"I am okay. Patrol continues.\""},{"type":"p","text":"Taku smiled. \"Nice recovery.\""},{"type":"p","text":"Above the street, the hero clock chimed."},{"type":"p","text":"Homehomeman had not become a perfect hero."},{"type":"p","text":"Pika-Maru had not become a perfect rival."},{"type":"p","text":"Shippaider had not become a perfect monster."},{"type":"p","text":"But the street was cleaner, kinder, and braver than before."},{"type":"p","text":"Ms. Hoshino opened her notebook for the school report."},{"type":"p","text":"She wrote, \"Today, the students learned that failure can become progress.\""},{"type":"p","text":"Then she paused."},{"type":"p","text":"Kenta whispered, \"Please add: frog possibility remains.\""},{"type":"p","text":"Ms. Hoshino closed the notebook."},{"type":"p","text":"\"Report complete.\""}]},{"themeNo":20,"id":"20","title":"Alien Transfer Student Monday","blocks":[{"type":"subtitle","text":"The Day the Desks Floated and Milk Became Science"},{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"Picol and the Floating Introduction"},{"type":"p","text":"On Monday morning, Ms. Hoshino stood in front of the class with a serious smile."},{"type":"p","text":"“Today,” she said, “we have a new transfer student.”"},{"type":"p","text":"The classroom became quiet."},{"type":"p","text":"Then the door opened."},{"type":"p","text":"A small boy walked in. He had a silver school bag, three tiny antennas, and a star-shaped name tag. His shoes made a soft sound."},{"type":"p","text":"Piko. Piko. Piko."},{"type":"p","text":"“My name is Picol,” he said briefly. “I come from Piko-Piko Planet. I hope to get along with Earth classmates.”"},{"type":"p","text":"Taku’s eyes became as round as planets."},{"type":"p","text":"“This is probably a mission,” he whispered."},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"“Evidence one: he has shiny eyes. Evidence two: frogs also have interesting eyes. Evidence three: maybe space frog.”"},{"type":"p","text":"Ms. Hoshino answered at once."},{"type":"p","text":"“He is a classmate, not a frog.”"},{"type":"p","text":"Picol smiled nervously."},{"type":"p","text":"“I am capable of friendship,” he said. “However, I am not always capable of Earth classroom control.”"},{"type":"p","text":"“What does that mean?” asked Riku."},{"type":"p","text":"Picol tried to distinguish the teacher’s desk from the students’ desks. He pointed to Ms. Hoshino’s desk."},{"type":"p","text":"“Large command spacecraft?” he asked."},{"type":"p","text":"“It is a desk,” said Ms. Hoshino."},{"type":"p","text":"Picol pointed to Taku’s desk."},{"type":"p","text":"“Small lunch spacecraft?”"},{"type":"p","text":"“Also a desk,” said Ms. Hoshino."},{"type":"p","text":"Picol nodded, but he looked nervous. The blue belt around his waist began to blink."},{"type":"p","text":"Beep. Beep. Beep."},{"type":"p","text":"Riku opened his notebook."},{"type":"p","text":"“My hypothesis is that Picol’s gravity belt reacts to nervous feelings.”"},{"type":"p","text":"“A hypothesis is an idea we can test,” said Ms. Hoshino. “But first, safety.”"},{"type":"p","text":"Picol tried to introduce himself."},{"type":"p","text":"“My hobbies are observing Earth culture, for example milk, sports, and friendship. For instance, I would like to learn why humans put pencils behind ears.”"},{"type":"p","text":"At that moment, Taku’s desk floated."},{"type":"p","text":"Then Riku’s pencil case floated."},{"type":"p","text":"Then Kenta’s frog eraser floated and slowly turned in the air like a proud green moon."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Froggy has achieved space flight!”"},{"type":"p","text":"“Froggy has achieved nothing,” said Ms. Hoshino. “It is floating.”"},{"type":"p","text":"The class laughed. Picol turned purple with embarrassment."},{"type":"p","text":"“I am sorry. I did not intend to float the furniture.”"},{"type":"p","text":"Taku held up both hands."},{"type":"p","text":"“It is okay. We need to address a problem, not panic.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“We can make separate rules. Normal class mode and space science mode.”"},{"type":"p","text":"At that moment, the classroom speaker made a tiny space noise."},{"type":"p","text":"“Message from Governor Pipipon of Piko-Piko Planet.”"},{"type":"p","text":"A round face appeared on the screen."},{"type":"p","text":"“Dear Earth class,” said the governor. “Picol is capable of friendship, but he may float furniture. Please adopt the Earth School Welcome Plan.”"},{"type":"p","text":"Ms. Hoshino read the plan."},{"type":"p","text":"“Rule one: speak kindly. Rule two: do not touch the gravity belt. Rule three: if a desk floats, move slowly.”"},{"type":"p","text":"Then the office printer printed a bill."},{"type":"p","text":"“Bill for anti-floating desk tape: 500 yen.”"},{"type":"p","text":"Taku stared at it."},{"type":"p","text":"“Do we need to purchase anti-floating desk tape?”"},{"type":"p","text":"“Maybe later,” said Ms. Hoshino. “First, we solve the problem with calm rules.”"},{"type":"p","text":"Class monitor Aya raised her hand."},{"type":"p","text":"“I object to floating desks during handwriting practice.”"},{"type":"p","text":"“That is a fair objection,” said Ms. Hoshino. “Picol, when you feel nervous, please tell us.”"},{"type":"p","text":"“I will try,” said Picol."},{"type":"p","text":"Taku coughed because of a little dust on his floating desk."},{"type":"p","text":"Picol jumped."},{"type":"p","text":"“Emergency sound detected! Earth student is exploding!”"},{"type":"p","text":"“It was a cough,” said Ms. Hoshino. “A cough can happen. We use tissues, clean hands, and ask if someone feels sick.”"},{"type":"p","text":"Picol took notes quickly."},{"type":"p","text":"“Cough equals not explosion.”"},{"type":"p","text":"“Good note,” said Riku."},{"type":"p","text":"The desks slowly came down."},{"type":"p","text":"Taku smiled at Picol."},{"type":"p","text":"“Welcome to our class. Your Monday is strange, but our Mondays are usually strange.”"},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"“Picol is not a frog. Probably.”"},{"type":"p","text":"Picol smiled."},{"type":"p","text":"“Thank you. That is the warmest almost-not-frog welcome I have ever received.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Milk Research and the Almost Milk War"},{"type":"p","text":"At lunch time, Picol looked at his milk carton as if it were a moon rock."},{"type":"p","text":"“What is this white Earth liquid?” he asked."},{"type":"p","text":"“It is milk,” said Kenta. “It is not frog juice.”"},{"type":"p","text":"“Thank you for clarifying something nobody needed,” said Ms. Hoshino."},{"type":"p","text":"Picol raised his hand."},{"type":"p","text":"“May I examine it before drinking?”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Yes, but lunch is for eating safely. Research must not take over lunch time.”"},{"type":"p","text":"Riku was already building a tiny Milk Research Station from two rulers, a spoon, and a block tower."},{"type":"p","text":"“Initial test,” he said."},{"type":"p","text":"“Initial hygiene check first,” said Ms. Hoshino."},{"type":"p","text":"Picol examined the milk. He observed the color, smell, temperature, and the small square carton."},{"type":"p","text":"“Milk may be compared to moon fuel,” he said, “but only emotionally.”"},{"type":"p","text":"“Milk can be compared to moon fuel in a poem,” said Ms. Hoshino, “but it is not actual fuel.”"},{"type":"p","text":"Picol pulled a silver tube from his school bag."},{"type":"p","text":"“I will replace the straw with a space drinking tube.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “Do not replace school lunch equipment without permission.”"},{"type":"p","text":"Riku helped him write a safe research card."},{"type":"p","text":"“I will assist Picol, but I will not let the lab take over lunch.”"},{"type":"p","text":"Picol wrote at the top of the card:"},{"type":"p","text":"Motivation: To understand why Earth children drink milk together."},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That is a good motivation. Lunch is also part of our class community.”"},{"type":"p","text":"Then the milk refrigerator beeped."},{"type":"p","text":"Riku checked it."},{"type":"p","text":"“The battery is dead.”"},{"type":"p","text":"Kenta stared at his carton."},{"type":"p","text":"“Dead milk?”"},{"type":"p","text":"“No,” said Ms. Hoshino. “Dead can mean not working. The battery is dead. The milk is not dead.”"},{"type":"p","text":"But rumors were already moving around the classroom."},{"type":"p","text":"“Milk is rocket fuel!” shouted one student."},{"type":"p","text":"“Milk makes desks float!” said another."},{"type":"p","text":"“Milk war!” said a third."},{"type":"p","text":"Ms. Hoshino clapped once."},{"type":"p","text":"“Stop. War is a serious word. This is not a war. This is a milk misunderstanding.”"},{"type":"p","text":"The milk rumor became widespread in one minute."},{"type":"p","text":"Taku heard “milk cannon,” “milk shield,” and “cow UFO.”"},{"type":"p","text":"Picol looked worried."},{"type":"p","text":"“Am I in danger if I drink too much milk?”"},{"type":"p","text":"“That is why preventive care is important,” said Ms. Hoshino. “We check ingredients, allergies, and how your body feels before you try a new food. Otherwise, a small problem can become bigger.”"},{"type":"p","text":"Picol nodded carefully."},{"type":"p","text":"“Otherwise, I may drink too much Earth milk and become Milk Picol.”"},{"type":"p","text":"“That is not the medical term,” said Ms. Hoshino."},{"type":"p","text":"Riku fixed the refrigerator battery with the lunch staff. The milk stayed safe."},{"type":"p","text":"Picol took one small sip."},{"type":"p","text":"A white milk mustache appeared under his nose."},{"type":"p","text":"The class became quiet."},{"type":"p","text":"Picol looked around."},{"type":"p","text":"“Did I do Earth culture correctly?”"},{"type":"p","text":"Taku gave him a thumbs-up."},{"type":"p","text":"“Yes. Protect, or preserve, the milk mustache for three seconds. Then wipe it.”"},{"type":"p","text":"Picol wiped it with a napkin."},{"type":"p","text":"Kenta whispered, “Space milk mustache. Very rare.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Research is good. Safe lunch is better. Today we did both.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Zero-Gravity P.E. and the Lost Shoe"},{"type":"p","text":"In the afternoon, the class went to the gym."},{"type":"p","text":"Picol looked at the wide floor, the basketball hoops, and the white lines."},{"type":"p","text":"“Is this the Earth gravity training laboratory?”"},{"type":"p","text":"“It is a gym,” said Ms. Hoshino."},{"type":"p","text":"“Kind of a gravity training laboratory,” said Taku."},{"type":"p","text":"“Do not encourage the label,” said Ms. Hoshino."},{"type":"p","text":"Today’s activity was ball-carrying relay. Before they began, Riku said,"},{"type":"p","text":"“We should carry out a gravity safety check.”"},{"type":"p","text":"Picol touched his belt."},{"type":"p","text":"“On my planet, children founded the Floating Exercise Club. During sports, gravity can shift a little.”"},{"type":"p","text":"“On Earth,” said Ms. Hoshino, “gravity pulls us toward the ground. Astronauts in orbit feel weightless because they are falling around Earth, not because gravity disappears completely.”"},{"type":"p","text":"Taku looked up."},{"type":"p","text":"“So this gym is not a space station?”"},{"type":"p","text":"“Correct.”"},{"type":"p","text":"Picol jumped once."},{"type":"p","text":"He did not come down."},{"type":"p","text":"He floated upward, slowly spinning."},{"type":"p","text":"Taku grabbed his sleeve and floated too."},{"type":"p","text":"Kenta’s left shoe lifted off his foot."},{"type":"p","text":"Riku’s red P.E. cap began to orbit his head."},{"type":"p","text":"Kenta shouted, “My shoe is at risk of becoming a ceiling animal!”"},{"type":"p","text":"“Your shoe is at risk of being lost,” said Ms. Hoshino."},{"type":"p","text":"Riku took out his tablet."},{"type":"p","text":"“Gravity Safety Project begins. Current location of Kenta’s shoe: near the ceiling beam.”"},{"type":"p","text":"“We must look for the safe gravity switch,” said Taku."},{"type":"p","text":"Picol was upside down now."},{"type":"p","text":"“I am embarrassed. I forgot Earth P.E. mode.”"},{"type":"p","text":"“P.E. grade is not only about perfect performance,” said Ms. Hoshino. “Safety, effort, and teamwork matter.”"},{"type":"p","text":"On the wall, there was a school garden poster. It showed a crop growing from soil."},{"type":"p","text":"Picol pointed at it."},{"type":"p","text":"“Earth crops grow in two directions?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “Roots grow down. Stems grow up. Gravity helps plants know direction.”"},{"type":"p","text":"Picol looked impressed."},{"type":"p","text":"“Plants are quiet gravity experts.”"},{"type":"p","text":"“That is a lovely sentence,” said Ms. Hoshino."},{"type":"p","text":"The floating students bumped into a line of gym clutter. A paper cup, a jump rope, and a dust ball floated by."},{"type":"p","text":"Riku said, “This looks like an air landfill.”"},{"type":"p","text":"“A landfill is a place for waste,” said Ms. Hoshino. “This is floating gym clutter. But we will clean it.”"},{"type":"p","text":"Picol showed them his gravity belt."},{"type":"p","text":"“It has several degrees: weak, normal, strong, moon-like, and frog jump.”"},{"type":"p","text":"Kenta’s eyes shone."},{"type":"p","text":"“Frog jump degree is suitable for me.”"},{"type":"p","text":"“No,” said Ms. Hoshino and Taku at the same time."},{"type":"p","text":"Riku pressed the safe button."},{"type":"p","text":"The students floated down softly."},{"type":"p","text":"Kenta’s shoe did not."},{"type":"p","text":"It stayed on the ceiling."},{"type":"p","text":"Kenta looked proud."},{"type":"p","text":"“My shoe wants to stay in space.”"},{"type":"p","text":"“Your shoe wants tape removal,” said Ms. Hoshino."},{"type":"p","text":"Picol set his belt to Slow Earth Mode."},{"type":"p","text":"“This mode may be suitable for Earth P.E.”"},{"type":"p","text":"“I am becoming more familiar with Earth sports,” Picol said."},{"type":"p","text":"Taku patted his shoulder."},{"type":"p","text":"“Good. Next time, you can float the ball, not the class.”"},{"type":"p","text":"Ms. Hoshino raised one eyebrow."},{"type":"p","text":"“Or nobody floats anything without permission.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"UFO Parent Observation Day"},{"type":"p","text":"The next day was parent observation day."},{"type":"p","text":"Picol looked nervous again."},{"type":"p","text":"“My family will visit Earth school.”"},{"type":"p","text":"Taku whispered, “Alien parents’ day!”"},{"type":"p","text":"“Parent observation day,” said Ms. Hoshino. “Please say it politely.”"},{"type":"p","text":"A round shadow moved across the schoolyard."},{"type":"p","text":"Everyone looked up."},{"type":"p","text":"A small silver UFO floated above the soccer goal."},{"type":"p","text":"Riku opened his tablet."},{"type":"p","text":"“We must confirm the landing location.”"},{"type":"p","text":"“And we need security,” said Ms. Hoshino."},{"type":"p","text":"The school staff quickly installed a safe visitor line on the ground. It was not a dangerous landing. It was a tiny family learning UFO, and it came down as gently as a soap bubble."},{"type":"p","text":"Out came Picol’s family."},{"type":"p","text":"His mother wore a star coat and carried a notebook."},{"type":"p","text":"“I am Dr. Pika Picol,” she said. “I am a biologist. I study living things.”"},{"type":"p","text":"Kenta rushed forward, then stopped at the safety line."},{"type":"p","text":"“Are you a frog expert?”"},{"type":"p","text":"“I study many living things,” she said kindly."},{"type":"p","text":"“Good answer,” said Ms. Hoshino."},{"type":"p","text":"Picol’s father was a star-bus driver. His little sister floated three pencils by accident. His grandmother spoke in a space dialect that the translator turned into old soup recipes. Their pet, a soft Star Jelly, drifted through the air and landed on the principal’s head."},{"type":"p","text":"The principal stood very still."},{"type":"p","text":"“Welcome,” he said."},{"type":"p","text":"The Star Jelly blinked politely."},{"type":"p","text":"Ms. Hoshino read the school contract with the UFO family."},{"type":"p","text":"“Rule one: no classroom takeover. Rule two: no desk floating during math. Rule three: no unknown space cookies without an ingredient check.”"},{"type":"p","text":"Picol’s mother nodded."},{"type":"p","text":"“Each individual in our family is different. Our gravity levels vary.”"},{"type":"p","text":"Ms. Hoshino repeated for the class."},{"type":"p","text":"“Individual means each person. Vary means differ or change.”"},{"type":"p","text":"Picol looked down."},{"type":"p","text":"“I am proud of my family. On the other hand, I am embarrassed because Grandma’s translator just called the chalkboard ‘flat soup.’”"},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“That is very Earth. Families are wonderful and embarrassing.”"},{"type":"p","text":"Picol’s father said, “After the class visit, we will go on a trip to see Earth clouds and oceans.”"},{"type":"p","text":"The UFO made a happy beep."},{"type":"p","text":"Then it made a worried beep."},{"type":"p","text":"Riku checked the screen."},{"type":"p","text":"“Gravity disaster risk.”"},{"type":"p","text":"“Disaster is a serious word,” said Ms. Hoshino. “This is a school UFO problem. Still, we handle it carefully.”"},{"type":"p","text":"Picol’s mother explained."},{"type":"p","text":"“This UFO has a special property. It floats higher when the family becomes excited.”"},{"type":"p","text":"“Property can mean a thing someone owns,” said Ms. Hoshino. “It can also mean a quality or feature. Here, it means a feature of the UFO.”"},{"type":"p","text":"Taku led the class in a calm breathing exercise."},{"type":"p","text":"The UFO came down."},{"type":"p","text":"The Star Jelly slid off the principal’s head and landed in a visitor bowl."},{"type":"p","text":"The principal said, “Thank you for not owning the sky.”"},{"type":"p","text":"Picol’s grandmother’s translator beeped."},{"type":"p","text":"“Flat soup agrees.”"},{"type":"p","text":"Nobody knew what that meant, but everyone clapped politely."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Friend Certification Stamp"},{"type":"p","text":"By Friday, Picol had learned many things."},{"type":"p","text":"He learned that a cough was not an explosion."},{"type":"p","text":"He learned that milk was not moon fuel."},{"type":"p","text":"He learned that P.E. was not a gravity contest."},{"type":"p","text":"He learned that Earth school contracts used many careful rules."},{"type":"p","text":"But he still looked worried."},{"type":"p","text":"“Too many strange events occurred,” he said. “Did I cause trouble?”"},{"type":"p","text":"Riku showed a chart."},{"type":"p","text":"“Floating desk accidents decreased from seven to one. Milk research amount increased too much, but we controlled it. UFO safety checks are complete. Friendship amount is increasing.”"},{"type":"p","text":"“Can friendship be measured?” asked Picol."},{"type":"p","text":"“Not fully,” said Ms. Hoshino."},{"type":"p","text":"“Can friendship be a purchase?”"},{"type":"p","text":"“No,” said Ms. Hoshino. “A purchase is something you buy. Friendship cannot be purchased.”"},{"type":"p","text":"Taku stood up."},{"type":"p","text":"“We need to come up with something that shows friendship, but does not buy it.”"},{"type":"p","text":"Riku’s eyes lit up."},{"type":"p","text":"“A Friend Certification Stamp.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Can it be frog-shaped?”"},{"type":"p","text":"“It may have one small frog corner,” said Ms. Hoshino. “Only one.”"},{"type":"p","text":"They went to the science laboratory. Riku set a star-shaped stamp on the table. It had tiny marks around it: a rocket, a spoon, a dinosaur footprint, a detective zipper, a cloud, a train, a pillow map, a toy hammer, and many more."},{"type":"p","text":"Picol looked at it."},{"type":"p","text":"“Do I need to become ordinary to receive this?”"},{"type":"p","text":"“No,” said Taku. “Personal differences are not problems.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“We are not stamping you because you are the same as everyone. We are stamping you because you belong here as yourself.”"},{"type":"p","text":"Picol’s antennas trembled."},{"type":"p","text":"“I came to Earth in search of friends.”"},{"type":"p","text":"“And you found strange ones,” said Kenta."},{"type":"p","text":"“Very strange ones,” said Riku."},{"type":"p","text":"“Kind ones,” said Taku."},{"type":"p","text":"Picol smiled."},{"type":"p","text":"“Am I able to be your friend, even if I float desks?”"},{"type":"p","text":"“Yes,” said Taku, “so that we can learn together.”"},{"type":"p","text":"Kenta added, “And so that I can continue my space frog research.”"},{"type":"p","text":"“The first reason is better,” said Ms. Hoshino."},{"type":"p","text":"Then the lights in the laboratory dimmed. The ceiling began to shine. Twenty small lights appeared like stars."},{"type":"p","text":"One light looked like a fart rocket. One looked like a curry spoon. One looked like Norton the dinosaur. One looked like Sir Zipperton’s detective zipper. One looked like Dr. Poop’s Earth mark. One looked like a ninja star. One looked like the invisible principal’s tie. One looked like Ponkotsumaru’s digital tear. One looked like Beetle Kingdom. One looked like a gentle ghost handkerchief. One looked like a giant gacha capsule. One looked like the sneezing train ticket. One looked like a pajama pirate pillow map. One looked like a silly zoo medal. One looked like the toy court hammer. One looked like a sunny weather medal. One looked like a time-slip bath bucket. One looked like an upside-down traffic light. One looked like Praise Hero’s battery."},{"type":"p","text":"And the last light looked like Picol’s friend stamp."},{"type":"p","text":"Taku whispered, “They are separate adventures, but together they make one constellation.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Beautiful. And surprisingly calm.”"},{"type":"p","text":"Riku pressed the stamp."},{"type":"p","text":"STAMP."},{"type":"p","text":"The paper glowed."},{"type":"p","text":"Friend Certified. Different, strange, capable, and welcome."},{"type":"p","text":"Picol’s face shone silver."},{"type":"p","text":"“Over-thankful mode activated,” said his belt."},{"type":"p","text":"The desks rose one centimeter."},{"type":"p","text":"Riku checked the meter."},{"type":"p","text":"“Over-floating has occurred.”"},{"type":"p","text":"Ms. Hoshino said, “Then we decrease the gravity level calmly.”"},{"type":"p","text":"Picol breathed out. The desks settled."},{"type":"p","text":"Taku held out his hand."},{"type":"p","text":"“Final mission: keep learning together.”"},{"type":"p","text":"Picol shook it."},{"type":"p","text":"On the blackboard, Picol wrote:"},{"type":"p","text":"The end of the first adventure."},{"type":"p","text":"Taku blinked."},{"type":"p","text":"“First?”"},{"type":"p","text":"Picol smiled."},{"type":"p","text":"“On my planet, friendship starts after the certification stamp.”"},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"“So next Monday—”"},{"type":"p","text":"Ms. Hoshino raised one finger."},{"type":"p","text":"“No explosions next Monday.”"},{"type":"p","text":"Just then, Kenta’s frog eraser floated to the corner of the blackboard and stamped a tiny green mark."},{"type":"p","text":"Ribbit Certified."},{"type":"p","text":"Ms. Hoshino took a long, final breath."},{"type":"p","text":"“I will not ask who installed that feature.”"},{"type":"p","text":"And on that Monday, the class learned one final thing: a friend from far away does not have to become ordinary. He only has to become understood."}]}];

e":"“I will analyze the sound data,” he said."},"#0028":{"definition":"To announce means to tell people news clearly.","example":"“I announce that my translation system is complex, unstable, and slightly sleepy.”"},"#0029":{"definition":"To appeal means to ask strongly for something or to be interesting and attractive.","example":"This test does not appeal to violence."},"#0030":{"definition":"To appear means to come into sight or seem to be a certain way.","example":"“You appear like a person whose face got lost on the way,” said Riku."},"#0031":{"definition":"To apply means to ask officially or use something in a situation.","example":"Clean-up rules apply to everyone."},"#0032":{"definition":"To appreciate means to be thankful for something or understand its value.","example":"According to rail law, all trains must appreciate tracks before entering the Maze Rail Zone.\""},"#0033":{"definition":"To approach means to come near or start dealing with something.","example":"Captain Munyahige said, “To approach Pillow Island, we need the Sleepy Cannon.”"},"#0034":{"definition":"To approve means to say yes to something officially or think it is good.","example":"“I do not approve the giraffe neck slide.”"},"#0035":{"definition":"To argue means to give reasons for an idea or to disagree strongly.","example":"Bruno said, “I argue that we did not block the road on purpose.”"},"#0036":{"definition":"To arise means to happen or begin.","example":"\"When a problem arises, we respond calmly."},"#0037":{"definition":"To arrange means to plan something or put things in order.","example":"\"I will arrange the consultation."},"#0038":{"definition":"To assess means to judge or decide the value or quality of something.","example":"\"I will assess the shoes and estimate the safe walking time.\""},"#0039":{"definition":"To assign means to give someone a job or task.","example":"I assign failure to everyone!\""},"#0040":{"definition":"To assist means to help.","example":"“I will assist Picol, but I will not let the lab take over lunch.”"},"#0041":{"definition":"To associate means to connect one thing with another or spend time with someone.","example":"“Why do people associate the Moon with rabbits?”"},"#0042":{"definition":"To assume means to think something is true before you know for sure.","example":"Captain Carroton shouted, \"We assume the Leftover Dragon caused this!\""},"#0043":{"definition":"To assure means to tell someone something is true so they do not worry.","example":"\"I assure you, Mount Eraser is safe.\""},"#0044":{"definition":"To attach means to join one thing to another.","example":"“So my pencil is like a tiny space tool that failed to attach to the space station?”"},"#0045":{"definition":"To attempt means to try to do something.","example":"We must attempt to stop the cloud, but we must understand it first.”"},"#0046":{"definition":"To attract means to make someone or something come closer or feel interested.","example":"There were trays, soup, milk, bread, rice balls, and a warm smell that could attract every hungry ninja in the school."},"#0047":{"definition":"To authorize means to officially allow someone to do something.","example":"“I authorize this test only in a restricted area,” she said."},"#0048":{"definition":"To avoid means to stay away from something.","example":"According to Base Manual 08, visitors must explore the base politely and avoid dangerous buttons."},"#0049":{"definition":"To ban means to say that something is not allowed.","example":"We ban crumb dropping, wing pulling, and screaming into tunnels.”"},"#0050":{"definition":"To base something on something means to use it as a starting point.","example":"“I base attendance on plates."},"#0051":{"definition":"A benefit is something helpful; to benefit means to help or be helped.","example":"\"Benefit means help or be useful,\" said Ms."},"#0052":{"definition":"To blame means to say someone caused a problem.","example":"Article 4: Figure out the cause before you blame the wheels."},"#0053":{"definition":"To boost means to raise, improve, or help something.","example":"“The moon current will boost us!” shouted Taku."},"#0054":{"definition":"To borrow means to use something and give it back later.","example":"“You may borrow my old gavel, but do not borrow my fish lunch.”"},"#0055":{"definition":"To bother means to annoy, worry, or take the trouble to do something.","example":"“As for the blocks,” he said, “they bother cars, feature dangerous corners, and seek to control the floor!”"},"#0056":{"definition":"To calculate means to find an answer with numbers.","example":"\"I will calculate the safest angle."},"#0057":{"definition":"To cancel means to stop a plan or event from happening.","example":"Step three: cancel tail-splashing."},"#0058":{"definition":"To capture means to catch or take hold of something.","example":"I capture rules and force them into songs.\""},"#0059":{"definition":"To care means to feel concern or look after someone.","example":"It should notice effort, action, or care.\""},"#0060":{"definition":"To carry out a plan means to do it.","example":"“We should carry out a gravity safety check.”"},"#0061":{"definition":"To cause means to make something happen.","example":"It causes trouble."},"#0062":{"definition":"To challenge means to question something or try to beat someone.","example":"\"I challenge you,\" said Nokoshin."},"#0063":{"definition":"To charge means to ask for money, accuse someone, or put power into a battery.","example":"A charger can charge a pencil battery, if pencils had batteries."},"#0064":{"definition":"To claim means to say something is true or ask for something as yours.","example":"“I claim that Taku’s memory is under-organized!” he shouted."},"#0065":{"definition":"To clarify means to make something clear or easier to understand.","example":"“I have arrived to clarify the source.”"},"#0066":{"definition":"To classify means to put things into groups.","example":"“To earn the qualification for the final exam, classify the clues, explain your reason, and choose the safe route.”"},"#0067":{"definition":"To collect means to bring things together.","example":"“We will collect clues in order to help you.”"},"#0068":{"definition":"To combine means to put things together.","example":"“Then I will combine the safe battery, the hand crank, and the solar panel.”"},"#0069":{"definition":"To comfort means to help someone feel better.","example":"The golden beetle needed comfort."},"#0070":{"definition":"To command means to give an order or control something.","example":"“I command all ghosts to scare properly!” he shouted."},"#0071":{"definition":"To communicate means to share information or feelings.","example":"\"To communicate with a house,\" he said, \"listen to its creaks.\""},"#0072":{"definition":"To compare means to look at two things and see how they are alike or different.","example":"We should compare the old station filter with the current filter.\""},"#0073":{"definition":"To compete means to try to win against others.","example":"TO OPEN THE TREASURE, COMPETE IN THE BEDTIME CHALLENGE."},"#0074":{"definition":"To complain means to say that something is wrong or unfair.","example":"“Complain means say you are not happy about something,” said Ms."},"#0075":{"definition":"To complete means to finish something.","example":"“We cannot complete this case with loud voices alone,” he said."},"#0076":{"definition":"To concentrate means to give all your attention to something.","example":"\"I will concentrate on whether it is a frog egg.\""},"#0077":{"definition":"To concern means to be about something or make someone worried.","example":"This concerns hygiene, comfort, speed, and towel organization.\""},"#0078":{"definition":"To conclude means to finish or decide after thinking.","example":"\"But I concluded that reversing every rule would make everything fair."},"#0079":{"definition":"To conduct means to lead, guide, or carry out an activity.","example":"\"We will conduct a praise experiment,\" said Dr."},"#0080":{"definition":"To confirm means to check or show that something is true.","example":"“We must confirm the landing location.”"},"#0081":{"definition":"To confuse means to make someone unsure or mixed up.","example":"“This will confuse navigation.”"},"#0082":{"definition":"To connect means to join things or show that they are related.","example":"Connect your lunch with the Sun, the soil, the water, and many people."},"#0083":{"definition":"To consider means to think carefully about something.","example":"Consider means to think carefully.\""},"#0084":{"definition":"To consist of means to be made of parts.","example":"This case consists of shoes, dust, lies, drama, and poor labeling.”"},"#0085":{"definition":"To construct means to build something or put parts together.","example":"“I will construct a sorting gate.”"},"#0086":{"definition":"To consult means to ask someone for advice or look at something for information.","example":"“We consult the map first.”"},"#0087":{"definition":"To consume means to use, eat, or drink something.","example":"“It says the cover can consume transparent ramune as fuel.”"},"#0088":{"definition":"To contain means to have something inside.","example":"“I contain too many errors,” he said."},"#0089":{"definition":"To contribute means to give help, money, or ideas.","example":"“You contributed to Beetle Kingdom."},"#0090":{"definition":"To control means to guide or manage something.","example":"“I can control the curtains with my Sunrise Curtain Control System.”"},"#0091":{"definition":"To convince means to make someone believe or agree.","example":"\"Before we spin, we must convince the house."},"#0092":{"definition":"To cooperate means to work together.","example":"We should figure it out and cooperate.\""},"#0093":{"definition":"To cope means to deal with a difficult situation.","example":"“How do we cope with a map that will not wake up?”"},"#0094":{"definition":"To create means to make something new.","example":"“At first, I wanted to create a space zoo."},"#0095":{"definition":"To criticize means to say what is wrong with something.","example":"Judge Piko-Hammer said, “The court will not criticize the frog eraser, because the frog eraser has said nothing.”"},"#0096":{"definition":"To cure means to make a sick person or problem better.","example":"\"My Sunny Medal can cure cloudy sadness!\""},"#0097":{"definition":"To damage means to hurt or break something.","example":"\"You caused a little time damage."},"#0098":{"definition":"To deal with something means to handle it.","example":"\"The reverser deals with rules in relation to laughter."},"#0099":{"definition":"To debate means to discuss different ideas in a serious way.","example":"Ms. Hoshino, Pika-Maru, and, after some debate, Shippaider."},"#0100":{"definition":"To decrease means to become smaller or make something smaller.","example":"Ms. Hoshino said, “Then we decrease the gravity level calmly.”"},"#0101":{"definition":"To define means to say clearly what a word or idea means.","example":"The backpack said, “Please define space trip.”"},"#0102":{"definition":"A delay is a time when something happens later than planned.","example":"Every minute of delay makes our curry colder."},"#0103":{"definition":"To deliver means to take something to a place or give a speech.","example":"I deliver lost answers to my stomach library."},"#0104":{"definition":"To demand means to ask strongly.","example":"“Before I return to the shelf, I demand my final detective fee.”"},"#0105":{"definition":"To demonstrate means to show clearly how something works or that something is true.","example":"I will demonstrate the Pusu-Pusu Power Machine."},"#0106":{"definition":"To deny means to say that something is not true.","example":"“I deny that this was a bad throw,” said Taku."},"#0107":{"definition":"To depend means to need someone or something, or be decided by something.","example":"I depend on your help.”"},"#0108":{"definition":"To describe means to say what something is like.","example":"“Please describe your problem,” said the robot."},"#0109":{"definition":"To design means to plan how something will look or work.","example":"“I can design a Min-Min Volume Support System,” he said."},"#0110":{"definition":"To destroy means to damage something so badly that it cannot be used.","example":"“And I do not have to destroy anyone’s peace with a loud Boo?”"},"#0111":{"definition":"To determine means to decide something or find out the facts.","example":"\"We need to determine the cause."},"#0112":{"definition":"To develop means to grow, improve, or make something new.","example":"It may have developed an unusual level of sensitivity.\""},"#0113":{"definition":"To differ means to be different.","example":"EACH GENERATION OF PAJAMA PIRATES DIFFERS FROM THE LAST."},"#0114":{"definition":"To disappear means to go away or become impossible to see.","example":"Taku whispered, “He did not disappear."},"#0115":{"definition":"To disappoint means to fail to meet the expectation or hope of.","example":"It disappointed me.”"},"#0116":{"definition":"To discover means to find something for the first time.","example":"Under the basket, he discovered an old weather note."},"#0117":{"definition":"To discuss means to talk about something with other people.","example":"Discuss before pressing buttons."},"#0118":{"definition":"To display means to show something so people can see it.","example":"Kenta looked behind the clock tower and came across a small science display."},"#0119":{"definition":"To dispose of something means to throw it away or deal with it.","example":"\"Do not dispose of a mistake before learning from it."},"#0120":{"definition":"To distinguish means to see or show the difference between things.","example":"Picol tried to distinguish the teacher’s desk from the students’ desks."},"#0121":{"definition":"To distribute means to give things out to many people or ous buttons."},"#0149":{"definition":"To expose means to show something or leave it open to danger, light, or air.","example":"“Do not expose this area to bright light,” Anton warned."},"#0150":{"definition":"To express means to show or say a thought or feeling.","example":"“You express your worry by counting plates.”"},"#0151":{"definition":"To extend means to grow long.","example":"The army began to extend into the hallway, under the table, over the cushion, and toward the stairs."},"#0152":{"definition":"To face means to deal with something difficult or look toward something.","example":"Taku pressed his face close to the window, but not too close."},"#0153":{"definition":"To fail means to not succeed.","example":"You failed to satisfy the pillow fare system.”"},"#0154":{"definition":"To favor means to like, support, or choose something more than another.","example":"“The chair favors that statement,” said Penbert."},"#0155":{"definition":"To feature means to include something as an important part.","example":"“As for the blocks,” he said, “they bother cars, feature dangerous corners, and seek to control the floor!”"},"#0156":{"definition":"To figure out means to understand something or find the answer.","example":"\"We need to figure out the rhythm."},"#0157":{"definition":"To focus means to give attention to one thing.","example":"Step one: focus on safety."},"#0158":{"definition":"To force means to make someone do something, or to push strongly.","example":"I capture rules and force them into songs.\""},"#0159":{"definition":"To form means to the shape and structure of something as distinguished from its material.","example":"\"Then form a clean-up team."},"#0160":{"definition":"To found means to start or set up a group, school, or company.","example":"“And you found strange ones,” said Kenta."},"#0161":{"definition":"To frighten means to make afraid.","example":"I do not intend to frighten anyone.”"},"#0162":{"definition":"To gain means to get more of something.","example":"But every time food is wasted, I gain more sadness."},"#0163":{"definition":"To generate means to make or produce something.","example":"\"I can generate a fake page."},"#0164":{"definition":"To graduate means to finish school or a course.","example":"“And can Taku graduate from Forgetfulness Academy?”"},"#0165":{"definition":"To guarantee means to promise that something is true or will happen.","example":"“I cannot guarantee a clean town unless people sort things correctly.”"},"#0166":{"definition":"To handle means to deal with or to treat.","example":"HOW SHOULD NINJAS HANDLE LIVING THINGS IN THE SCHOOL GARDEN?"},"#0167":{"definition":"To hesitate means to stop for a moment before doing something because you are unsure.","example":"The principal hesitated."},"#0168":{"definition":"To identify means to know or say who or what something is.","example":"“We need to identify the power source.”"},"#0169":{"definition":"To ignore means to refuse to take notice of.","example":"“I did not mean to ignore the residents,” he said."},"#0170":{"definition":"To illustrate means to explain with pictures or examples.","example":"“I will illustrate a proper scary ghost.”"},"#0171":{"definition":"To imagine means to make a picture or idea in your mind.","example":"\"I can imagine it,\" he said."},"#0172":{"definition":"To imply means to suggest something without saying it directly.","example":"A sneeze from Achoo Express may imply that the filter is blocked."},"#0173":{"definition":"To improve means to make or become better.","example":"“We need to tackle the message and improve it.”"},"#0174":{"definition":"To include means to have something as part of a group.","example":"“Our department can include math, English, and banana science."},"#0175":{"definition":"To increase means to become larger or make something larger.","example":"Ms. Hoshino said, “Increase means grow or become more."},"#0176":{"definition":"To indicate means to show or point to something.","examp w, the major issue is power.”"},"#0189":{"definition":"To judge means to decide what you think about someone or something.","example":"I can judge whether visitors may receive Return-to-Size Nectar.”"},"#0190":{"definition":"A lack is not having enough of something.","example":"“Maybe the mansion does not lack scariness."},"#0191":{"definition":"To launch means to start something or send something into the air or space.","example":"TO LAUNCH HOME RESTORE ACTION, TURN THE LEVER."},"#0192":{"definition":"To lead means to guide someone or be first.","example":"\"This clean filter can lead us back to the safe route,\" said Riku."},"#0193":{"definition":"To maintain means to keep something in good condition or keep it going.","example":"Maintain means keep."},"#0194":{"definition":"To manage means to control, lead, or succeed in doing something.","example":"Then I found out a zoo boss must manage safety, listen calmly, and care for animals.”"},"#0195":{"definition":"To manufacture means to make many products, usually in a factory.","example":"Mofuda said, “Toys are manufactured to be used, but not to be stepped on forever.”"},"#0196":{"definition":"To measure means to find the size, amount, or distance of something.","example":"\"Thunder Volume Measure, initial test.\""},"#0197":{"definition":"To mention means to say something briefly.","example":"Now you must mention what happened and repair it.\""},"#0198":{"definition":"To observe means to watch carefully or follow a rule.","example":"Observe can mean watch carefully, and it can also mean follow a rule.\""},"#0199":{"definition":"To obtain means to get or to earn.","example":"\"Shippaider, you will obtain a new position."},"#0200":{"definition":"To occur means to happen.","example":"I can occur it in a clear way."},"#0201":{"definition":"To offer means to give, suggest, or ask if someone wants something.","example":"I offer a better school trip."},"#0202":{"definition":"To operate means to use a machine, run a busines ion":"To reflect means to show an image, show an idea, or think carefully.","example":"“The shape of the ring may reflect beetle culture."},"#0230":{"definition":"To refuse means to say no.","example":"“But our Ghost Civil Rights Board says every ghost has the right to refuse scary work.”"},"#0231":{"definition":"To regard something as something means to think of it that way.","example":"We do not regard family members as items.\""},"#0232":{"definition":"To register means to put your name or information on an official list.","example":"\"I will register the route in my Rail Maze Map."},"#0233":{"definition":"To regulate means to control something with rules.","example":"“I can regulate the yawn level.”"},"#0234":{"definition":"To reject means to say no to something or not accept it.","example":"I reject the neck slide plan."},"#0235":{"definition":"To relate means to connect one thing with another.","example":"But we relate to Riku’s space base project.”"},"#0236":{"definition":"To release means to let something go or make it available.","example":"I release thunder power!\""},"#0237":{"definition":"To rely on someone or something means to trust or need them.","example":"\"Can I rely on your advice?"},"#0238":{"definition":"To remain means to stay the same or stay in a place.","example":"But traffic rules, checkups, and school safety rules will remain normal.\""},"#0239":{"definition":"To remove means to take something away.","example":"I will help remove the rolls from the road.\""},"#0240":{"definition":"To replace means to put something new in the place of something old.","example":"“Do not replace school lunch equipment without permission.”"},"#0241":{"definition":"To require means to need something or say that it must be done.","example":"“That explanation may require a meeting.”"},"#0242":{"definition":"Research means careful study to find facts, or to study something carefully.","example":"\"We are trying to research the mystery,\" said Taku."},"#0243":{"def ether.”"},"#0285":{"definition":"Ability is the skill or power to do something.","example":"Ms. Hoshino added, “Your ability to clean is useful, but your ability to follow a simple system is even more useful.”"},"#0286":{"definition":"Absence means not being in a place where you are expected to be.","example":"“The principal’s absence is strange.”"},"#0287":{"definition":"Access means the chance or right to enter, use, or get something.","example":"“I need access to the database,” he said."},"#0288":{"definition":"An accident is something bad or unexpected that happens by chance.","example":"“A noisy, banana-shaped accident, but an accident.”"},"#0289":{"definition":"An account is a report, an explanation, or a place where money is kept.","example":"“It can also mean a bank account, but I do not accept acorn money from children.”"},"#0290":{"definition":"An achievement is something good you finish after effort.","example":"“I thought our achievement had to be scaring people.”"},"#0291":{"definition":"An action is something that someone does.","example":"Spin tokens required: sincere apology, thank-you action, or clean-up effort."},"#0292":{"definition":"An activity is something people do.","example":"\"The suffix -ity can make a noun, such as safety, activity, and sensitivity.\""},"#0293":{"definition":"An advantage is something that helps you do better.","example":"The advantage of a bedtime routine is that your body and brain know what comes next.”"},"#0294":{"definition":"Advice is an idea about what someone should do.","example":"Director Yamashita asked, “What advice would you give to the next one-day zoo boss?”"},"#0295":{"definition":"An affair is an event, situation, or matter people deal with.","example":"In honor of the Great Mini Car Affair, this toy box will celebrate Toy Peace Day."},"#0296":{"definition":"Agriculture is the work of growing crops and raising animals for food.","example":"\"And agriculture,\" said Ms."},"#0297":{"definition":"An aid is h usion,\" said Kenta, \"I still want a frog station.\""},"#1193":{"definition":"In connection with means related to something.","example":"IN CONNECTION WITH TONIGHT’S LESSON, COMPLETE THE BEDTIME ROUTINE."},"#1194":{"definition":"In exchange for means giving one thing and getting another.","example":"“In exchange for your calm leadership and respectful care, the animals want to give you this.”"},"#1195":{"definition":"In honor of means to show respect for someone or something.","example":"In honor of the Great Mini Car Affair, this toy box will celebrate Toy Peace Day."},"#1196":{"definition":"In no time means very soon.","example":"In no time, the medals were ready."},"#1197":{"definition":"In your opinion means what you think.","example":"\"In my opinion, Edo frogs were not the main issue."},"#1198":{"definition":"In relation to means about or connected with.","example":"\"The reverser deals with rules in relation to laughter."},"#1199":{"definition":"In response to means as an answer to something.","example":"It finds small problems and asks for kind action in response to them.\""},"#1200":{"definition":"In search of means looking for.","example":"“I came to Earth in search of friends.”"},"#1201":{"definition":"In the distance means far away, but still possible to see or hear.","example":"And somewhere in the distance, on the Moon, Gomigon laughed so loudly that three clean underpants floated like flags."},"#1202":{"definition":"In the future means later, not now.","example":"Future Goal: In the future, every child will choose a good lunch amount and waste less food."},"#1203":{"definition":"In the long run means after a long time.","example":"Hiding a problem does not help in the long run."},"#1204":{"definition":"In the middle of means at the center or during something.","example":"Just then, in the middle of the classroom, a short pencil rolled across the floor by itself."},"#1205":{"definition":"In the past means before now.","example":"“In the past, people o
