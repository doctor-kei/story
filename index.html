re than trying to keep everything in your head.”"},{"type":"p","text":"Taku looked relieved."},{"type":"p","text":"“So I do not have to be a memory robot?”"},{"type":"p","text":"Ms. Hoshino added, “The phrase be afraid of means to fear something. It is okay to be afraid of being scolded, but it is better to tell the truth.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “You can build up a firm habit little by little.”"},{"type":"p","text":"“Firm means strong,” said Taku. “Like a firm bridge?”"},{"type":"p","text":"“Yes. Firm can also mean a company, but here it means strong and steady.”"},{"type":"p","text":"Riku whispered, “Firm Firm: a company that sells strong habits.”"},{"type":"p","text":"Ms. Hoshino whispered back, “Please do not invent a company during court.”"},{"type":"p","text":"Sir Zipperton lifted another card."},{"type":"p","text":"“The quality of a system matters. A poor system says, ‘Remember everything or panic.’ A better system says, ‘Check three places.’”"},{"type":"p","text":"“That was actually helpful,” said Ms. Hoshino."},{"type":"p","text":"Sir Zipperton puffed up."},{"type":"p","text":"“My wisdom has a strong appearance.”"},{"type":"p","text":"Judge Sockmoto nodded."},{"type":"p","text":"“The court asks the students to make a decision.”"},{"type":"p","text":"Taku stood up."},{"type":"p","text":"“I make a decision. I will not hide lost things. I will check my desk, my locker, and my contact notebook before I go home and when I arrive in the morning.”"},{"type":"p","text":"Riku took out blocks, tape, and three cards."},{"type":"p","text":"“Remember Rocket Checklist,” he said."},{"type":"p","text":"He placed the cards on the desk."},{"type":"p","text":"Number one: Desk Planet."},{"type":"p","text":"Number two: Locker Moon."},{"type":"p","text":"Number three: Contact Notebook Command Center."},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“Now that I can understand. Lost items need a safe orbit.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Good. But remember, school items do not really orbit the Sun. Planets orbit the Sun because of gravity. Your pencils return because of routines, labels, and attention.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Social gravity.”"},{"type":"p","text":"“Not actual physics,” said Ms. Hoshino. “But useful.”"},{"type":"p","text":"Kenta raised the lonely sock."},{"type":"p","text":"“Can the sock graduate from loneliness?”"},{"type":"p","text":"Judge Sockmoto hit the tissue box."},{"type":"p","text":"“Pon. The sock may graduate when its partner is found.”"},{"type":"p","text":"Sir Zipperton turned to Taku."},{"type":"p","text":"“And can Taku graduate from Forgetfulness Academy?”"},{"type":"p","text":"Ms. Hoshino said, “Not in one day. But he can practice.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“I was afraid of the problem. But I can make a system.”"},{"type":"p","text":"Sir Zipperton opened his zipper wide."},{"type":"p","text":"“Then the court gives a wet spaghetti decision.”"},{"type":"p","text":"“Please call it a checklist decision,” said Ms. Hoshino."},{"type":"p","text":"“Fine,” said Sir Zipperton. “The Checklist Decision.”"},{"type":"p","text":"Judge Sockmoto raised the tiny hammer."},{"type":"p","text":"Pon."},{"type":"p","text":"And at that exact moment, the lost items began to move."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Lost-Item Parade and the Orbit System"},{"type":"p","text":"First came the pencil."},{"type":"p","text":"Then came the eraser."},{"type":"p","text":"Then the ruler."},{"type":"p","text":"Then Taku’s missing shoe."},{"type":"p","text":"Then Kenta’s missing shoe."},{"type":"p","text":"Then the lunch cloth."},{"type":"p","text":"Then the contact notebook."},{"type":"p","text":"Then a handkerchief."},{"type":"p","text":"Then three pencil caps."},{"type":"p","text":"Then a name tag."},{"type":"p","text":"Then the lonely sock’s partner, riding on a water bottle lid like a tiny boat."},{"type":"p","text":"The classroom door opened by itself."},{"type":"p","text":"A parade of lost items marched into the hall."},{"type":"p","text":"Sir Zipperton leaped onto Taku’s desk."},{"type":"p","text":"“ZIP-BLAAARP! The Lost-Item Parade has begun!”"},{"type":"p","text":"Taku watched the line of things."},{"type":"p","text":"“I wonder why they are all moving together.”"},{"type":"p","text":"The contact notebook spoke."},{"type":"p","text":"“We are tired of being lost.”"},{"type":"p","text":"The pencil added, “Also, the dust bunnies were singing.”"},{"type":"p","text":"The dust bunnies began a soft chant."},{"type":"p","text":"“Return. Return. Clean the locker. Return.”"},{"type":"p","text":"Kenta wiped his eyes."},{"type":"p","text":"“That is beautiful. And possibly frog music.”"},{"type":"p","text":"Ms. Hoshino said, “It is dust music.”"},{"type":"p","text":"The parade moved down the hall."},{"type":"p","text":"It consisted of pencils, shoes, socks, notebooks, rulers, lunch cloths, eraser crumbs, and one mysterious international sticker that said HELLO in five languages."},{"type":"p","text":"Sir Zipperton shouted, “Look at this diversity! So many shapes, sizes, smells, and labels!”"},{"type":"p","text":"Riku held up a clipboard."},{"type":"p","text":"“We need staff for the Lost-and-Found Department.”"},{"type":"p","text":"“Department!” shouted Sir Zipperton. “At last, someone respects my title.”"},{"type":"p","text":"Ms. Hoshino said, “A department is a part of an organization. In school, we can have a lost-and-found area, but we will keep it simple.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“I will invent the Lost-Item Orbit System.”"},{"type":"p","text":"Taku raised his hand."},{"type":"p","text":"“Can I help name the planets?”"},{"type":"p","text":"“Yes,” said Riku. “But no pencil gets its own moon.”"},{"type":"p","text":"The system had five steps."},{"type":"p","text":"Step one: Write a name clearly."},{"type":"p","text":"Step two: Use a picture label when needed."},{"type":"p","text":"Step three: Check the desk, locker, and contact notebook."},{"type":"p","text":"Step four: If you find something, hand over the lost item to the classroom lost-and-found box."},{"type":"p","text":"Step five: A teacher or helper will record it."},{"type":"p","text":"Sir Zipperton pulled out a tiny microphone."},{"type":"p","text":"“Record my voice as official department music.”"},{"type":"p","text":"Ms. Hoshino covered the microphone."},{"type":"p","text":"“No.”"},{"type":"p","text":"Riku attached a label to the lost-and-found box."},{"type":"p","text":"LOST-AND-FOUND DEPARTMENT"},{"type":"p","text":"Then he attached a smaller label."},{"type":"p","text":"PLEASE PAY ATTENTION TO NAMES."},{"type":"p","text":"Then he attached an even smaller label."},{"type":"p","text":"DO NOT LABEL THE TEACHER."},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"“Thank you for the last one.”"},{"type":"p","text":"The contact notebook jumped onto the desk."},{"type":"p","text":"“I am supposed to be checked every day,” it said."},{"type":"p","text":"Ms. Hoshino said, “The phrase be supposed to means that something is expected or planned.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“You are supposed to be checked. I am supposed to check you.”"},{"type":"p","text":"The notebook seemed pleased."},{"type":"p","text":"The parade stopped at the lost-and-found box."},{"type":"p","text":"Ms. Hoshino placed the organic produce note on the board."},{"type":"p","text":"“Tomorrow, the school garden produce will be shown at lunch. Produce means fruits and vegetables grown on farms or in gardens.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Do carrots have a staff meeting?”"},{"type":"p","text":"“Not that I know of.”"},{"type":"p","text":"Riku picked up a sticky name label."},{"type":"p","text":"“The chemistry of sticky labels is useful,” he said. “The glue helps them stay on.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Chemistry is the science of substances and how they change or work together. The glue on a label is simple, but helpful.”"},{"type":"p","text":"Kenta held up his frog eraser."},{"type":"p","text":"“Can I put a sticky label on Froggy?”"},{"type":"p","text":"“Only if Froggy agrees,” said Ms. Hoshino."},{"type":"p","text":"Kenta listened to the eraser."},{"type":"p","text":"“He agrees silently.”"},{"type":"p","text":"“That is not strong evidence,” said Ms. Hoshino."},{"type":"p","text":"Meanwhile, the lonely sock found its partner."},{"type":"p","text":"The two socks hugged."},{"type":"p","text":"They rolled in a circle."},{"type":"p","text":"Judge Sockmoto tapped his tiny hammer."},{"type":"p","text":"“Pon. Sock therapy complete.”"},{"type":"p","text":"Sir Zipperton clapped his zipper."},{"type":"p","text":"“This parade will make history! It will make a record!”"},{"type":"p","text":"Riku said, “We should record where the items are found, not just make noise.”"},{"type":"p","text":"Sir Zipperton looked offended."},{"type":"p","text":"“My noise is data.”"},{"type":"p","text":"“Your noise is loud,” said Ms. Hoshino."},{"type":"p","text":"Taku picked up his pencil."},{"type":"p","text":"He picked up his eraser."},{"type":"p","text":"He picked up his ruler."},{"type":"p","text":"He picked up his contact notebook."},{"type":"p","text":"Then he found his missing shoe and put it with the other shoe."},{"type":"p","text":"“My shoes are back in orbit,” he said."},{"type":"p","text":"“Your shoes are in the shoe box,” said Ms. Hoshino."},{"type":"p","text":"“Safe orbit,” whispered Taku."},{"type":"p","text":"The lost items cheered."},{"type":"p","text":"The pencil wrote one last message on a small paper."},{"type":"p","text":"CHECK BEFORE BLASTOFF."},{"type":"p","text":"Taku read it aloud."},{"type":"p","text":"“Check before blastoff. I like it.”"},{"type":"p","text":"Sir Zipperton stood tall."},{"type":"p","text":"“The case shall now end, finish, and come to an end.”"},{"type":"p","text":"Ms. Hoshino said, “Good. One clear ending is enough.”"},{"type":"p","text":"Sir Zipperton bowed."},{"type":"p","text":"“Before I return to the shelf, I demand my final detective fee.”"},{"type":"p","text":"Taku gave him one eraser crumb."},{"type":"p","text":"Sir Zipperton inspected it."},{"type":"p","text":"“This crumb is under-sized.”"},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"“The case has come to an end.”"},{"type":"p","text":"Sir Zipperton sighed through his zipper."},{"type":"p","text":"“Fine. I reserve the right to complain next time.”"},{"type":"p","text":"The old backpack hopped back into the lost-and-found shelf."},{"type":"p","text":"The shelf became quiet."},{"type":"p","text":"Then a tiny voice came from inside."},{"type":"p","text":"“Remember my rule. I wake when seven or more lost items appear.”"},{"type":"p","text":"Taku looked at his desk."},{"type":"p","text":"He counted his pencil, eraser, ruler, contact notebook, lunch cloth, handkerchief, and shoes."},{"type":"p","text":"Everything was there."},{"type":"p","text":"He smiled."},{"type":"p","text":"“Six lost items would be bad,” he said. “Seven would be a backpack emergency.”"},{"type":"p","text":"Kenta looked under his desk."},{"type":"p","text":"“I found one dust bunny.”"},{"type":"p","text":"Ms. Hoshino said, “That is not a lost item.”"},{"type":"p","text":"Kenta held it gently."},{"type":"p","text":"“It looks lonely.”"},{"type":"p","text":"Riku took out a tiny label."},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"Riku put the label away."},{"type":"p","text":"Taku opened his contact notebook and checked the page."},{"type":"p","text":"Desk."},{"type":"p","text":"Locker."},{"type":"p","text":"Contact notebook."},{"type":"p","text":"Then he whispered, “Mission complete.”"},{"type":"p","text":"From the shelf, Sir Zipperton mumbled in his sleep."},{"type":"p","text":"“ZIP... blaa... do not abuse the badge...”"},{"type":"p","text":"The pencil rolled safely into the pencil case."},{"type":"p","text":"The shoes rested as a pair."},{"type":"p","text":"The contact notebook stayed open."},{"type":"p","text":"And the dust bunnies behind the locker began their quiet song again."},{"type":"p","text":"“Return. Return. Check before blastoff. Return.”"},{"type":"p","text":"Ms. Hoshino took a deep breath."},{"type":"p","text":"Then she wrote on the board:"},{"type":"p","text":"Forgetting happens. Hiding makes it harder. A system can help."},{"type":"p","text":"Taku read it."},{"type":"p","text":"Kenta read it."},{"type":"p","text":"Riku read it."},{"type":"p","text":"Sir Zipperton snored it."},{"type":"p","text":"“ZIP-BLAAARP.”"},{"type":"p","text":"And for the rest of the day, not one pencil escaped orbit."},{"type":"p","text":"The End"}]},{"themeNo":5,"id":"05","title":"Dr. Poop and the Flushy Earth Rescue Lab","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Toilet Sent an SOS"},{"type":"p","text":"On Tuesday morning, Taku was walking past the school bathroom with his backpack on one shoulder."},{"type":"p","text":"He was thinking about Jupiter, Lego rockets, and whether a frog could wear a space helmet."},{"type":"p","text":"Then he heard a voice."},{"type":"p","text":"“SOS! SOS! Earth Rescue Lab needs help!”"},{"type":"p","text":"Taku stopped in the middle of the hallway."},{"type":"p","text":"He looked left."},{"type":"p","text":"He looked right."},{"type":"p","text":"Then he looked at the toilet door."},{"type":"p","text":"The voice came again."},{"type":"p","text":"“SOS! Flush for science!”"},{"type":"p","text":"Taku’s eyes became as bright as a rocket engine."},{"type":"p","text":"“This is probably a mission,” he said."},{"type":"p","text":"Kenta came running with his frog eraser in his hand."},{"type":"p","text":"“Maybe this is a frog problem,” Kenta said. “Maybe a frog is trapped in the toilet and sending a direct message.”"},{"type":"p","text":"Ms. Hoshino appeared behind them."},{"type":"p","text":"“First, safety,” she said. “Second, hygiene. Third, it is probably not a frog.”"},{"type":"p","text":"Riku arrived with a small block machine in his pocket."},{"type":"p","text":"“If a toilet is sending an SOS,” he said, “we need data.”"},{"type":"p","text":"The bathroom door opened by itself."},{"type":"p","text":"Inside, the toilet water was spinning slowly."},{"type":"p","text":"Then it started to spin faster."},{"type":"p","text":"Then faster."},{"type":"p","text":"Then too fast."},{"type":"p","text":"“Warning!” said a tiny voice from the wall. “Do not accelerate the flush tunnel without adult supervision.”"},{"type":"p","text":"Ms. Hoshino raised one hand."},{"type":"p","text":"“We are not entering any tunnel until we know it is safe.”"},{"type":"p","text":"The toilet lid popped open."},{"type":"p","text":"A tiny elevator rose from the bowl."},{"type":"p","text":"On top of the elevator stood a strange man in a white coat made of toilet paper. He wore goggles shaped like a toilet seat. His boots were yellow. His microphone looked like a plunger."},{"type":"p","text":"He spread his arms."},{"type":"p","text":"“I am Dr. Poop Pooptaro, professor of Practical Poop Science!”"},{"type":"p","text":"Taku whispered, “That is the most powerful name I have ever heard.”"},{"type":"p","text":"Kenta nodded. “In my opinion, he has frog energy.”"},{"type":"p","text":"“I heard that,” said Dr. Poop. “And I respect frogs. But today is not about frogs. Today is about waste, science, and a town that may soon smell like a giant gym sock.”"},{"type":"p","text":"Ms. Hoshino took a careful step forward."},{"type":"p","text":"“Before anything else,” she said, “please explain the safety rules.”"},{"type":"p","text":"Dr. Poop put one hand on his heart."},{"type":"p","text":"“Excellent. Rule one: do not touch real waste. Rule two: scientists use safe tools, sealed samples, and clean hands. Rule three: if a button says Emergency Stink, do not press it with your face.”"},{"type":"p","text":"Taku slowly moved his finger away from a button that said Emergency Stink."},{"type":"p","text":"“I was only reading it with my finger,” he said."},{"type":"p","text":"“Read with your eyes,” said Ms. Hoshino."},{"type":"p","text":"Dr. Poop pressed a clean blue button. The bathroom wall opened, and behind it was a shining underground lab."},{"type":"p","text":"There were pipes, tanks, filters, lights, and a sign that said:"},{"type":"p","text":"EARTH RESCUE LAB FIELD: PRACTICAL WASTE SCIENCE SMELL IS DATA"},{"type":"p","text":"Riku read the sign."},{"type":"p","text":"“Field can mean an area of study,” he said. “It can also mean a place outside, like a soccer field.”"},{"type":"p","text":"“Correct!” cried Dr. Poop. “You are hired as Assistant Engineer Number One.”"},{"type":"p","text":"“I did not apply,” Riku said."},{"type":"p","text":"“Then you are hired in spirit.”"},{"type":"p","text":"Inside the lab, a small robot toilet was trying to walk by itself. It had tiny wheels and a proud face."},{"type":"p","text":"“I am Independent Toilet Robot Number Seven,” said the robot. “I do not need help. I am completely independent.”"},{"type":"p","text":"Then it rolled into a wall."},{"type":"p","text":"BONK."},{"type":"p","text":"“I require additional help,” the robot said."},{"type":"p","text":"Ms. Hoshino sighed. “That is a more precise statement.”"},{"type":"p","text":"A red alarm flashed."},{"type":"p","text":"“UN-CLEAN! UN-CLEAN! UN-CLEAN!”"},{"type":"p","text":"Dr. Poop pointed to the alarm."},{"type":"p","text":"“The prefix un- often means not. Clean becomes unclean. Helpful becomes unhelpful. Smelly becomes—well, unsmelly would be wonderful, but that button is broken.”"},{"type":"p","text":"Another sign blinked."},{"type":"p","text":"ADDITIONAL STINK POSSIBLE."},{"type":"p","text":"Taku looked at the tanks."},{"type":"p","text":"“What is in the stock room?” he asked."},{"type":"p","text":"“Safe sealed samples,” said Dr. Poop. “Our stock is too full. If we cannot process it, a stink cloud will escape. And today, the Clean Town Contest will take place in the park.”"},{"type":"p","text":"“The contest is today?” asked Ms. Hoshino."},{"type":"p","text":"“Yes,” said Dr. Poop. “In the past, people only said, ‘Yuck!’ and ran away from waste. But now we need a practical approach. Waste can be information. Waste can become energy. Waste can even help plants, if we use the right system.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Can it help frogs?”"},{"type":"p","text":"“Clean ponds help frogs,” said Ms. Hoshino. “So, indirectly, yes.”"},{"type":"p","text":"Kenta smiled at his frog eraser. “You hear that, Froggy? Earth Rescue is frog-related.”"},{"type":"p","text":"Dr. Poop clapped once."},{"type":"p","text":"“I need brave students to participate in the Earth Rescue Mission. I will demonstrate the Pusu-Pusu Power Machine. It can help us deal with the stock and prevent the stink cloud from attacking the town.”"},{"type":"p","text":"Taku stood up straight."},{"type":"p","text":"“We will do our best.”"},{"type":"p","text":"Riku looked around the lab."},{"type":"p","text":"“I can build something. Maybe.”"},{"type":"p","text":"Kenta held up his frog eraser."},{"type":"p","text":"“Froggy will observe.”"},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"“And I will make sure no one touches real waste, presses strange buttons, or calls a toilet a launch pad.”"},{"type":"p","text":"Dr. Poop smiled."},{"type":"p","text":"“Wonderful. Then follow me.”"},{"type":"p","text":"He pulled a handle shaped like a silver plunger."},{"type":"p","text":"The floor went down."},{"type":"p","text":"The lights flashed."},{"type":"p","text":"The pipes sang, “Plip, plop, plip, plop.”"},{"type":"p","text":"And somewhere deep in the lab, something went:"},{"type":"p","text":"Poooooooot."},{"type":"p","text":"Taku whispered, “Was that the machine?”"},{"type":"p","text":"Dr. Poop whispered back, “I hope so.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Pusu-Pusu Power Machine"},{"type":"p","text":"The elevator stopped in a round room."},{"type":"p","text":"In the center stood the Pusu-Pusu Power Machine 3000."},{"type":"p","text":"It looked like a toilet, a windmill, a Lego tower, and a giant bicycle light had all crashed into each other and become best friends."},{"type":"p","text":"A clean glass tank was connected to pipes. A sign on the tank said:"},{"type":"p","text":"SAFE MODEL ONLY NO REAL WASTE TOUCHING HAND WASHING REQUIRED"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“That sign is clear and important.”"},{"type":"p","text":"Dr. Poop nodded harder."},{"type":"p","text":"“Especially important! Safety is the golden toilet seat of science.”"},{"type":"p","text":"“That is not an expression,” said Ms. Hoshino."},{"type":"p","text":"“It is now,” said Dr. Poop."},{"type":"p","text":"He pointed to small brown pellets sealed inside a clear container."},{"type":"p","text":"“These are safe science models. They allow us to study how waste can be changed into useful gas. In the real world, tiny living things can break down some waste and make gas. If people handle it safely, that gas can be used as energy.”"},{"type":"p","text":"Kenta bounced on his toes."},{"type":"p","text":"“Tiny living things? Microorganisms? Is this biology?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “And no, you may not put your face near the tank.”"},{"type":"p","text":"Kenta slowly moved his face back."},{"type":"p","text":"“I was only listening with my nose.”"},{"type":"p","text":"“Listen with your ears.”"},{"type":"p","text":"Dr. Poop opened a folder."},{"type":"p","text":"“My campaign is called Don’t Waste Waste. The goal is to educate people. We need information as well as action.”"},{"type":"p","text":"Riku read the folder."},{"type":"p","text":"“It says, ‘Do not buy or purchase fake banana smell spray.’ Why both buy and purchase?”"},{"type":"p","text":"“Because buy means purchase,” said Dr. Poop. “Some companies sell sprays that hide the smell but do not solve the problem. We need to find the source instead of just covering it.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“So the smell is like a clue.”"},{"type":"p","text":"Dr. Poop pointed at him. “Exactly! Smell is data!”"},{"type":"p","text":"“Strong data,” said Riku."},{"type":"p","text":"“Very strong data,” said Kenta, pinching his nose."},{"type":"p","text":"A roll of toilet paper walked into the room. It wore glasses and a tiny necktie."},{"type":"p","text":"“Good morning,” it said. “I am Mr. Rollison, the lab lawyer.”"},{"type":"p","text":"Taku stared."},{"type":"p","text":"“You are a lawyer made of toilet paper.”"},{"type":"p","text":"“Yes,” said Mr. Rollison. “Please do not use me as regular toilet paper. I recommend safety rules, especially around the machine.”"},{"type":"p","text":"As he walked, one square of paper rolled off his body."},{"type":"p","text":"Mr. Rollison looked down. “I also recommend walking slowly.”"},{"type":"p","text":"Dr. Poop turned to the machine."},{"type":"p","text":"“Now, we put our idea into practice.”"},{"type":"p","text":"Riku pulled out a small block meter."},{"type":"p","text":"“I made a precise Pusu-Pusu Power Meter,” he said. “Initial test.”"},{"type":"p","text":"Ms. Hoshino said, “Initial safety check first.”"},{"type":"p","text":"Riku looked at the sign, checked the distance, and gave a thumbs-up."},{"type":"p","text":"“Safe test.”"},{"type":"p","text":"Dr. Poop pressed a green button."},{"type":"p","text":"The machine hummed."},{"type":"p","text":"The pipes shook."},{"type":"p","text":"The sealed tank bubbled."},{"type":"p","text":"A light bulb flickered."},{"type":"p","text":"Then it glowed."},{"type":"p","text":"“We have power!” cried Dr. Poop."},{"type":"p","text":"“Do not give up on good stink!” he shouted."},{"type":"p","text":"Ms. Hoshino coughed. “Maybe say, ‘Do not give up on safe research.’”"},{"type":"p","text":"Dr. Poop saluted. “Do not give up on safe research!”"},{"type":"p","text":"Then the toilet paper on the wall began to glow."},{"type":"p","text":"It glowed in a bright ring around the machine."},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“It looks like Saturn’s ring!”"},{"type":"p","text":"Ms. Hoshino looked at the glowing toilet paper."},{"type":"p","text":"“Saturn has beautiful rings made mostly of ice and rock. This toilet paper is not Saturn. It is just glowing for a very strange reason.”"},{"type":"p","text":"Kenta raised his frog eraser toward the glowing paper."},{"type":"p","text":"“Froggy has entered the Solar Toilet System.”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"The machine beeped."},{"type":"p","text":"CHEMICAL PROCESS ACTIVE."},{"type":"p","text":"Dr. Poop explained, “A chemical process means that materials are changing. In our safe model, the change makes gas. The machine catches the gas and turns it into energy.”"},{"type":"p","text":"Riku stared at the control screen."},{"type":"p","text":"“The process is not simple,” he said. “But the message can be simple: handle waste safely, use it wisely, and wash your hands.”"},{"type":"p","text":"“That is better than my first message,” said Dr. Poop."},{"type":"p","text":"“What was your first message?” asked Taku."},{"type":"p","text":"Dr. Poop stood proudly."},{"type":"p","text":"“Poop is tomorrow’s invisible battery.”"},{"type":"p","text":"Everyone was silent."},{"type":"p","text":"Mr. Rollison adjusted his glasses."},{"type":"p","text":"“As a lawyer, I recommend the simple message.”"},{"type":"p","text":"Suddenly, a red light flashed."},{"type":"p","text":"EMERGENCY. STINK PRESSURE RISING."},{"type":"p","text":"The machine made a sound like a robot trying not to sneeze."},{"type":"p","text":"Puuuuuu... puuuuu... PUSU!"},{"type":"p","text":"A gray-green cloud puffed out of the top pipe."},{"type":"p","text":"It floated in the air."},{"type":"p","text":"It opened two sleepy eyes."},{"type":"p","text":"Then it spoke."},{"type":"p","text":"“I am not just smell,” said the cloud. “I am a condition.”"},{"type":"p","text":"Kenta whispered, “It talks.”"},{"type":"p","text":"Taku whispered, “This is definitely a mission.”"},{"type":"p","text":"The cloud sniffed itself and frowned."},{"type":"p","text":"“Also,” it said, “I am a little lonely.”"},{"type":"p","text":"Dr. Poop grabbed his plunger microphone."},{"type":"p","text":"“Emergency meeting! Emergency meeting! Bring the nose clips!”"},{"type":"p","text":"The gray-green cloud grew wider."},{"type":"p","text":"“Do not hide me with banana spray,” it said. “Find the source.”"},{"type":"p","text":"Then it floated toward the next room."},{"type":"p","text":"The glowing toilet paper followed it like a shiny tail."},{"type":"p","text":"Ms. Hoshino took a deep breath through a clean mask."},{"type":"p","text":"“First, safety. Second, hygiene. Third, we need to respond calmly.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"The Nose-Holding Environmental Meeting"},{"type":"p","text":"The meeting room was shaped like a giant clean sink."},{"type":"p","text":"Everyone sat around a round table."},{"type":"p","text":"Taku sat with his notebook ready."},{"type":"p","text":"Kenta sat with Froggy."},{"type":"p","text":"Riku sat with his meter."},{"type":"p","text":"Ms. Hoshino sat closest to the exit, just in case."},{"type":"p","text":"Dr. Poop stood at the front."},{"type":"p","text":"Mr. Rollison sat in a cup so he would not roll away."},{"type":"p","text":"The gray-green cloud floated above the table."},{"type":"p","text":"“My name,” said the cloud, “is Moku-Moku Cloud.”"},{"type":"p","text":"“Moku-Moku,” said Kenta. “You resemble a giant frog burp.”"},{"type":"p","text":"“That is an opinion,” said Ms. Hoshino. “It is not very scientific, but it is an opinion.”"},{"type":"p","text":"Dr. Poop clapped."},{"type":"p","text":"“I want direct opinions. The town contest is soon. We must attempt to stop the cloud, but we must understand it first.”"},{"type":"p","text":"Riku looked at the data on his meter."},{"type":"p","text":"“I did not expect this range of stink,” he said. “The reading goes from Mild Sock to Dragon Lunch Box.”"},{"type":"p","text":"“That is not a standard range,” said Ms. Hoshino."},{"type":"p","text":"“It is my standard range,” said Riku."},{"type":"p","text":"Dr. Poop pointed to a screen."},{"type":"p","text":"“The problem can be divided into three parts: smell, hygiene, and environment.”"},{"type":"p","text":"The screen showed three circles."},{"type":"p","text":"One said SMELL. One said HYGIENE. One said ENVIRONMENT."},{"type":"p","text":"Ms. Hoshino stood up."},{"type":"p","text":"“This is important. It is also significant and essential. Those words are related. The source matters.”"},{"type":"p","text":"Taku wrote:"},{"type":"p","text":"important = significant = essential find the source wash hands probably not frog"},{"type":"p","text":"Kenta looked at the last line."},{"type":"p","text":"“Probably?”"},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"“Definitely.”"},{"type":"p","text":"Dr. Poop pressed a button. A picture of Earth appeared on the screen."},{"type":"p","text":"“In general, we should not hide environmental problems. We should look into them and take action.”"},{"type":"p","text":"Ms. Hoshino added, “Climate change is a serious environmental issue. Some gases in the air can trap heat and affect the climate. Today’s stink cloud is silly, but learning about gases is important.”"},{"type":"p","text":"Moku-Moku Cloud puffed itself up."},{"type":"p","text":"“I am educational!”"},{"type":"p","text":"“You are also stinky,” said Mr. Rollison."},{"type":"p","text":"Moku-Moku Cloud looked hurt."},{"type":"p","text":"“I know.”"},{"type":"p","text":"Dr. Poop raised a test tube."},{"type":"p","text":"“I have an idea! A smell vaccine!”"},{"type":"p","text":"Ms. Hoshino immediately held up her hand."},{"type":"p","text":"“No. A vaccine helps protect people from certain diseases. It is not for stopping bad smells. For bad smells, we need cleaning, ventilation, filters, and a safe system.”"},{"type":"p","text":"Dr. Poop slowly put the test tube down."},{"type":"p","text":"“New invention name: Ventilation Hero.”"},{"type":"p","text":"“That is better,” said Ms. Hoshino."},{"type":"p","text":"Taku looked at Moku-Moku Cloud."},{"type":"p","text":"“Why did you come out?”"},{"type":"p","text":"Moku-Moku Cloud floated lower."},{"type":"p","text":"“The stock room was too full. The sorting system was messy. The filters were tired. Unless people fix the source, I will return.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“So we need to figure out the source, get rid of the bad system, and prevent the same problem from happening again.”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “Rather than blaming the cloud, we should understand why it appeared.”"},{"type":"p","text":"Dr. Poop wiped his eyes with a clean tissue."},{"type":"p","text":"“This is the most beautiful stink conversation I have ever heard.”"},{"type":"p","text":"To make matters worse, Moku-Moku Cloud suddenly sneezed."},{"type":"p","text":"Puff-Poot!"},{"type":"p","text":"A small piece of cloud flew across the room and jumped into Taku’s backpack."},{"type":"p","text":"Taku’s backpack puffed up."},{"type":"p","text":"It made a tiny sound."},{"type":"p","text":"Poot."},{"type":"p","text":"Taku stared at it."},{"type":"p","text":"“My backpack has baggage,” he said. “Stinky baggage.”"},{"type":"p","text":"Kenta leaned closer."},{"type":"p","text":"“Maybe it is a frog inside.”"},{"type":"p","text":"Ms. Hoshino said, “It is not a frog. And do not sniff the backpack.”"},{"type":"p","text":"Riku checked the meter."},{"type":"p","text":"“The cloud is expanding. It may reach the park before the contest.”"},{"type":"p","text":"Dr. Poop grabbed his plunger microphone."},{"type":"p","text":"“We need a new strategy. We need speed. We need sorting. We need...”"},{"type":"p","text":"The wall opened."},{"type":"p","text":"A green shadow jumped out."},{"type":"p","text":"“Recycle Ninjutsu!” cried the shadow."},{"type":"p","text":"The shadow crashed into a clean plastic bin."},{"type":"p","text":"BONK."},{"type":"p","text":"“Ninja pain is recyclable,” it said."},{"type":"p","text":"Ms. Hoshino looked tired."},{"type":"p","text":"“Pain is not recyclable. Please be careful.”"},{"type":"p","text":"The shadow stood up."},{"type":"p","text":"It was a ninja wearing a green suit with a recycling mark on the back. He had paper cards, bottle cards, and food waste cards instead of shuriken."},{"type":"p","text":"“I am Recycle Ninja Gurugurumaru,” he said. “I have arrived to clarify the source.”"},{"type":"p","text":"Moku-Moku Cloud puffed happily."},{"type":"p","text":"“At last,” it said. “Someone with a hat.”"},{"type":"p","text":"Taku whispered, “This mission just upgraded.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Recycle Ninjutsu"},{"type":"p","text":"Recycle Ninja Gurugurumaru spread a map on the table."},{"type":"p","text":"“This data shows the problem,” he said. “The smell began in this range: the lab stock room, the school trash area, and the park festival bins.”"},{"type":"p","text":"Riku leaned over the map."},{"type":"p","text":"“The data is useful. The labels are not.”"},{"type":"p","text":"The map had labels like:"},{"type":"p","text":"MYSTERY GOO POSSIBLY PAPER DEFINITELY NOT A FROG SUSPICIOUS BANANA SPRAY"},{"type":"p","text":"Kenta pointed to the frog label."},{"type":"p","text":"“I like that one.”"},{"type":"p","text":"Ms. Hoshino said, “It is not a category.”"},{"type":"p","text":"Dr. Poop nodded. “I cannot guarantee a clean town unless people sort things correctly.”"},{"type":"p","text":"Gurugurumaru jumped onto a chair."},{"type":"p","text":"“Then we use Recycle Ninjutsu!”"},{"type":"p","text":"He threw three cards into the air."},{"type":"p","text":"“Paper Scroll Ninjutsu!”"},{"type":"p","text":"A paper card flew into a paper box."},{"type":"p","text":"“Bottle Spin Ninjutsu!”"},{"type":"p","text":"A bottle card spun into a bottle box."},{"type":"p","text":"“Food Waste Compost Ninjutsu!”"},{"type":"p","text":"A food waste card landed in a compost model box."},{"type":"p","text":"“Do-Not-Mix-It-Up Ninjutsu!”"},{"type":"p","text":"All the boxes moved away from each other."},{"type":"p","text":"“That last one is practical,” said Riku."},{"type":"p","text":"“It is also a very general rule,” said Ms. Hoshino. “A general rule is a basic rule that works in many cases.”"},{"type":"p","text":"Gurugurumaru made a serious face."},{"type":"p","text":"“General Rule is my teacher.”"},{"type":"p","text":"A trash can popped open. A small banana peel wearing a cape stood up inside it."},{"type":"p","text":"“I am General Trash!” it shouted."},{"type":"p","text":"Ms. Hoshino pointed at the trash can."},{"type":"p","text":"“No trash generals today.”"},{"type":"p","text":"General Trash slowly sat down."},{"type":"p","text":"Kenta picked up a shiny snack bag."},{"type":"p","text":"“This is a foreign snack bag,” he said. “Is it a new species?”"},{"type":"p","text":"“No,” said Ms. Hoshino. “Foreign means from another country. The bag is not a species. But we should check the recycling mark.”"},{"type":"p","text":"Riku attached a scanner to the bag."},{"type":"p","text":"“Initial test.”"},{"type":"p","text":"“Initial safety check,” said Ms. Hoshino."},{"type":"p","text":"“Safe,” said Riku."},{"type":"p","text":"The scanner beeped."},{"type":"p","text":"RECYCLE MARK FOUND. DO NOT SUBMIT FROG ERASER."},{"type":"p","text":"Kenta froze."},{"type":"p","text":"“How did it know?”"},{"type":"p","text":"Riku did not look at him."},{"type":"p","text":"“I added that rule.”"},{"type":"p","text":"Gurugurumaru pointed to a screen showing the sky."},{"type":"p","text":"“We must also be aware of Earth’s protection systems. For example, the ozone layer helps protect Earth from too much ultraviolet light from the Sun.”"},{"type":"p","text":"Taku’s face brightened."},{"type":"p","text":"“So Earth has a shield?”"},{"type":"p","text":"“In a way,” said Ms. Hoshino. “It is not a superhero shield, but it is very important. Earth’s air, water, and living things are connected.”"},{"type":"p","text":"Dr. Poop nodded."},{"type":"p","text":"“That is why we do not waste waste. We use safe systems.”"},{"type":"p","text":"Mr. Rollison rolled into the room with a document."},{"type":"p","text":"“I have information from the town office,” he said. “The Clean Town Contest reservation is still active, but the mayor may call off the contest if the smell reaches the park.”"},{"type":"p","text":"“Call off means cancel,” said Taku."},{"type":"p","text":"“Yes,” said Ms. Hoshino. “And we do not want that to happen.”"},{"type":"p","text":"Kenta lifted Froggy."},{"type":"p","text":"“Frogs prefer clean parks.”"},{"type":"p","text":"“True,” said Ms. Hoshino."},{"type":"p","text":"Gurugurumaru turned to the children."},{"type":"p","text":"“One small action can make a difference!”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“Then we take action.”"},{"type":"p","text":"Riku opened his tool box."},{"type":"p","text":"“I will construct a sorting gate.”"},{"type":"p","text":"Ms. Hoshino smiled a little."},{"type":"p","text":"“A safe sorting gate.”"},{"type":"p","text":"“Yes,” said Riku. “A safe sorting gate.”"},{"type":"p","text":"With the help of Gurugurumaru, Riku built the Recycle Ninja Sorting Gate."},{"type":"p","text":"It had three doors:"},{"type":"p","text":"PAPER BOTTLES FOOD WASTE MODEL"},{"type":"p","text":"It also had one tiny door that said:"},{"type":"p","text":"FROG ERASERS ARE NOT PRODUCE"},{"type":"p","text":"Kenta looked offended."},{"type":"p","text":"“Froggy has never had a chance to be a vegetable.”"},{"type":"p","text":"“That is because Froggy is an eraser,” said Ms. Hoshino."},{"type":"p","text":"Riku pressed the button."},{"type":"p","text":"A paper cup flew into the paper box."},{"type":"p","text":"A bottle model flew into the bottle box."},{"type":"p","text":"A safe food waste model flew into the compost box."},{"type":"p","text":"Then Kenta’s frog eraser slipped from his hand."},{"type":"p","text":"The scanner beeped."},{"type":"p","text":"GREEN ITEM DETECTED. SUBMIT TO VEGETABLE AREA."},{"type":"p","text":"The frog eraser shot through the air and landed in a basket labeled PRODUCE."},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Froggy has submitted himself as data!”"},{"type":"p","text":"Ms. Hoshino picked up Froggy and handed him back."},{"type":"p","text":"“Please do not submit the frog eraser.”"},{"type":"p","text":"Riku looked at his machine."},{"type":"p","text":"“Unexpected, but useful data.”"},{"type":"p","text":"Moku-Moku Cloud floated near the gate. Each time the items were sorted correctly, the cloud became a little smaller."},{"type":"p","text":"“It is working,” said Taku."},{"type":"p","text":"Dr. Poop danced."},{"type":"p","text":"“Flush for science! Sort for survival!”"},{"type":"p","text":"“Maybe just ‘Sort for science,’” said Ms. Hoshino."},{"type":"p","text":"The lab screen beeped again."},{"type":"p","text":"TOWN PARK SMELL LEVEL: HIGH TIME UNTIL CONTEST: SHORT"},{"type":"p","text":"Taku tightened his backpack straps."},{"type":"p","text":"“Earth Rescue Mission: Final Orbit.”"},{"type":"p","text":"Gurugurumaru jumped toward the exit."},{"type":"p","text":"“Recycle Ninjutsu, park version!”"},{"type":"p","text":"He ran into the door before it opened."},{"type":"p","text":"BONK."},{"type":"p","text":"Ms. Hoshino closed her eyes."},{"type":"p","text":"“Door first. Ninja second.”"},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Clean Town Contest"},{"type":"p","text":"The park was filled with people, flags, tables, and colorful bins."},{"type":"p","text":"The Clean Town Contest was about to begin."},{"type":"p","text":"But the park was not very clean yet."},{"type":"p","text":"There were small pieces of paper near the benches."},{"type":"p","text":"A plastic bottle was under a bush."},{"type":"p","text":"A snack wrapper was stuck to a fence."},{"type":"p","text":"And above the stage floated the last part of Moku-Moku Cloud."},{"type":"p","text":"Some townspeople pinched their noses."},{"type":"p","text":"“I am tired of this smell,” said one man."},{"type":"p","text":"“Me too,” said a girl. “But I want the contest to happen.”"},{"type":"p","text":"The mayor stood on the stage with a microphone."},{"type":"p","text":"“If we cannot improve the condition of the park,” she said, “we may call off the contest.”"},{"type":"p","text":"Dr. Poop jumped onto the stage."},{"type":"p","text":"“Please do not call it off! We have a strategy!”"},{"type":"p","text":"The mayor stared at him."},{"type":"p","text":"“Are you wearing a coat made of toilet paper?”"},{"type":"p","text":"“Yes,” said Dr. Poop. “For science.”"},{"type":"p","text":"Ms. Hoshino stepped forward."},{"type":"p","text":"“We have a simple plan. Pick it up. Sort it out. Wash your hands.”"},{"type":"p","text":"Riku placed a small station near the stage."},{"type":"p","text":"“I constructed the Pika-Pika Eco Station,” he said. “It has labels, pictures, and a record sheet.”"},{"type":"p","text":"The station had three big signs:"},{"type":"p","text":"PICK IT UP SORT IT OUT WASH YOUR HANDS"},{"type":"p","text":"It also had pictures for younger children and people who needed extra help."},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“A good system should help everyone.”"},{"type":"p","text":"Riku handed the mayor a document."},{"type":"p","text":"“My first document had twelve pages about the complexity of trash. This version has one page.”"},{"type":"p","text":"Taku read it."},{"type":"p","text":"“Good. No one wants to read a twelve-page trash document before lunch.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“A simple strategy is likely to work better.”"},{"type":"p","text":"Dr. Poop raised both hands."},{"type":"p","text":"“We must invest time, effort, and care. Not just money. We invest attention.”"},{"type":"p","text":"Ms. Hoshino added, “Your ability to clean is useful, but your ability to follow a simple system is even more useful.”"},{"type":"p","text":"Kenta held up Froggy."},{"type":"p","text":"“And we invest frog hope.”"},{"type":"p","text":"Ms. Hoshino said, “That is not a normal investment, but the feeling is favorable.”"},{"type":"p","text":"The mayor smiled."},{"type":"p","text":"“Everyone, please help. Pick up small trash safely. Use the bins. Wash your hands. Staff members will record what we collect.”"},{"type":"p","text":"Town staff handed out gloves, tongs, and bags."},{"type":"p","text":"Mr. Rollison rolled by with a sign."},{"type":"p","text":"SAFETY FIRST. DO NOT TOUCH DANGEROUS ITEMS. ASK STAFF FOR HELP."},{"type":"p","text":"“Excellent information,” said Ms. Hoshino."},{"type":"p","text":"The children began."},{"type":"p","text":"Taku picked up a paper cup with tongs and put it in the correct bin."},{"type":"p","text":"Kenta found a bottle cap near a pond."},{"type":"p","text":"“Frogs prefer clean ponds,” he said. “In my opinion, bottle caps do not belong here.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That is a good opinion.”"},{"type":"p","text":"Riku checked the records."},{"type":"p","text":"“Paper, twelve pieces. Bottles, five. Snack wrappers, nine. Shoe data, zero.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “Keep it that way.”"},{"type":"p","text":"Gurugurumaru spun in circles."},{"type":"p","text":"“Recycle Ninjutsu: Sort-it-out Spin!”"},{"type":"p","text":"He sorted three cards correctly, then fell into a box labeled CLEAN CLOTHS."},{"type":"p","text":"“I am clean now,” he said."},{"type":"p","text":"Dr. Poop pointed to a table."},{"type":"p","text":"“After you wash your hands, please help yourselves to clean snacks. The sign says help oneself to, which means take something freely. But do not help oneself to lab samples.”"},{"type":"p","text":"The townspeople looked at a second table labeled LAB SAMPLES: DO NOT EAT."},{"type":"p","text":"Everyone stepped away from it."},{"type":"p","text":"“Very good,” said Ms. Hoshino."},{"type":"p","text":"A shop owner arrived with a basket of cloth bags."},{"type":"p","text":"“For the contest,” she said, “we are giving a discount on eco bags.”"},{"type":"p","text":"“Discount means a lower price,” said Taku."},{"type":"p","text":"“Correct,” said Ms. Hoshino."},{"type":"p","text":"Kenta showed the mayor a note."},{"type":"p","text":"“I made a recipe for a frog-friendly clean pond. One pond, two leaves, no plastic.”"},{"type":"p","text":"The mayor laughed."},{"type":"p","text":"“That is a good recipe for frogs.”"},{"type":"p","text":"“And people,” said Ms. Hoshino."},{"type":"p","text":"As a result of everyone’s work, the park began to change."},{"type":"p","text":"The ground looked cleaner."},{"type":"p","text":"The bins were organized."},{"type":"p","text":"The record sheet was filled with useful data."},{"type":"p","text":"The last part of Moku-Moku Cloud became smaller and smaller."},{"type":"p","text":"Finally, it was only a tiny puff above the stage."},{"type":"p","text":"Moku-Moku Cloud looked down."},{"type":"p","text":"“I only wanted people to notice the problem,” it said."},{"type":"p","text":"Taku looked up at it."},{"type":"p","text":"“We regard you as a warning, not an enemy.”"},{"type":"p","text":"Moku-Moku smiled."},{"type":"p","text":"“That is kind. Also, I am still a little stinky.”"},{"type":"p","text":"“We know,” said everyone."},{"type":"p","text":"Dr. Poop wiped his eyes with a clean tissue."},{"type":"p","text":"“Beautiful. We did not just say ‘Yuck.’ We looked into the source. We used a safe system. We took small actions. We made a difference.”"},{"type":"p","text":"The mayor raised a shiny certificate."},{"type":"p","text":"“The Best Practical Stink-to-Science Award goes to Dr. Poop and the Earth Rescue Team!”"},{"type":"p","text":"Dr. Poop jumped up."},{"type":"p","text":"“Flush for science!”"},{"type":"p","text":"The Pusu-Pusu Power Meter on Riku’s belt beeped."},{"type":"p","text":"The toilet paper decorations around the stage began to glow again, forming a bright ring."},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“Saturn has returned!”"},{"type":"p","text":"Ms. Hoshino took a very deep breath."},{"type":"p","text":"“Please do not turn the award ceremony into Saturn.”"},{"type":"p","text":"But even she smiled."},{"type":"p","text":"The park was cleaner."},{"type":"p","text":"The contest could continue."},{"type":"p","text":"The frog pond was safe."},{"type":"p","text":"The lab was under control."},{"type":"p","text":"And the Earth Rescue Mission had succeeded."},{"type":"p","text":"Taku looked at the blue sky."},{"type":"p","text":"“Earth is like a spaceship,” he said. “We all ride it together.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“From space, Earth looks blue and beautiful. Its air and water are precious. Keeping our town clean is one small way to care for our planet.”"},{"type":"p","text":"Kenta held up Froggy."},{"type":"p","text":"“Froggy agrees.”"},{"type":"p","text":"Riku checked his machine."},{"type":"p","text":"“The data says success.”"},{"type":"p","text":"Dr. Poop bowed deeply."},{"type":"p","text":"“Remember,” he said, “yuck can become useful if we use science, safety, and common sense.”"},{"type":"p","text":"A tiny voice came from the park restroom."},{"type":"p","text":"“SOS?”"},{"type":"p","text":"Everyone froze."},{"type":"p","text":"The voice continued."},{"type":"p","text":"“Just kidding. Hand soap is low.”"},{"type":"p","text":"Ms. Hoshino pointed at the restroom."},{"type":"p","text":"“That is a normal problem. We will tell the staff.”"},{"type":"p","text":"Dr. Poop saluted."},{"type":"p","text":"“Earth Rescue Mission: Soap Refill!”"},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“This is probably a mission.”"},{"type":"p","text":"Ms. Hoshino smiled, but only a little."},{"type":"p","text":"“It is probably a chore.”"},{"type":"p","text":"And somewhere near the clean snack table, the glowing toilet paper made one final tiny sound."},{"type":"p","text":"Pusu."},{"type":"p","text":"The end."}]},{"themeNo":6,"id":"06","title":"Ninja Elementary Training","blocks":[{"type":"subtitle","text":"The Eraser Shuriken That Came Back"},{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Eraser Shuriken Test"},{"type":"p","text":"After school, Taku, Kenta, and Riku were still in the classroom."},{"type":"p","text":"Taku was putting a rocket sticker on his pencil case. Kenta was showing his frog eraser a picture of a beetle. Riku was building a tiny gate with blocks under his desk."},{"type":"p","text":"Ms. Hoshino looked at them and took a slow breath."},{"type":"p","text":"“Before anyone turns the classroom into a space station,” she said, “please clean your desks.”"},{"type":"p","text":"Taku looked at the blackboard."},{"type":"p","text":"The blackboard shook."},{"type":"p","text":"Then it turned around by itself."},{"type":"p","text":"On the other side, bright green letters appeared."},{"type":"p","text":"WELCOME TO NINJA ELEMENTARY TRAINING."},{"type":"p","text":"Taku’s eyes shone."},{"type":"p","text":"“This is probably a mission,” he said."},{"type":"p","text":"Kenta leaned closer to the blackboard."},{"type":"p","text":"“Maybe a frog wrote this,” he said. “Look. The green letters have pond energy.”"},{"type":"p","text":"“It is probably not a frog,” said Ms. Hoshino."},{"type":"p","text":"At that moment, the recycle box beside the door jumped."},{"type":"p","text":"It jumped again."},{"type":"p","text":"Then it spun in a circle."},{"type":"p","text":"“Recycle Ninjutsu!” cried a voice."},{"type":"p","text":"A green ninja flew out of the recycle box."},{"type":"p","text":"He tried to land on the teacher’s desk."},{"type":"p","text":"Instead, he landed in the paper tray."},{"type":"p","text":"BONK."},{"type":"p","text":"A pile of old worksheets flew into the air."},{"type":"p","text":"The ninja stood up with one worksheet on his head."},{"type":"p","text":"“I am Recycle Ninja Gurugurumaru!” he shouted. “Advanced Recycle Ninja Instructor!”"},{"type":"p","text":"Taku pointed at him."},{"type":"p","text":"“You came back from the Earth Rescue Lab!”"},{"type":"p","text":"“Yes,” said Gurugurumaru. “In the previous mission, we saved the town from stink. Today, we train as school ninjas.”"},{"type":"p","text":"Ms. Hoshino picked the worksheet off his head."},{"type":"p","text":"“Are you qualified to teach children?” she asked."},{"type":"p","text":"Gurugurumaru pulled out a small card."},{"type":"p","text":"It said:"},{"type":"p","text":"ADVANCED RECYCLE NINJA INSTRUCTOR SPECIAL AREA: SAFE ERASER SHURIKEN WEAK POINT: BOXES"},{"type":"p","text":"Riku read the card."},{"type":"p","text":"“Interesting. The area is very specific.”"},{"type":"p","text":"“The first lesson,” said Gurugurumaru, “is the Eraser Shuriken Test!”"},{"type":"p","text":"Kenta hugged his frog eraser."},{"type":"p","text":"“No sharp ninja tools, right?” asked Ms. Hoshino."},{"type":"p","text":"“Correct,” said Gurugurumaru. “Only soft erasers. No throwing at faces. No throwing at frogs. No throwing at teachers who are already tired.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “Then we need a clear safety line.”"},{"type":"p","text":"She put tape on the floor."},{"type":"p","text":"“This is the safe practice area. You will take turns.”"},{"type":"p","text":"A lonely eraser sat in the middle of the desk. It had no owner’s name on it."},{"type":"p","text":"The eraser spoke in a tiny voice."},{"type":"p","text":"“I have been waiting for a ninja purpose.”"},{"type":"p","text":"Taku whispered, “The eraser is talking.”"},{"type":"p","text":"Kenta whispered back, “Maybe it is a frog in disguise.”"},{"type":"p","text":"“It is still not a frog,” said Ms. Hoshino."},{"type":"p","text":"Gurugurumaru held up the lonely eraser."},{"type":"p","text":"“This eraser wants to trade normal life for ninja life.”"},{"type":"p","text":"Riku took out a block machine."},{"type":"p","text":"“I made a prototype,” he said. “It is called the Eraser Shuriken Returner.”"},{"type":"p","text":"Ms. Hoshino immediately said, “Initial safety check first.”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“The prototype uses a rubber band. Due to the rubber band, the eraser will come back.”"},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“Like a satellite returning from orbit?”"},{"type":"p","text":"“Not exactly,” said Ms. Hoshino. “A satellite stays in orbit because of gravity. This eraser comes back because of rubber.”"},{"type":"p","text":"Taku nodded seriously."},{"type":"p","text":"“Rubber gravity.”"},{"type":"p","text":"“That is not a real term,” said Ms. Hoshino. “But I understand what you mean.”"},{"type":"p","text":"Riku drew a figure on the target board."},{"type":"p","text":"It had a circle, a square, three numbers, and one shape that looked a little like a frog."},{"type":"p","text":"Kenta pointed."},{"type":"p","text":"“That figure is clearly a frog.”"},{"type":"p","text":"“It is a triangle with eyes,” said Riku."},{"type":"p","text":"“Exactly,” said Kenta. “A triangle frog.”"},{"type":"p","text":"Gurugurumaru clapped."},{"type":"p","text":"“Taku, perform the first throw!”"},{"type":"p","text":"Taku stepped into the practice area."},{"type":"p","text":"He held the eraser shuriken."},{"type":"p","text":"He aimed."},{"type":"p","text":"He threw."},{"type":"p","text":"The eraser flew forward."},{"type":"p","text":"Then it came back."},{"type":"p","text":"It landed on Taku’s head."},{"type":"p","text":"PON."},{"type":"p","text":"“I deny that this was a bad throw,” said Taku."},{"type":"p","text":"Ms. Hoshino smiled a little."},{"type":"p","text":"“You can deny it if you want, but it happened. The next step is to accept the result and try again.”"},{"type":"p","text":"Gurugurumaru raised both arms."},{"type":"p","text":"“A true ninja can accept a PON!”"},{"type":"p","text":"Riku wrote on his notebook."},{"type":"p","text":"Test result: head landing."},{"type":"p","text":"Useful data: maybe."},{"type":"p","text":"Kenta took a turn in the same way."},{"type":"p","text":"He threw the eraser."},{"type":"p","text":"It came back and tapped his frog eraser."},{"type":"p","text":"PON."},{"type":"p","text":"Kenta looked proud."},{"type":"p","text":"“Froggy has been chosen by ninja destiny.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “Froggy was hit by a soft eraser.”"},{"type":"p","text":"Gurugurumaru took the eraser and stuck a label on it."},{"type":"p","text":"The label said:"},{"type":"p","text":"RECYCLABLE THROWABLE WASHABLE POSSIBLY LAUGHABLE"},{"type":"p","text":"Ms. Hoshino pointed to the label."},{"type":"p","text":"“The suffix -able often means ‘can be’ or ‘suitable for.’ Recyclable means it can be recycled. Washable means it can be washed.”"},{"type":"p","text":"Gurugurumaru added one more word."},{"type":"p","text":"“Ninja-able!”"},{"type":"p","text":"“That is not a normal word,” said Ms. Hoshino."},{"type":"p","text":"“But it is fun-able,” said Taku."},{"type":"p","text":"“Also not normal,” said Ms. Hoshino."},{"type":"p","text":"The blackboard flashed."},{"type":"p","text":"LESSON ONE COMPLETE. A GOOD NINJA TAKES TURNS. A GOOD NINJA ACCEPTS DATA. A GOOD NINJA DOES NOT THROW ERASERS AT TEACHERS."},{"type":"p","text":"Gurugurumaru bowed."},{"type":"p","text":"“Ninja pain is recyclable!”"},{"type":"p","text":"“Pain is not recyclable,” said Ms. Hoshino. “Please be careful.”"},{"type":"p","text":"Then the gym door opened by itself."},{"type":"p","text":"A long green sock flew out and slapped Gurugurumaru in the face."},{"type":"p","text":"PACHIN."},{"type":"p","text":"The sock shouted, “Election time!”"},{"type":"p","text":"Taku stared."},{"type":"p","text":"“Is this still ninja training?”"},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"“Apparently, yes.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Quick-Change Gym Technique and the Sock Election"},{"type":"p","text":"The gym had become a ninja training hall."},{"type":"p","text":"There were soft mats on the floor, green paper lanterns hanging from the ceiling, and a large sign that said:"},{"type":"p","text":"FIRST, SAFETY. SECOND, PERMISSION. THIRD, NO PANTS CYCLONE."},{"type":"p","text":"Taku read the third rule."},{"type":"p","text":"“No Pants Cyclone?”"},{"type":"p","text":"Ms. Hoshino looked directly at him."},{"type":"p","text":"“No.”"},{"type":"p","text":"“No explanation?” asked Taku."},{"type":"p","text":"“The explanation is also no,” said Ms. Hoshino."},{"type":"p","text":"Gurugurumaru held up a ninja headband."},{"type":"p","text":"“Lesson two is the Quick-Change Gym Technique. A ninja can alter his outfit quickly!”"},{"type":"p","text":"He spun around."},{"type":"p","text":"His green cape wrapped around his face."},{"type":"p","text":"He fell backward onto a mat."},{"type":"p","text":"PUF."},{"type":"p","text":"“I have altered my ability to see,” he said from inside the cape."},{"type":"p","text":"Riku opened a block box."},{"type":"p","text":"“I have an innovation,” he said. “Quick-Change Cyclone 2.0.”"},{"type":"p","text":"“Initial safety check first,” said Ms. Hoshino."},{"type":"p","text":"Riku pointed to the sign."},{"type":"p","text":"“I will ask for permission before I use school equipment.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “You may go ahead after I check the speed.”"},{"type":"p","text":"The machine was made of blocks, rubber bands, clothespins, and one fan that looked suspiciously like a lunch tray."},{"type":"p","text":"Riku pressed a button."},{"type":"p","text":"The fan turned slowly."},{"type":"p","text":"“Clear speed,” said Ms. Hoshino. “Not too fast.”"},{"type":"p","text":"Taku stepped in."},{"type":"p","text":"The machine spun."},{"type":"p","text":"WHOOSH."},{"type":"p","text":"Taku’s headband landed perfectly on his head."},{"type":"p","text":"Kenta stepped in."},{"type":"p","text":"WHOOSH."},{"type":"p","text":"A green cape landed on his shoulders."},{"type":"p","text":"Kenta smiled."},{"type":"p","text":"“I feel social.”"},{"type":"p","text":"Ms. Hoshino said, “Social means related to people and society. Wearing a cape does not automatically make you social.”"},{"type":"p","text":"Then Riku stepped in."},{"type":"p","text":"WHOOSH."},{"type":"p","text":"One of his socks flew off and stuck to the blackboard."},{"type":"p","text":"The sock shouted, “I am free!”"},{"type":"p","text":"The other sock shouted, “I am also a candidate!”"},{"type":"p","text":"The gym became silent."},{"type":"p","text":"Then thirty socks jumped from the sock basket."},{"type":"p","text":"A right sock landed on a ball."},{"type":"p","text":"A left sock stood on a cone."},{"type":"p","text":"Gurugurumaru stood between them."},{"type":"p","text":"The right sock said, “Elect me. I am the right sock.”"},{"type":"p","text":"The left sock said, “Elect me. I am the left sock.”"},{"type":"p","text":"Gurugurumaru raised his hand."},{"type":"p","text":"“Elect me. I am green and experienced.”"},{"type":"p","text":"Riku looked at him."},{"type":"p","text":"“You are not a sock.”"},{"type":"p","text":"“I am a candidate in spirit,” said Gurugurumaru."},{"type":"p","text":"Ms. Hoshino stepped forward."},{"type":"p","text":"“Even a pretend election needs clear rules. It must be fair. It must be safe. And no one has to take part if they do not want to.”"},{"type":"p","text":"The sock judge jumped onto a box."},{"type":"p","text":"“I declare this election legal enough for gym socks!”"},{"type":"p","text":"Ms. Hoshino closed her eyes for one second."},{"type":"p","text":"“Legal is a serious word. In this case, it means the rules are acceptable for a pretend game.”"},{"type":"p","text":"Suddenly, the socks flew everywhere."},{"type":"p","text":"One sock landed on Taku’s shoulder."},{"type":"p","text":"One sock landed on Kenta’s frog eraser."},{"type":"p","text":"Three socks made a tiny tower on Riku’s head."},{"type":"p","text":"Gurugurumaru shouted, “Sock epidemic!”"},{"type":"p","text":"Ms. Hoshino’s voice became calm and firm."},{"type":"p","text":"“An epidemic is a serious spread of disease. This is not an epidemic. This is a sock problem.”"},{"type":"p","text":"Kenta lifted the sock from his frog eraser."},{"type":"p","text":"“Froggy may need therapy after this.”"},{"type":"p","text":"“Froggy is fine,” said Ms. Hoshino."},{"type":"p","text":"Riku adjusted his machine."},{"type":"p","text":"“I can recover the socks.”"},{"type":"p","text":"He pushed a blue button."},{"type":"p","text":"The fan turned backward."},{"type":"p","text":"WHOOSH."},{"type":"p","text":"The socks flew back into the basket."},{"type":"p","text":"One sock remained on Gurugurumaru’s head like a hat."},{"type":"p","text":"“Eventually,” said Riku, “the machine succeeded.”"},{"type":"p","text":"“Eventually,” said Ms. Hoshino, “after it attacked the gym with socks.”"},{"type":"p","text":"Taku tugged at his ninja shirt."},{"type":"p","text":"“This cloth is itchy.”"},{"type":"p","text":"Gurugurumaru nodded."},{"type":"p","text":"“A true ninja can put up with a slightly itchy uniform.”"},{"type":"p","text":"“A true teacher checks if the uniform is actually safe,” said Ms. Hoshino."},{"type":"p","text":"She checked the cloth."},{"type":"p","text":"“It is safe. You can wear it for a short time. But tell me if it hurts or feels wrong.”"},{"type":"p","text":"The blackboard lit up again."},{"type":"p","text":"HELP = ASSIST. A GOOD NINJA HELPS. A GOOD NINJA ASSISTS."},{"type":"p","text":"Kenta read it."},{"type":"p","text":"“So, if I help Froggy, I assist Froggy?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino."},{"type":"p","text":"“If Froggy helps me, Froggy assists me?”"},{"type":"p","text":"“Yes.”"},{"type":"p","text":"“If a sock helps Froggy—”"},{"type":"p","text":"“No more sock examples,” said Ms. Hoshino."},{"type":"p","text":"Gurugurumaru bowed."},{"type":"p","text":"“Lesson two complete! You asked for permission, followed clear rules, and recovered the socks. Now we move to lesson three: Hidden Lunch Duty!”"},{"type":"p","text":"Taku blinked."},{"type":"p","text":"“Lunch duty? With ninjas?”"},{"type":"p","text":"From the hallway came a rolling rice ball."},{"type":"p","text":"It bounced once."},{"type":"p","text":"It bounced twice."},{"type":"p","text":"Then it zoomed past them like a tiny white moon."},{"type":"p","text":"Taku gasped."},{"type":"p","text":"“Rice ball meteor!”"},{"type":"p","text":"Ms. Hoshino ran after it."},{"type":"p","text":"“This is lunch, not space weather!”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Hidden Lunch Duty and the Rice Ball Meteor Shower"},{"type":"p","text":"The cafeteria entrance had changed."},{"type":"p","text":"A cardboard gate stood in front of it."},{"type":"p","text":"On the gate was a sign."},{"type":"p","text":"LUNCH BOARDING AREA. BOARDING PASS REQUIRED."},{"type":"p","text":"Riku stared at it."},{"type":"p","text":"“Why does the cafeteria need a boarding pass?”"},{"type":"p","text":"Gurugurumaru held up four small paper tickets."},{"type":"p","text":"“Because lunch is a journey.”"},{"type":"p","text":"Taku took one ticket."},{"type":"p","text":"It said:"},{"type":"p","text":"PASSENGER: TAKU DESTINATION: SAFE LUNCH DUTY SNACK PLANET: UNKNOWN"},{"type":"p","text":"“This is definitely a mission,” said Taku."},{"type":"p","text":"Ms. Hoshino checked the gate."},{"type":"p","text":"“Pretend boarding passes are fine. But lunch duty is not for disappearing. It is for serving safely.”"},{"type":"p","text":"Gurugurumaru raised one finger."},{"type":"p","text":"“Lesson three: experience Hidden Lunch Duty!”"},{"type":"p","text":"The lunch carts came in."},{"type":"p","text":"There were trays, soup, milk, bread, rice balls, and a warm smell that could attract every hungry ninja in the school."},{"type":"p","text":"Kenta sniffed."},{"type":"p","text":"“The smell has frog picnic energy.”"},{"type":"p","text":"“It is soup,” said Ms. Hoshino."},{"type":"p","text":"Ninja students hid under tables, behind curtains, and behind the milk box."},{"type":"p","text":"One voice whispered, “I am invisible.”"},{"type":"p","text":"Another voice whispered, “I am also invisible.”"},{"type":"p","text":"A third voice whispered, “I am in need of more bread.”"},{"type":"p","text":"Ms. Hoshino clapped her hands."},{"type":"p","text":"“If someone is in need of food, the lunch helpers should serve them. But the helpers must be visible enough to work safely.”"},{"type":"p","text":"Gurugurumaru shouted, “Invisible serving!”"},{"type":"p","text":"He tried to hand out rice balls while hiding behind a tray."},{"type":"p","text":"He missed."},{"type":"p","text":"One rice ball flew up."},{"type":"p","text":"Another rice ball bounced off a spoon."},{"type":"p","text":"A third rice ball sailed across the cafeteria."},{"type":"p","text":"Taku pointed at it."},{"type":"p","text":"“Rice ball meteor shower!”"},{"type":"p","text":"Ms. Hoshino caught the rice ball with a clean tray."},{"type":"p","text":"“A shooting star is not really a star,” she said. “It is often a small space rock burning in the atmosphere. This is not a shooting star. This is lunch.”"},{"type":"p","text":"Kenta looked at a round rice ball."},{"type":"p","text":"“It resembles a distant frog egg planet.”"},{"type":"p","text":"“It is rice,” said Ms. Hoshino."},{"type":"p","text":"Riku unfolded a paper map."},{"type":"p","text":"“I made a Lunch Duty Route Map.”"},{"type":"p","text":"The map showed the soup station, the milk station, the bread station, and the rice ball danger zone."},{"type":"p","text":"Taku read it."},{"type":"p","text":"“Whereas space missions need rockets, lunch missions need clean hands.”"},{"type":"p","text":"“Exactly,” said Ms. Hoshino. “And that is a useful whereas sentence.”"},{"type":"p","text":"Gurugurumaru blew a whistle."},{"type":"p","text":"“Emergency conference!”"},{"type":"p","text":"All the ninja students sat at the tables."},{"type":"p","text":"Gurugurumaru stood on a chair."},{"type":"p","text":"Ms. Hoshino gently lifted him down."},{"type":"p","text":"“Chairs are for sitting.”"},{"type":"p","text":"He stood on the floor."},{"type":"p","text":"“Hidden Lunch Conference begins!”"},{"type":"p","text":"Riku wrote on the board."},{"type":"p","text":"LUNCH DUTY RULES 1. Wash hands. 2. Use clean tools. 3. Serve enough food. 4. Do not waste food. 5. Do not disappear while holding soup."},{"type":"p","text":"The board flashed."},{"type":"p","text":"ENOUGH = SUFFICIENT."},{"type":"p","text":"Ms. Hoshino read it aloud."},{"type":"p","text":"“Enough means sufficient. We give everyone a sufficient amount, not too much and not too little.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Word card,” said Ms. Hoshino. “To be eager to do something means to really want to do it.”"},{"type":"p","text":"“Are frogs eager to do lunch duty?”"},{"type":"p","text":"“You are eager to ask frog questions,” said Ms. Hoshino. “But frogs do not work in our cafeteria.”"},{"type":"p","text":"Gurugurumaru covered himself with soap bubbles."},{"type":"p","text":"“I am eager to perform Hand-Wash Ninjutsu!”"},{"type":"p","text":"He spun in circles."},{"type":"p","text":"Bubble, bubble, bubble."},{"type":"p","text":"To one's surprise, his body disappeared inside the foam, but the recycle mark on his back kept glowing green."},{"type":"p","text":"Taku laughed."},{"type":"p","text":"“To one's surprise, the ninja is invisible, but the recycling mark is not!”"},{"type":"p","text":"Riku nodded."},{"type":"p","text":"“Useful data.”"},{"type":"p","text":"Ms. Hoshino said, “Clean hands are important. Viruses can spread through unclean hands or close contact. That is why we wash hands, use clean tools, and do not share food from our hands.”"},{"type":"p","text":"Gurugurumaru’s voice came from inside the bubbles."},{"type":"p","text":"“I am very clean and very lost.”"},{"type":"p","text":"Kenta patted the bubble pile with a towel."},{"type":"p","text":"“We can restore him.”"},{"type":"p","text":"The bubbles popped."},{"type":"p","text":"POP POP POP."},{"type":"p","text":"Gurugurumaru appeared with soap on his nose."},{"type":"p","text":"“Restored!” he cried."},{"type":"p","text":"Ms. Hoshino looked at the rice balls."},{"type":"p","text":"“Food also connects with conservation. When we waste food, we waste water, soil, energy, and the work of many people. We should take only what we can eat and treat food carefully.”"},{"type":"p","text":"Taku held up his boarding pass."},{"type":"p","text":"“So lunch duty is an opportunity to help people and protect the Earth?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “A small opportunity, but a real one.”"},{"type":"p","text":"Riku fixed the route map."},{"type":"p","text":"“New strategy,” he said. “Visible Lunch Duty.”"},{"type":"p","text":"Gurugurumaru saluted."},{"type":"p","text":"“Visible Lunch Ninjutsu!”"},{"type":"p","text":"The lunch line restarted."},{"type":"p","text":"This time, Taku handed out trays. Kenta counted milk cartons. Riku followed the route map. Gurugurumaru held the rice balls with both hands and walked slowly."},{"type":"p","text":"No rice balls became meteors."},{"type":"p","text":"Almost."},{"type":"p","text":"One tiny grain of rice flew off and stuck to Gurugurumaru’s forehead."},{"type":"p","text":"Taku pointed."},{"type":"p","text":"“Mini moon.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Mini rice.”"},{"type":"p","text":"The blackboard flashed."},{"type":"p","text":"LESSON THREE COMPLETE. A GOOD NINJA IS USEFUL, CLEAN, AND VISIBLE WHEN SERVING SOUP."},{"type":"p","text":"Then the principal’s door at the end of the hallway opened."},{"type":"p","text":"A long scroll rolled out."},{"type":"p","text":"It rolled past the cafeteria."},{"type":"p","text":"It rolled past the gym."},{"type":"p","text":"It rolled all the way to Taku’s feet."},{"type":"p","text":"On the scroll were the words:"},{"type":"p","text":"PRINCIPAL MAKIMONO’S SCROLL QUIZ."},{"type":"p","text":"Kenta leaned down."},{"type":"p","text":"“Maybe the scroll is a long frog tongue.”"},{"type":"p","text":"Ms. Hoshino shook her head."},{"type":"p","text":"“Please do not say that to the principal.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Principal Makimono’s Scroll Quiz"},{"type":"p","text":"The scroll unrolled across the classroom floor."},{"type":"p","text":"It was so long that it went under three desks, around the recycle box, and over Gurugurumaru’s foot."},{"type":"p","text":"“Ow,” said Gurugurumaru. “Scroll pain is recyclable.”"},{"type":"p","text":"“Pain is not recyclable,” said Ms. Hoshino."},{"type":"p","text":"A deep voice came from the scroll."},{"type":"p","text":"“I am Principal Makimono.”"},{"type":"p","text":"Taku looked around."},{"type":"p","text":"“Where is the principal?”"},{"type":"p","text":"The voice answered, “A ninja principal is not always seen.”"},{"type":"p","text":"Ms. Hoshino whispered, “That will be difficult to write in the school report.”"},{"type":"p","text":"The scroll spoke again."},{"type":"p","text":"“To earn the qualification for the final exam, classify the clues, explain your reason, and choose the safe route.”"},{"type":"p","text":"Taku stood up straight."},{"type":"p","text":"“Scroll mission accepted.”"},{"type":"p","text":"The first quiz appeared in ink."},{"type":"p","text":"QUIZ ONE: CLASSIFY THESE ITEMS. A SOFT ERASER. A REAL TOOL WITH A SHARP EDGE. A FROG ERASER. A SCHOOL ROPE. A MYSTERY SOCK."},{"type":"p","text":"Kenta raised both hands."},{"type":"p","text":"“I classify the frog eraser as frog.”"},{"type":"p","text":"“It is an eraser,” said Ms. Hoshino. “Classify means put things into groups. The answer should be based on facts, not wishes.”"},{"type":"p","text":"Riku pointed to the list."},{"type":"p","text":"“Soft eraser: safe with rules. Sharp tool: adults only or not for this activity. School rope: ask for permission. Mystery sock: laundry issue.”"},{"type":"p","text":"The scroll glowed."},{"type":"p","text":"“Acceptable.”"},{"type":"p","text":"Kenta whispered to Froggy, “You are still spiritually frog.”"},{"type":"p","text":"The second quiz appeared."},{"type":"p","text":"QUIZ TWO: HOW SHOULD NINJAS HANDLE LIVING THINGS IN THE SCHOOL GARDEN?"},{"type":"p","text":"At once, the classroom floor turned into a tiny garden path."},{"type":"p","text":"Soil appeared."},{"type":"p","text":"Leaves appeared."},{"type":"p","text":"A small worm wearing a leaf hat lifted its head."},{"type":"p","text":"“I am the Worm Representative,” it said. “We suffer when giant ninja feet crush our tunnels.”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“A talking worm! Finally, real biology!”"},{"type":"p","text":"Ms. Hoshino kneeled at a safe distance."},{"type":"p","text":"“Earthworms can help the soil. We should handle living things gently. We do not pull them, throw them, or treat them like toys.”"},{"type":"p","text":"The worm nodded."},{"type":"p","text":"“Thank you. Also, please stop calling every small creature a snack.”"},{"type":"p","text":"Gurugurumaru saluted."},{"type":"p","text":"“Garden Conservation Ninjutsu!”"},{"type":"p","text":"The scroll showed a picture of a bottle."},{"type":"p","text":"PESTICIDE."},{"type":"p","text":"Ms. Hoshino pointed to the picture."},{"type":"p","text":"“Pesticide can be used to control pests, but it must be handled carefully by adults. Not every insect or worm is bad. Some small creatures help the garden.”"},{"type":"p","text":"Kenta held his frog eraser close."},{"type":"p","text":"“In my opinion, worms have important routes under the soil.”"},{"type":"p","text":"The worm bowed."},{"type":"p","text":"“That is the best opinion of the day.”"},{"type":"p","text":"The third quiz appeared."},{"type":"p","text":"QUIZ THREE: DEBATE THIS QUESTION. IS A MUDDY PATH A PROBLEM, AN ISSUE, OR A NINJA OPPORTUNITY?"},{"type":"p","text":"Taku raised his hand."},{"type":"p","text":"“It is a mission route.”"},{"type":"p","text":"Riku said, “It is a structure problem.”"},{"type":"p","text":"Kenta said, “It may contain frog evidence.”"},{"type":"p","text":"Gurugurumaru said, “It is recyclable mud.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “But it may be part of the test.”"},{"type":"p","text":"The scroll rustled."},{"type":"p","text":"“Your debate must include a reason.”"},{"type":"p","text":"Taku thought."},{"type":"p","text":"“My reason is this: a muddy path can be dangerous if we run, but useful if we investigate it carefully.”"},{"type":"p","text":"Riku added, “We need a bridge or a safer route.”"},{"type":"p","text":"Kenta added, “We need to protect worm tunnels.”"},{"type":"p","text":"Gurugurumaru added, “We need to sort mud into mud, wetter mud, and suspicious mud.”"},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"“That is not necessary, but your effort is noted.”"},{"type":"p","text":"The scroll glowed again."},{"type":"p","text":"It issued a new message."},{"type":"p","text":"ISSUE SPECIAL EDITION: STUDENTS MADE AN EFFORT."},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Issue can mean a problem. It can also mean a special edition, or to give something officially. Here, the scroll issued a message.”"},{"type":"p","text":"Taku looked at the bottom of the scroll."},{"type":"p","text":"There was a muddy mark."},{"type":"p","text":"Then another."},{"type":"p","text":"Then another."},{"type":"p","text":"He leaned closer."},{"type":"p","text":"“I catch sight of tiny footprints,” he said."},{"type":"p","text":"Riku looked carefully."},{"type":"p","text":"“They are not from our shoes.”"},{"type":"p","text":"Kenta almost jumped."},{"type":"p","text":"“Frog?”"},{"type":"p","text":"The worm shook its head."},{"type":"p","text":"“Former route marks. They were left by the former beginner ninja class.”"},{"type":"p","text":"Principal Makimono’s voice filled the room."},{"type":"p","text":"“You noticed the former route. You classified carefully. You respected the garden. You made an effort. Therefore, you have the qualification for the final exam.”"},{"type":"p","text":"Taku pumped his fist."},{"type":"p","text":"“Final mission!”"},{"type":"p","text":"Ms. Hoshino raised one finger."},{"type":"p","text":"“Final safe mission.”"},{"type":"p","text":"The scroll rolled itself up."},{"type":"p","text":"Then it pointed toward the school field."},{"type":"p","text":"Outside, dark clouds had just finished raining."},{"type":"p","text":"The field was full of mud."},{"type":"p","text":"Gurugurumaru smiled too widely."},{"type":"p","text":"“Muddy graduation exam!”"},{"type":"p","text":"Ms. Hoshino stared at the mud."},{"type":"p","text":"“How do I write this in the school report?”"},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Muddy Graduation Test"},{"type":"p","text":"The school field had turned into a muddy ninja course."},{"type":"p","text":"There was a rope bridge."},{"type":"p","text":"There were soft stepping stones."},{"type":"p","text":"There were puddles."},{"type":"p","text":"There were signs."},{"type":"p","text":"There was also one frog sitting on a leaf near the fence."},{"type":"p","text":"Kenta froze."},{"type":"p","text":"“Finally,” he whispered. “Real frog evidence.”"},{"type":"p","text":"Ms. Hoshino whispered back, “Observe from a safe distance.”"},{"type":"p","text":"A large scroll stood at the starting line."},{"type":"p","text":"It read:"},{"type":"p","text":"FINAL EXAM RULES CONSULT THE MAP. INVESTIGATE THE MUD. POINT OUT DANGER. HOLD ON TO THE ROPE. CHOOSE THE RIGHT PATH."},{"type":"p","text":"Taku read the last line twice."},{"type":"p","text":"“Right path means correct path, not right side, right?”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Right can mean correct. It can also mean the right side. It can also mean a right that people have. In this test, it means the safe and correct path.”"},{"type":"p","text":"Gurugurumaru had already run to the right side."},{"type":"p","text":"“I chose the right path!” he shouted."},{"type":"p","text":"SPLASH."},{"type":"p","text":"He stepped into the deepest puddle and sank up to his knees."},{"type":"p","text":"Ms. Hoshino said, “You chose the right side, not the right answer.”"},{"type":"p","text":"“Muddy pain is recyclable,” said Gurugurumaru."},{"type":"p","text":"“Still no,” said Ms. Hoshino."},{"type":"p","text":"Riku studied the rope bridge."},{"type":"p","text":"“The structure has changed because of the rain.”"},{"type":"p","text":"He pointed at the wood, rope, mud, and block supports."},{"type":"p","text":"“Each component matters. If one component slips, the bridge may fall.”"},{"type":"p","text":"Taku looked at the muddy ground."},{"type":"p","text":"“This is like a Mars rover mission.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“A rover can investigate the surface of Mars. We are not on Mars. We are on the school field. But observing the ground is useful.”"},{"type":"p","text":"Kenta pointed at tiny tracks near the puddle."},{"type":"p","text":"“Frog tracks. Worm route. Shoe mark. Gurugurumaru disaster mark.”"},{"type":"p","text":"“Accurate,” said Riku."},{"type":"p","text":"The scroll spoke."},{"type":"p","text":"“Begin.”"},{"type":"p","text":"Taku did not run."},{"type":"p","text":"He looked at the map."},{"type":"p","text":"“We consult the map first.”"},{"type":"p","text":"Riku checked the bridge."},{"type":"p","text":"“We investigate the weak parts.”"},{"type":"p","text":"Kenta watched the leaf with the frog."},{"type":"p","text":"“We protect the local pond ar
