":"Kenta nodded hard."},{"type":"p","text":"“In my professional opinion, resting is very beetle-brave.”"},{"type":"p","text":"“You are not a professional beetle doctor,” said Ms. Hoshino."},{"type":"p","text":"“Not yet,” said Kenta."},{"type":"p","text":"Beside the gate stood an old monument. It was made of acorn shell and smooth stone. On it was a picture of an ancient beetle king."},{"type":"p","text":"The words said:"},{"type":"p","text":"A successful guard does not always win. A successful guard keeps the kingdom safe."},{"type":"p","text":"Hasaminosuke read the words quietly."},{"type":"p","text":"Then he sat down on a moss cushion."},{"type":"p","text":"“I will run into trouble if I pretend to be fine,” he said. “So I will rest.”"},{"type":"p","text":"At that moment, a smaller beetle rolled a tiny wooden ball into the flower petal ring."},{"type":"p","text":"“We can still do the Puni-Puni Sumo Test,” said the beetle. “The visitors may push this ball out of the ring. If they do it safely, they pass.”"},{"type":"p","text":"Taku stepped into the ring."},{"type":"p","text":"“This is probably a mission. Mission: Push the Beetle Ball.”"},{"type":"p","text":"He pushed."},{"type":"p","text":"The ball did not move."},{"type":"p","text":"He pushed harder."},{"type":"p","text":"The ball still did not move."},{"type":"p","text":"Then the petal bounced."},{"type":"p","text":"PUNI!"},{"type":"p","text":"Taku fell on his back."},{"type":"p","text":"“The ring attacked me,” he said."},{"type":"p","text":"“The ring is soft,” said Ms. Hoshino. “Your balance attacked you.”"},{"type":"p","text":"Riku stepped into the ring with two block-shaped shoes he had made from bark."},{"type":"p","text":"“I designed traction support.”"},{"type":"p","text":"“Initial safety check?” asked Ms. Hoshino."},{"type":"p","text":"“Completed,” said Riku."},{"type":"p","text":"He pushed the ball. His bark shoes stuck to the petal."},{"type":"p","text":"“I cannot move,” he said."},{"type":"p","text":"Kenta stepped into the ring and knelt beside the petal."},{"type":"p","text":"“This material is fascinating. It has bounce, softness, and slight frog energy.”"},{"type":"p","text":"“Are you fighting?” asked Hasaminosuke."},{"type":"p","text":"“I am observing professionally,” said Kenta."},{"type":"p","text":"Finally, Taku, Kenta, and Riku pushed together. Ms. Hoshino counted."},{"type":"p","text":"“One, two, three.”"},{"type":"p","text":"PUNI-PUNI-PON!"},{"type":"p","text":"The ball rolled gently out of the ring."},{"type":"p","text":"The beetles cheered."},{"type":"p","text":"Hasaminosuke raised one tired leg."},{"type":"p","text":"“You passed because you used teamwork, made use of wisdom, and did not damage the flower.”"},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“So it was successful?”"},{"type":"p","text":"“Yes,” said Hasaminosuke. “You are small now, but you may grow up into respectful giants.”"},{"type":"p","text":"Taku looked at his tiny hands."},{"type":"p","text":"“I prefer growing back first.”"},{"type":"p","text":"Hasaminosuke laughed so hard that his jaws clicked like tap shoes."},{"type":"p","text":"“Enter Beetle Kingdom,” he said. “And please tell the king that I am resting by order of the small frog doctor.”"},{"type":"p","text":"Kenta froze with happiness."},{"type":"p","text":"“Did he call me a frog doctor?”"},{"type":"p","text":"“No,” said Ms. Hoshino. “He almost did, and I am not correcting him today.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"The Ant Train and the Underground Tunnel Tour"},{"type":"p","text":"Inside the gate, Beetle Kingdom was not just a pile of leaves."},{"type":"p","text":"It had roads made of roots. It had mushroom bus stops. It had acorn shops. It had a sticky tree-sap cafe called The Smelly Sweet Bar."},{"type":"p","text":"Taku stared at everything."},{"type":"p","text":"“This is not a small forest,” he said. “This is a whole city.”"},{"type":"p","text":"“Small to us,” said Ms. Hoshino. “Not small to them.”"},{"type":"p","text":"A line of ants hurried past. Each ant wore a tiny leaf cap."},{"type":"p","text":"One ant blew a whistle."},{"type":"p","text":"“Ant Central Departure Station! Departure in ten seconds! No crumb dropping!”"},{"type":"p","text":"Riku looked delighted."},{"type":"p","text":"“Transportation system.”"},{"type":"p","text":"Kenta looked even more delighted."},{"type":"p","text":"“Ant train.”"},{"type":"p","text":"The ant conductor bowed."},{"type":"p","text":"“I am Conductor Anton. Please board the Ant Train. Keep all legs inside the line. We ban crumb dropping, wing pulling, and screaming into tunnels.”"},{"type":"p","text":"“I have no wings,” said Taku."},{"type":"p","text":"“Then do not pull someone else’s,” said Anton."},{"type":"p","text":"They climbed onto a leaf carriage pulled by twelve ants. The carriage moved smoothly along a dark tunnel under the roots."},{"type":"p","text":"Anton rang a seed bell."},{"type":"p","text":"“Next stop: Underground History Cave.”"},{"type":"p","text":"The tunnel walls glowed with tiny fungus lamps."},{"type":"p","text":"“Do not expose this area to bright light,” Anton warned. “Some tunnel rooms need darkness.”"},{"type":"p","text":"Riku quickly turned his tablet screen down."},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Good. We are visitors. After all, this is their home.”"},{"type":"p","text":"The train slowed beside a wall covered with pictures scratched into clay. The pictures showed water drops, roots, ants, beetles, and a long dry sun."},{"type":"p","text":"“These pictures reveal our history,” said Anton. “This tunnel used to be wet. We used to have many water stations. But during a long dry period, the forest had a drought.”"},{"type":"p","text":"“A drought means a long time with little water,” said Ms. Hoshino. “It can affect plants, insects, and the whole forest.”"},{"type":"p","text":"Kenta took off his cap respectfully."},{"type":"p","text":"“I am grateful for this lesson from ants.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“We should be grateful for small workers too,” she said."},{"type":"p","text":"Anton looked pleased."},{"type":"p","text":"“We are grateful for listeners who do not drop crumbs.”"},{"type":"p","text":"Taku pointed at a huge round water drop shining on a root above them."},{"type":"p","text":"“That drop is big. Large. Huge.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Big, large, and huge have similar meanings. In particular, at your current size, a single dewdrop looks huge.”"},{"type":"p","text":"The water drop trembled."},{"type":"p","text":"Riku’s eyes widened."},{"type":"p","text":"“If it falls, the consequence could be dramatic.”"},{"type":"p","text":"“Correct,” said Anton. “One uncontrolled dewdrop can flood a tunnel.”"},{"type":"p","text":"Taku whispered, “Dewdrop Planet is dangerous.”"},{"type":"p","text":"“It is still water,” said Ms. Hoshino."},{"type":"p","text":"The train stopped at a platform made of dry leaves."},{"type":"p","text":"Anton gave them a new assignment."},{"type":"p","text":"“Carry one safe drop of water to the Sap Root Station. It will support the festival.”"},{"type":"p","text":"Kenta saluted."},{"type":"p","text":"“For the ants. For the beetles. For all tiny residents.”"},{"type":"p","text":"Riku made a quick plan. He folded a leaf into a small bowl and tied it to the carriage with grass fiber."},{"type":"p","text":"“Dewdrop Tank Stabilizer,” he said. “Initial test.”"},{"type":"p","text":"Ms. Hoshino lifted one finger."},{"type":"p","text":"“Initial safety check first.”"},{"type":"p","text":"The dewdrop slid into the leaf bowl."},{"type":"p","text":"It shook."},{"type":"p","text":"The carriage shook."},{"type":"p","text":"The ants shook."},{"type":"p","text":"Taku shook."},{"type":"p","text":"Kenta yelled, “The water tank is big, large, huge, and very wobbly!”"},{"type":"p","text":"The Ant Train moved."},{"type":"p","text":"Wobble."},{"type":"p","text":"Wobble."},{"type":"p","text":"WOBBLE."},{"type":"p","text":"“Left!” shouted Riku."},{"type":"p","text":"“Right!” shouted Taku."},{"type":"p","text":"“Frog!” shouted Kenta."},{"type":"p","text":"“Not a direction!” shouted Ms. Hoshino."},{"type":"p","text":"The dewdrop almost rolled out. Then Taku held a tiny stick like a space rover arm. Riku pulled a grass rope. Kenta used a soft leaf to guide the drop."},{"type":"p","text":"At last, they reached Sap Root Station."},{"type":"p","text":"The ants cheered."},{"type":"p","text":"Anton bowed deeply."},{"type":"p","text":"“Because of your careful work, the festival water supply is safe for now.”"},{"type":"p","text":"Taku looked proud."},{"type":"p","text":"“So we saved a planet.”"},{"type":"p","text":"“You delivered a water drop,” said Ms. Hoshino."},{"type":"p","text":"“To a tiny world,” said Taku."},{"type":"p","text":"Ms. Hoshino looked around at the glowing tunnel, the ants, and the dewdrop tank."},{"type":"p","text":"“Yes,” she said. “That part is true.”"},{"type":"p","text":"Then the ground shook."},{"type":"p","text":"A sound came from above."},{"type":"p","text":"MIN-MIN-MIN-MAX!"},{"type":"p","text":"Anton dropped his whistle."},{"type":"p","text":"“Oh no,” he said. “DJ Min-Min Max has started.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"DJ Min-Min Max and the Forest Mega-Loud Live Show"},{"type":"p","text":"When they returned to the surface, the whole forest was bouncing."},{"type":"p","text":"Leaves trembled."},{"type":"p","text":"Acorns rolled."},{"type":"p","text":"A mushroom sign fell over and pointed to “Bathroom for Ladybugs” instead of “Festival Square.”"},{"type":"p","text":"At the center of the square stood a cicada wearing acorn headphones. His leaf speakers were as wide as lunch trays. Sticky tree sap lights flashed behind him."},{"type":"p","text":"“MIN-MIN-MIN-MAX!” he shouted. “Welcome to the Annual Forest Live!”"},{"type":"p","text":"Taku covered his ears."},{"type":"p","text":"“This is a forest concert.”"},{"type":"p","text":"Kenta covered his ears too, but he was smiling."},{"type":"p","text":"“This is the loudest bug I have ever respected.”"},{"type":"p","text":"Ms. Hoshino said, “Respect can be quiet.”"},{"type":"p","text":"The square seemed to be covered with cicada shells, leaf confetti, and tiny signs that said LOW VOLUME PLEASE. Ant carts could not move. Beetle wagons were stuck behind a mushroom. A traffic jam stretched from the sap cafe to the root bridge."},{"type":"p","text":"A small golden beetle sat on a pebble and cried."},{"type":"p","text":"“No one can hear my tiny song,” it said."},{"type":"p","text":"Kenta knelt beside the beetle."},{"type":"p","text":"“I will comfort you,” he said. “Your song may be tiny, but it matters.”"},{"type":"p","text":"The beetle sniffed."},{"type":"p","text":"“Matter means it is important?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “Good use.”"},{"type":"p","text":"A beetle wearing a leaf badge climbed onto a bark box."},{"type":"p","text":"“I call a meeting of the Forest Student Council!” she shouted."},{"type":"p","text":"Taku whispered, “There is a student council for bugs?”"},{"type":"p","text":"“Apparently,” said Ms. Hoshino. “Many societies need decisions.”"},{"type":"p","text":"The student council included three ants, two beetles, one shy moth, and a snail who arrived late but looked official."},{"type":"p","text":"The council leader said, “We must make a decision. The music is fun, but every resident has a right to use the forest path.”"},{"type":"p","text":"DJ Min-Min Max lowered one headphone."},{"type":"p","text":"“My dream was to be a famous forest DJ,” he said. “I wanted my dream to come true. Today my dream came true. Why does everyone look upset?”"},{"type":"p","text":"A tired ant raised a leg."},{"type":"p","text":"“Because the traffic jam is longer than a noodle.”"},{"type":"p","text":"A beetle pointed at the stage."},{"type":"p","text":"“The path is covered with shells.”"},{"type":"p","text":"The shy moth whispered, “I like music, but I also like not vibrating.”"},{"type":"p","text":"DJ Min-Min Max looked at the crowd."},{"type":"p","text":"“I did not mean to ignore the residents,” he said. “I wanted to make everyone happy.”"},{"type":"p","text":"Riku crawled behind the leaf speakers."},{"type":"p","text":"“The speakers use renewable energy,” he said. “Leaf solar panels collect sunlight. Interesting system. But the volume control is stuck at MIN-MIN-MAX.”"},{"type":"p","text":"“In general, renewable energy can be useful,” said Ms. Hoshino. “But any system should be used carefully.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“Music is good, but shaking the forest apart does not make sense.”"},{"type":"p","text":"DJ Min-Min Max drooped."},{"type":"p","text":"“So my dream came true, but I forgot to listen.”"},{"type":"p","text":"Kenta patted the stage."},{"type":"p","text":"“Your music has bug power. But quiet bugs matter too.”"},{"type":"p","text":"Riku pulled out three grass strings, a seed dial, and a beetle-shell knob."},{"type":"p","text":"“I can design a Min-Min Volume Support System,” he said. “Maybe.”"},{"type":"p","text":"Ms. Hoshino said, “Initial safety check first.”"},{"type":"p","text":"“Checked,” said Riku."},{"type":"p","text":"He attached the seed dial to the speaker."},{"type":"p","text":"DJ Min-Min Max cleared his throat."},{"type":"p","text":"“Low volume mode test.”"},{"type":"p","text":"He sang."},{"type":"p","text":"“Min-min.”"},{"type":"p","text":"The leaves moved gently."},{"type":"p","text":"The ants smiled."},{"type":"p","text":"The snail nodded, very slowly."},{"type":"p","text":"Then Kenta added a soft clap."},{"type":"p","text":"“Gero-clap.”"},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"“Why?”"},{"type":"p","text":"“For rhythm.”"},{"type":"p","text":"The tiny golden beetle sang too. Its voice was small, but this time everyone heard it."},{"type":"p","text":"The student council leader raised her leaf badge."},{"type":"p","text":"“Decision: the concert may continue at safe volume, the shells must be cleared, and the ant road must remain open.”"},{"type":"p","text":"DJ Min-Min Max bowed."},{"type":"p","text":"“I want to support the forest, not shake it apart.”"},{"type":"p","text":"He turned to the crowd."},{"type":"p","text":"“New song! It is called Small Does Not Mean Unimportant.”"},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“That title sounds like Ms. Hoshino.”"},{"type":"p","text":"Ms. Hoshino smiled back."},{"type":"p","text":"“It is a very good title.”"},{"type":"p","text":"The whole forest joined in softly."},{"type":"p","text":"Ant feet tapped."},{"type":"p","text":"Beetle shells clicked."},{"type":"p","text":"Leaves whispered."},{"type":"p","text":"The snail shook a tiny bell, three seconds late."},{"type":"p","text":"For once, even Kenta’s frog clap fit the music."},{"type":"p","text":"Then a royal horn sounded."},{"type":"p","text":"King Kabuking had arrived."},{"type":"p","text":"His sticky sap crown slowly slid over one eye."},{"type":"p","text":"“Tiny visitors,” said the king, pushing his crown back up, “you have helped the festival. Now you must visit Dr. Nectar if you want to return to your original size.”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Return? Already?”"},{"type":"p","text":"Ms. Hoshino said, “Yes. Before your parents wonder why you are bean-size.”"},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"Return-to-Size Nectar and Thank You to the Forest"},{"type":"p","text":"Dr. Nectar lived in a flower cup above the sap cafe."},{"type":"p","text":"The doctor wore a white coat made of flower petals and carried a spoon carved from grass. A sign on the door said:"},{"type":"p","text":"Return-to-Size Nectar Lab. Do not drink unknown nectar in real life. This is story science."},{"type":"p","text":"Ms. Hoshino pointed to the sign."},{"type":"p","text":"“Excellent warning.”"},{"type":"p","text":"Dr. Nectar bowed."},{"type":"p","text":"“Welcome. I can judge whether visitors may receive Return-to-Size Nectar.”"},{"type":"p","text":"Taku raised his hand."},{"type":"p","text":"“Is there a fee?”"},{"type":"p","text":"“Yes,” said Dr. Nectar. “The fee is not money. The fee is one account of what you learned.”"},{"type":"p","text":"“Account means a report?” asked Taku."},{"type":"p","text":"“Yes,” said Dr. Nectar. “It can also mean a bank account, but I do not accept acorn money from children.”"},{"type":"p","text":"Kenta looked relieved."},{"type":"p","text":"“I only have one crumb and a frog eraser.”"},{"type":"p","text":"Dr. Nectar placed a shining drop of honey-colored nectar on a leaf dish."},{"type":"p","text":"“This nectar has a size-changing effect,” the doctor said. “It is not medical treatment. It is not for real life. Do not taste unknown plants, sap, or nectar.”"},{"type":"p","text":"“Very important,” said Ms. Hoshino."},{"type":"p","text":"King Kabuking stood beside the lab door. His crown slipped again."},{"type":"p","text":"“I am an ambitious king,” he announced. “I want the forest to have clean paths, safe water, respectful visitors, and concerts that do not launch ants into the air.”"},{"type":"p","text":"“One ant did fly a little,” whispered Kenta."},{"type":"p","text":"“That was before low volume mode,” said DJ Min-Min Max from outside."},{"type":"p","text":"Dr. Nectar opened a tiny notebook."},{"type":"p","text":"“Tell me your account. What was your discovery?”"},{"type":"p","text":"Taku stepped forward."},{"type":"p","text":"“I discovered that tiny creatures have huge worlds. A dewdrop can be a water source. A root can be a road. A forest can be a kingdom.”"},{"type":"p","text":"Dr. Nectar wrote it down."},{"type":"p","text":"Kenta stepped forward next."},{"type":"p","text":"“I discovered that bugs are not just things to catch. They are residents. Hasaminosuke needed rest. The golden beetle needed comfort. Ants needed water. In my opinion, beetles deserve respect.”"},{"type":"p","text":"Dr. Nectar nodded."},{"type":"p","text":"“Good account.”"},{"type":"p","text":"Riku looked at his tablet."},{"type":"p","text":"“I discovered that the forest is a living system. Water, soil, plants, insects, sound, and paths are connected. My software could not account for everything because living systems are not simple machines.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That is a careful conclusion.”"},{"type":"p","text":"Then she gave her own account."},{"type":"p","text":"“I discovered that my school report will be difficult. By contrast, the lesson is simple: observe carefully, protect habitats, and do not ride beetles.”"},{"type":"p","text":"Kenta raised a finger."},{"type":"p","text":"“Can we put off returning for five minutes? I want to observe more beetles.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “We do not put off safety.”"},{"type":"p","text":"Dr. Nectar wrote one final line."},{"type":"p","text":"“In all, you carried one dewdrop, helped one gatekeeper rest, reduced one concert, and learned many things.”"},{"type":"p","text":"King Kabuking lifted his horn."},{"type":"p","text":"“You contributed to Beetle Kingdom. You did not crush our houses. You did not steal our sap. You did not call our king a sticky helmet insect.”"},{"type":"p","text":"Taku opened his mouth, then closed it."},{"type":"p","text":"“I almost did.”"},{"type":"p","text":"“Thank you for stopping,” said Ms. Hoshino."},{"type":"p","text":"Dr. Nectar held up the nectar."},{"type":"p","text":"“One more term,” the doctor said. “Term can mean a word, a period of time, or a condition. My condition is this: return to your size and protect the forest.”"},{"type":"p","text":"“We will,” said Taku."},{"type":"p","text":"“I will observe from a safe distance,” said Kenta."},{"type":"p","text":"“I will update the software,” said Riku. “No surprise shrinking.”"},{"type":"p","text":"“I will make sure of that,” said Ms. Hoshino."},{"type":"p","text":"They each touched the nectar with a tiny leaf spoon."},{"type":"p","text":"It tasted like honey, sunlight, and the smell of a very clean tree."},{"type":"p","text":"The world stretched."},{"type":"p","text":"The grass became grass again."},{"type":"p","text":"The dewdrop became a dewdrop again."},{"type":"p","text":"The ants became ants again."},{"type":"p","text":"PON!"},{"type":"p","text":"Taku, Kenta, Riku, and Ms. Hoshino stood beside the small forest in the school yard."},{"type":"p","text":"Kenta immediately lay down on the ground and looked at the grass."},{"type":"p","text":"“Hello, Beetle Kingdom,” he whispered. “I respect your border.”"},{"type":"p","text":"Taku looked at the tiny trees and roots."},{"type":"p","text":"“It is not just a small forest,” he said. “It is a whole kingdom.”"},{"type":"p","text":"Riku checked his tablet."},{"type":"p","text":"The screen said:"},{"type":"p","text":"Tiny Explorer Software Update Complete. New rule: No shrinking without teacher permission."},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"“That is the best rule your software has ever made.”"},{"type":"p","text":"Then a very quiet sound came from the grass."},{"type":"p","text":"“MIN-MIN... low volume mode.”"},{"type":"p","text":"Kenta’s eyes widened."},{"type":"p","text":"“DJ Min-Min Max!”"},{"type":"p","text":"Something tiny landed on Kenta’s head."},{"type":"p","text":"It was a cicada headphone made from a seed shell."},{"type":"p","text":"Ms. Hoshino took one deep breath."},{"type":"p","text":"“How do I write ‘student returned from Beetle Kingdom with insect headphones’ in the school report?”"},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“Write: Mission successful.”"},{"type":"p","text":"Kenta nodded."},{"type":"p","text":"“And write: Small creatures matter.”"},{"type":"p","text":"Riku added, “And write: Initial test should not shrink the class.”"},{"type":"p","text":"Ms. Hoshino looked at the small forest again."},{"type":"p","text":"The leaves moved softly."},{"type":"p","text":"The ants marched."},{"type":"p","text":"Somewhere under a leaf, a beetle festival continued at a safe volume."},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That,” she said, “is a report I can accept.”"}]},{"themeNo":10,"id":"10","title":"The Not-Scary Ghost Mansion Night Shift","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"Pororon and the Boo-Hoo Interview"},{"type":"p","text":"The field trip notice looked strange from the beginning."},{"type":"p","text":"Ms. Hoshino wrote on the board:"},{"type":"p","text":"Today, we will visit the Not-Scary Ghost Mansion. This is a safe evening tour. Stay with the group. Be polite. Do not chase ghosts."},{"type":"p","text":"Taku raised his hand at once."},{"type":"p","text":"“This is probably a mission,” he said. “Mission: Ghost Mansion Night Shift.”"},{"type":"p","text":"Kenta looked under his desk."},{"type":"p","text":"“Maybe a frog ghost will come with us,” he said."},{"type":"p","text":"“It is probably not a frog,” said Ms. Hoshino. “Also, please do not bring a frog net to an interview.”"},{"type":"p","text":"Riku took out a small notebook and wrote, Possible ghost system. Possible floating plates. Possible frog: Kenta hopes yes."},{"type":"p","text":"That evening, the mansion did not look very scary. It had yellow windows, a clean front path, and a sign that said:"},{"type":"p","text":"Not-Scary Ghost Mansion Night Shift Trainee Interview Today"},{"type":"p","text":"The front door opened by itself."},{"type":"p","text":"Creeeeak."},{"type":"p","text":"Then it whispered, “Please wipe your shoes.”"},{"type":"p","text":"“That is polite,” said Ms. Hoshino."},{"type":"p","text":"“Too polite to be scary,” said Taku."},{"type":"p","text":"Inside the hall sat a small white ghost with a huge pile of handkerchiefs. His name tag said Pororon. Under his name, someone had written: Night Shift Applicant."},{"type":"p","text":"Pororon tried to stand up straight."},{"type":"p","text":"“I prepared my best boo,” he said. “I will now make a proper attempt.”"},{"type":"p","text":"He took a deep breath."},{"type":"p","text":"“Boo…”"},{"type":"p","text":"Then his eyes filled with tears."},{"type":"p","text":"“…hoo.”"},{"type":"p","text":"Taku blinked."},{"type":"p","text":"“That was not scary,” he said. “But it was very wet.”"},{"type":"p","text":"Pororon covered his face with two handkerchiefs."},{"type":"p","text":"“I am anxious,” he said. “When I try to say Boo, it becomes Boo-hoo.”"},{"type":"p","text":"A tall ghost manager floated in from the hall. He wore a hat shaped like a spiderweb."},{"type":"p","text":"“Pororon destroyed the scare machine with his tears,” said the manager. “Several ghosts accuse him of ruining the interview room.”"},{"type":"p","text":"Pororon cried harder."},{"type":"p","text":"“I did not mean to destroy anything!”"},{"type":"p","text":"Ms. Hoshino raised one hand."},{"type":"p","text":"“We should not accuse someone before we check the facts.”"},{"type":"p","text":"Riku crouched by the scare machine. It was a box with a rubber bat, a light, and a button marked BOO POWER. The box leaned to the left."},{"type":"p","text":"“The foundation is weak,” said Riku. “The tear was not the primary cause.”"},{"type":"p","text":"The manager floated lower."},{"type":"p","text":"“The foundation?”"},{"type":"p","text":"“The bottom part,” said Ms. Hoshino. “A weak foundation can make a machine fall apart.”"},{"type":"p","text":"Riku opened the side panel."},{"type":"p","text":"“Also, the screw is made of old candy.”"},{"type":"p","text":"“That was an economic decision,” said the manager. “Ghost glue costs a lot.”"},{"type":"p","text":"“We will discuss ghost glue later,” said Ms. Hoshino."},{"type":"p","text":"The manager cleared his throat."},{"type":"p","text":"“Pororon, the night shift has serious responsibility. A night ghost must close doors, guide lost guests, help in the dining hall, and protect the mansion from noisy raccoons.”"},{"type":"p","text":"“And scare people?” asked Taku."},{"type":"p","text":"“Sometimes,” said the manager. “But our Ghost Civil Rights Board says every ghost has the right to refuse scary work.”"},{"type":"p","text":"Ms. Hoshino nodded carefully."},{"type":"p","text":"“Civil rights is an important phrase in the human world. Here, the ghosts are using it for their mansion rule. The idea is that everyone should be treated fairly.”"},{"type":"p","text":"Pororon sniffed."},{"type":"p","text":"“I refuse scary work because I do not want children to cry. I already cry enough for three ghosts.”"},{"type":"p","text":"“Then you may have a different talent,” said Taku. “A tearful ghost can still be helpful.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“The suffix -ful means full of. Tearful means full of tears. Helpful means full of help. Careful means full of care.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Frogful?”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"Pororon’s eyes slowly closed. He was so nervous and tired that he began to fall asleep while floating."},{"type":"p","text":"“Please do not fall asleep during your interview,” said the manager."},{"type":"p","text":"“Maybe we should turn down the light and the music,” said Ms. Hoshino. “He needs to calm down.”"},{"type":"p","text":"Riku pressed a button. The music became softer. The lights became warm and low."},{"type":"p","text":"Pororon opened one eye."},{"type":"p","text":"“When I look back on my first boo,” he said, “I think it was more like a wet sneeze.”"},{"type":"p","text":"Kenta wrote in his notebook."},{"type":"p","text":"“Wet sneeze ghost. Interesting species.”"},{"type":"p","text":"“Not a species,” said Ms. Hoshino."},{"type":"p","text":"Then a bell rang in the hall."},{"type":"p","text":"Ding-dong-boo."},{"type":"p","text":"The manager gasped."},{"type":"p","text":"“Next interview test: the No-Face Makeup Lesson!”"},{"type":"p","text":"Pororon shivered."},{"type":"p","text":"“Do I need a scary face?”"},{"type":"p","text":"Taku looked at the handkerchief pile."},{"type":"p","text":"“Maybe just a dry one.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Madame Noppera’s Makeup Class and the Extra Nose Problem"},{"type":"p","text":"The makeup classroom was covered with mirrors."},{"type":"p","text":"That was strange because most of the ghosts did not have faces."},{"type":"p","text":"At the front stood Madame Noppera. She wore a purple dress, a feather hat, and a badge that said Face Policy Teacher. Her head was smooth and blank."},{"type":"p","text":"“Welcome,” she said. “A proper scary face requires knowledge.”"},{"type":"p","text":"Kenta whispered, “Where is her mouth?”"},{"type":"p","text":"“Please do not ask that in public,” said Ms. Hoshino."},{"type":"p","text":"Madame Noppera held up a box of face stickers."},{"type":"p","text":"“Eyes. Mouths. Noses. Eyebrows. Surprise wrinkles. Suitable parts must appear in suitable places.”"},{"type":"p","text":"She stuck two eyes on her forehead."},{"type":"p","text":"Then she stuck a mouth on her left shoulder."},{"type":"p","text":"Taku stared."},{"type":"p","text":"“That face is taking a side trip.”"},{"type":"p","text":"“I appear confident,” said Madame Noppera."},{"type":"p","text":"“You appear like a person whose face got lost on the way,” said Riku."},{"type":"p","text":"Madame Noppera looked proud anyway."},{"type":"p","text":"“The challenge today is simple. Make a face that helps your job.”"},{"type":"p","text":"Pororon lifted a nose sticker."},{"type":"p","text":"“I do not want a face that makes children cry.”"},{"type":"p","text":"“That is why I want to employ you,” said Madame Noppera. “This mansion needs a ghost who can comfort guests.”"},{"type":"p","text":"Pororon blinked."},{"type":"p","text":"“Employ me? Like a real job?”"},{"type":"p","text":"“Yes. However, first we must find your suitable face.”"},{"type":"p","text":"The other ghosts joined the class. Or, as Ms. Hoshino explained, they took part in the class. They also participated in the lesson."},{"type":"p","text":"“Join, take part in, and participate in are similar,” she said. “They all mean to be part of an activity.”"},{"type":"p","text":"Kenta chose two round green eye stickers."},{"type":"p","text":"“These have frog energy.”"},{"type":"p","text":"“Please do not make every ghost a frog,” said Ms. Hoshino."},{"type":"p","text":"Riku built a Face Sticker Sorter."},{"type":"p","text":"“Initial test.”"},{"type":"p","text":"“Initial permission first,” said Ms. Hoshino."},{"type":"p","text":"Madame Noppera gave permission. Riku poured stickers into the machine. It sorted eyes into one cup, mouths into another, and noses into a third."},{"type":"p","text":"Then it sorted Kenta’s frog eraser into the Nose Cup."},{"type":"p","text":"“Froggy has been recognized as a nose,” said Kenta proudly."},{"type":"p","text":"“That is not a proper result,” said Ms. Hoshino."},{"type":"p","text":"Pororon tried a tiny smile sticker. Then he tried a star-shaped tear sticker. Then he tried a very serious eyebrow."},{"type":"p","text":"The eyebrow made him look like he was angry at soup."},{"type":"p","text":"“I refuse this eyebrow,” said Pororon. “It is too soup-angry.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “You can refuse something that does not feel right.”"},{"type":"p","text":"Madame Noppera opened a small rule book."},{"type":"p","text":"“Our Ghost Makeup Policy says: clean brushes, kind faces, no scary sneezing.”"},{"type":"p","text":"“Why no scary sneezing?” asked Taku."},{"type":"p","text":"“If a ghost has the flu, even in a story, the ghost should rest,” said Ms. Hoshino. “Also, do not share makeup tools when you are sick.”"},{"type":"p","text":"Madame Noppera nodded."},{"type":"p","text":"“Health before horror.”"},{"type":"p","text":"The class continued. A tall mummy ghost put eyes on his knees. A tiny door ghost put a smile on his doorknob. Pororon put one gentle smile near the top of his face and one small tear sticker under it."},{"type":"p","text":"“That looks kind,” said Taku."},{"type":"p","text":"“That looks like a wet marshmallow,” said Kenta."},{"type":"p","text":"“Kind wet marshmallow,” said Pororon softly."},{"type":"p","text":"Riku checked the sticker box."},{"type":"p","text":"“We are about to run out of noses.”"},{"type":"p","text":"All at once, the ghosts panicked."},{"type":"p","text":"“No noses?” cried Madame Noppera. “At the end of the lesson, everyone must hand in extra noses!”"},{"type":"p","text":"A ghost with three noses slowly removed two and placed them on the desk."},{"type":"p","text":"“I had a nose collection problem,” he said."},{"type":"p","text":"Kenta held up a tiny green sticker."},{"type":"p","text":"“Can I hand in a frog nose?”"},{"type":"p","text":"“No frog nose today,” said Ms. Hoshino."},{"type":"p","text":"Pororon looked in the mirror. His face was not scary. It was gentle, a little silly, and very Pororon."},{"type":"p","text":"“I do not appear scary,” he said."},{"type":"p","text":"“No,” said Taku. “But you appear like someone I would ask for help if I got lost.”"},{"type":"p","text":"Madame Noppera clapped."},{"type":"p","text":"“Excellent. A suitable face for a comfort ghost.”"},{"type":"p","text":"Pororon smiled."},{"type":"p","text":"Then his smile sticker fell off and landed on his stomach."},{"type":"p","text":"Kenta pointed."},{"type":"p","text":"“Belly face!”"},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"“Still not a frog.”"},{"type":"p","text":"A loud clatter came from below."},{"type":"p","text":"Clack-clack-clack-clack!"},{"type":"p","text":"The floor shook."},{"type":"p","text":"Madame Noppera looked down."},{"type":"p","text":"“The dining hall plates are moving again.”"},{"type":"p","text":"Pororon gulped."},{"type":"p","text":"“Plate duty?”"},{"type":"p","text":"The manager’s voice echoed through the wall."},{"type":"p","text":"“All trainees to the dining hall!”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Sarako’s Plate Counter and the Clack-Clack Tower"},{"type":"p","text":"The ghost dining hall was underground."},{"type":"p","text":"It had long tables, floating candles, and a sign that said:"},{"type":"p","text":"Please return all plates to the Dish Return Station. Destination: left side of the kitchen. Do not build towers without permission."},{"type":"p","text":"At the center of the room stood Sarako, the plate counter. She wore a white apron and balanced one tiny plate on her head."},{"type":"p","text":"“One plate,” said Sarako. “Two plates. Three plates. Wait. Did plate number four express sadness?”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“A sad plate creature?”"},{"type":"p","text":"“It is a plate,” said Ms. Hoshino."},{"type":"p","text":"Sarako trembled."},{"type":"p","text":"“I base attendance on plates. If there are forty plates, there should be forty ghosts at dinner. But when plates move, I cannot review the list.”"},{"type":"p","text":"Taku looked at the plates. They sat in stacks on a long table. They looked normal."},{"type":"p","text":"Then, all at once, every plate began to shake."},{"type":"p","text":"Clack-clack-clack-clack!"},{"type":"p","text":"A blue plate rolled across the floor. A yellow plate hopped onto a spoon. A tiny cup ghost screamed, “Not again!”"},{"type":"p","text":"Riku opened his backpack."},{"type":"p","text":"“I can build a Plate Attendance Counter.”"},{"type":"p","text":"Ms. Hoshino raised her finger."},{"type":"p","text":"“Initial permission first.”"},{"type":"p","text":"Sarako nodded quickly."},{"type":"p","text":"“You have permission, but please do not start construction on a giant plate tower.”"},{"type":"p","text":"Riku froze."},{"type":"p","text":"“I was not going to build a giant plate tower.”"},{"type":"p","text":"Ms. Hoshino looked at him."},{"type":"p","text":"“I was going to build a medium plate tower.”"},{"type":"p","text":"“No tower,” said Ms. Hoshino."},{"type":"p","text":"Riku changed the plan. He made a small platform with soft cloth on top. The plates could slide gently down into the correct basket."},{"type":"p","text":"“This is safer,” he said. “Also less dramatic.”"},{"type":"p","text":"Sarako held her notebook."},{"type":"p","text":"“I hate counting in public,” she said. “If I make a mistake, everyone laughs.”"},{"type":"p","text":"Pororon floated close."},{"type":"p","text":"“I express my feelings by crying,” he said. “You express your worry by counting plates.”"},{"type":"p","text":"“That is strange,” said Sarako."},{"type":"p","text":"“But kind,” said Ms. Hoshino."},{"type":"p","text":"The manager pointed to the corner of the dining hall. Small dust bunnies sat there wearing crumb hats."},{"type":"p","text":"“Please be careful. Broken plates can be harmful to the tiny dust-bunny ecosystem.”"},{"type":"p","text":"Kenta dropped to the floor."},{"type":"p","text":"“Dust-bunny ecosystem!” he whispered. “May I observe it?”"},{"type":"p","text":"“From a safe distance,” said Ms. Hoshino."},{"type":"p","text":"The plates clacked louder. Sarako tried to count them, but her voice shook."},{"type":"p","text":"“One, two, four, seven, maybe soup…”"},{"type":"p","text":"“Let’s review the system,” said Ms. Hoshino. “Where should the plates go?”"},{"type":"p","text":"“The destination is the Dish Return Station,” said Taku."},{"type":"p","text":"“Who can help?”"},{"type":"p","text":"“The cup ghosts,” said Pororon."},{"type":"p","text":"“With the help of the cup ghosts,” said Riku, “we can move plates in small groups.”"},{"type":"p","text":"The tiny cup ghosts marched in a line."},{"type":"p","text":"“Cup team ready!”"},{"type":"p","text":"Riku’s machine slid each plate gently forward. Taku called out the numbers. Kenta watched the dust-bunny ecosystem and warned everyone when a crumb hat was in the way. Pororon wiped tears from the floor before anyone slipped."},{"type":"p","text":"Sarako counted again."},{"type":"p","text":"“One plate. Two plates. Three plates. Four plates.”"},{"type":"p","text":"Her voice grew steadier."},{"type":"p","text":"“Thirty-eight plates. Thirty-nine plates. Forty plates.”"},{"type":"p","text":"The room cheered."},{"type":"p","text":"Sarako smiled."},{"type":"p","text":"“The attendance is complete.”"},{"type":"p","text":"The manager looked relieved."},{"type":"p","text":"“Good. Plate damage would be an economic problem. Ghost plates are not cheap, even when half of them are invisible.”"},{"type":"p","text":"Kenta held up a very small plate."},{"type":"p","text":"“This plate is small. Tiny. Very tiny. Maybe it is a bug plate.”"},{"type":"p","text":"“Small means tiny,” said Ms. Hoshino. “Bug plate is not part of the lesson.”"},{"type":"p","text":"The tiny plate suddenly said, “I am a sauce dish.”"},{"type":"p","text":"Everyone went quiet."},{"type":"p","text":"Kenta whispered, “Still possible bug plate.”"},{"type":"p","text":"Before Ms. Hoshino could answer, a loud voice came from upstairs."},{"type":"p","text":"“Contest time! All ghosts report to the Great Hall!”"},{"type":"p","text":"Sarako hugged her notebook."},{"type":"p","text":"“Oh no. The Scare Failure Contest.”"},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“A failure contest? That sounds like our kind of event.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"The Scare Failure Contest and the Star-Power Stage"},{"type":"p","text":"The Great Hall had a stage, a curtain, and a sign that flashed:"},{"type":"p","text":"Annual Scare Failure Contest Fear Level Required: Maybe Laughter Level Accepted: Probably"},{"type":"p","text":"At the center of the stage stood Mr. Boozawa. He wore a black cape, a red sash, and a very serious face."},{"type":"p","text":"“I command all ghosts to scare properly!” he shouted."},{"type":"p","text":"A mummy ghost stepped forward. He lifted his arms."},{"type":"p","text":"“Booooo—”"},{"type":"p","text":"Then his bandages wrapped around his feet, and he rolled across the stage like a dusty burrito."},{"type":"p","text":"The audience laughed."},{"type":"p","text":"Mr. Boozawa frowned."},{"type":"p","text":"“A decline! A terrible decline! Our scary reputation is going down!”"},{"type":"p","text":"A door ghost tried next. It opened slowly."},{"type":"p","text":"Creeeeeak."},{"type":"p","text":"Then it whispered, “Excuse me. May I scare you now?”"},{"type":"p","text":"“That was polite,” said Ms. Hoshino."},{"type":"p","text":"“And not scary,” said Taku."},{"type":"p","text":"A mirror ghost appeared and screamed at its own reflection."},{"type":"p","text":"Pororon tried to say, “Boo!”"},{"type":"p","text":"“Boo… hoo…”"},{"type":"p","text":"The crowd said, “Aww.”"},{"type":"p","text":"Riku turned on his Boo Meter."},{"type":"p","text":"“I will measure the results.”"},{"type":"p","text":"The screen blinked."},{"type":"p","text":"Fear level: 2. Laughter level: 98. Frog confusion level: 300."},{"type":"p","text":"Kenta clapped."},{"type":"p","text":"“Excellent statistics.”"},{"type":"p","text":"“Not official statistics,” said Ms. Hoshino. “But they are useful.”"},{"type":"p","text":"Mr. Boozawa grabbed a piece of chalk."},{"type":"p","text":"“I will illustrate a proper scary ghost.”"},{"type":"p","text":"He drew a big shape on the board. It had two eyes, four legs, and a long yellow body."},{"type":"p","text":"Taku tilted his head."},{"type":"p","text":"“Global banana ghost?”"},{"type":"p","text":"“No global banana ghost,” said Ms. Hoshino."},{"type":"p","text":"Mr. Boozawa looked hurt."},{"type":"p","text":"“Suppose we stop being scary. What resource do we have? Our income depends on frightening tours!”"},{"type":"p","text":"Taku looked around. He saw ghosts laughing together. He saw Sarako counting plates more confidently. He saw Pororon helping a nervous little candle ghost."},{"type":"p","text":"“You have other resources,” Taku said. “Kindness, jokes, floating plates, and very wet tears.”"},{"type":"p","text":"Mr. Boozawa opened his mouth. Then he closed it."},{"type":"p","text":"The manager stepped onto the stage."},{"type":"p","text":"“Maybe the subject of this contest should change.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Fun is different from harm. A fun surprise is different from a scare that hurts someone’s feelings.”"},{"type":"p","text":"“So,” said Riku, “we can transfer the contest from the Fear Department to the Kindness Department.”"},{"type":"p","text":"“Transfer?” asked Pororon."},{"type":"p","text":"“Move it,” said Ms. Hoshino. “A transfer can be a move from one place or group to another.”"},{"type":"p","text":"Mr. Boozawa looked at the stage lights."},{"type":"p","text":"“At least our stage is powerful.”"},{"type":"p","text":"Riku looked up."},{"type":"p","text":"“There are panels on the roof.”"},{"type":"p","text":"“Yes,” said the manager. “The stage uses solar power. During the day, the panels collect energy from the Sun. At night, the stage uses stored electricity.”"},{"type":"p","text":"Taku’s eyes shone."},{"type":"p","text":"“So this ghost stage runs on star power! The Sun is a star!”"},{"type":"p","text":"“In a way, yes,” said Ms. Hoshino. “But please do not call it spooky star juice.”"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“Can frog ghosts also use star power?”"},{"type":"p","text":"“We still do not have evidence of frog ghosts,” said Ms. Hoshino."},{"type":"p","text":"The contest changed. Instead of trying to scare people, each ghost had to make one safe, kind, funny surprise."},{"type":"p","text":"The mummy ghost unrolled himself and became a bandage slide."},{"type":"p","text":"The door ghost opened and said, “Welcome, please watch your step.”"},{"type":"p","text":"The mirror ghost reflected silly faces."},{"type":"p","text":"Sarako made a plate tower only three plates high, with permission."},{"type":"p","text":"Pororon floated to the front."},{"type":"p","text":"“I cannot scare,” he said. “However, I can help a crying guest.”"},{"type":"p","text":"He handed a handkerchief to a nervous candle ghost."},{"type":"p","text":"The candle ghost smiled."},{"type":"p","text":"The Boo Meter blinked."},{"type":"p","text":"Fear level: 0. Comfort level: 100. Floor wetness: acceptable."},{"type":"p","text":"Mr. Boozawa looked at the numbers."},{"type":"p","text":"“Maybe we should cut down on loud screams.”"},{"type":"p","text":"“And make sure guests are enjoying the tour,” said Ms. Hoshino."},{"type":"p","text":"Mr. Boozawa sighed."},{"type":"p","text":"“I still like saying Boo.”"},{"type":"p","text":"“You can say Boo gently,” said Taku."},{"type":"p","text":"Mr. Boozawa tried."},{"type":"p","text":"“Boo?”"},{"type":"p","text":"A tiny cup ghost clapped."},{"type":"p","text":"Then the stage lights flashed red."},{"type":"p","text":"A warning bell rang."},{"type":"p","text":"Ding-dong-sun!"},{"type":"p","text":"The manager gasped."},{"type":"p","text":"“Morning is coming!”"},{"type":"p","text":"Pororon’s eyes grew wide."},{"type":"p","text":"“Curtain duty!”"},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"Sunrise, Sorry, and the Not-Scary Night Shift Certificate"},{"type":"p","text":"The mansion did not disappear in the morning."},{"type":"p","text":"It just became extremely embarrassed by sunlight."},{"type":"p","text":"Every ghost ran in a circle."},{"type":"p","text":"“Close the curtains!” cried the manager."},{"type":"p","text":"“Find the moon shades!” shouted Mr. Boozawa."},{"type":"p","text":"“Count the breakfast plates!” cried Sarako."},{"type":"p","text":"“Ribbit boo?” whispered something in the corner."},{"type":"p","text":"Kenta froze."},{"type":"p","text":"“I heard that.”"},{"type":"p","text":"Ms. Hoshino pointed down the hall."},{"type":"p","text":"“First, safety. Second, kindness. Third, we will discuss frog ghosts after curtain duty.”"},{"type":"p","text":"Riku pulled out wires, cloth, and a small gear."},{"type":"p","text":"“I can control the curtains with my Sunrise Curtain Control System.”"},{"type":"p","text":"“Initial safety check first,” said Ms. Hoshino."},{"type":"p","text":"Riku checked the cords. Nothing was blocking the doorway. No ghost was inside the curtain roll."},{"type":"p","text":"“Initial test.”"},{"type":"p","text":"The curtains closed."},{"type":"p","text":"Then opened."},{"type":"p","text":"Then closed again."},{"type":"p","text":"Then the chandelier blinked, the plates spun slowly, and Pororon’s tears sparkled like tiny stars."},{"type":"p","text":"“The system lacks calmness,” said Riku."},{"type":"p","text":"“So does the mansion,” said Taku."},{"type":"p","text":"Ms. Hoshino looked at the ghosts."},{"type":"p","text":"“Maybe the mansion does not lack scariness. Maybe it lacks confidence and teamwork.”"},{"type":"p","text":"Pororon looked down."},{"type":"p","text":"“I thought I lacked the right technique.”"},{"type":"p","text":"Mr. Boozawa took off his sash."},{"type":"p","text":"“I thought our achievement had to be scaring people.”"},{"type":"p","text":"Sarako held her notebook."},{"type":"p","text":"“I thought effort did not matter if I made counting mistakes.”"},{"type":"p","text":"Ms. Hoshino spoke gently."},{"type":"p","text":"“Effort matters. Technique matters. But kindness matters too. Pororon needs mental support, not more pressure.”"},{"type":"p","text":"The manager nodded slowly."},{"type":"p","text":"“And our income does not have to come only from scary tours. We can have a Not-Scary Night Tour. Families can laugh, learn, and feel safe.”"},{"type":"p","text":"Taku pointed at the window."},{"type":"p","text":"“The Sun is rising. Earth is turning, so the Sun appears to rise. That means the Sunrise Shield Mission is still on.”"},{"type":"p","text":"“Correct,” said Ms. Hoshino. “The Sun is not attacking the mansion.”"},{"type":"p","text":"Riku made one more adjustment. Pororon held the left curtain rope. Sarako counted the rings. Mr. Boozawa stood ready to say a gentle boo if anyone panicked. Taku watched the light like a space captain. Kenta watched the dark corner for frog evidence."},{"type":"p","text":"With the help of everyone, the curtains closed smoothly."},{"type":"p","text":"The hall became calm."},{"type":"p","text":"The ghosts cheered softly."},{"type":"p","text":"Mr. Boozawa floated toward Pororon."},{"type":"p","text":"“I must apologize,” he said. “I accused you by mistake. The machine broke because of its old foundation, not because of your tears.”"},{"type":"p","text":"Pororon sniffed."},{"type":"p","text":"“Thank you. In any case, I still want to work here.”"},{"type":"p","text":"The manager smiled."},{"type":"p","text":"“Then we will employ you as our Crying Comfort Officer.”"},{"type":"p","text":"Pororon glowed pale blue."},{"type":"p","text":"“My responsibility will be to help guests feel safe?”"},{"type":"p","text":"“Yes,” said the manager."},{"type":"p","text":"“And I do not have to destroy anyone’s peace with a loud Boo?”"},{"type":"p","text":"“No,” said Ms. Hoshino. “You can treat guests kindly.”"},{"type":"p","text":"Kenta whispered, “Treat can mean handle kindly, right? And also give snacks?”"},{"type":"p","text":"“Yes,” said Ms. Hoshino. “Treat has more than one meaning.”"},{"type":"p","text":"At that exact moment, Madame Noppera rolled in a cart of moon-shaped cookies."},{"type":"p","text":"“Then let us treat everyone to cookies!” she said."},{"type":"p","text":"“Good timing,” said Taku."},{"type":"p","text":"The manager opened a silver folder."},{"type":"p","text":"“Please refer to the new mansion policy.”"},{"type":"p","text":"He read aloud."},{"type":"p","text":"Rule one: Do not accuse too quickly. Rule two: Check the facts. Rule three: Do not make fun of tears. Rule four: A fun surprise is different from a harmful scare. Rule five: Treat ghosts, people, plates, and possible frog ghosts with respect."},{"type":"p","text":"Ms. Hoshino paused."},{"type":"p","text":"“Possible frog ghosts?”"},{"type":"p","text":"Kenta pointed to the corner."},{"type":"p","text":"A tiny shape sat under a chair. It had round eyes, a pale sheet, and very small feet."},{"type":"p","text":"It opened its mouth."},{"type":"p","text":"“Ribbit… boo?”"},{"type":"p","text":"Everyone stared."},{"type":"p","text":"Kenta slowly raised both hands."},{"type":"p","text":"“Evidence one: it says ribbit. Evidence two: it says boo. Evidence three: I have waited ten chapters for this.”"},{"type":"p","text":"Ms. Hoshino closed her eyes."},{"type":"p","text":"“I will not write this in the school report.”"},{"type":"p","text":"The manager handed Pororon a certificate."},{"type":"p","text":"Certificate of Not-Scary Night Shift Achievement Pororon may work with kindness, effort, and careful tears."},{"type":"p","text":"Pororon held the certificate proudly."},{"type":"p","text":"“I may not be scary,” he said."},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“But you are helpful.”"},{"type":"p","text":"“And tearful,” said Kenta."},{"type":"p","text":"“And now officially employed,” said Riku."},{"type":"p","text":"The mansion creaked happily. On the wall, glowing letters appeared."},{"type":"p","text":"BOO LEVEL LOW. JOY LEVEL HIGH. THANK YOU FOR THE KIND NIGHT SHIFT."},{"type":"p","text":"Taku looked at the old mansion, the glowing tears, the gentle ghosts, and the tiny frog ghost in the corner."},{"type":"p","text":"“This was definitely a mission,” he said."},{"type":"p","text":"Ms. Hoshino picked up her bag."},{"type":"p","text":"“Yes,” she said. “And the mission is over before anyone asks to bring the frog ghost to school.”"},{"type":"p","text":"Kenta opened his mouth."},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"The frog ghost blinked."},{"type":"p","text":"“Boo-bit?”"},{"type":"p","text":"Kenta whispered, “He wants to participate.”"},{"type":"p","text":"Ms. Hoshino walked toward the door."},{"type":"p","text":"“I am turning down that request.”"}]},{"themeNo":11,"id":"11","title":"My House Became a Giant Gacha","blocks":[{"type":"subtitle","text":"Main characters: Taku, Kenta, Riku, Ms. Hoshino, Mom, Grandpa Genzo, and the Hazure Prize Army"},{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"Do Not Turn the Entrance Lever"},{"type":"p","text":"On Saturday afternoon, Taku's house was full of boxes."},{"type":"p","text":"There was a toy box, a book box, a pencil box, a mystery box, and one box that said, \"Maybe socks, maybe danger.\""},{"type":"p","text":"Taku looked at the boxes and said, \"This is probably a mission. Mission: Clean the House Before Snack Time.\""},{"type":"p","text":"Kenta opened the mystery box and found a green pencil cap."},{"type":"p","text":"\"Evidence one: it is green,\" said Kenta. \"Evidence two: frogs are green. Evidence three: I want it to be a frog cap.\""},{"type":"p","text":"Ms. Hoshino was helping because the class had a community service project. The children were collecting clean, safe, reusable things for a public reuse event on the school campus."},{"type":"p","text":"\"Remember,\" said Ms. Hoshino. \"We are here with permission. We do not open private drawers. We do not run. We do not turn this house into a disaster.\""},{"type":"p","text":"Riku held up his tablet. \"I built a clean-up app. It can sort toys, paper, old pencils, and reusable objects. Its name is Clean-up-ify.\""},{"type":"p","text":"\"Clean-up-ify?\" asked Taku."},{"type":"p","text":"\"The suffix -ify can mean 'make into,'\" said Riku. \"So clean-up-ify means make things clean-up-ready.\""},{"type":"p","text":"Ms. Hoshino looked worried. \"Please do not add -ify to everything before checking safety. Last time your label machine label-ified my attendance book.\""},{"type":"p","text":"Riku nodded. \"That was data.\""},{"type":"p","text":"\"That was tape,\" said Ms. Hoshino."},{"type":"p","text":"Taku's mom came from the kitchen. \"If we work together, we can achieve the clean-up goal before snack time. If we play with every old toy, we will fall behind.\""},{"type":"p","text":"\"I will not play,\" said Taku."},{"type":"p","text":"At that exact moment, a tiny plastic astronaut rolled out of a box."},{"type":"p","text":"Taku whispered, \"Captain Space Bean! I have not seen you since first grade.\""},{"type":"p","text":"Ms. Hoshino raised one eyebrow."},{"type":"p","text":"\"I will not play for more than three seconds,\" Taku corrected himself."},{"type":"p","text":"Riku opened the app. A map of the house appeared. It showed the living room, the hallway, the kitchen, and the entrance."},{"type":"p","text":"Then the entrance began to flash."},{"type":"p","text":"The door handle grew longer. It became red. It became shiny. It became enormous."},{"type":"p","text":"The entrance handle turned into a giant gacha lever."},{"type":"p","text":"A sign appeared on the door."},{"type":"p","text":"DO NOT TURN THE ENTRANCE LEVER. YOUR HOUSE MAY TURN INTO A GIANT GACHA."},{"type":"p","text":"Taku's eyes became round. \"This is definitely a mission.\""},{"type":"p","text":"Kenta gasped. \"Maybe a frog capsule will appear.\""},{"type":"p","text":"Ms. Hoshino said, \"It is probably not a frog capsule. Also, do not turn the lever.\""},{"type":"p","text":"Riku studied the tablet. \"We need to determine the cause. The app has connected to the house. That was not my plan.\""},{"type":"p","text":"\"We also need to preserve the house,\" said Ms. Hoshino. \"A home is not a toy machine. Freedom does not mean doing anything anytime. We need an appropriate attitude.\""},{"type":"p","text":"Taku stepped backward carefully."},{"type":"p","text":"Then the entrance mat slid."},{"type":"p","text":"His elbow bumped the lever."},{"type":"p","text":"GACHA-GACHA-GACHA... PON!"},{"type":"p","text":"The windows became capsule exits. The stairs became a prize lane. The living room became a capsule pool. The sofa spun once, stopped, and made a proud \"pon\" sound."},{"type":"p","text":"Taku shouted, \"The whole house has turned into a giant gacha!\""},{"type":"p","text":"Riku whispered, \"This supports my gacha-house theory.\""},{"type":"p","text":"\"I do not want a gacha-house theory,\" said Mom from the kitchen. \"I want my living room back.\""},{"type":"p","text":"A second sign appeared."},{"type":"p","text":"PUBLIC SAFETY RULES Do not spin without permission. Do not open capsules with your face. Do not look down on normal prizes. Rare is not always better. Spin tokens required: sincere apology, thank-you action, or clean-up effort."},{"type":"p","text":"Taku looked at the rolling capsules. \"They are like tiny planets!\""},{"type":"p","text":"Ms. Hoshino said, \"Planets move in space because of gravity. These capsules are rolling because your living room floor is slanted.\""},{"type":"p","text":"\"So it is living-room gravity?\" asked Taku."},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"It is a floor problem.\""},{"type":"p","text":"The first capsule rolled to Taku's feet. It was blue and scratched. It opened with a tiny pop."},{"type":"p","text":"Inside was one of Taku's indoor shoes."},{"type":"p","text":"The shoe stood up by itself and said, \"I have waited many months to achieve recognition.\""},{"type":"p","text":"Kenta bent down. \"The shoe speaks. This is a rare species.\""},{"type":"p","text":"Ms. Hoshino sighed. \"It is a shoe. A very dramatic shoe.\""},{"type":"p","text":"The shoe pointed its toe at Taku. \"You left me under the shoe box in March.\""},{"type":"p","text":"Taku looked away. \"I was busy with space stickers.\""},{"type":"p","text":"\"Your attitude is part of the case,\" said the shoe."},{"type":"p","text":"The house made another sound."},{"type":"p","text":"GACHA-GACHA..."},{"type":"p","text":"Mom shouted, \"Nobody touch that lever!\""},{"type":"p","text":"But the next capsule was already coming."},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Mom Capsule and the Family Rule Cards"},{"type":"p","text":"A large pink capsule rolled down the stairs. It was bigger than a watermelon and smaller than a refrigerator, which made no sense."},{"type":"p","text":"GACHA-GACHA... PON!"},{"type":"p","text":"The capsule opened."},{"type":"p","text":"Inside stood Taku's mom."},{"type":"p","text":"She was a little smaller than usual. A capsule lid sat on her head like a hat. Her apron said:"},{"type":"p","text":"MOM CAPSULE: REAL MOM, TEMPORARY GACHA MODE."},{"type":"p","text":"Mom crossed her arms. \"I am not a prize.\""},{"type":"p","text":"Ms. Hoshino nodded. \"Exactly. People are not prizes. We do not regard family members as items.\""},{"type":"p","text":"Taku bowed quickly. \"Sorry, Mom. You are not rare. I mean, you are special. I mean, not a prize. I mean, help.\""},{"type":"p","text":"\"Good start,\" said Mom. \"Needs work.\""},{"type":"p","text":"Kenta raised his hand. \"If she is not a prize, can we still call this a surprising encounter?\""},{"type":"p","text":"\"Yes,\" said Ms. Hoshino. \"We have encountered a surprising situation. But we stay respectful.\""},{"type":"p","text":"Mom pulled a stack of cards from her apron and said, \"I will hand out the family rule cards.\""},{"type":"p","text":"\"Family Rule Card One,\" she said. \"Wash your hands before touching shared capsules. Infection can spread when many people touch the same thing with dirty hands.\""},{"type":"p","text":"Kenta looked at his hands. \"What if my hands have frog research on them?\""},{"type":"p","text":"\"Then wash them twice,\" said Mom."},{"type":"p","text":"\"Family Rule Card Two,\" she continued. \"Unknown capsules must be set aside until an adult checks them.\""},{"type":"p","text":"Riku placed a red box on the floor. \"Set-aside zone created.\""},{"type":"p","text":"\"Family Rule Card Three,\" said Mom. \"These rules apply to everyone.\""},{"type":"p","text":"Taku read the next card. \"Do not be absorbed in spinning.\""},{"type":"p","text":"\"That one is for you,\" said Mom."},{"type":"p","text":"\"I am not absorbed in it,\" said Taku."},{"type":"p","text":"A gold capsule rolled by."},{"type":"p","text":"Taku's eyes followed it all the way across the room."},{"type":"p","text":"Mom said, \"You were absorbed for eight seconds.\""},{"type":"p","text":"Then she pointed at a basket. \"Also, you have a lack of clean socks. That is another reason to clean.\""},{"type":"p","text":"Ms. Hoshino said, \"A chance is not a promise. A rare capsule may appear, or it may not. Spinning more and more is not a plan.\""},{"type":"p","text":"Taku tried to look serious. \"I understand.\""},{"type":"p","text":"Kenta picked up a green capsule. \"This must be the frog capsule.\""},{"type":"p","text":"\"Please wait,\" said Ms. Hoshino. \"Safety first.\""},{"type":"p","text":"Mom checked the capsule. \"Safe. Open it away from your face.\""},{"type":"p","text":"Kenta opened it."},{"type":"p","text":"Inside was a green pepper key chain."},{"type":"p","text":"Kenta stared at it."},{"type":"p","text":"\"I am confused,\" he said. \"Very confused.\""},{"type":"p","text":"Ms. Hoshino smiled. \"Confused means mixed up in your mind. This is a green pepper, not a frog.\""},{"type":"p","text":"\"It has pond energy,\" said Kenta."},{"type":"p","text":"\"It has vegetable energy,\" said Mom."},{"type":"p","text":"Another card came out of the pink capsule. It said:"},{"type":"p","text":"HOUSE POLICY Clean-up rules apply to everyone. Respect people. Respect objects. Respect the home."},{"type":"p","text":"Taku asked, \"Mom, are you a politician?\""},{"type":"p","text":"Mom stared at him."},{"type":"p","text":"\"No,\" she said. \"But this house needs a policy.\""},{"type":"p","text":"Riku wrote on his tablet. \"House policy recorded. In addition, I will add a capsule safety list.\""},{"type":"p","text":"The living room floor rumbled."},{"type":"p","text":"A blue screen appeared on the wall."},{"type":"p","text":"EVENT RECORD This happened in the living room. This occurred after the lever was touched. This took place during clean-up time."},{"type":"p","text":"Taku said, \"So happen, occur, and take place are similar.\""},{"type":"p","text":"\"Correct,\" said Ms. Hoshino. \"And all three describe a problem we still need to solve.\""},{"type":"p","text":"Mom looked around at the capsule pool, the spinning sofa, and the shoe giving speeches."},{"type":"p","text":"\"First,\" she said, \"we set aside unsafe capsules. Second, we stop the house from spinning. Third, we clean this up before dinner.\""},{"type":"p","text":"A gray capsule bumped into her foot."},{"type":"p","text":"It had a label:"},{"type":"p","text":"HAZURE PRIZE ZONE."},{"type":"p","text":"The capsule shook angrily."},{"type":"p","text":"A tiny voice shouted, \"Do not say hazure like it means useless!\""},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"The Hazure Prize Army Strikes Back"},{"type":"p","text":"The gray capsule burst open."},{"type":"p","text":"Out marched a smelly sock wearing a bottle-cap helmet."},{"type":"p","text":"Behind it came a half-used eraser, a bent ruler, an empty capsule, a bitten pencil cap, a lonely button, and something labeled FORMER TOOTHBRUSH HOLDER."},{"type":"p","text":"The smelly sock raised a toothpick flag."},{"type":"p","text":"\"We are the Hazure Prize Army!\" it shouted. \"Do not look down on us!\""},{"type":"p","text":"The indoor shoe saluted. \"Dramatic but understandable.\""},{"type":"p","text":"Taku took one step back. \"I was not looking down on you. I was looking down because you are on the floor.\""},{"type":"p","text":"\"Suspicious answer!\" shouted the sock."},{"type":"p","text":"Kenta crouched near the sock. \"Can I observe the smell?\""},{"type":"p","text":"Ms. Hoshino pulled him gently backward. \"From a safe distance.\""},{"type":"p","text":"The sock commander puffed out a greenish cloud."},{"type":"p","text":"\"This is my power emission!\""},{"type":"p","text":"Ms. Hoshino covered her nose. \"Emission means something released. In science, it is often used for gases. This is a sock-smell joke, but real emissions can be an environmental issue. Also, that sock needs washing.\""},{"type":"p","text":"The sock commander looked proud anyway. \"Our emission warns enemies.\""},{"type":"p","text":"\"And friends,\" said Riku. \"Mostly friends.\""},{"type":"p","text":"The old eraser elder stepped forward. \"We can benefit the house. We are not trash.\""},{"type":"p","text":"\"Benefit means help or be useful,\" said Ms. Hoshino. \"Please continue.\""},{"type":"p","text":"The eraser elder pointed to the empty capsules. \"These can hold beads.\""},{"type":"p","text":"The bent ruler bowed. \"I can hold labels down.\""},{"type":"p","text":"The pencil cap shouted, \"I can be a safety cover!\""},{"type":"p","text":"The lonely button said, \"I can be a robot eye.\""},{"type":"p","text":"Kenta gasped. \"A button robot frog eye?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino and Mom together."},{"type":"p","text":"Riku became excited. \"This is educational. A consumer may call something hazure, but we can find another use.\""},{"type":"p","text":"Mom nodded. \"A good reuse policy looks for safe roles before throwing things away.\""},{"type":"p","text":"The Hazure Prize Army cheered."},{"type":"p","text":"The cheering made more gray capsules open."},{"type":"p","text":"The army began to extend into the hallway, under the table, over the cushion, and toward the stairs."},{"type":"p","text":"\"They are moving in every direction!\" said Taku."},{"type":"p","text":"\"In spite of the smell, I am impressed by their teamwork,\" said Kenta."},{"type":"p","text":"\"I am impressed by your kindness,\" said Ms. Hoshino. \"Not by the smell.\""},{"type":"p","text":"The sock commander climbed onto a cushion. \"Our message must spread all over the world!\""},{"type":"p","text":"Mom pointed to the laundry basket. \"Your message can spread after washing.\""},{"type":"p","text":"The old eraser elder raised his tiny hand. \"Without doubt, old, ancient, and former things can still help!\""},{"type":"p","text":"Ms. Hoshino said, \"Careful. Old, ancient, and former are related, but not the same. Your former toothbrush holder is old. It is not exactly ancient.\""},{"type":"p","text":"The former toothbrush holder looked offended. \"I feel ancient.\""},{"type":"p","text":"\"Feelings noted,\" said Riku."},{"type":"p","text":"He opened a new screen on his tablet."},{"type":"p","text":"HAZURE USEFULNESS CHART Empty capsule: small-parts box. Bent ruler: label holder. Old eraser: craft stamp. Former toothbrush holder: pencil stand. Smelly sock: wash first, then cleaning mitten."},{"type":"p","text":"The sock commander stared at the chart. \"Wash first?\""},{"type":"p","text":"\"Yes,\" said everyone."},{"type":"p","text":"The house rumbled again."},{"type":"p","text":"Another message appeared on the wall."},{"type":"p","text":"HAZURE VALUE DETECTED. REWARD SYSTEM ACTIVATED."},{"type":"p","text":"A tiny bell rang."},{"type":"p","text":"Each hazure prize received a sticker that said USEFUL AFTER CHECKING."},{"type":"p","text":"The army danced."},{"type":"p","text":"The smelly sock danced too, but everyone opened a window."},{"type":"p","text":"Then the ceiling glowed gold."},{"type":"p","text":"Riku looked up. \"A rare capsule is coming.\""},{"type":"p","text":"Taku whispered, \"Just one rare capsule...\""},{"type":"p","text":"Mom whispered back, \"Appropriate attitude.\""},{"type":"p","text":"Taku put his hands behind his back. \"Appropriate attitude activated.\""},{"type":"p","text":"GAAAAACHA... GAAAAACHA... LEGENDARY PON!"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Rare Character Grandpa and the Sustainable Gacha Lesson"},{"type":"p","text":"The gold capsule landed on the carpet with a soft thump."},{"type":"p","text":"It opened slowly."},{"type":"p","text":"Inside sat Grandpa Genzo."},{"type":"p","text":"He wore a straw hat, work pants, and boots. He held an old textbook, a small shovel, and a magnifying glass. Gold paper ribbons covered his shoulders."},{"type":"p","text":"A label on the capsule said:"},{"type":"p","text":"RARE CHARACTER GRANDPA GENZO FORMER FARMER SUSTAINABLE TOOL MASTER"},{"type":"p","text":"Taku shouted, \"Grandpa is a rare character!\""},{"type":"p","text":"Grandpa Genzo stood up and brushed gold paper from his hat."},{"type":"p","text":"\"I object to being called a prize,\" he said."},{"type":"p","text":"Ms. Hoshino nodded. \"Object can mean a thing, a goal, or to disagree. Here, Grandpa objects.\""},{"type":"p","text":"Grandpa looked around the living room. He saw the capsule pool, the speaking shoe, the Hazure Prize Army, the tiny mom hat, and Riku's tablet."},{"type":"p","text":"\"Well,\" he said, \"Saturday has become interesting.\""},{"type":"p","text":"Taku ran to him. \"Grandpa, my house became a giant gacha. Can you fix it?\""},{"type":"p","text":"Grandpa placed one hand on the wall."},{"type":"p","text":"\"To communicate with a house,\" he said, \"listen to its creaks.\""},{"type":"p","text":"Kenta whispered, \"Can houses communicate like frogs?\""},{"type":"p","text":"Ms. Hoshino whispered back, \"Not exactly.\""},{"type":"p","text":"The house creaked."},{"type":"p","text":"Creak. Creak. Gacha."},{"type":"p","text":"Grandpa closed his eyes. \"The house is tired. It says, 'Stop treating me like a machine.'\""},{"type":"p","text":"Riku checked the wall panel. \"The response from the system is similar. It says: HOME VALUE ERROR.\""},{"type":"p","text":"Grandpa opened his old textbook. It showed pictures of fields, tools, barns, and a very serious chicken."},{"type":"p","text":"\"This is my agricultural textbook,\" he said. \"A good tool can survive for decades if you take care of it. A healthy home also needs care.\""},{"type":"p","text":"Taku looked at the endless capsules. \"Can we survive in a capsule jungle?\""},{"type":"p","text":"Mom said, \"No.\""},{"type":"p","text":"Kenta said, \"Maybe frogs could.\""},{"type":"p","text":"Ms. Hoshino said, \"We are not testing that.\""},{"type":"p","text":"Grandpa pointed at the lever. \"This gacha house works by endless wanting. The more you spin, the more and more capsules appear.\""},{"type":"p","text":"Riku typed quickly. \"So the technology rewards spinning. The system is connected to wanting.\""},{"type":"p","text":"\"Exactly,\" said Grandpa. \"But a sustainable home does not depend on endless spinning. It depends on using things carefully, fixing what you can, and sharing what you do not need.\""},{"type":"p","text":"The Hazure Prize Army listened proudly."},{"type":"p","text":"The former toothbrush holder said, \"I knew I had a future.\""},{"type":"p","text":"Grandpa picked up the gold label from his capsule. \"Now, here is my definition of rare. Rare does not mean expensive. Rare means meaningful, useful, or too important to forget.\""},{"type":"p","text":"Taku looked at Grandpa."},{"type":"p","text":"\"So you are rare because you know lots of things, not because you came from a gold capsule,\" he said."},{"type":"p","text":"Grandpa smiled. \"That is a better view.\""},{"type":"p","text":"Riku added, \"Grandpa is familiar with tools, farming, old machines, and house creaks.\""},{"type":"p","text":"Kenta raised his hand. \"Is Grandpa familiar with frogs?\""},{"type":"p","text":"\"A little,\" said Grandpa."},{"type":"p","text":"Kenta looked deeply impressed."},{"type":"p","text":"Taku imagined his whole house full of capsules forever: capsule beds, capsule soup, capsule socks, capsule homework, capsule frogs that were probably not frogs."},{"type":"p","text":"He shivered."},{"type":"p","text":"\"I can imagine it,\" he said. \"I do not want it.\""},{"type":"p","text":"Grandpa nodded. \"Then we must cut off the wrong power.\""},{"type":"p","text":"Riku looked at the wires. \"Which wire?\""},{"type":"p","text":"Grandpa tapped Taku gently on the shoulder. \"Not a wire. We cut off the endless-wanting part.\""},{"type":"p","text":"Ms. Hoshino looked surprised. \"That is unexpectedly deep.\""},{"type":"p","text":"The wall panel flashed again."},{"type":"p","text":"FINAL SPIN WILL OPEN SOON. CHOOSE CAREFULLY."},{"type":"p","text":"Taku swallowed."},{"type":"p","text":"A final spin."},{"type":"p","text":"A chance for more rare prizes."},{"type":"p","text":"Or a chance to bring the house back."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Last Spin and the Home Restore Election"},{"type":"p","text":"The living room lights blinked."},{"type":"p","text":"The giant gacha panel rose from behind the sofa."},{"type":"p","text":"FINAL SPIN AVAILABLE. CHOOSE ONE. A. MORE RARE PRIZES. B. BIGGER CAPSULES. C. RESTORE HOME."},{"type":"p","text":"Taku stared at the choices."},{"type":"p","text":"More rare prizes sounded exciting. Bigger capsules sounded ridiculous. Restore home sounded right."},{"type":"p","text":"But his hand twitched toward A for half a second."},{"type":"p","text":"Mom saw it."},{"type":"p","text":"Ms. Hoshino saw it."},{"type":"p","text":"Grandpa saw it."},{"type":"p","text":"The smelly sock saw it and shouted, \"Temptation detected!\""},{"type":"p","text":"Taku pulled his hand back. \"I was only reading with my finger.\""},{"type":"p","text":"Ms. Hoshino said, \"That sentence is often dangerous.\""},{"type":"p","text":"Riku opened a new board."},{"type":"p","text":"\"We need an election,\" he said."},{"type":"p","text":"\"An election?\" asked the shoe."},{"type":"p","text":"\"Yes,\" said Riku. \"A Home Restore Election. We choose the final action together.\""},{"type":"p","text":"He wrote three teams on the board."},{"type":"p","text":"Rare Prize Party. Capsule Forever Party. Home Restore Action Team."},{"type":"p","text":"The Capsule Forever Party had one member: a very excited empty capsule."},{"type":"p","text":"The Rare Prize Party had Taku's left eyebrow for three seconds."},{"type":"p","text":"The Home Restore Action Team had everyone else."},{"type":"p","text":"\"The result seems clear,\" said Riku."},{"type":"p","text":"The panel beeped."},{"type":"p","text":"TO LAUNCH HOME RESTORE ACTION, TURN THE LEVER. WARNING: ONE PERSON CANNOT DO IT BY ONESELF."},{"type":"p","text":"Grandpa said, \"Good. A home is not restored by one person alone.\""},{"type":"p","text":"Mom added, \"Everyone helps. Regardless of rare or hazure, every object needs a proper place.\""},{"type":"p","text":"The Hazure Prize Army lined up."},{"type":"p","text":"The empty capsules rolled into a storage box. The bent ruler held down labels. The old eraser became a craft stamp. The former toothbrush holder became a pencil stand. The sock commander marched bravely to the laundry basket."},{"type":"p","text":"\"I will return after washing!\" he cried."},{"type":"p","text":"\"That is your best action,\" said Ms. Hoshino."},{"type":"p","text":"Riku studied the electronic control panel. \"The gacha technology is unstable, but I can create mild spin mode. The giant gacha industry would be impressed, but this is still our living room.\""},{"type":"p","text":"\"Mild means gentle,\" said Ms. Hoshino. \"Not tornado mode.\""},{"type":"p","text":"Kenta raised his hand. \"What about frog mode?\""},{"type":"p","text":"\"No frog mode,\" said Ms. Hoshino."},{"type":"p","text":"Riku attached a small dial to the lever."},{"type":"p","text":"MILD SPIN MODE. NO TORNADO. NO MOM CAPSULE. NO FROG MODE."},{"type":"p","text":"Kenta sighed. \"Very strict technology.\""},{"type":"p","text":"Grandpa looked at Taku. \"Before we spin, we must convince the house. Tell it what you understand.\""},{"type":"p","text":"Taku stood in the middle of the living room. Capsules rolled softly around him like little planets."},{"type":"p","text":"He said, \"Dear house, I am sorry. I got excited. I wanted rare things. But in comparison with rare prizes, my home is better.\""},{"type":"p","text":"The wall panel blinked."},{"type":"p","text":"CONTINUE."},{"type":"p","text":"Taku took a breath."},{"type":"p","text":"\"I will not view this house as a prize machine. I view it as a home.\""},{"type":"p","text":"The panel blinked faster."},{"type":"p","text":"GOOD."},{"type":"p","text":"Kenta stepped forward. \"I also apologize. I viewed too many capsules as possible frogs.\""},{"type":"p","text":"The panel paused."},{"type":"p","text":"ACCEPTED, STRANGELY."},{"type":"p","text":"Riku stepped forward. \"My Clean-up-ify App caused part of the problem. I take responsibility for the error. I will use technology with better safety checks.\""},{"type":"p","text":"The panel beeped."},{"type":"p","text":"APPROVED."},{"type":"p","text":"Mom stepped forward. \"This home is for people, not endless spinning.\""},{"type":"p","text":"Grandpa stepped forward. \"Former things can still have a future.\""},{"type":"p","text":"The Hazure Prize Army shouted, \"Do not look down on hazure!\""},{"type":"p","text":"Ms. Hoshino said, \"First, safety. Second, respect. Third, do not spin your mother.\""},{"type":"p","text":"The panel glowed white."},{"type":"p","text":"HOME RESTORE READY."},{"type":"p","text":"Everyone placed one hand, one toe, one ruler, or one carefully washed sock clip on the lever."},{"type":"p","text":"Taku whispered, \"This is probably a mission.\""},{"type":"p","text":"Ms. Hoshino whispered, \"A gentle mission.\""},{"type":"p","text":"Together, they turned the lever."},{"type":"p","text":"Gacha... Gacha... Pon."},{"type":"p","text":"The windows became windows again. The stairs became stairs again. The sofa stopped spinning. The capsule pool became a normal living room. Mom returned to normal size. Grandpa kept a little gold ribbon on his hat. The shoe stopped speaking, except for one final dramatic cough."},{"type":"p","text":"The house gave one last message."},{"type":"p","text":"THANK YOU FOR PLAYING HOME GACHA. NEXT SPIN: NOT RECOMMENDED."},{"type":"p","text":"Taku looked at the entrance lever. It was a normal door handle again."},{"type":"p","text":"\"Maybe just one tiny spin?\" he said."},{"type":"p","text":"Mom said, \"No.\""},{"type":"p","text":"Grandpa said, \"No.\""},{"type":"p","text":"Ms. Hoshino said, \"No.\""},{"type":"p","text":"The Hazure Prize Army shouted from the reuse box, \"No!\""},{"type":"p","text":"Kenta said, \"Unless it is a frog capsule?\""},{"type":"p","text":"Ms. Hoshino closed her notebook."},{"type":"p","text":"\"Especially no,\" she said."},{"type":"p","text":"Then the doorbell rang."},{"type":"p","text":"Everyone froze."},{"type":"p","text":"Taku opened the door carefully."},{"type":"p","text":"Outside was the delivery person with one small package."},{"type":"p","text":"The label said:"},{"type":"p","text":"NORMAL PACKAGE. NOT A CAPSULE. PLEASE RELAX."},{"type":"p","text":"Everyone relaxed."},{"type":"p","text":"Then the package made a tiny sound."},{"type":"p","text":"Pon."},{"type":"p","text":"Ms. Hoshino looked at the ceiling."},{"type":"p","text":"\"I am not writing that in the school report,\" she said."},{"type":"p","text":"And Taku, Kenta, Riku, Mom, Grandpa, and even the washed sock commander laughed so hard that no one was absorbed in spinning anymore."},{"type":"p","text":"The End"}]},{"themeNo":12,"id":"12","title":"The Sneezing Train to the Sea","blocks":[{"type":"subtitle","text":"Main characters: Taku, Kenta, Riku, Ms. Hoshino, Achoo Express, Conductor Penpen, Station Manager Samezawa, and Mr. Yuge"},{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Ekiben Snot Sauce Incident"},{"type":"p","text":"On Friday morning, Taku, Kenta, Riku, and Ms. Hoshino stood on Platform Three."},{"type":"p","text":"Their class was going on a field trip to the Sea Science Museum. Everyone had a small backpack, a water bottle, and a promise to sit safely on the train."},{"type":"p","text":"Taku looked at the shining train and said, \"This is probably a mission. Mission: Reach the Sea Museum Before Lunch.\""},{"type":"p","text":"Kenta pointed at the front light of the train. It was
