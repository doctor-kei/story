ething.","example":"\"So clean-up-ify means make things clean-up-ready.\""},"#1312":{"definition":"The suffix -ity means a state or quality.","example":"\"Frog-ity?\" asked Kenta."},"#1313":{"definition":"The suffix -less means without something.","example":"Sleep-less means without sleep."},"#1314":{"definition":"The suffix -ment can make a noun about an action or result.","example":"The suffix -ment can make a noun about an action or result."},"#1315":{"definition":"The suffix -ous means full of or having something.","example":"“Case type: mysterious, dangerous, ridiculous, and possibly block-ous.”"},"#1316":{"definition":"The suffix -tion can mean an action, result, or state.","example":"The suffix -tion can mean an action, result, or state."},"#1317":{"definition":"These words mean almost the same thing: cause, and lead to.","example":"Do not cause harm to any time period."},"#1318":{"definition":"These words mean almost the same thing: because, since, and as.","example":"Ms. Hoshino said, \"In space, astronauts float because of microgravity."},"#1319":{"definition":"These words mean almost the same thing: but, however, and yet.","example":"A quiet bookshop owner said, \"I like kindness, but I do not like accidents.\""},"#1320":{"definition":"These words mean almost the same thing: for example, and for instance.","example":"“My hobbies are observing Earth culture, for example milk, sports, and friendship."},"#1321":{"definition":"These words mean almost the same thing: many, and a number of.","example":"“After too many moon jumps, rabbits need recovery.”"},"#1322":{"definition":"These words mean almost the same thing: some, and several.","example":"Some foods, such as yogurt, are connected with helpful microorganisms.\""},"#1323":{"definition":"These words mean almost the same thing: start, and begin.","example":"\"Start means begin,\" whispered Kenta."},"#1324":{"definition":"These words mean almost the same thing: end, finish, and come to an end.","example":"A detective case does not end, finish, or come to an end until the detective has given a very long speech.”"},"#1325":{"definition":"These words mean almost the same thing: buy, and purchase.","example":"“It says, ‘Do not buy or purchase fake banana smell spray.’ Why both buy and purchase?”"},"#1326":{"definition":"These words mean almost the same thing: help, and assist.","example":"“So lunch duty is an opportunity to help people and protect the Earth?”"},"#1327":{"definition":"These words mean almost the same thing: need, and require.","example":"“But now we need to be careful with our words."},"#1328":{"definition":"These words mean almost the same thing: keep, and maintain.","example":"“If we want to keep the translator working, we must maintain the battery level.”"},"#1329":{"definition":"These words mean almost the same thing: use, and make use of.","example":"The music is fun, but every resident has a right to use the forest path.”"},"#1330":{"definition":"These words mean almost the same thing: join, take part in, and participate in.","example":"“Join, take part in, and participate in are similar,” she said."},"#1331":{"definition":"These words mean almost the same thing: happen, occur, and take place.","example":"Taku said, \"So happen, occur, and take place are similar.\""},"#1332":{"definition":"These words mean almost the same thing: show, indicate, and demonstrate.","example":"Please show your ticket, your certificate, and your account of the sneeze.\""},"#1333":{"definition":"These words mean almost the same thing: think, suppose, and assume.","example":"I think we should fire one gentle yawn cloud."},"#1334":{"definition":"These words mean almost the same thing: say, state, and mention.","example":"“Please say hello, state your name if needed, and mention your purpose clearly."},"#1335":{"definition":"These words mean almost the same thing: find, and discover.","example":"Ms. Hoshino said, “Find and discover are similar."},"#1336":{"definition":"These words mean almost the same thing: answer, and respond to.","example":"Then we answer, or respond to, the citizens' worries.\""},"#1337":{"definition":"These words mean almost the same thing: change, alter, and transform.","example":"\"Change, alter, and transform are related, and today we avoid all three.\""},"#1338":{"definition":"These words mean almost the same thing: improve, and enhance.","example":"If people laugh together at a silly rule and choose to improve it, maybe it will reset.\""},"#1339":{"definition":"These words mean almost the same thing: reduce, and cut down on.","example":"But we should reduce accidents, or cut down on accidents, not create more.\""},"#1340":{"definition":"These words mean almost the same thing: protect, and preserve.","example":"Protect, or preserve, the milk mustache for three seconds."},"#1341":{"definition":"These words mean almost the same thing: problem, issue, and challenge.","example":"“This is science and a fart problem at the same time!”"},"#1342":{"definition":"These words mean almost the same thing: way, method, and approach.","example":"\"Fair means treating people in a right and balanced way,\" said Taku."},"#1343":{"definition":"These words mean almost the same thing: result, outcome, and consequence.","example":"Result, outcome, and consequence are all connected.\""},"#1344":{"definition":"These words mean almost the same thing: reason, cause, and factor.","example":"“The reason, the cause, and the factor behind this mystery may not be one bad person."},"#1345":{"definition":"These words mean almost the same thing: important, significant, and essential.","example":"Today’s stink cloud is silly, but learning about gases is important.”"},"#1346":{"definition":"These words mean almost the same thing: enough, and sufficient.","example":"But the helpers must be visible enough to work safely.”"},"#1347":{"definition":"These words mean almost the same thing: wrong, and incorrect.","example":"Making fun of someone’s trouble is wrong."},"#1348":{"definition":"These words mean almost the same thing: right, correct, and proper.","example":"In other words, right can be correct, or it can mean the opposite of left."},"#1349":{"definition":"These words mean almost the same thing: big, large, and huge.","example":"Kenta yelled, “The water tank is big, large, huge, and very wobbly!”"},"#1350":{"definition":"These words mean almost the same thing: small, and tiny.","example":"“With the help of the cup ghosts,” said Riku, “we can move plates in small groups.”"},"#1351":{"definition":"These words mean almost the same thing: old, ancient, and former.","example":"Riku added, \"Grandpa is familiar with tools, farming, old machines, and house creaks.\""},"#1352":{"definition":"These words mean almost the same thing: new, recent, and latest.","example":"New, recent, latest: all are useful words, but latest means the newest information.\""},"#1353":{"definition":"These words mean almost the same thing: near, and close to.","example":"“Pillow Island is near.”"},"#1354":{"definition":"These words mean almost the same thing: far, distant, and remote.","example":"“As far as I know, we swim better than we fly,” said Penbert."},"#1355":{"definition":"These words mean almost the same thing: quickly, and rapidly.","example":"Quickly and rapidly are similar.”"},"#1356":{"definition":"These words mean almost the same thing: slowly, and gradually.","example":"\"You are permitted to cross as long as you walk slowly,\" said Judge Nanairo."}};
</script>
<script>
(function(){
  'use strict';
  var THEMES = window.APP_THEMES || [];
  var STORIES = window.APP_STORIES || [];
  var STORY_BY_NO = {};
  var CARD_BY_THEME = {};
  var CARD_EXTRAS = window.APP_CARD_EXTRAS || {};
  var state = {view:'home', themeNo:1, cardIndex:0, side:'front'};
  var cleanTimer = 0;
  var progressKey = 'adventureReadingQuest.v1';

  function byId(id){return document.getElementById(id);}
  function pad2(n){return String(n).padStart(2,'0');}
  function clamp(n,min,max){n=parseInt(n,10); if(isNaN(n)){n=min;} return Math.max(min,Math.min(max,n));}
  function setText(el, value){if(el){el.textContent = value == null ? '' : String(value);}}
  function show(el, yes){if(el){el.hidden = !yes;}}
  function hasStory(no){return !!STORY_BY_NO[parseInt(no,10)];}
  function getTheme(no){no=parseInt(no,10); for(var i=0;i<THEMES.length;i++){if(THEMES[i].no===no){return THEMES[i];}} return THEMES[0] || {no:1,index:0,id:'01',emoji:'⭐',title:'Adventure',cardCount:0};}
  function getCards(no){var t=getTheme(no); return CARD_BY_THEME[t.index] || [];}
  function storyThemes(){return THEMES.filter(function(t){return hasStory(t.no) && getCards(t.no).length;});}
  function firstTrailTheme(){var s=storyThemes(); return s.length ? s[0].no : (THEMES[0] ? THEMES[0].no : 1);}
  function firstTrailHash(){return '#cards/' + pad2(firstTrailTheme()) + '/1';}
  function nextStoryThemeAfter(no){var s=storyThemes().filter(function(t){return t.no > no;}); return s.length ? s[0].no : null;}
  function firstCardOnlyAfter(no){for(var i=0;i<THEMES.length;i++){if(THEMES[i].no > no && getCards(THEMES[i].no).length){return THEMES[i].no;}} return null;}
  function safeStorageGet(){try{return JSON.parse(localStorage.getItem(progressKey) || '{}') || {};}catch(e){return {};}}
  function safeStorageSet(obj){try{localStorage.setItem(progressKey, JSON.stringify(obj));}catch(e){}}
  function saveProgress(hash){
    if(!hash || hash === '#home'){return;}
    var p = safeStorageGet();
    p.lastHash = hash;
    p.updatedAt = new Date().toISOString();
    safeStorageSet(p);
  }
  function setVh(){try{document.documentElement.style.setProperty('--vh',(window.innerHeight*0.01)+'px');}catch(e){}}
  function setHash(hash, replace){
    if(!hash){hash = '#home';}
    if(replace && window.history && history.replaceState){history.replaceState(null,'',hash); routeFromHash();}
    else if(location.hash === hash){routeFromHash();}
    else{location.hash = hash;}
  }
  function parseHash(){
    var h = location.hash || '#home';
    var m;
    if((m = h.match(/^#cards\/(\d{1,2})(?:\/(\d+))?$/))){return {view:'cards',themeNo:clamp(m[1],1,99),cardIndex:Math.max(0,(parseInt(m[2] || '1',10)-1))};}
    if((m = h.match(/^#story\/(\d{1,2})$/))){return {view:'story',themeNo:clamp(m[1],1,99)};}
    if(h === '#continued'){return {view:'continued'};}
    return {view:'home'};
  }
  function setView(name){
    document.body.setAttribute('data-view', name);
    show(byId('homeView'), name === 'home');
    show(byId('cardsView'), name === 'cards');
    show(byId('storyView'), name === 'story');
    show(byId('continuedView'), name === 'continued');
  }
  function routeFromHash(){
    var r = parseHash();
    closeShortcuts(false);
    if(r.view === 'cards'){
      state.view='cards'; state.themeNo=r.themeNo; state.cardIndex=r.cardIndex; state.side='front'; renderCards(); saveProgress(location.hash);
    }else if(r.view === 'story'){
      state.view='story'; state.themeNo=r.themeNo; renderStory(); saveProgress(location.hash);
    }else if(r.view === 'continued'){
      state.view='continued'; renderContinued(); saveProgress(location.hash);
    }else{
      state.view='home'; renderHome();
    }
  }
  function parseCards(){
    var raw = (byId('cardData') && (byId('cardData').value || byId('cardData').textContent)) || '';
    raw = raw.replace(/\r/g,'');
    var lines = raw.split('\n');
    lines.forEach(function(line){
      if(!line || !line.replace(/\s/g,'')){return;}
      var p = line.split('\t');
      if(p.length < 6){return;}
      var themeIndex = clamp(p[0],0,999);
      if(!CARD_BY_THEME[themeIndex]){CARD_BY_THEME[themeIndex] = [];}
      var extra = CARD_EXTRAS[p[1]] || {};
      var meaning = p[5] || '';
      var sourceExample = p.length > 6 ? p[6] : '';
      var sourceDefinition = p.length > 7 ? p[7] : '';
      CARD_BY_THEME[themeIndex].push({themeIndex:themeIndex,id:p[1],term:p[2],pos:p[3],level:p[4],meaning:meaning,definition:sourceDefinition || extra.definition || '',example:sourceExample || extra.example || '',local:CARD_BY_THEME[themeIndex].length});
    });
  }
  function renderHome(){
    setView('home');
    var p = safeStorageGet();
    var cont = byId('continueBtn');
    if(cont){cont.disabled = !p.lastHash;}
    var firstNo = firstTrailTheme();
    var t = getTheme(firstNo);
    setText(byId('homeNextStop'), 'First stop: Theme ' + t.id + ' · ' + t.emoji + ' ' + t.title);
    setTimeout(function(){try{window.scrollTo(0,0);}catch(e){}},0);
  }
  function levelLabel(level){return level === 'S' ? 'S Star' : level;}
  function fitTerm(text){
    var len = (text || '').length;
    if(len > 34){return 'clamp(25px,6.5vw,42px)';}
    if(len > 24){return 'clamp(28px,7.5vw,48px)';}
    if(len > 16){return 'clamp(31px,8.4vw,54px)';}
    return '';
  }
  function fitMeaning(text){
    var len = (text || '').length;
    if(len > 34){return 'clamp(18px,4.8vw,26px)';}
    if(len > 22){return 'clamp(20px,5.3vw,30px)';}
    return '';
  }
  function popCard(){var el=byId('flashCard'); if(!el){return;} el.classList.remove('pop'); try{void el.offsetWidth;}catch(e){} el.classList.add('pop');}
  function currentHash(){
    if(state.view==='cards'){return '#cards/' + pad2(state.themeNo) + '/' + (state.cardIndex + 1);}
    if(state.view==='story'){return '#story/' + pad2(state.themeNo);}
    if(state.view==='continued'){return '#continued';}
    return '#home';
  }
  function renderCards(){
    setView('cards');
    var t = getTheme(state.themeNo);
    var cards = getCards(state.themeNo);
    if(!cards.length){setHash('#continued'); return;}
    state.cardIndex = clamp(state.cardIndex,0,cards.length-1);
    var c = cards[state.cardIndex];
    setText(byId('cardsKicker'), 'Theme ' + t.id + ' / ' + THEMES.length);
    setText(byId('cardsTitle'), t.emoji + ' ' + t.title);
    setText(byId('cardsBadge'), (state.cardIndex + 1) + '/' + cards.length);
    setText(byId('themePill'), 'Theme ' + t.id);
    setText(byId('themeName'), t.emoji + ' ' + t.title);
    setText(byId('themeReady'), hasStory(t.no) ? 'Story ready' : 'Story soon');
    var termEl = byId('termText');
    var frontEl = byId('frontContent');
    var backEl = byId('backContent');
    var meaningEl = byId('meaningText');
    var definitionEl = byId('definitionText');
    var exampleEl = byId('exampleText');
    var showingBack = state.side === 'back';
    setText(termEl, c.term);
    setText(meaningEl, c.meaning);
    setText(definitionEl, c.definition || 'A simple meaning for this card.');
    setText(exampleEl, c.example || 'Try this word in your own sentence.');
    if(frontEl){frontEl.classList.toggle('hidden-side', showingBack);}
    if(backEl){backEl.classList.toggle('hidden-side', !showingBack);}
    if(termEl){termEl.style.fontSize = fitTerm(c.term);}
    if(meaningEl){meaningEl.style.fontSize = fitMeaning(c.meaning);}
    setText(byId('posText'), c.pos);
    setText(byId('levelText'), levelLabel(c.level));
    setText(byId('cardHint'), showingBack ? 'Tap for English' : 'Tap for meaning');
    setText(byId('flipBtn'), showingBack ? 'English' : 'Meaning');
    var nextLabel = 'Next';
    if(state.cardIndex >= cards.length - 1){nextLabel = hasStory(t.no) ? 'Story' : 'To be continued';}
    setText(byId('nextBtn'), nextLabel);
    byId('prevBtn').disabled = state.cardIndex <= 0;
    var slider = byId('cardSlider');
    if(slider){slider.max = cards.length; slider.value = state.cardIndex + 1;}
    var jump = byId('jumpNo');
    if(jump){jump.value = state.cardIndex + 1; jump.setAttribute('max', cards.length);}
    var bar=byId('cardBar');
    if(bar){bar.style.width = (((state.cardIndex+1)/cards.length)*100) + '%';}
    var cardBtn = byId('flashCard');
    if(cardBtn){cardBtn.setAttribute('aria-label', showingBack ? 'Show English' : 'Show meaning');}
  }
  function setCardIndex(n, replace){
    var cards = getCards(state.themeNo);
    state.cardIndex = clamp(n, 0, Math.max(0, cards.length - 1));
    state.side = 'front';
    setHash('#cards/' + pad2(state.themeNo) + '/' + (state.cardIndex+1), replace !== false);
  }
  function flipCard(){state.side = state.side === 'back' ? 'front' : 'back'; renderCards();}
  function prevCard(){if(state.cardIndex > 0){setCardIndex(state.cardIndex-1, true); popCard();}}
  function nextCard(){
    var cards = getCards(state.themeNo);
    if(state.cardIndex < cards.length - 1){setCardIndex(state.cardIndex+1, true); popCard(); return;}
    if(hasStory(state.themeNo)){setHash('#story/' + pad2(state.themeNo)); return;}
    setHash('#continued');
  }
  function speakTerm(){
    try{
      var cards=getCards(state.themeNo); var c=cards[state.cardIndex]; if(!c){return;}
      if(!window.speechSynthesis || !window.SpeechSynthesisUtterance){return;}
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(c.term);
      u.lang = 'en-US'; u.rate = 0.84;
      window.speechSynthesis.speak(u);
    }catch(e){}
  }
  function makeEl(tag, className, text){
    var el = document.createElement(tag);
    if(className){el.className = className;}
    if(text != null){el.textContent = text;}
    return el;
  }
  function renderStory(){
    var story = STORY_BY_NO[state.themeNo];
    if(!story){setHash('#continued'); return;}
    setView('story');
    var article = byId('storyArticle');
    if(!article){return;}
    article.textContent = '';
    article.appendChild(makeEl('h1','',story.title));
    (story.blocks || []).forEach(function(block){
      var type = block.type || 'p';
      var text = block.text || '';
      if(!text){return;}
      if(type === 'h2'){article.appendChild(makeEl('h2','',text));}
      else if(type === 'h3'){article.appendChild(makeEl('h3','',text));}
      else if(type === 'subtitle'){article.appendChild(makeEl('p','story-subtitle',text));}
      else{article.appendChild(makeEl('p','',text));}
    });
    var tool = byId('storyToolbar');
    if(tool){tool.classList.remove('clean'); scheduleCleanToolbar();}
    setTimeout(function(){try{window.scrollTo(0,0);}catch(e){}},0);
  }
  function scheduleCleanToolbar(){
    clearTimeout(cleanTimer);
    cleanTimer = setTimeout(function(){var t=byId('storyToolbar'); if(t && state.view==='story'){t.classList.add('clean');}},2600);
  }
  function wakeStoryToolbar(){var t=byId('storyToolbar'); if(t){t.classList.remove('clean'); scheduleCleanToolbar();}}
  function prevFromStory(){
    var cards = getCards(state.themeNo);
    var idx = cards.length ? cards.length : 1;
    setHash('#cards/' + pad2(state.themeNo) + '/' + idx);
  }
  function nextFromStory(){
    var next = nextStoryThemeAfter(state.themeNo);
    if(next){setHash('#cards/' + pad2(next) + '/1');}
    else{setHash('#continued');}
  }
  function renderContinued(){
    setView('continued');
    var sThemes = storyThemes();
    var last = sThemes.length ? sThemes[sThemes.length-1].no : firstTrailTheme();
    var nextCards = firstCardOnlyAfter(last);
    var explore = byId('exploreCardsBtn');
    if(explore){
      if(nextCards){
        var t = getTheme(nextCards);
        explore.hidden = false;
        setText(explore, 'Explore Theme ' + t.id + ' Cards');
        explore.onclick = function(){setHash('#cards/' + pad2(nextCards) + '/1');};
      }else{
        explore.hidden = true;
      }
    }
    setTimeout(function(){try{window.scrollTo(0,0);}catch(e){}},0);
  }
  function openShortcuts(){
    renderShortcuts();
    var wrap = byId('shortcutBackdrop');
    show(wrap,true);
    try{byId('shortcutClose').focus({preventScroll:true});}catch(e){}
  }
  function closeShortcuts(returnFocus){
    var wrap = byId('shortcutBackdrop');
    if(wrap){wrap.hidden = true;}
    if(returnFocus){try{(state.view==='story' ? byId('storyMenuBtn') : byId('menuBtn')).focus({preventScroll:true});}catch(e){}}
  }
  function renderShortcuts(){
    var list = byId('shortcutList');
    if(!list){return;}
    list.textContent = '';
    THEMES.forEach(function(t){
      var count = getCards(t.no).length || t.cardCount || 0;
      var item = makeEl('div','shortcut-item');
      var main = makeEl('div','shortcut-main');
      main.appendChild(makeEl('div','shortcut-name',t.id + '. ' + t.emoji + ' ' + t.title));
      main.appendChild(makeEl('div','shortcut-meta',count + ' cards · ' + (hasStory(t.no) ? 'story ready' : 'story soon')));
      var cardBtn = makeEl('button','mini-btn primary','Cards');
      cardBtn.type = 'button';
      cardBtn.addEventListener('click',function(){closeShortcuts(false); setHash('#cards/' + t.id + '/1');});
      var storyBtn = makeEl('button','mini-btn','Story');
      storyBtn.type = 'button';
      storyBtn.disabled = !hasStory(t.no);
      storyBtn.addEventListener('click',function(){if(hasStory(t.no)){closeShortcuts(false); setHash('#story/' + t.id);}});
      item.appendChild(main); item.appendChild(cardBtn); item.appendChild(storyBtn);
      list.appendChild(item);
    });
  }
  function bindPress(el, fn){
    if(!el){return;}
    var touched = 0;
    try{
      el.addEventListener('touchend',function(e){touched=Date.now(); if(e && e.cancelable){e.preventDefault();} fn(e);},false);
      el.addEventListener('click',function(e){if(Date.now()-touched < 420){return;} fn(e);},false);
    }catch(err){el.onclick=fn;}
  }
  function bind(){
    bindPress(byId('startBtn'),function(){setHash(firstTrailHash());});
    bindPress(byId('continueBtn'),function(){var p=safeStorageGet(); setHash(p.lastHash || firstTrailHash());});
    bindPress(byId('homeMenuBtn'),openShortcuts);
    bindPress(byId('menuBtn'),openShortcuts);
    bindPress(byId('flipBtn'),flipCard);
    bindPress(byId('flashCard'),flipCard);
    bindPress(byId('prevBtn'),prevCard);
    bindPress(byId('nextBtn'),nextCard);
    bindPress(byId('speakBtn'),speakTerm);
    bindPress(byId('storyMenuBtn'),function(){wakeStoryToolbar(); openShortcuts();});
    bindPress(byId('storyPrevBtn'),function(){wakeStoryToolbar(); prevFromStory();});
    bindPress(byId('storyNextBtn'),function(){wakeStoryToolbar(); nextFromStory();});
    bindPress(byId('continuedMenuBtn'),openShortcuts);
    bindPress(byId('startOverBtn'),function(){setHash(firstTrailHash());});
    bindPress(byId('shortcutClose'),function(){closeShortcuts(true);});
    var backdrop=byId('shortcutBackdrop');
    if(backdrop){backdrop.addEventListener('click',function(e){if(e.target===backdrop){closeShortcuts(true);}},false);}
    var slider=byId('cardSlider');
    if(slider){slider.addEventListener('input',function(){setCardIndex(parseInt(slider.value,10)-1,true);},false);}
    var jump=byId('jumpNo');
    if(jump){
      jump.addEventListener('change',function(){setCardIndex(parseInt(jump.value,10)-1,true);},false);
      jump.addEventListener('keydown',function(e){var k=e.key || e.keyCode; if(k==='Enter' || k===13){jump.blur(); setCardIndex(parseInt(jump.value,10)-1,true);}},false);
    }
    document.addEventListener('keydown',function(e){
      var k=e.key || e.keyCode;
      if(k==='Escape' || k===27){closeShortcuts(true); return;}
      if(state.view==='cards'){
        if(k==='ArrowRight' || k===39){nextCard();}
        else if(k==='ArrowLeft' || k===37){prevCard();}
        else if(k===' ' || k===32 || k==='Enter' || k===13){if(e.preventDefault){e.preventDefault();} flipCard();}
      }
    },false);
    ['touchstart','mousemove','scroll','keydown'].forEach(function(evt){document.addEventListener(evt,function(){if(state.view==='story'){wakeStoryToolbar();}}, {passive:true});});
    window.addEventListener('hashchange',routeFromHash,false);
    window.addEventListener('resize',setVh,false);
    window.addEventListener('orientationchange',function(){setTimeout(setVh,240);},false);
  }
  function init(){
    try{
      STORIES.forEach(function(s){STORY_BY_NO[parseInt(s.themeNo,10)] = s;});
      parseCards();
      setVh();
      bind();
      if(!location.hash){history.replaceState(null,'','#home');}
      routeFromHash();
      document.body.setAttribute('data-ready','yes');
    }catch(err){
      var st=byId('status');
      if(st){st.textContent='App error: ' + (err && err.message ? err.message : err); st.classList.add('show');}
      else{throw err;}
    }
  }
  init();
}());
</script>
</body>
