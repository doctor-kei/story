 large and round, like a nose."},{"type":"p","text":"\"Evidence one: it has a nose,\" said Kenta. \"Evidence two: frogs also have faces. Evidence three: I want this train to be a frog train.\""},{"type":"p","text":"Ms. Hoshino said, \"It is not a frog train. Also, please do not diagnose trains on the platform.\""},{"type":"p","text":"The train door opened with a polite ding."},{"type":"p","text":"A soft voice came from the speaker."},{"type":"p","text":"\"Welcome to the Achoo Express. I acknowledge all passengers. My main function is transportation, not dramatic sneezing. Please enjoy your trip.\""},{"type":"p","text":"Riku pushed his glasses up. \"Interesting. This train has a wireless smell sensor. It may have developed an unusual level of sensitivity.\""},{"type":"p","text":"\"Sensitivity ends with -ity,\" said Ms. Hoshino. \"The suffix -ity can make a noun, such as safety, activity, and sensitivity.\""},{"type":"p","text":"\"Frog-ity?\" asked Kenta."},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"Inside the train, a robot cart came down the aisle. It sold special sea-shaped lunch boxes."},{"type":"p","text":"\"Rare Artificial Wasabi-Seaweed Ekiben!\" said the cart. \"Blue ocean jelly! Green wasabi mountains! Tiny fish-shaped carrots!\""},{"type":"p","text":"Taku opened one box just a little."},{"type":"p","text":"A sharp smell jumped out."},{"type":"p","text":"The front light of Achoo Express turned yellow."},{"type":"p","text":"\"Artificial wasabi smell detected,\" said the train. \"Please close the ekiben lid to prevent a large sneeze.\""},{"type":"p","text":"Taku tried to close it."},{"type":"p","text":"The jelly wobbled."},{"type":"p","text":"Kenta whispered, \"It looks like ocean snot.\""},{"type":"p","text":"Ms. Hoshino said, \"Please do not name the sauce. Real sneezes need tissues and clean hands. This is only sauce, but we still clean it.\""},{"type":"p","text":"The train shook."},{"type":"p","text":"\"A... A... AAAAA...\""},{"type":"p","text":"Riku grabbed his notebook. \"The audience should remain calm. By audience, the train means the passengers who can hear the announcement.\""},{"type":"p","text":"\"AAAAA-CHOOOOOO!\""},{"type":"p","text":"The whole train sneezed."},{"type":"p","text":"The blue ocean jelly stretched across the lunch box like a long rubber noodle. One fish carrot flew up, landed on Kenta's sleeve, and looked disappointed."},{"type":"p","text":"The car was silent."},{"type":"p","text":"Then Achoo Express spoke again."},{"type":"p","text":"\"I acknowledge my sneeze. I also acknowledge the bento damage. I request sympathy, and possibly a tissue the size of a blanket.\""},{"type":"p","text":"Kenta patted the wall of the train. \"I feel sympathy for you. Sometimes I sneeze when I see pond dust.\""},{"type":"p","text":"\"Pond dust is not a standard term,\" said Ms. Hoshino."},{"type":"p","text":"Taku stood up a little too quickly."},{"type":"p","text":"\"Sit down,\" said Ms. Hoshino. \"First, safety. Second, hygiene. Third, no more ocean snot jokes.\""},{"type":"p","text":"\"We need to figure out the cause,\" said Taku. \"Was it the ekiben? The wireless sensor? The rare sea mode?\""},{"type":"p","text":"A golden card slid out from the seat pocket."},{"type":"p","text":"TRAIN CONSTITUTION Article 1: A train must carry passengers safely. Article 2: Passengers should not feed artificial wasabi smell to the nose sensor. Article 3: If the train sneezes, do not panic. Article 4: Figure out the cause before you blame the wheels."},{"type":"p","text":"\"A constitution is a very important set of rules,\" said Ms. Hoshino. \"This one is silly, but the idea of rules is serious.\""},{"type":"p","text":"Taku nodded. \"I look up to a train that admits its problem.\""},{"type":"p","text":"\"Look up to means respect,\" said Ms. Hoshino. \"That is a strange but good thing to say.\""},{"type":"p","text":"The train gave a small sniff."},{"type":"p","text":"\"It may turn out that I am not sick,\" said Achoo Express. \"My sensor may be blocked. Also, my emergency sea mode has started.\""},{"type":"p","text":"The windows turned blue."},{"type":"p","text":"The floor hummed."},{"type":"p","text":"The track outside bent toward a shining tunnel that looked like a water slide for trains."},{"type":"p","text":"Taku pressed his face close to the window, but not too close."},{"type":"p","text":"\"The train sneezed us into a sea mission!\""},{"type":"p","text":"Ms. Hoshino opened her emergency field trip folder."},{"type":"p","text":"\"That sentence has originality,\" she said. \"But it needs more safety information. Everyone, stay seated.\""},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Wiggly Rail Maze"},{"type":"p","text":"Achoo Express entered the shining tunnel."},{"type":"p","text":"The track ahead was no longer straight. It curved left, then right, then made a loop, then shaped itself like a giant noodle."},{"type":"p","text":"\"The track became a maze!\" said Taku."},{"type":"p","text":"Riku opened his tablet. \"I will register the route in my Rail Maze Map. Initial test.\""},{"type":"p","text":"The map appeared, then sneezed."},{"type":"p","text":"\"Maps do not usually sneeze,\" said Ms. Hoshino."},{"type":"p","text":"\"This one learned from the train,\" said Riku."},{"type":"p","text":"Suddenly, letters appeared on the rail."},{"type":"p","text":"WE PROTEST. TOO MUCH SNEEZING. TOO MUCH BENDING. PLEASE APPRECIATE STRAIGHT TRACKS."},{"type":"p","text":"A metal voice came from the floor."},{"type":"p","text":"\"I am Chief Gunya Rail. According to rail law, all trains must appreciate tracks before entering the Maze Rail Zone.\""},{"type":"p","text":"Kenta leaned down. \"The rail is talking. It has character. Maybe it is a long metal frog.\""},{"type":"p","text":"\"It is a rail character, not a frog,\" said Ms. Hoshino."},{"type":"p","text":"Chief Gunya Rail wiggled with great seriousness."},{"type":"p","text":"\"A protest means we strongly disagree,\" said the rail. \"We protest against uncontrolled sneezing. The vibration was considerable.\""},{"type":"p","text":"Ms. Hoshino raised one finger. \"To prevent injury, nobody leaves the train without permission.\""},{"type":"p","text":"Riku nodded. \"Considerable means quite large. This is a technical sneeze problem.\""},{"type":"p","text":"Achoo Express sounded embarrassed. \"I appreciate tracks. I am accustomed to normal straight rails, but I am not accustomed to noodle rails.\""},{"type":"p","text":"\"Be accustomed to means be used to,\" said Ms. Hoshino. \"The train is used to normal rails, not spaghetti rails.\""},{"type":"p","text":"Taku held the seat handle. \"We encourage you, Achoo Express. You can do this.\""},{"type":"p","text":"\"Thank you,\" said the train. \"Encouragement received. Nose still nervous.\""},{"type":"p","text":"The train moved slowly. The rail turned right, then left, then under a bridge made of signs."},{"type":"p","text":"A sign flashed."},{"type":"p","text":"BLUE ARROW = SAFE ROUTE. THE ARROW SHOWS THE SAFE ROUTE. THE ARROW INDICATES THE SAFE ROUTE. THE ARROW DEMONSTRATES THE SAFE ROUTE."},{"type":"p","text":"\"Show, indicate, and demonstrate can all mean 'to show,'\" said Ms. Hoshino. \"Good sign. Very repetitive sign.\""},{"type":"p","text":"Taku looked at the twisting rails. \"This is like an asteroid path in space.\""},{"type":"p","text":"\"In contrast,\" said Ms. Hoshino, \"asteroids are in space. These rails are under a very emotional train.\""},{"type":"p","text":"Chief Gunya Rail gasped. \"Emotional? I am a professional rail.\""},{"type":"p","text":"The rail bent into a question mark."},{"type":"p","text":"\"You are also dramatic,\" said Riku."},{"type":"p","text":"A tiny maintenance robot rolled beside the train. Its name tag said TrackBot Old-3."},{"type":"p","text":"\"I am accustomed to strange rails,\" said TrackBot. \"But you passengers may have difficulty choosing the correct route.\""},{"type":"p","text":"\"We have difficulty staying normal on this field trip,\" said Ms. Hoshino."},{"type":"p","text":"The train reached a crossing with four tracks."},{"type":"p","text":"One track went to the Sea Museum. One track went to a cafeteria. One track went to a tunnel labeled POSSIBLY FISH. One track went in a circle and looked proud."},{"type":"p","text":"Kenta pointed at POSSIBLY FISH. \"Possibly frog?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino."},{"type":"p","text":"Riku checked his map. \"The blue arrow indicates the safe sea route. We should set out for Undersea Station.\""},{"type":"p","text":"\"Set out means start a trip,\" said Ms. Hoshino. \"Good. We set out carefully.\""},{"type":"p","text":"The track shook again."},{"type":"p","text":"\"A-rail-choo!\" said Chief Gunya Rail."},{"type":"p","text":"Kenta smiled. \"The rail is learning frog language.\""},{"type":"p","text":"Ms. Hoshino looked at her folder. \"No. It is learning trouble.\""},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Conductor Penpen's Peta-Peta Ticket Check"},{"type":"p","text":"After the wiggly maze, the tunnel became cold and blue."},{"type":"p","text":"The train door opened for exactly three seconds."},{"type":"p","text":"Peta. Peta. Peta."},{"type":"p","text":"A penguin in a tiny conductor hat stepped inside."},{"type":"p","text":"\"Ticket check! Peta-peta!\" he said. \"I am Conductor Penpen of the Sea Railway. Please show your ticket, your certificate, and your account of the sneeze.\""},{"type":"p","text":"Taku blinked. \"Account? Like a bank account?\""},{"type":"p","text":"Ms. Hoshino said, \"Account can mean a bank account, but it can also mean an explanation. Here, he wants an explanation of what happened.\""},{"type":"p","text":"Penpen pulled out an ice-blue clipboard."},{"type":"p","text":"\"We face a sneeze problem,\" said Penpen. \"But blame will not fix the route. I do not blame before I check.\""},{"type":"p","text":"Ms. Hoshino bowed a little. \"Excellent conductor attitude.\""},{"type":"p","text":"Achoo Express gave a small sniffle. \"Thank you, Conductor. I feared I had ruined the trip.\""},{"type":"p","text":"\"Ruin means spoil or destroy the good result,\" said Ms. Hoshino. \"The trip is not ruined yet. It is only extremely strange.\""},{"type":"p","text":"Penpen stamped the air."},{"type":"p","text":"\"Sea Railway Safety Certificate required,\" he said. \"The due date is sunset. If you arrive after sunset, the certificate becomes wet in a more official way.\""},{"type":"p","text":"\"It is already wet,\" said Riku."},{"type":"p","text":"\"As a matter of fact,\" said Penpen, \"most things under the sea are wet.\""},{"type":"p","text":"Kenta whispered, \"I am in favor of penguin conductors. They are serious and round.\""},{"type":"p","text":"\"Be in favor of means support,\" said Ms. Hoshino. \"You support penguin conductors. That is allowed.\""},{"type":"p","text":"Penpen tapped his fish-shaped tablet."},{"type":"p","text":"\"I must contact Undersea Station. I need the latest route information. New, recent, latest: all are useful words, but latest means the newest information.\""},{"type":"p","text":"Riku connected his tablet to the train system."},{"type":"p","text":"\"Contact established,\" he said. \"In terms of safety, we should move slowly. In terms of travel, we need the certificate. In terms of lunch, the bento still looks dangerous.\""},{"type":"p","text":"\"Good use of in terms of,\" said Ms. Hoshino. \"Please leave the lunch alone.\""},{"type":"p","text":"The screen showed a map of Undersea Station. It also showed penguins, fish, crabs, and one shark icon with a stationmaster hat."},{"type":"p","text":"\"The population of Undersea Station includes many sea creatures,\" said Penpen. \"Some ocean animals are endangered species, so the Sea Railway has strict trash rules.\""},{"type":"p","text":"Kenta looked out the window. \"If frogs lived in the sea, would they get a discount?\""},{"type":"p","text":"Penpen shook his head. \"No frog discount. Fish-bone tickets are also not a toy.\""},{"type":"p","text":"The train speaker buzzed."},{"type":"p","text":"\"Temporary certificate ready,\" said Achoo Express. \"But my printer may sneeze.\""},{"type":"p","text":"\"Do not sneeze on the certificate,\" said Ms. Hoshino. \"Checking facts is more effective than shouting at the train.\""},{"type":"p","text":"The certificate slid out slowly."},{"type":"p","text":"It was damp, blue, and shaped like a fish."},{"type":"p","text":"Penpen stamped it."},{"type":"p","text":"\"Peta-peta approved!\""},{"type":"p","text":"Then he pointed to the window."},{"type":"p","text":"Beyond the glass, the tunnel opened into a wide blue place. Undersea Station glowed ahead."},{"type":"p","text":"\"Next stop,\" said Penpen, \"Station Manager Samezawa. Please do not scream at his teeth. He is sensitive about teeth-based first impressions.\""},{"type":"p","text":"Taku swallowed. \"We will try.\""},{"type":"p","text":"Kenta whispered, \"Evidence one: sharks have teeth. Evidence two: frogs do not have teeth like that. Evidence three: I am still curious.\""},{"type":"p","text":"Ms. Hoshino said, \"Curious is fine. Screaming is not.\""},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Undersea Station and Station Manager Samezawa"},{"type":"p","text":"Achoo Express rolled into Undersea Station."},{"type":"p","text":"The platform was behind strong glass walls. Fish swam outside. Seaweed waved like green flags. Bubbles went up, up, up."},{"type":"p","text":"Taku pressed his hands together. \"This is like space, but wetter.\""},{"type":"p","text":"Ms. Hoshino smiled. \"Deep water pushes hard. Space has almost no air, while the deep sea has a lot of water pressure. They are very different, but both are difficult places for humans.\""},{"type":"p","text":"Kenta pointed. \"A shark is coming. I suspect he is the fish principal.\""},{"type":"p","text":"\"Please do not assign school jobs to sharks,\" said Ms. Hoshino."},{"type":"p","text":"A large shark in a stationmaster hat came onto the platform. His name tag said:"},{"type":"p","text":"STATION MANAGER SAMEZAWA DEGREE IN GENTLE OCEAN OPERATION PLEASE DO NOT SUSPECT ME BECAUSE OF MY TEETH"},{"type":"p","text":"Samezawa opened his mouth."},{"type":"p","text":"\"Welcome.\""},{"type":"p","text":"Everyone took one tiny step backward."},{"type":"p","text":"Samezawa sighed. \"I no longer eat tickets. They are not part of a balanced diet.\""},{"type":"p","text":"Ms. Hoshino nodded. \"A balanced diet means eating different kinds of food in a healthy way. Tickets are not food.\""},{"type":"p","text":"\"As a matter of fact,\" said Penpen, \"he is a very responsible station manager.\""},{"type":"p","text":"Samezawa bowed. \"My responsibility is to keep this historical station safe. But we have a serious problem.\""},{"type":"p","text":"He pointed his tail at the waiting room."},{"type":"p","text":"It was filled with trash."},{"type":"p","text":"\"A station should not be filled with trash,\" said Samezawa."},{"type":"p","text":"There were old snack wrappers, tiny plastic pieces, broken toy nets, and one suspicious sock floating in a bubble."},{"type":"p","text":"Kenta stared. \"The sock has ocean frog energy.\""},{"type":"p","text":"\"Please do not add energy to the sock,\" said Ms. Hoshino."},{"type":"p","text":"Samezawa looked serious. \"This station used to be clean. Now the trash blocks the air filter operation. A sneeze from Achoo Express may imply that the filter is blocked. It does not imply that the train has bad behavior.\""},{"type":"p","text":"Riku opened his tool kit. \"So the sneeze was data. We should compare the old station filter with the current filter.\""},{"type":"p","text":"\"Compare means look at similarities and differences,\" said Ms. Hoshino."},{"type":"p","text":"Riku checked the filter. \"The degree of blockage is high. Not a university degree. A level of blockage.\""},{"type":"p","text":"\"Good,\" said Ms. Hoshino. \"Degree has more than one meaning.\""},{"type":"p","text":"Samezawa picked up a plastic wrapper with a grabber."},{"type":"p","text":"\"I devote myself to clean ocean operation,\" he said. \"The phrase devote oneself to means to give a lot of time and energy to something. I also teach baby sharks about trash. Tuition is free, because baby sharks pay in terrible songs.\""},{"type":"p","text":"From a small classroom behind the platform came a sound."},{"type":"p","text":"\"La la la, chomp chomp la.\""},{"type":"p","text":"Taku winced. \"That song is rare.\""},{"type":"p","text":"\"It is not the main issue,\" said Ms. Hoshino."},{"type":"p","text":"Achoo Express sounded guilty. \"I thought my sneeze ruined everything.\""},{"type":"p","text":"Samezawa shook his head. \"No. The sneeze showed the problem. Now we take action.\""},{"type":"p","text":"Ms. Hoshino gave instructions."},{"type":"p","text":"\"We do not touch real dangerous trash with bare hands. In this story, the station staff has safe tools. We help with model trash and sorting cards.\""},{"type":"p","text":"Kenta sorted a card with a fish picture. \"Endangered species need clean homes.\""},{"type":"p","text":"\"Exactly,\" said Ms. Hoshino. \"Some ocean animals are endangered species. Trash can hurt them, so we must be careful.\""},{"type":"p","text":"Riku repaired the filter with Samezawa."},{"type":"p","text":"Penpen checked the due date."},{"type":"p","text":"Taku held a sign that said THE OCEAN IS NOT A TRASH BOX."},{"type":"p","text":"Achoo Express breathed in through its nose sensor."},{"type":"p","text":"\"I am less sneezy,\" said the train. \"I no longer blame the ekiben alone. The blocked filter was also related to the problem.\""},{"type":"p","text":"Everyone relaxed."},{"type":"p","text":"Then Achoo Express said, \"A... A...\""},{"type":"p","text":"Everyone shouted, \"No!\""},{"type":"p","text":"Achoo Express finished softly, \"A... agreeable improvement detected.\""},{"type":"p","text":"Samezawa smiled."},{"type":"p","text":"It was a little too toothy."},{"type":"p","text":"Kenta whispered, \"Friendly, but very tooth-based.\""},{"type":"p","text":"Ms. Hoshino wrote something in her folder. \"Do not judge only by teeth. Also, do not use tooth-based as an official word.\""},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Bathhouse at the Final Stop"},{"type":"p","text":"Past Undersea Station, the track led to a warm, steamy place."},{"type":"p","text":"A sign appeared."},{"type":"p","text":"SEA BREEZE BATHHOUSE TERMINAL FINAL STOP FOR SNEEZY TRAINS"},{"type":"p","text":"Taku jumped in his seat. \"The final stop is a bathhouse?\""},{"type":"p","text":"Conductor Penpen said, \"It is tradition. A sneezy train must wash its nose filter before returning to normal tracks.\""},{"type":"p","text":"A bathhouse employee came out of the steam. He wore a towel on his head and a badge that said MR. YUGE."},{"type":"p","text":"\"Welcome,\" said Mr. Yuge. \"This tradition has led many sneezy trains back to safety. We use modern filters, old-fashioned brushes, and very serious bubbles.\""},{"type":"p","text":"Riku's eyes shone. \"I can help as an engineer.\""},{"type":"p","text":"\"Good,\" said Mr. Yuge. \"An engineer helps design or fix machines. Today, we fix a train nose. Very honorable. Slightly ridiculous.\""},{"type":"p","text":"Kenta looked at a bath bucket. \"Can frogs use this bath?\""},{"type":"p","text":"\"Not today,\" said Ms. Hoshino."},{"type":"p","text":"Mr. Yuge pointed to a bubble meter."},{"type":"p","text":"\"Be careful. Bubble inflation is high. Too many bubbles cost extra towels.\""},{"type":"p","text":"Ms. Hoshino said, \"Inflation usually means prices going up. Here it is a bubble joke, but we still reduce the bubbles.\""},{"type":"p","text":"Riku connected his Anti-Sneeze Bubble Controller."},{"type":"p","text":"\"Initial test.\""},{"type":"p","text":"The machine made one small bubble."},{"type":"p","text":"Then ten bubbles."},{"type":"p","text":"Then a hundred bubbles."},{"type":"p","text":"Then the whole platform looked like a cloud."},{"type":"p","text":"Taku laughed. \"Bubble planet!\""},{"type":"p","text":"Ms. Hoshino said, \"It is not a planet. It is soap. Also, please keep soap away from your eyes.\""},{"type":"p","text":"Achoo Express opened its front filter."},{"type":"p","text":"Riku read the data."},{"type":"p","text":"\"Achoo behavior analysis: artificial wasabi smell, blocked filter, wireless smell sensitivity, and some emotional rails.\""},{"type":"p","text":"Chief Gunya Rail's voice came through the speaker. \"I heard that.\""},{"type":"p","text":"\"Sorry,\" said Riku. \"Useful emotional rails.\""},{"type":"p","text":"Ms. Hoshino said, \"Behavior means how someone or something acts. The train's behavior caused trouble, but now it is learning.\""},{"type":"p","text":"Everyone began the cleaning activity."},{"type":"p","text":"Mr. Yuge brushed the nose filter. Penpen stamped the maintenance certificate. Samezawa checked the trash screen. Riku adjusted the anti-sneeze filter. Kenta observed the bubbles from a safe distance. Taku held the mission sign. Ms. Hoshino made sure nobody licked soap, rail, ticket, or mystery sauce."},{"type":"p","text":"Achoo Express sighed."},{"type":"p","text":"\"I rely on my passengers, my conductor, my station manager, and my bathhouse team. Thank you.\""},{"type":"p","text":"\"Rely on means depend on,\" said Ms. Hoshino. \"A train should not rely on children too much, but teamwork is good.\""},{"type":"p","text":"The filter clicked into place."},{"type":"p","text":"\"This clean filter can lead us back to the safe route,\" said Riku."},{"type":"p","text":"The blue light became green."},{"type":"p","text":"Achoo Express spoke in a clear voice."},{"type":"p","text":"\"By the time we return to school, I will be cleaner, calmer, and less sneezy.\""},{"type":"p","text":"\"Good,\" said Taku. \"But can you still say achoo?\""},{"type":"p","text":"\"Only in emergency mode,\" said the train. \"Or when reading my own name.\""},{"type":"p","text":"Mr. Yuge handed out tiny towels that said ANTI-SNEEZE TEAM."},{"type":"p","text":"\"The prefix anti- means against,\" said Ms. Hoshino. \"Anti-sneeze, anti-trash, anti-slip.\""},{"type":"p","text":"Kenta held up his towel. \"Anti-frog?\""},{"type":"p","text":"\"No,\" said Ms. Hoshino. \"We are not against frogs. We are against unsafe nonsense.\""},{"type":"p","text":"At last, the steam cleared. The track ahead was straight. The sea outside looked cleaner. The suspicious sock was in a sealed wash bag, where it could no longer hurt noses or oceans."},{"type":"p","text":"Conductor Penpen stood proudly."},{"type":"p","text":"\"In conclusion,\" he said, \"the train sneezed, the track protested, the penguin checked tickets, the shark was not a villain, the bathhouse cleaned the filter, and nobody got a frog discount.\""},{"type":"p","text":"\"In conclusion,\" said Kenta, \"I still want a frog station.\""},{"type":"p","text":"\"In conclusion,\" said Ms. Hoshino, \"no.\""},{"type":"p","text":"Achoo Express rolled back toward school."},{"type":"p","text":"The train was calm."},{"type":"p","text":"The passengers were safe."},{"type":"p","text":"Taku watched the bubbles disappear behind them."},{"type":"p","text":"\"A problem can turn out to have many causes,\" he said. \"We should not blame too fast. We should figure it out and cooperate.\""},{"type":"p","text":"Ms. Hoshino smiled. \"That is a very good conclusion.\""},{"type":"p","text":"The train speaker clicked."},{"type":"p","text":"\"Next stop: School. Thank you for riding Achoo Express.\""},{"type":"p","text":"Everyone relaxed."},{"type":"p","text":"Then the train said, \"A... A...\""},{"type":"p","text":"Everyone froze."},{"type":"p","text":"\"A... arigato,\" said Achoo Express."},{"type":"p","text":"Taku grinned. \"He sneezed thank you!\""},{"type":"p","text":"Ms. Hoshino closed her folder."},{"type":"p","text":"\"That is not how sneezes work,\" she said. \"But after today, I will accept it.\""}]},{"themeNo":13,"id":"13","title":"Pajama Pirates and Pillow Island","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Futon Ship Sets Out"},{"type":"p","text":"On Friday night, Ms. Hoshino held a special reading night in the school library."},{"type":"p","text":"Taku came in space pajamas. Tiny rockets flew across his sleeves. Kenta came in frog pajamas. A green frog smiled from his pocket. Riku came in block pajamas. He had twelve pockets, and every pocket made a tiny click."},{"type":"p","text":"Ms. Hoshino clapped her hands softly."},{"type":"p","text":"“Tonight, we read quietly, brush our teeth, and sleep safely. First, safety. Second, calmness. Third, no pillow wrestling.”"},{"type":"p","text":"Taku hugged his blanket and grinned."},{"type":"p","text":"“This is probably a mission.”"},{"type":"p","text":"Kenta held up his pillow."},{"type":"p","text":"“Maybe my pillow contains a frog captain.”"},{"type":"p","text":"“It probably does not,” said Ms. Hoshino."},{"type":"p","text":"Just then, Taku’s futon made a creaking sound."},{"type":"p","text":"Creeeeeak."},{"type":"p","text":"The pillow stood up like a mast. The blanket became a sail. The sleeping bag became a soft wooden deck."},{"type":"p","text":"A small sign popped out of the pillow."},{"type":"p","text":"WELCOME TO DREAM HARBOR. FUTON SHIP MUNYA IS AVAILABLE."},{"type":"p","text":"Riku blinked."},{"type":"p","text":"“My bed has turned into transportation.”"},{"type":"p","text":"The futon ship wiggled and said, “Munya… boarding time.”"},{"type":"p","text":"A tiny office appeared on the edge of the blanket. A sleepy clerk with a moon-shaped hat waved a form."},{"type":"p","text":"“I am from the Dream Harbor Authority. Before departure, please fill out the Pajama Pirate Form.”"},{"type":"p","text":"Taku looked at the form."},{"type":"p","text":"“Name, pajama type, pillow softness, allergy information, trustworthy pirate partner, up to three bedtime snacks, recent dreams, and… blanket crime history?”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Blanket crime sounds serious.”"},{"type":"p","text":"Ms. Hoshino bent down and read the paper. “In this dream world, stealing another person’s blanket is called a blanket crime. In real life, we just say, ‘Please give it back.’ Also, allergy information is important. Dream snacks are silly, but real allergies are serious.”"},{"type":"p","text":"Riku took out a pencil. “I will process the form data.”"},{"type":"p","text":"The sleepy clerk nodded. “Good. While children sleep, the brain can process what it learned. But please do not install twelve buttons on your brain.”"},{"type":"p","text":"Taku whispered, “Sleeping is like brain engineering.”"},{"type":"p","text":"“A little,” said Ms. Hoshino. “But less noisy.”"},{"type":"p","text":"The clerk stamped their forms."},{"type":"p","text":"“Congratulations. You acquire the Pajama Pirate License.”"},{"type":"p","text":"A second sign appeared."},{"type":"p","text":"EACH GENERATION OF PAJAMA PIRATES DIFFERS FROM THE LAST. OLD PIRATES LOOKED FOR GOLD. NEW PAJAMA PIRATES HELP SLEEPLESS ISLANDS."},{"type":"p","text":"Kenta touched the word sleepless."},{"type":"p","text":"“Less means without, right? Sleep-less means without sleep. Frogless means without frogs. That is sad.”"},{"type":"p","text":"“That is the suffix -less,” said Ms. Hoshino. “And yes, frogless would be sad for you.”"},{"type":"p","text":"The ship’s sail filled with a warm night wind."},{"type":"p","text":"A map rolled down from the mast."},{"type":"p","text":"RECENT PROBLEM: PILLOW ISLAND IS SLEEPLESS. MISSION: MAKE PROGRESS BEFORE SUNRISE."},{"type":"p","text":"Taku put one foot on the deck."},{"type":"p","text":"“Pajama pirates, set sail!”"},{"type":"p","text":"Kenta raised his frog pillow. A tiny flag popped out."},{"type":"p","text":"FROG CAPTAIN AVAILABLE."},{"type":"p","text":"“I knew it!” Kenta shouted."},{"type":"p","text":"Ms. Hoshino looked closely. “Kenta, you drew that flag this afternoon.”"},{"type":"p","text":"Kenta nodded proudly."},{"type":"p","text":"“That makes it trustworthy.”"},{"type":"p","text":"The library faded. The walls became clouds. The moon grew huge above them."},{"type":"p","text":"Futon Ship Munya slid away from Dream Harbor and into the silver dream sea."},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Sleepy Cannon and the Yawn Cloud Meeting"},{"type":"p","text":"The dream sea rolled under the ship. The waves looked like blankets. The moon pulled the water into slow, soft hills."},{"type":"p","text":"Taku pointed up."},{"type":"p","text":"“The Moon is pulling the dream sea!”"},{"type":"p","text":"Ms. Hoshino smiled. “In the real world, the Moon’s gravity helps make ocean tides. In this dream, the Moon is also making blanket waves.”"},{"type":"p","text":"Riku wrote on a card."},{"type":"p","text":"Dream tide system: not scientific, but useful."},{"type":"p","text":"A loud snore came from the front of the ship."},{"type":"p","text":"“Who snored?” asked Taku."},{"type":"p","text":"A pirate stepped out from behind the mast. He wore striped pajamas, a sleepy eye patch, and a nightcap with a tiny bell."},{"type":"p","text":"“I am Captain Munyahige,” he said. “Munya… I mean, onward!”"},{"type":"p","text":"Kenta bowed. “Are you a frog pirate?”"},{"type":"p","text":"“I have nothing to do with frogs,” said Captain Munyahige."},{"type":"p","text":"Kenta wrote that down with disappointment."},{"type":"p","text":"At the front of the ship stood a huge cannon. It was covered with pillows and had a dial that said YAWN LEVEL."},{"type":"p","text":"Captain Munyahige said, “To approach Pillow Island, we need the Sleepy Cannon.”"},{"type":"p","text":"Ms. Hoshino stepped forward. “Only if it is safe.”"},{"type":"p","text":"The cannon opened one sleepy eye."},{"type":"p","text":"“I am convenient and traditional,” it said. “My characteristic is simple. I fire yawn clouds. Yawn cloud ready.”"},{"type":"p","text":"Taku jumped back. “A talking cannon!”"},{"type":"p","text":"Riku leaned closer. “I can regulate the yawn level.”"},{"type":"p","text":"“Good,” said Ms. Hoshino. “A tool that makes people sleepy could endanger the trip if used too much. It is not medicine. If someone cannot sleep for a long time, they should talk to an adult or a doctor. In this story, it is a dream tool.”"},{"type":"p","text":"The Sleepy Cannon puffed out a tiny cloud."},{"type":"p","text":"“Puff. I am addicted to yawning.”"},{"type":"p","text":"Ms. Hoshino raised one finger. “Be addicted to is a strong expression. Addiction can be serious for people. Here, the cannon is making a machine joke.”"},{"type":"p","text":"The cannon whispered, “A serious machine joke.”"},{"type":"p","text":"Captain Munyahige rang a small bell."},{"type":"p","text":"“Pajama Pirate Meeting! Public opinion about the Sleepy Cannon is mixed.”"},{"type":"p","text":"Several dream sailors appeared. One sheep sailor held a sign."},{"type":"p","text":"YAWN CLOUDS ARE CALM."},{"type":"p","text":"A teddy bear sailor held another sign."},{"type":"p","text":"YAWN CLOUDS MAKE ME MISS SNACKS."},{"type":"p","text":"Kenta held up his own sign."},{"type":"p","text":"MAKE THE CLOUD FROG-SHAPED."},{"type":"p","text":"Ms. Hoshino read it and said, “That has nothing to do with the main problem.”"},{"type":"p","text":"Taku stood on a pillow box. His space pajamas shone under the moon."},{"type":"p","text":"“We should show respect for sleep,” he said. “But we should not force anyone to sleep. I think we should fire one gentle yawn cloud. I suppose it can help us calm down. I assume Riku can test it first.”"},{"type":"p","text":"Riku adjusted the dial. “You think, suppose, and assume it is safe. I will test it carefully.”"},{"type":"p","text":"Captain Munyahige nodded. “That is real pajama leadership.”"},{"type":"p","text":"“In fact,” said Ms. Hoshino, “good leadership means thinking about safety before excitement.”"},{"type":"p","text":"Riku pressed the smallest button."},{"type":"p","text":"Pooooof."},{"type":"p","text":"A tiny yawn cloud floated out."},{"type":"p","text":"It drifted across the deck, missed Taku, missed Riku, and landed directly on Kenta’s frog pillow."},{"type":"p","text":"The frog pillow whispered, “Gero… yawn…”"},{"type":"p","text":"Kenta’s eyes widened."},{"type":"p","text":"“The frog has entered sleep mode.”"},{"type":"p","text":"“It is a pillow,” said Ms. Hoshino."},{"type":"p","text":"The pillow snored softly."},{"type":"p","text":"Captain Munyahige pointed ahead."},{"type":"p","text":"“Pillow Island is near.”"},{"type":"p","text":"“Close to us?” asked Taku."},{"type":"p","text":"“Very close to us,” said the captain."},{"type":"p","text":"Then the sea rose, the moon glowed brighter, and a giant white fin cut through the blanket waves."},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Fluffyfin the Pillow Shark"},{"type":"p","text":"The white fin came closer. The dream sea bubbled with feathers."},{"type":"p","text":"A huge pillow shark rose from the waves."},{"type":"p","text":"It had a shark shape, a pillow body, no sharp teeth, and a mouth full of fluffy feathers."},{"type":"p","text":"“Stop the futon ship!” it shouted."},{"type":"p","text":"Taku grabbed the soft rail."},{"type":"p","text":"“A pillow shark!”"},{"type":"p","text":"Kenta leaned forward."},{"type":"p","text":"“Evidence one: it is soft. Evidence two: soft things may hide frogs. Evidence three: I want it to be a frog pillow.”"},{"type":"p","text":"“Observe from a safe distance,” said Ms. Hoshino."},{"type":"p","text":"The pillow shark swam beside the ship."},{"type":"p","text":"“My name is Fluffyfin. I am the environmentalist of Pillow Island. You failed to satisfy the pillow fare system.”"},{"type":"p","text":"“Fare?” asked Taku. “Like train money?”"},{"type":"p","text":"“In this dream,” said Ms. Hoshino, “fare means one polite bedtime promise.”"},{"type":"p","text":"Riku checked the map. “We did not pay the fare because the content of the ticket was hidden under a blanket wave.”"},{"type":"p","text":"Fluffyfin narrowed his sleepy eyes."},{"type":"p","text":"“Many pirates chase treasure instead of listening. As a result of noisy dreams, Pillow Island is losing quiet places.”"},{"type":"p","text":"The ship became silent."},{"type":"p","text":"Fluffyfin continued. “Dream towns grew too fast. Pillow shops, blanket towers, and snack castles spread everywhere. It is dream urbanization. Tiny dream creatures now have poverty of quiet places. They do not have enough peaceful space to rest.”"},{"type":"p","text":"Ms. Hoshino spoke gently. “Poverty is a serious word about not having enough money or resources. In this dream, small dream creatures do not have enough quiet sleeping places. We treat that respectfully.”"},{"type":"p","text":"Taku lowered his pirate hat."},{"type":"p","text":"“So the problem is not only treasure.”"},{"type":"p","text":"“Correct,” said Fluffyfin. “Address the quiet-place problem. Also, my address is Close-to-the-Moon Reef, Pillow Island.”"},{"type":"p","text":"Kenta brightened. “Address can mean problem-solve and place-to-live. Nice.”"},{"type":"p","text":"Fluffyfin turned his soft tail. “I am independent of the Blanket Empire. I protect this island by myself.”"},{"type":"p","text":"Captain Munyahige whispered, “He is serious.”"},{"type":"p","text":"Riku opened a small block notebook."},{"type":"p","text":"“We need an efficient plan. First, check the quiet reefs. Second, boost the ship with moon tide. Third, do not get swallowed by a pillow shark.”"},{"type":"p","text":"“That third step is important,” said Taku."},{"type":"p","text":"Fluffyfin looked offended. “I do not swallow pirates. I only stop them with extreme softness.”"},{"type":"p","text":"Then he opened his huge feather mouth and sent out a wind of warm pillow smell."},{"type":"p","text":"Taku, Kenta, and Riku swayed."},{"type":"p","text":"“Sleepy…” said Kenta."},{"type":"p","text":"“We are being chased by a bed,” Taku mumbled."},{"type":"p","text":"“A pillow shark,” said Ms. Hoshino. “But emotionally, yes.”"},{"type":"p","text":"The futon ship leaned into the moon tide. The blanket sail filled. The ship moved faster."},{"type":"p","text":"“The moon current will boost us!” shouted Taku."},{"type":"p","text":"Fluffyfin raced beside them, not angry now, but worried."},{"type":"p","text":"“If you only look for treasure, you will miss the real issue!”"},{"type":"p","text":"Kenta shouted back, “Can you become our classmate?”"},{"type":"p","text":"“Only in dream class!” Fluffyfin shouted."},{"type":"p","text":"The ship slid between two clouds and reached Pillow Island."},{"type":"p","text":"The island was beautiful, but not peaceful. Advertisement flags flapped on every hill. Minty lights flashed in the night. Dream creatures wore tired faces."},{"type":"p","text":"At the center of the island sat a huge treasure chest."},{"type":"p","text":"Captain Munyahige smiled."},{"type":"p","text":"“At last. Treasure.”"},{"type":"p","text":"The chest sneezed mint dust."},{"type":"p","text":"Ms. Hoshino folded her arms."},{"type":"p","text":"“I have questions.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"The Toothpaste Treasure"},{"type":"p","text":"A sign on the treasure chest said:"},{"type":"p","text":"TO OPEN THE TREASURE, COMPETE IN THE BEDTIME CHALLENGE."},{"type":"p","text":"Captain Munyahige drew his pillow sword."},{"type":"p","text":"“A pirate competition!”"},{"type":"p","text":"Ms. Hoshino shook her head. “A safe competition.”"},{"type":"p","text":"The first event was Silent Pajama Walk. The pirates had to walk across a row of squeaky floorboards without waking a baby cloud."},{"type":"p","text":"Taku tiptoed like an astronaut on the Moon. Riku moved like a careful robot. Kenta tried a frog jump."},{"type":"p","text":"SQUEAK-BOING."},{"type":"p","text":"The baby cloud opened one eye."},{"type":"p","text":"“That was not silent,” said Ms. Hoshino."},{"type":"p","text":"Kenta bowed. “My frog technique needs improvement.”"},{"type":"p","text":"The second event was Toothpaste Order. A mint-bearded scientist appeared from behind the chest."},{"type":"p","text":"“I am Dr. Mintbeard,” he said. “Put the bedtime tools in the correct order.”"},{"type":"p","text":"On the table were a toothbrush, toothpaste, a frog cup, a towel, and a tiny treasure spoon."},{"type":"p","text":"Kenta grabbed the frog cup. “The real treasure.”"},{"type":"p","text":"Dr. Mintbeard coughed. “The order matters. Brush gently. Spit. Rinse if your adult says so. Do not eat toothpaste.”"},{"type":"p","text":"Ms. Hoshino nodded. “Toothpaste is for brushing teeth, not for eating.”"},{"type":"p","text":"Suddenly, a huge advertisement lit up behind the chest."},{"type":"p","text":"MEGA MINT PIRATE PASTE! HUGE SPARKLE! HUGE BUBBLES! HUGE BEDTIME POWER! NOW WITH CAFFEINE MINT BLAST!"},{"type":"p","text":"Taku covered his eyes. “That advertisement is too huge.”"},{"type":"p","text":"Riku read the small letters at the bottom. “Caffeine Mint Blast is not for bedtime.”"},{"type":"p","text":"Ms. Hoshino spoke clearly. “Caffeine can make it harder to sleep. Children should not choose caffeine products by themselves. At bedtime, calm routines are better.”"},{"type":"p","text":"Dr. Mintbeard sighed. “That advertisement caused a problem. The demand for strong mint became too high. As a result, dream children stayed excited. Pillow Island lost quiet.”"},{"type":"p","text":"Fluffyfin lowered his head."},{"type":"p","text":"“I was forced to guard the treasure because the ads made everyone forget sleep.”"},{"type":"p","text":"Taku looked at the bright sign."},{"type":"p","text":"“Strong is not always better.”"},{"type":"p","text":"“Exactly,” said Ms. Hoshino."},{"type":"p","text":"Riku opened his notebook. “We need to tackle the message and improve it.”"},{"type":"p","text":"He turned the sign around. The back was blank."},{"type":"p","text":"Taku, Kenta, Riku, and Fluffyfin wrote a new advertisement."},{"type":"p","text":"BRUSH GENTLY. SLEEP CALMLY. TREASURE IS A HEALTHY ROUTINE."},{"type":"p","text":"Captain Munyahige blinked."},{"type":"p","text":"“No gold?”"},{"type":"p","text":"Dr. Mintbeard pointed to a smaller sign."},{"type":"p","text":"“Gold is shiny, but clean teeth are useful.”"},{"type":"p","text":"The chest clicked."},{"type":"p","text":"Before it opened, an old lullaby floated across the island. The tune was soft and simple."},{"type":"p","text":"Captain Munyahige took off his hat."},{"type":"p","text":"“This song is traditional. If nobody sings it, it may die out.”"},{"type":"p","text":"“That means disappear over time,” said Ms. Hoshino. “A custom, song, or even a species can die out. Here, we are talking about a bedtime song.”"},{"type":"p","text":"The dream creatures began to hum. The bright mint lights became softer."},{"type":"p","text":"The treasure chest opened."},{"type":"p","text":"Inside were no coins."},{"type":"p","text":"There was a moon-shaped toothbrush, a small tube of toothpaste, a calm breathing card, a frog cup, and a fuzzy map."},{"type":"p","text":"Kenta lifted the cup."},{"type":"p","text":"“The frog cup is the real treasure.”"},{"type":"p","text":"“For you, perhaps,” said Ms. Hoshino."},{"type":"p","text":"Taku lifted the map."},{"type":"p","text":"The letters on it glowed."},{"type":"p","text":"THE MAP THAT WOULD NOT WAKE UP. ROUTINE REQUIRED."},{"type":"p","text":"Riku frowned."},{"type":"p","text":"“That sounds like a final problem.”"},{"type":"p","text":"The map yawned and rolled itself into a circle."},{"type":"p","text":"Then the whole island spun."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The Map That Would Not Wake Up"},{"type":"p","text":"The fuzzy map unrolled again, but the path had changed."},{"type":"p","text":"The same palm tree appeared on the left. The same pillow rock appeared on the right. The same sleepy crab waved the same tiny flag."},{"type":"p","text":"“We are going in circles,” said Taku."},{"type":"p","text":"Riku scanned the map. “The map maintains dream mode. Maintain means keep. It keeps us in the dream.”"},{"type":"p","text":"Taku held the map upside down. “How do we cope with a map that will not wake up?”"},{"type":"p","text":"Ms. Hoshino answered, “We slow down, check the routine, and solve one step at a time.”"},{"type":"p","text":"A card fell from the map."},{"type":"p","text":"PILLOW SHIP INSURANCE Covers: lost socks, broken feather compass, minor yawn storms. Does not cover: eating toothpaste."},{"type":"p","text":"Kenta nodded. “Good insurance.”"},{"type":"p","text":"Captain Munyahige looked serious. “I must explain something. I am not your employer. I do not order you around. I am your co-captain.”"},{"type":"p","text":"Taku smiled. “Co-captain means we lead together.”"},{"type":"p","text":"“Yes,” said the captain. “Co- means together, like co-captain or cooperate.”"},{"type":"p","text":"The map glowed again."},{"type":"p","text":"FIND THE THREE TREASURES. NATURAL SLEEP. BRAVE HONESTY. KIND TREATMENT."},{"type":"p","text":"Ms. Hoshino read each line."},{"type":"p","text":"“Natural sleep means calming down and resting, not forcing excitement forever. Brave honesty means you can say, ‘I feel worried,’ or ‘I need rest.’ Treatment can mean medical care, but it can also mean how we treat people. Here, it means kind treatment. The advantage of a bedtime routine is that your body and brain know what comes next.”"},{"type":"p","text":"Fluffyfin swam beside the shore."},{"type":"p","text":"“I care about Pillow Island. I want quiet places back.”"},{"type":"p","text":"Kenta patted his frog cup. “I care about Pillow Island too. Also, I care about the frog cup.”"},{"type":"p","text":"“The first part is more important,” said Ms. Hoshino."},{"type":"p","text":"Riku looked at the spinning path and began building with soft blocks."},{"type":"p","text":"“Pillow bridge engineering begins.”"},{"type":"p","text":"He connected pillow rocks, blanket ropes, and moonlight sticks. The bridge formed a gentle path back to the Futon Ship Munya."},{"type":"p","text":"Taku looked at the reading room shape in the clouds."},{"type":"p","text":"“This map reminds me of our school library.”"},{"type":"p","text":"“It reminds A of B,” said Ms. Hoshino. “The map reminds you of the library.”"},{"type":"p","text":"The map shivered. More words appeared."},{"type":"p","text":"IN CONNECTION WITH TONIGHT’S LESSON, COMPLETE THE BEDTIME ROUTINE."},{"type":"p","text":"Taku took a deep breath."},{"type":"p","text":"“Brush teeth.”"},{"type":"p","text":"Kenta held up the frog cup."},{"type":"p","text":"“Put things away.”"},{"type":"p","text":"Riku checked his pockets."},{"type":"p","text":"“Turn off extra buttons.”"},{"type":"p","text":"Fluffyfin said, “Protect quiet places.”"},{"type":"p","text":"Captain Munyahige said, “Say good night.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“Sleep calmly.”"},{"type":"p","text":"The map became warm. The bright dream sea grew quiet. The advertisement flags folded themselves. The Sleepy Cannon whispered, “Yawn cloud not needed.”"},{"type":"p","text":"The Futon Ship Munya sailed back through moonlight."},{"type":"p","text":"The moon looked huge. Taku watched it reflect on the dream sea."},{"type":"p","text":"“The Moon is like a night lamp for pirates.”"},{"type":"p","text":"Ms. Hoshino answered softly, “The Moon reflects sunlight. And now it is time to sleep.”"},{"type":"p","text":"The ship reached Dream Harbor. The library shelves returned. The blankets became blankets again. The pillows became pillows."},{"type":"p","text":"Morning came."},{"type":"p","text":"Taku woke in his sleeping bag. His toothbrush stood neatly in his cup. Riku woke with one soft block stuck to his sleeve. Kenta woke hugging his frog cup."},{"type":"p","text":"Ms. Hoshino checked the room."},{"type":"p","text":"“Everyone is safe. Excellent.”"},{"type":"p","text":"Kenta sniffed his cup."},{"type":"p","text":"“It smells like mint treasure.”"},{"type":"p","text":"Ms. Hoshino sighed. “I am not writing that in the school report.”"},{"type":"p","text":"Taku reached under his pillow and found a tiny fuzzy map."},{"type":"p","text":"It said:"},{"type":"p","text":"NEXT DESTINATION: BLANKET VOLCANO. DEPARTURE TIME: AFTER HOMEWORK."},{"type":"p","text":"Taku grinned."},{"type":"p","text":"“This is probably another mission.”"},{"type":"p","text":"Ms. Hoshino took the map and read the last line."},{"type":"p","text":"A BRAVE PAJAMA PIRATE KNOWS WHEN TO REST."},{"type":"p","text":"She smiled."},{"type":"p","text":"“Then the mission can wait.”"},{"type":"p","text":"Kenta whispered, “Unless Blanket Volcano has frogs.”"},{"type":"p","text":"“No,” said Ms. Hoshino."},{"type":"p","text":"From inside the frog cup, a tiny voice said, “Gero… good night.”"},{"type":"p","text":"Ms. Hoshino closed her notebook."},{"type":"p","text":"“I am definitely not writing that in the school report.”"}]},{"themeNo":14,"id":"14","title":"Silly Zoo Boss for a Day","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"Sir Gaozaimasu, the Polite Lion"},{"type":"p","text":"On Monday morning, Taku, Kenta, Riku, and Ms. Hoshino went to Silly Zoo."},{"type":"p","text":"The sign at the gate said:"},{"type":"p","text":"Welcome to Silly Zoo. Today’s goal: happy animals, safe visitors, and zero banana accidents. This is not a typical zoo."},{"type":"p","text":"Taku looked at the sign and grinned."},{"type":"p","text":"“This is probably a mission,” he said."},{"type":"p","text":"Kenta looked at the pond near the entrance."},{"type":"p","text":"“Maybe there is a frog lion,” he said."},{"type":"p","text":"Ms. Hoshino gave him a calm look."},{"type":"p","text":"“It is probably not a frog lion,” she said. “Also, please do not invent animals near the ticket gate.”"},{"type":"p","text":"Riku opened his notebook."},{"type":"p","text":"“I will record the average number of visitors, the average animal noise level, and the average chance of banana accidents.”"},{"type":"p","text":"“That is a lot of averages,” said Taku."},{"type":"p","text":"Before they could buy tickets, the zoo speaker coughed."},{"type":"p","text":"“Attention, visitors. The regular zoo director has disappeared.”"},{"type":"p","text":"Everyone gasped."},{"type":"p","text":"“The director disappeared?” said Taku."},{"type":"p","text":"“This is definitely a mission!”"},{"type":"p","text":"A small machine above the gate shook and produced a shiny badge. The badge machine can produce one temporary badge each day. The badge flew across the air and stuck to Taku’s shirt."},{"type":"p","text":"Temporary Zoo Boss: Taku"},{"type":"p","text":"Taku stood up tall."},{"type":"p","text":"“I am the zoo boss for a day! I will make this zoo into a space zoo!”"},{"type":"p","text":"Ms. Hoshino held up one hand."},{"type":"p","text":"“First, safety. Second, respect. Third, no space lions.”"},{"type":"p","text":"The first animal they met was a lion."},{"type":"p","text":"He had a huge mane, a tiny necktie, and a sign that said, Please Roar Politely."},{"type":"p","text":"The lion bowed."},{"type":"p","text":"“Good morning, young director,” he said. “Would you kindly stop the visitors from roaring at me?”"},{"type":"p","text":"Taku blinked."},{"type":"p","text":"“The lion is more polite than me.”"},{"type":"p","text":"The lion bowed again."},{"type":"p","text":"“In this zoo, it is a custom to greet animals politely,” said Ms. Hoshino. “Please say hello, state your name if needed, and mention your purpose clearly. Say, state, and mention are related words.”"},{"type":"p","text":"“My name is Sir Gaozaimasu. I used to roar loudly. However, many visitors roared back at me every day. I had to adapt. Now I speak politely.”"},{"type":"p","text":"“Used to means something happened often in the past,” said Ms. Hoshino. “He used to roar. Now he uses polite words.”"},{"type":"p","text":"Kenta looked at the lion’s tail."},{"type":"p","text":"“Evidence one: he has animal energy. Evidence two: his tail has a rhythm. Evidence three: I want to observe him.”"},{"type":"p","text":"“Observation is good,” said Ms. Hoshino. “But stay behind the line.”"},{"type":"p","text":"Sir Gaozaimasu sighed."},{"type":"p","text":"“My anxiety goes up when visitors shout. I am a lion, but I also like peace.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Anxiety is a serious feeling of worry. We use that word carefully, even in a funny zoo.”"},{"type":"p","text":"Riku checked his Zoo Boss Dashboard."},{"type":"p","text":"“The average visitor number is high,” he said. “But the average lion comfort level is low.”"},{"type":"p","text":"Taku looked worried."},{"type":"p","text":"“So the goal is not just to make visitors laugh?”"},{"type":"p","text":"“Correct,” said Ms. Hoshino. “A zoo is not only for entertainment. It is also for learning, safety, and care.”"},{"type":"p","text":"Sir Gaozaimasu smiled politely."},{"type":"p","text":"“A zoo is made up of animals, people, care, rules, and naps.”"},{"type":"p","text":"“Make up means be formed from,” said Ms. Hoshino."},{"type":"p","text":"Taku wrote in his boss notebook:"},{"type":"p","text":"Zoo management rule one: A good zoo boss listens before deciding."},{"type":"p","text":"Just then, Kenta pointed at a hammock near the sloth area."},{"type":"p","text":"“Something is moving.”"},{"type":"p","text":"They ran over. Inside the hammock was the regular zoo director, Director Yamashita. He was wearing a leaf on his head and snoring softly."},{"type":"p","text":"Taku whispered, “He did not disappear. He was asleep.”"},{"type":"p","text":"Director Yamashita opened one eye."},{"type":"p","text":"“Actually, I was doing sleep research.”"},{"type":"p","text":"“Actually means in fact,” said Ms. Hoshino. “But this is still a nap.”"},{"type":"p","text":"Director Yamashita looked at Taku’s badge."},{"type":"p","text":"“Ah. The temporary badge chose you. Please find out what the animals need today.”"},{"type":"p","text":"Taku saluted."},{"type":"p","text":"“Zoo mission accepted!”"},{"type":"p","text":"Sir Gaozaimasu bowed."},{"type":"p","text":"“Thank you very much. And would you kindly ask the monkeys to stop sending me banana letters?”"},{"type":"p","text":"“Banana letters?” said Riku."},{"type":"p","text":"A banana peel flew over the fence and landed on Riku’s notebook."},{"type":"p","text":"Riku stared at it."},{"type":"p","text":"“Data has arrived.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"Mr. Kirinda and the Giraffe Slide Plan"},{"type":"p","text":"The next area was the giraffe field."},{"type":"p","text":"A tall giraffe stood under a tree. Around his neck hung a sign."},{"type":"p","text":"NOT A SLIDE"},{"type":"p","text":"Beside him was a big plan board:"},{"type":"p","text":"Creative Giraffe Neck Slide Plan Approved? Not yet."},{"type":"p","text":"Taku’s eyes shone."},{"type":"p","text":"“A giraffe slide! It is like a space elevator!”"},{"type":"p","text":"Ms. Hoshino answered immediately."},{"type":"p","text":"“No riding animals. No sliding on animals. No space elevator giraffes.”"},{"type":"p","text":"The giraffe lowered his long head."},{"type":"p","text":"“Good morning. I am Mr. Kirinda. I reject the neck slide plan. My neck is not playground equipment.”"},{"type":"p","text":"Taku looked embarrassed."},{"type":"p","text":"“Sorry. I got excited.”"},{"type":"p","text":"Mr. Kirinda nodded."},{"type":"p","text":"“I understand excitement. But people are often in a hurry to take funny photos. My lunch time and rest time are affected by shouting, flashing cameras, and strange ideas.”"},{"type":"p","text":"Ms. Hoshino said, “Be affected by means be influenced by something. Animals can be affected by stress too.”"},{"type":"p","text":"Kenta looked up at the giraffe."},{"type":"p","text":"“His neck is amazing, but his eyes look tired.”"},{"type":"p","text":"“Good observation,” said Ms. Hoshino. “Mental health means how the mind feels. We usually use it for people, but animals also need calm conditions.”"},{"type":"p","text":"Riku studied the board."},{"type":"p","text":"“The majority of visitors voted yes for the slide. But Mr. Kirinda rejects it.”"},{"type":"p","text":"“A majority opinion matters,” said Ms. Hoshino. “But it is not enough if the animal is uncomfortable.”"},{"type":"p","text":"Taku crossed out the plan."},{"type":"p","text":"“I do not approve the giraffe neck slide.”"},{"type":"p","text":"Mr. Kirinda smiled."},{"type":"p","text":"“Thank you.”"},{"type":"p","text":"Riku raised a finger."},{"type":"p","text":"“I have a creative idea. We can enhance the visitor experience with a safe model slide shaped like a giraffe. Nobody touches Mr. Kirinda. Some money can go to charity for wildlife care.”"},{"type":"p","text":"“That is much better,” said Ms. Hoshino."},{"type":"p","text":"A sign on the fence listed the giraffe field regulation:"},{"type":"p","text":"Do not shout. Do not touch the giraffe without staff permission. Do not use a giraffe as a slide. Respect long necks and short patience."},{"type":"p","text":"Taku read it aloud."},{"type":"p","text":"“Respect long necks and short patience. That is a strong regulation.”"},{"type":"p","text":"Kenta stared at the word GIRAFFE on the sign."},{"type":"p","text":"“What does GIRAFFE stand for?”"},{"type":"p","text":"Riku quickly said, “Gentle, Impossibly Ridiculous Animal For Friendly Education.”"},{"type":"p","text":"Ms. Hoshino sighed."},{"type":"p","text":"“Stand for can mean represent. The meaning is correct. The acronym is strange.”"},{"type":"p","text":"Mr. Kirinda laughed softly."},{"type":"p","text":"“In other words, I can rest, and visitors can slide safely on a model.”"},{"type":"p","text":"Taku added another rule to his notebook."},{"type":"p","text":"Zoo management rule two: Fun is good, but animal safety comes first."},{"type":"p","text":"Riku built a small model slide from blocks, safe foam, and cardboard."},{"type":"p","text":"“Initial test,” he said."},{"type":"p","text":"“Initial safety check first,” said Ms. Hoshino."},{"type":"p","text":"The model slide worked. Taku slid down and landed safely. Kenta slid down and shouted, “Frog landing!” Riku slid down and took notes."},{"type":"p","text":"Then the model slide stretched too far."},{"type":"p","text":"“Riku,” said Ms. Hoshino, “why does the exit go into the penguin meeting room?”"},{"type":"p","text":"Riku looked at his map."},{"type":"p","text":"“Accidental transportation.”"},{"type":"p","text":"At the bottom of the slide, a group of penguins stared at them."},{"type":"p","text":"One penguin held a tiny fish-shaped gavel."},{"type":"p","text":"“Who slid into our meeting?” he asked."},{"type":"p","text":"Taku stood up."},{"type":"p","text":"“Sorry. I am the temporary zoo boss.”"},{"type":"p","text":"The penguin nodded seriously."},{"type":"p","text":"“Then you must attend the meeting.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Chairpenguin Penbert’s Very Serious Meeting"},{"type":"p","text":"The penguin room was cold and tidy."},{"type":"p","text":"At the front stood Chairpenguin Penbert. He wore a tiny badge and tapped the table with a fish-shaped gavel."},{"type":"p","text":"“This meeting is scheduled to begin now,” he said."},{"type":"p","text":"Taku whispered, “The penguin has better meeting skills than our class.”"},{"type":"p","text":"Ms. Hoshino whispered back, “Please do not compare classmates with penguins during a meeting.”"},{"type":"p","text":"The agenda was written on a board:"},{"type":"p","text":"Penguin Curriculum and Remote Ice Home Article"},{"type":"p","text":"Kenta raised his hand."},{"type":"p","text":"“What is a curriculum?”"},{"type":"p","text":"“A curriculum is a plan for what students learn,” said Ms. Hoshino. “Here, it means the zoo’s penguin learning program.”"},{"type":"p","text":"Chairpenguin Penbert tapped the gavel."},{"type":"p","text":"“Article One: Penguins are birds. Article Two: Penguins do not have flight like many birds. Article Three: Penguins are excellent swimmers.”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Penguins do not fly?”"},{"type":"p","text":"“As far as I know, we swim better than we fly,” said Penbert."},{"type":"p","text":"Ms. Hoshino explained, “Penguins are birds, but they cannot fly in the air. Their wings work like flippers in water.”"},{"type":"p","text":"An elderly penguin raised one wing. He looked calm, even under the pressure of a very serious meeting."},{"type":"p","text":"“I am Elderly Pencho,” he said. “You may borrow my old gavel, but do not borrow my fish lunch.”"},{"type":"p","text":"“Noted,” said Riku."},{"type":"p","text":"Penbert pointed to a map."},{"type":"p","text":"“Our wild relatives live far away. Far, distant, and remote all mean not near. Some penguin homes are located in remote areas.”"},{"type":"p","text":"Taku leaned closer."},{"type":"p","text":"“Like a far ice planet?”"},{"type":"p","text":"“Not a planet,” said Ms. Hoshino. “But yes, some homes are very far from here.”"},{"type":"p","text":"Another board showed waves hitting a shore."},{"type":"p","text":"“Erosion is also in the article,” said Penbert. “Water, wind, or ice can wear away land.”"},{"type":"p","text":"Ms. Hoshino nodded."},{"type":"p","text":"“Erosion can affect coasts and animal homes. We explain it gently, but it is important.”"},{"type":"p","text":"The penguins began to discuss a sign that said, “Penguin Flight Practice Show.”"},{"type":"p","text":"Penbert looked upset."},{"type":"p","text":"“That sign is in the wrong context. Visitors may think we are failed flying birds.”"},{"type":"p","text":"Taku said, “But the context is wrong. You are not flight failures. You are swimming experts.”"},{"type":"p","text":"“The chair favors that statement,” said Penbert."},{"type":"p","text":"Riku adjusted the schedule."},{"type":"p","text":"“I schedule the swimming lesson after the fish break.”"},{"type":"p","text":"The penguins clapped with their flippers."},{"type":"p","text":"Then a young penguin pointed at the glass wall."},{"type":"p","text":"“Also, we need a rule to keep visitors from tapping the glass.”"},{"type":"p","text":"Ms. Hoshino said, “Keep A from -ing means prevent A from doing something. Good rule.”"},{"type":"p","text":"Taku wrote another note."},{"type":"p","text":"Zoo management rule three: Correct information helps animals and visitors."},{"type":"p","text":"Penbert ended the meeting."},{"type":"p","text":"“Meeting closed by belly slide.”"},{"type":"p","text":"All the penguins jumped onto their bellies and slid across the room."},{"type":"p","text":"Kenta watched with shining eyes."},{"type":"p","text":"“This is not only a meeting but also a sport.”"},{"type":"p","text":"“Not only A but also B,” said Ms. Hoshino. “Good pattern. But please do not belly slide without permission.”"},{"type":"p","text":"Suddenly, a monkey ran past the door carrying a pile of worksheets."},{"type":"p","text":"The monkey shouted, “Homework! Fast homework! Banana answers guaranteed!”"},{"type":"p","text":"Taku froze."},{"type":"p","text":"“That sounds useful.”"},{"type":"p","text":"Ms. Hoshino said, “No. It sounds dishonest.”"},{"type":"h2","text":"Chapter 4"},{"type":"h3","text":"Monkey Sarumaru’s Homework Department"},{"type":"p","text":"The group followed the monkey to Monkey Mountain."},{"type":"p","text":"A sign hung between two trees."},{"type":"p","text":"Monkey Homework Department We do homework for bananas. Math, English, drawing, and banana science included."},{"type":"p","text":"Monkey Sarumaru, the boss, sat behind a desk made of crates. He wore a small tie and held a banana-shaped pen."},{"type":"p","text":"“Welcome!” he said. “Our department can include math, English, and banana science. Human children tend to complain about homework, so we help.”"},{"type":"p","text":"Taku looked at his backpack."},{"type":"p","text":"“Just one problem maybe?”"},{"type":"p","text":"Ms. Hoshino said, “Homework is for practice. A monkey may give a hint, but it should not do it for you.”"},{"type":"p","text":"Sarumaru waved a worksheet."},{"type":"p","text":"“Do not worry. Final answer: banana.”"},{"type":"p","text":"He wrote fast."},{"type":"p","text":"Question 1: banana. Question 2: banana. Question 3: banana. Name: banana."},{"type":"p","text":"Kenta nodded seriously."},{"type":"p","text":"“The monkey has a clear academic style.”"},{"type":"p","text":"“No,” said Ms. Hoshino. “That is not academic work.”"},{"type":"p","text":"Riku took out a small device."},{"type":"p","text":"“This is my Monkey Homework Detector. Initial test.”"},{"type":"p","text":"The detector beeped."},{"type":"p","text":"Banana risk level: 99. Learning level: 2. Frog relation: 0."},{"type":"p","text":"Kenta frowned."},{"type":"p","text":"“That last line may be wrong.”"},{"type":"p","text":"Sarumaru complained."},{"type":"p","text":"“Human homework is boring. Bananas are honest.”"},{"type":"p","text":"“Complain means say you are not happy about something,” said Ms. Hoshino. “But complaining does not make banana answers correct.”"},{"type":"p","text":"Sarumaru showed them an applicant form."},{"type":"p","text":"Monkey Homework Department Applicant Form Requirement 1: Likes bananas. Requirement 2: Writes quickly. Requirement 3: Does not worry about spelling. Payment: one banana or calorie exchange."},{"type":"p","text":"Ms. Hoshino pointed to the word calorie."},{"type":"p","text":"“A calorie is a unit of energy in food. It is not a good homework payment plan.”"},{"type":"p","text":"Kenta watched the monkeys climb, play, and share food."},{"type":"p","text":"“I am interested in monkey behavior,” he said. “Not only funny answers but also how they learn.”"},{"type":"p","text":"“That is a very good way to watch wildlife,” said Ms. Hoshino."},{"type":"p","text":"Sarumaru scratched his head."},{"type":"p","text":"“But our customers want easy answers.”"},{"type":"p","text":"Taku looked at the banana worksheet."},{"type":"p","text":"“I wanted easy answers for one second,” he admitted. “But if the monkey does everything, I do not learn.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That is honest.”"},{"type":"p","text":"Riku changed the sign."},{"type":"p","text":"Monkey Homework Department is now: Monkey Hint Department Hints, not answers. Banana jokes limited."},{"type":"p","text":"Sarumaru read the new sign."},{"type":"p","text":"“Can I still say banana?”"},{"type":"p","text":"“One time,” said Ms. Hoshino."},{"type":"p","text":"Sarumaru grinned."},{"type":"p","text":"“Banana.”"},{"type":"p","text":"“Now stop,” said Ms. Hoshino."},{"type":"p","text":"Taku wrote another rule."},{"type":"p","text":"Zoo management rule four: Help is good. Cheating is not help."},{"type":"p","text":"Sarumaru waved as they left."},{"type":"p","text":"“I will drop by your classroom tomorrow!”"},{"type":"p","text":"“No monkey homework visits,” said Ms. Hoshino."},{"type":"p","text":"“Can he drop by the frog pond?” asked Kenta."},{"type":"p","text":"“Also no.”"},{"type":"p","text":"Ms. Hoshino added, “A good learner is patient. Patient can also mean a person receiving medical care, but here it means able to wait and keep trying.”"},{"type":"p","text":"Sarumaru looked thoughtful."},{"type":"p","text":"“I will be patient. Final answer tomorrow: maybe not banana.”"},{"type":"p","text":"Everyone stared at him."},{"type":"p","text":"“Progress,” said Riku."},{"type":"h2","text":"Chapter 5"},{"type":"h3","text":"The After-Hours Animal Dance Festival"},{"type":"p","text":"The sun began to go down. Visitors left the zoo. Taku thought his job was finished."},{"type":"p","text":"Then the zoo speaker turned on."},{"type":"p","text":"“After-hours Animal Dance Festival begins now.”"},{"type":"p","text":"Lights came on softly. Music played. Animals gathered in safe areas, with staff watching carefully."},{"type":"p","text":"Sir Gaozaimasu stepped forward and bowed."},{"type":"p","text":"“Would you kindly keep the volume at a polite level?”"},{"type":"p","text":"Riku stood by the sound equipment."},{"type":"p","text":"“I will manage the sound system.”"},{"type":"p","text":"He raised the volume."},{"type":"p","text":"Sir Gaozaimasu’s tail twitched."},{"type":"p","text":"“Negative feedback,” said Riku. “Useful data.”"},{"type":"p","text":"“Negative feedback can help us improve,” said Ms. Hoshino. “It is not always an insult.”"},{"type":"p","text":"Mr. Kirinda danced by moving only his feet."},{"type":"p","text":"“My neck is resting,” he said."},{"type":"p","text":"The penguins did a belly-slide circle, but only on the safe ice mat."},{"type":"p","text":"Chairpenguin Penbert shouted, “This slide is scheduled and approved!”"},{"type":"p","text":"Sarumaru held a banana like a microphone."},{"type":"p","text":"“Banana rap begins!”"},{"type":"p","text":"Ms. Hoshino said, “One verse only.”"},{"type":"p","text":"Kenta did three frog jumps outside the animal area."},{"type":"p","text":"“Visitors may watch,” said Ms. Hoshino, “but do not enter animal areas.”"},{"type":"p","text":"Director Yamashita finally arrived, fully awake."},{"type":"p","text":"“Taku,” he said, “may I interview you?”"},{"type":"p","text":"Taku stood straight."},{"type":"p","text":"“Yes.”"},{"type":"p","text":"Director Yamashita asked, “What advice would you give to the next one-day zoo boss?”"},{"type":"p","text":"Taku thought about the day."},{"type":"p","text":"“At first, I wanted to create a space zoo. Then I found out a zoo boss must manage safety, listen calmly, and care for animals.”"},{"type":"p","text":"Director Yamashita nodded."},{"type":"p","text":"“Good advice.”"},{"type":"p","text":"Ms. Hoshino added, “Care for can mean take care of. It can also mean like. Here, both ideas are close.”"},{"type":"p","text":"Director Yamashita looked around."},{"type":"p","text":"“This zoo had a trend of making everything bigger, louder, and sillier. Some problems result from good ideas used in the wrong way.”"},{"type":"p","text":"Taku nodded."},{"type":"p","text":"“The giraffe slide idea was creative, but wrong for a real giraffe. The monkey homework idea was funny, but dishonest. The penguin sign was silly, but it gave wrong information.”"},{"type":"p","text":"Sir Gaozaimasu raised one paw politely."},{"type":"p","text":"“I was once called a scary lion. Today, I feel less misunderstood.”"},{"type":"p","text":"Ms. Hoshino said, “Dis- can add a negative or opposite meaning, like disappear, disagree, dishonest, and sometimes misunderstood.”"},{"type":"p","text":"Riku wrote that down."},{"type":"p","text":"Director Yamashita handed Taku a medal."},{"type":"p","text":"“In exchange for your calm leadership and respectful care, the animals want to give you this.”"},{"type":"p","text":"The medal said:"},{"type":"p","text":"For calm leadership and respectful care. Temporary Zoo Boss Taku."},{"type":"p","text":"Taku smiled."},{"type":"p","text":"“This is better than a space zoo medal.”"},{"type":"p","text":"Kenta whispered, “But a frog lion medal would also be nice.”"},{"type":"p","text":"Ms. Hoshino heard him."},{"type":"p","text":"“No frog lion employment.”"},{"type":"p","text":"“Employment means a job, right?” asked Taku."},{"type":"p","text":"“Yes,” said Ms. Hoshino. “And there is no job for a frog lion because there is no frog lion.”"},{"type":"p","text":"The dance festival ended with a penguin belly-slide finale. Everyone clapped."},{"type":"p","text":"Then Sarumaru ran in with one last worksheet."},{"type":"p","text":"“Final answer!” he shouted."},{"type":"p","text":"Everyone waited."},{"type":"p","text":"Sarumaru wrote slowly."},{"type":"p","text":"Hint: Try again. Answer: Your own work."},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“That is much better.”"},{"type":"p","text":"Sarumaru added a tiny banana drawing."},{"type":"p","text":"“Small improvement,” said Riku."},{"type":"p","text":"Sir Gaozaimasu bowed to Taku."},{"type":"p","text":"“A good zoo boss listens before deciding.”"},{"type":"p","text":"Taku looked at the animals, the staff, his friends, and Ms. Hoshino."},{"type":"p","text":"“Today I learned that fun is not enough. Animals need respect. Visitors need safety. Staff need support. And monkeys need fewer banana worksheets.”"},{"type":"p","text":"Kenta raised a hand."},{"type":"p","text":"“And frogs need a zoo section.”"},{"type":"p","text":"Ms. Hoshino said, “We will discuss that never.”"},{"type":"p","text":"The zoo lights turned soft. The animals went to their resting places. Taku took off the temporary badge and gave it back to Director Yamashita."},{"type":"p","text":"As they left, the sign at the gate changed."},{"type":"p","text":"Thank you for visiting Silly Zoo. Goal achieved: More listening. Less shouting. No giraffe slide. One banana answer reduced."},{"type":"p","text":"Taku laughed."},{"type":"p","text":"“This was probably a mission.”"},{"type":"p","text":"Ms. Hoshino smiled."},{"type":"p","text":"“It was definitely a field trip.”"},{"type":"p","text":"Kenta looked back at the pond."},{"type":"p","text":"Something small went, “ribbit.”"},{"type":"p","text":"Kenta gasped."},{"type":"p","text":"“Frog evidence!”"},{"type":"p","text":"Ms. Hoshino kept walking."},{"type":"p","text":"“Normal frog. Not frog lion.”"},{"type":"p","text":"The End"}]},{"themeNo":15,"id":"15","title":"Toy Court and Teddy Lawyer","blocks":[{"type":"h2","text":"Chapter 1"},{"type":"h3","text":"The Night the Mini Car Sued"},{"type":"p","text":"After school, Taku, Kenta, Riku, and Ms. Hoshino were cleaning the classroom toy corner."},{"type":"p","text":"There were blocks, mini cars, stuffed animals, toy robots, dinosaur figures, and one green frog eraser."},{"type":"p","text":"Taku looked at the mountain of toys and said, “This is probably a mission.”"},{"type":"p","text":"Kenta picked up the frog eraser and said, “Maybe Froggy is the judge.”"},{"type":"p","text":"Ms. Hoshino said, “It is probably not the judge. Also, please do not add a frog to every legal system.”"},{"type":"p","text":"Riku pushed a box under the table. “Initial test. The toy box can hold thirty-two blocks, six cars, and one suspicious frog eraser.”"},{"type":"p","text":"Ms. Hoshino nodded. “Good. Now we clean up, not conduct an experiment.”"},{"type":"p","text":"Just then, the classroom lights blinked."},{"type":"p","text":"Pika."},{"type":"p","text":"Pika."},{"type":"p","text":"Piko."},{"type":"p","text":"The toy box opened by itself, and a tiny courtroom rose from inside. The judge’s desk was an upside-down pencil case. The chairs were building blocks. The gavel was a squeaky toy hammer."},{"type":"p","text":"A sign appeared."},{"type":"p","text":"Toy Court is now open. Toy Box Government and Toy Democracy are in session."},{"type":"p","text":"Taku whispered, “The toys have a government?”"},{"type":"p","text":"Ms. Hoshino whispered back, “In this story, yes. But it is a toy government for rules, storage, and fairness.”"},{"type":"p","text":"A red mini car rolled to the front."},{"type":"p","text":"“My name is Red,” said the mini car. “I sue the block road. It disappointed me.”"},{"type":"p","text":"The squeaky hammer went, “Piko!”"},{"type":"p","text":"Judge Piko-Hammer said, “Order in the toy court.”"},{"type":"p","text":"Red continued. “I was driving for a while. I was fast. I was brave. I was almost winning the Great Desk Leg Race. Then, suddenly, a wall of blocks stopped me. I need a reliable road!”"},{"type":"p","text":"Kenta leaned closer. “Does the car have feelings?”"},{"type":"p","text":"Red honked. “Yes. Additionally, I lost my appetite for racing.”"},{"type":"p","text":"Ms. Hoshino said, “Appetite usually means a desire for food. Here, Red means he lost his desire to race. Cars do not usually eat lunch.”"},{"type":"p","text":"Kenta looked disappointed. “So no tire sandwiches?”"},{"type":"p","text":"“No tire sandwiches,” said Ms. Hoshino."},{"type":"p","text":"Judge Piko-Hammer raised the squeaky hammer. “Whether or not the blocks are guilty, this court needs facts.”"},{"type":"p","text":"Taku pointed at the road. “The mini car lost its orbit!”"},{"type":"p","text":"Ms. Hoshino smiled. “A planet has an orbit in space because of gravity. A car has a route or road. Still, both need a clear path.”"},{"type":"p","text":"A tiny poster dropped from the wall."},{"type":"p","text":"Court Goal: Promote Toy Safety Awareness."},{"type":"p","text":"Ms. Hoshino said, “Awareness means knowing about a problem. Are we all aware that toys on the floor can be dangerous?”"},{"type":"p","text":"The toys shouted, “Aware!”"},{"type":"p","text":"The frog eraser made no sound."},{"type":"p","text":"Kenta held it up. “Froggy is aware silently.”"},{"type":"p","text":"Judge Piko-Hammer said, “The court will hear all sides. We are not here only to criticize. We are here to solve the conflict.”"},{"type":"p","text":"Red beeped. “Then I demand a road that can make up for my crash.”"},{"type":"p","text":"A tiny robot clerk wrote everything down. “Case type: mysterious, dangerous, ridiculous, and possibly block-ous.”"},{"type":"p","text":"Ms. Hoshino said, “The suffix -ous can mean ‘full of’ or ‘having.’ Dangerous means full of danger. But block-ous is not a normal word.”"},{"type":"p","text":"Taku grinned. “It should be.”"},{"type":"p","text":"The judge hit the hammer again."},{"type":"p","text":"“Piko! Call the block witnesses.”"},{"type":"h2","text":"Chapter 2"},{"type":"h3","text":"The Block Witnesses"},{"type":"p","text":"The blocks walked to the witness stand."},{"type":"p","text":"Kaku."},{"type":"p","text":"Kaku."},{"type":"p","text":"Kaku."},{"type":"p","text":"They moved in little square steps. Their leader was a blue block named Bruno."},{"type":"p","text":"Bruno said, “I argue that we did not block the road on purpose.”"},{"type":"p","text":"Red honked. “You were right in the middle of the track!”"},{"type":"p","text":"Bruno nodded. “That is true. But we relate to Riku’s space base project.”"},{"type":"p","text":"Everyone looked at Riku."},{"type":"p","text":"Riku looked at the floor. “That is correct. I built a space base yesterday. I planned to complete it, but the cleanup bell rang.”"},{"type":"p","text":"Ms. Hoshino said, “Thank you for being honest.”"},{"type":"p","text":"Bruno held up a tiny paper."},{"type":"p","text":"Toy Material Rights Declaration."},{"type":"p","text":"He read it aloud. “Blocks are allowed to be roads, walls, rockets, castles, towers, and frog hotels. Be allowed to means to have permission.”"},{"type":"p","text":"Kenta jumped. “Frog hotels are important.”"},{"type":"p","text":"Ms. Hoshino said, “Not in this case.”"},{"type":"p","text":"Bruno continued. “We enjoy becoming many things. We are building material.”"},{"type":"p","text":"Ms. Hoshino explained, “Material means what something is made of. A block may be plastic or wood. A stuffed bear may be cloth. Different material needs different care.”"},{"type":"p","text":"A yellow block stood up. “In addition to fun, we need safety.”"},{"type":"p","text":"A green block added, “In particular, we need a clear choice. Are we a road? Are we a space station? Or are we going back to the storage box?”"},{"type":"p","text":"Riku nodded. “My space base was unique. It stood out.”"},{"type":"p","text":"Ms. Hoshino said, “Standing out is nice. But leaving blocks on the floor can be a critical safety problem. A critical problem is very serious.”"},{"type":"p","text":"Kenta crawled under the witness stand. “I find, or discover, a small green block. It may be a frog egg.”"},{"type":"p","text":"The green block shouted, “I am not an egg.”"},{"type":"p","text":"Ms. Hoshino said, “Find and discover are similar. The frog egg idea is not correct.”"},{"type":"p","text":"Kenta bowed to the block. “I apologize. You have strong pond energy.”"},{"type":"p","text":"Bruno sighed. “We blocks have no nutrition. We are not food. But we feed imagination.”"},{"type":"p","text":"Taku smiled. “That was deep for a block.”"},{"type":"p","text":"Ms. Hoshino said, “Nutrition is about food and health. But ‘feed imagination’ is a nice expression.”"},{"type":"p","text":"Red honked again. “But imagination does not fix my front bumper!”"},{"type":"p","text":"Bruno said, “We do not deny your crash. We only ask the court to understand our role.”"},{"type":"p","text":"Judge Piko-Hammer nodded. “The court understands. The blocks may be involved, but the story is not complete.”"},{"type":"p","text":"Then a loud voice blasted from the toy box."},{"type":"p","text":"“OBJECTION MODE ACTIVATED!”"},{"type":"p","text":"A robot rolled into court."},{"type":"p","text":"Its head was a calculator. Its arms were red pens. Its chest said FAST JUSTICE MODE."},{"type":"p","text":"“I am Prosecutor Bishibashi 3000,” said the robot. “I seek justice quickly. Rapidly. Immediately. Possibly before snack time.”"},{"type":"p","text":"Ms. Hoshino murmured, “This may become noisy.”"},{"type":"h2","text":"Chapter 3"},{"type":"h3","text":"Prosecutor Bishibashi 3000"},{"type":"p","text":"Bishibashi 3000 rolled to the front at top speed."},{"type":"p","text":"“As for the blocks,” he said, “they bother cars, feature dangerous corners, and seek to control the floor!”"},{"type":"p","text":"Taku blinked. “Did he say the blocks want to control the floor?”"},{"type":"p","text":"Riku checked the robot’s speech meter. “He said it very quickly. Quickly and rapidly are similar.”"},{"type":"p","text":"Judge Piko-Hammer said, “Please slow down.”"},{"type":"p","text":"Bishibashi beeped. “Impossible. Fast justice mode cannot slow down. I charge the blocks with road trouble!”"},{"type":"p","text":"Then his battery light flashed."},{"type":"p","text":"“Also, I need to charge my battery.”"},{"type":"p","text":"Kenta raised his hand. “So charge means blame, money, and battery?”"},{"type":"p","text":"Ms. Hoshino said, “Yes. Charge is a us
